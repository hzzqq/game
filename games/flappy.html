<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TERMINAL // FLAPPY</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --sub:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  .window{
    position:relative; width:440px; max-width:100%;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    box-shadow:0 20px 60px rgba(0,0,0,.55); overflow:hidden;
  }
  .titlebar{
    display:flex; align-items:center; gap:10px; height:40px; padding:0 14px;
    background:linear-gradient(180deg,#161d28,#10151d); border-bottom:1px solid var(--border);
  }
  .dot{ width:12px; height:12px; border-radius:50%; }
  .dot.r{ background:#ff5f56; } .dot.y{ background:#ffbd2e; } .dot.g{ background:#27c93f; }
  .title{ flex:1; text-align:center; font-size:13px; letter-spacing:2px; }
  .title .accent{ color:var(--red); }
  .stage{ position:relative; padding:14px; background:var(--bg); }
  canvas{ display:block; width:100%; height:auto; border-radius:6px; background:#0d1420; touch-action:none; }
  .bar{ display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--border); }
  button{
    flex:1; font-family:inherit; font-size:12px; cursor:pointer; border-radius:6px;
    padding:9px 10px; border:1px solid var(--border); background:transparent; color:var(--text); transition:all .15s;
  }
  button:hover:not(:disabled){ border-color:var(--red); }
  .btn-main{ background:var(--red); color:#0a0e14; border-color:var(--red); font-weight:700; box-shadow:0 0 12px rgba(246,70,93,.35); }
  .hint{ padding:0 14px 12px; color:var(--sub); font-size:11px; text-align:center; }
  .diffbar{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; padding:0 14px 12px; }
  .diffbar button{ background:var(--panel,#121821); color:var(--sub,#6b7785); border:1px solid var(--border); border-radius:8px; padding:6px 13px; font-weight:700; cursor:pointer; font-family:inherit; font-size:12px; }
  .diffbar button.active{ background:var(--gold,#f0b90b); color:#0a0e14; border-color:var(--gold,#f0b90b); }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">TERMINAL // <span class="accent">FLAPPY</span> · 像素小鸟</span>
    </div>
    <div class="stage">
      <canvas id="cv" width="400" height="600"></canvas>
    </div>
    <div class="bar">
      <button id="btnFlap" class="btn-main">拍翅 ▲</button>
      <button id="btnMute">🔊 音效</button>
    </div>
    <div class="hint">空格 / ↑ / W / 点按 拍翅 · 穿过管道得分 · 撞管或落地即结束</div>
    <div class="diffbar" id="diffbar"></div>
  </div>

  <script src="juice.js"></script>
  <script>
  (function () {
    var COL = { red:'#f6465d', green:'#02c076', gold:'#f0b90b', dim:'#6b7785' };
    var W = 400, H = 600;
    var GROUND = H - 70;
    var canvas = document.getElementById('cv');
    var ctx = canvas.getContext('2d');

    var GRAV = 1150;       // 重力 px/s^2
    var FLAP = -360;       // 拍翅初速
    var PIPE_W = 62;
    var BASE_GAP = 158;        // 基准管道间隙
    var BASE_PIPE_SPD = 155;   // 基准管道左移速度
    var GAP = BASE_GAP;        // 当前间隙（随难度在 reset 时重设）
    var PIPE_SPD = BASE_PIPE_SPD; // 当前左移速度
    var SPAWN_DX = 230;    // 相邻管道水平间距

    // ---------- 难度系统（简单/普通/困难/地狱）----------
    // gapMult=间隙倍率（越小越难）；spdMult=管道速度倍率（越大越难）
    // normal=1.0 保持原有手感（避免破坏既有单测）
    var DIFFICULTY = {
      easy:   { label:'简单', gapMult:1.22, spdMult:0.82 },
      normal: { label:'普通', gapMult:1.0,  spdMult:1.0 },
      hard:   { label:'困难', gapMult:0.82, spdMult:1.22 },
      hell:   { label:'地狱', gapMult:0.66, spdMult:1.45 }
    };
    var DIFF_ORDER = ['easy','normal','hard','hell'];
    var difficulty = 'normal';
    function setDifficulty(d){ if(DIFFICULTY[d]){ difficulty=d; return true; } return false; }
    function getDifficulty(){ return difficulty; }
    function diffCfg(){ return DIFFICULTY[difficulty] || DIFFICULTY.normal; }

    var state, bird, pipes, score, best, spawnX, flashMsg, groundHit;
    best = (typeof Juice !== 'undefined') ? (Juice.load('best_flappy', 0) || 0) : 0;

    // 局部种子 PRNG（mulberry32）：注入掉落随机必须走它，禁止 Math.random
    function mk(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
    var _rng = mk(0xF1A9B0B & 0xFFFFFFFF);
    function reseed(s){ _rng = mk((s>>>0) || 1); }
    function nowMs(){ return (typeof performance!=='undefined' && performance.now) ? performance.now() : 0; }

    // 掉落道具（纯注入，不改核心玩法）
    var lives = 1;        // 额外命（heart 提供）；默认 1 = 一击即死
    var boostUntil = 0;   // 🚀 加速
    var shieldUntil = 0;  // 🛡 护盾（免一次致死）
    var pickups = [];     // {x,y,vy,type}
    var pickupTimer = 0;  // 自动掉落计时（仅真实循环 frame 驱动）

    function reset() {
      state = 'menu';
      bird = { x: 96, y: H * 0.42, vy: 0, r: 13 };
      pipes = [];
      score = 0;
      spawnX = W + 80;
      flashMsg = '';
      groundHit = false;
      lives = 1; boostUntil = 0; shieldUntil = 0; pickups = []; pickupTimer = 0;
      GAP = Math.round(BASE_GAP * diffCfg().gapMult);
      PIPE_SPD = BASE_PIPE_SPD * diffCfg().spdMult;
      reseed(0xF1A9B0B & 0xFFFFFFFF);
      spawnPipe(W + 120);
      spawnPipe(W + 120 + SPAWN_DX);
      spawnPipe(W + 120 + SPAWN_DX * 2);
    }

    function spawnPipe(x) {
      var margin = 70;
      var gapY = margin + Math.random() * (GROUND - GAP - margin * 2);
      pipes.push({ x: x == null ? spawnX : x, gapY: gapY, scored: false });
      spawnX += SPAWN_DX;
    }

    // ---------- 掉落道具（纯注入，不改核心玩法）----------
    function makePickup(type, x, y) { return { x: x, y: y, vy: 120, type: type }; }
    var PICKUP_TYPES = ['heart', 'rocket', 'gem'];
    // 自动掉落（局部 PRNG）：从顶部随机 x 落下
    function spawnPickupAtRandom() {
      if (pickups.length >= 2) return;
      var x = 40 + _rng() * (W - 80);
      var type = PICKUP_TYPES[(_rng() * PICKUP_TYPES.length) | 0];
      pickups.push(makePickup(type, x, -10));
    }
    // 拾取生效：返回 true 表示已应用
    function applyPickup(type) {
      if (type === 'heart') { lives += 1; }                 // ❤ 回血/额外命
      else if (type === 'rocket') { boostUntil = nowMs() + 5000; score += 5; } // 🚀 加速+加分
      else { score += 10; }                              // 💰 加分
      if (typeof Juice !== 'undefined') {
        var sym = type === 'heart' ? '❤' : (type === 'rocket' ? '🚀' : '💰');
        Juice.sfx('pickup'); Juice.popup(bird.x, bird.y - 20, sym, COL.gold, { size: 16 });
      }
      return true;
    }
    // 下落 + 鸟接住（确定性，无随机；pickups 为空时无害）
    function updatePickups(dt) {
      for (var i = pickups.length - 1; i >= 0; i--) {
        var p = pickups[i];
        p.y += p.vy * dt;
        if (p.y > H + 20) { pickups.splice(i, 1); continue; }
        var dx = p.x - bird.x, dy = p.y - bird.y;
        if (dx * dx + dy * dy < (bird.r + 8) * (bird.r + 8)) {
          applyPickup(p.type);
          pickups.splice(i, 1);
        }
      }
    }
    // 致死分支：有额外命则 revive 存活，无则 dead
    function birdHit() {
      if (lives > 1) { lives -= 1; reviveBird(); return true; }
      return false;
    }
    function reviveBird() {
      bird.y = H * 0.42; bird.vy = 0;
      // 放到最近管道间隙中央，避免立即再死
      var best = null, bestD = 1e9;
      for (var i = 0; i < pipes.length; i++) {
        var p = pipes[i];
        var d = Math.abs(p.x - bird.x);
        if (d < bestD) { bestD = d; best = p; }
      }
      if (best) bird.y = best.gapY + GAP / 2;
    }

    function flap() {
      if (state === 'menu') { state = 'play'; bird.vy = FLAP; return; }
      if (state === 'dead') { reset(); state = 'play'; bird.vy = FLAP; return; }
      bird.vy = FLAP;
      if (typeof Juice !== 'undefined') { Juice.sfx('click'); Juice.burst(bird.x, bird.y, { color: COL.red, n: 5, speed: 130, life: 0.4 }); }
    }

    // 纯碰撞判定：鸟圆 vs 管道矩形 / 地面 / 天花板
    function hits() {
      if (bird.y + bird.r >= GROUND) return true;
      if (bird.y - bird.r <= 0) return true;
      for (var i = 0; i < pipes.length; i++) {
        var p = pipes[i];
        if (bird.x + bird.r < p.x || bird.x - bird.r > p.x + PIPE_W) continue;
        var topH = p.gapY, botY = p.gapY + GAP;
        if (bird.y - bird.r < topH || bird.y + bird.r > botY) return true;
      }
      return false;
    }

    function update(dt) {
      if (state !== 'play') return;
      bird.vy += GRAV * dt;
      bird.y += bird.vy * dt;
      for (var i = 0; i < pipes.length; i++) {
        var p = pipes[i];
        p.x -= PIPE_SPD * dt;
        if (!p.scored && p.x + PIPE_W < bird.x) {
          p.scored = true; score++;
          if (typeof Juice !== 'undefined') { Juice.sfx('pickup'); Juice.popup(bird.x, bird.y - 24, '+1', COL.gold, { size: 18 }); }
        }
      }
      // 回收越界管道并补新
      while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      while (pipes.length < 3) spawnPipe();
      // 掉落道具下落 + 拾取（pickups 为空时无害）
      updatePickups(dt);
      if (hits()) {
        if (!birdHit()) {  // 有额外命则 revive 存活，否则 dead
          state = 'dead';
          if (typeof Juice !== 'undefined') {
            Juice.sfx('lose'); Juice.addTrauma(0.6); Juice.flash('#f6465d', 0.35);
            Juice.burst(bird.x, bird.y, { color: '#f6465d', n: 18, speed: 240 });
            Juice.ring(bird.x, bird.y, { color: '#f6465d', r1: 70 });
            var b = Juice.best('best_flappy', score);
            if (b.isNew) Juice.achievement('🏆 新纪录 ' + score + '！');
          }
          best = Math.max(best, score);
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // 背景
      var g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#0d1420'); g.addColorStop(1, '#0a0e14');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      // 管道
      for (var i = 0; i < pipes.length; i++) {
        var p = pipes[i];
        ctx.fillStyle = COL.green;
        ctx.fillRect(p.x, 0, PIPE_W, p.gapY);
        ctx.fillRect(p.x, p.gapY + GAP, PIPE_W, GROUND - (p.gapY + GAP));
        ctx.fillStyle = 'rgba(255,255,255,.12)';
        ctx.fillRect(p.x, p.gapY - 6, PIPE_W, 6);
        ctx.fillRect(p.x, p.gapY + GAP, PIPE_W, 6);
      }
      // 地面
      ctx.fillStyle = '#10161f'; ctx.fillRect(0, GROUND, W, H - GROUND);
      ctx.fillStyle = COL.gold; ctx.fillRect(0, GROUND, W, 3);
      // 鸟
      ctx.fillStyle = COL.red;
      ctx.beginPath(); ctx.arc(bird.x, bird.y, bird.r, 0, 7); ctx.fill();
      ctx.fillStyle = '#0a0e14';
      ctx.beginPath(); ctx.arc(bird.x + 5, bird.y - 3, 3, 0, 7); ctx.fill();
      // 掉落道具（辉光圆 + emoji）
      for (var pi = 0; pi < pickups.length; pi++) {
        var pp = pickups[pi];
        var pcol = pp.type === 'heart' ? '#f6465d' : (pp.type === 'rocket' ? '#f0b90b' : '#f0b90b');
        var psym = pp.type === 'heart' ? '❤' : (pp.type === 'rocket' ? '🚀' : '💰');
        ctx.save();
        ctx.shadowColor = pcol; ctx.shadowBlur = 12; ctx.fillStyle = pcol;
        ctx.beginPath(); ctx.arc(pp.x, pp.y, 11, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        ctx.fillStyle = '#0a0e14'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(psym, pp.x, pp.y + 1);
      }
      // 激活增益（左上角）
      var bx = 8, by = 8;
      if (nowMs() < boostUntil) { ctx.fillStyle = COL.gold; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText('🚀', bx, by); by += 18; }
      if (lives > 1) { ctx.fillStyle = COL.red; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText('❤' + lives, bx, by); by += 18; }
      // 分数
      ctx.fillStyle = COL.text || '#e6edf3';
      ctx.font = 'bold 30px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#e6edf3';
      ctx.fillText(score, W / 2, 44);
      if (state === 'menu') {
        ctx.font = 'bold 16px monospace'; ctx.fillStyle = COL.gold;
        ctx.fillText('点击 / 空格 起飞', W / 2, H / 2 + 40);
      }
      if (state === 'dead') {
        ctx.font = 'bold 22px monospace'; ctx.fillStyle = COL.red;
        ctx.fillText('坠毁 · 得分 ' + score, W / 2, H / 2);
        ctx.font = '13px monospace'; ctx.fillStyle = COL.dim;
        ctx.fillText('最佳 ' + best + ' · 点击重来', W / 2, H / 2 + 26);
      }
    }

    function loop(t) {
      var last = 0;
      function frame(ts) {
        var dt = Math.min(0.05, (ts - last) / 1000 || 0); last = ts;
        if (typeof Juice !== 'undefined') Juice.update(dt);
        // 自动掉落（仅真实循环触发；测试直接调 update 不受影响）
        pickupTimer += dt;
        if (pickupTimer >= 5) { pickupTimer = 0; if (pickups.length < 2) spawnPickupAtRandom(); }
        update(dt);
        if (typeof Juice !== 'undefined') Juice.begin(ctx);
        draw();
        if (typeof Juice !== 'undefined') Juice.mid(ctx);
        if (typeof Juice !== 'undefined') Juice.end(ctx);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    // 输入
    function onFlap(e) { if (e) e.preventDefault(); flap(); }
    canvas.addEventListener('pointerdown', onFlap);
    document.getElementById('btnFlap').addEventListener('click', onFlap);
    document.getElementById('btnMute').addEventListener('click', function () {
      if (typeof Juice !== 'undefined') { var m = Juice.toggleMute(); this.textContent = m ? '🔇 静音' : '🔊 音效'; }
    });
    window.addEventListener('keydown', function (e) {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); flap(); }
    });

    function buildDiffBar(){
      if (typeof document === 'undefined') return;
      var bar = document.getElementById('diffbar'); if (!bar) return;
      bar.innerHTML = '';
      DIFF_ORDER.forEach(function (k) {
        var b = document.createElement('button');
        b.textContent = DIFFICULTY[k].label;
        if (k === difficulty) b.className = 'active';
        b.addEventListener('click', function () { setDifficulty(k); reset(); buildDiffBar(); });
        bar.appendChild(b);
      });
    }
    buildDiffBar();

    // 测试钩子（不影响正常玩法）
    window.__t = {
      reset: reset, update: update, flap: flap,
      DIFFICULTY: DIFFICULTY, setDifficulty: setDifficulty, getDifficulty: getDifficulty,
      getGap: function () { return GAP; }, getPipeSpd: function () { return PIPE_SPD; },
      start: function () { reset(); state = 'play'; },
      step: function (dt) { update(dt); },
      spawnPipe: spawnPipe,
      hits: hits,
      setBird: function (y, vy) { bird.y = y; if (vy != null) bird.vy = vy; },
      clearPipes: function () { pipes = []; },
      addPipe: function (x, gapY) { pipes.push({ x: x, gapY: gapY, scored: false }); },
      setStatus: function (s) { state = s; },
      getStatus: function () { return state; },
      getScore: function () { return score; },
      setScore: function (v) { score = v; },
      getBest: function () { return best; },
      GROUND: GROUND, GAP: GAP, PIPE_W: PIPE_W, GRAV: GRAV, FLAP: FLAP,
      // —— 标准掉落钩子 ——
      spawnPickup: function (type, x, y) { pickups.push(makePickup(type, x, y)); },
      applyPickup: function (type) { return applyPickup(type); },
      getPickups: function () { return pickups.map(function (p) { return { x: p.x, y: p.y, type: p.type }; }); },
      setPickups: function (arr) { pickups = (arr || []).map(function (p) { return { x: p.x, y: p.y, vy: 120, type: p.type }; }); },
      stepPickups: function (dt) { updatePickups(dt); },
      makePickup: function (type, x, y) { return makePickup(type, x, y); },
      getBoost: function () { return nowMs() < boostUntil; },
      setBoost: function (v) { boostUntil = v ? nowMs() + 1e9 : 0; },
      getShield: function () { return nowMs() < shieldUntil; },
      setShield: function (v) { shieldUntil = v ? nowMs() + 1e9 : 0; },
      getLives: function () { return lives; },
      setLives: function (v) { lives = v; },
      getState: function () { return { status: state, score: score, best: best,
        boost: nowMs() < boostUntil, shield: nowMs() < shieldUntil, lives: lives,
        bird: { x: bird.x, y: bird.y, vy: bird.vy, r: bird.r },
        pipes: pipes.map(function (p) { return { x: p.x, gapY: p.gapY, scored: p.scored }; }),
        pickups: pickups.map(function (p) { return { x: p.x, y: p.y, type: p.type }; }) }; }
    };

    reset();
    draw();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
