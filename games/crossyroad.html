<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 过马路 CROSSY ROAD</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(2,192,118,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--green)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .controls button{flex:1;min-width:60px;background:var(--green);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.over{color:var(--red);font-weight:700}
  .diffbar{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .diffbar button{flex:0 0 auto;font:600 12px/1 inherit;color:var(--dim);background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;transition:.12s}
  .diffbar button:hover{color:#fff;border-color:#666}
  .diffbar button.active{color:#0a0e14;background:var(--gold);border-color:var(--gold)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>过马路</b> CROSSY ROAD</span></div>
  <div class="wrap">
    <div class="hud"><span>最前行 · <span class="st" id="score">0</span></span><span>状态 · <span class="st" id="st">进行中</span></span></div>
    <div class="boardwrap"><canvas id="board" width="360" height="600"></canvas></div>
    <div class="controls">
      <button data-d="up">↑上</button><button data-d="left">←左</button>
      <button data-d="down">↓下</button><button data-d="right">→右</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="diffbar" id="diffbar"></div>
    <div class="msg" id="msg">方向键跳跃穿越马路与河流。撞车或被水冲走即结束，分数 = 抵达的最前行。</div>
  </div>
  <div class="foot">Crossy Road（过马路）：操纵角色向前跳跃，躲避横向车流、踩着浮木过河。越靠前行号越高分。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;
  // 局部 PRNG（mulberry32）—— 生成只用它，绝不用 Math.random
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x1234c0de);
  function setRand(fn){ if(typeof fn==='function') _rng=fn; }

  // ---- 难度选择系统（简单/普通/困难/地狱，倍率法）----
  // speedMult 缩放障碍移动速度；countMult 缩放障碍生成密度。normal=1.0 保持基线行为。
  var DIFFICULTY = {
    easy:   { label:'简单', speedMult:0.75, countMult:0.7, bossHpMult:0.7 },
    normal: { label:'普通', speedMult:1.0,  countMult:1.0, bossHpMult:1.0 },
    hard:   { label:'困难', speedMult:1.25, countMult:1.3, bossHpMult:1.4 },
    hell:   { label:'地狱', speedMult:1.5,  countMult:1.7, bossHpMult:1.9 }
  };
  var DIFF_ORDER = ['easy','normal','hard','hell'];
  var difficulty = 'normal';
  function diffCfg(){ return DIFFICULTY[difficulty]; }
  function setDifficulty(d){ if(!DIFFICULTY[d]) return false; difficulty=d; if(typeof startGame==='function') startGame(); else if(typeof reset==='function') reset(); return true; }
  function getDifficulty(){ return difficulty; }

  const ROWS = 15, COLS = 9;
  const START_ROW = ROWS - 1;
  let rows, player, gameOver, furthest, score, pickups, bonus;
  const COIN_VALUE = 20;

  // ---- 里程碑正反馈：分数每跨越一个 MILESTONE_STEP 触发一次 confetti（只读钩子 confettiFired）----
  const MILESTONE_STEP = 10;
  let confettiFx = 0;       // 成就命中次数（只读钩子）
  let nextMilestone = MILESTONE_STEP;
  function milestoneFire(){ confettiFx++; if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); }
  function checkMilestone(){ if(score >= nextMilestone){ nextMilestone += MILESTONE_STEP; milestoneFire(); } }

  // ---- Boss 系统（生存型「鹰 Boss」，每 BOSS_EVERY 个里程碑出现）----
  // wave = 里程碑计数：玩家每推进到更靠前的一行 +1；isBossWave 命中的波次召唤鹰。
  const BOSS_EVERY = 3;
  function isBossWave(w){ return w > 0 && (w % BOSS_EVERY) === 0; }
  let boss = null;     // { hp,maxHp,phase,diving,diveCol,diveProgress,diveCd,diveDur,dmgPerRow,lastFurthest }
  let wave = 1;
  // 鹰俯冲命中玩家走护盾优先伤害（复用 die 分支）
  function bossHitPlayer(){ die(); }

  function genField(){
    rows = [];
    for(let r=0; r<ROWS; r++){
      let type;
      if(r === ROWS-1) type = 'safe';          // 起点草地
      else {
        const x = _rng();
        if(x < 0.16) type = 'safe';
        else if(x < 0.62) type = 'road';
        else type = 'river';
      }
      const dir = _rng() < 0.5 ? -1 : 1;
      const speed = (0.4 + _rng() * 1.6) * diffCfg().speedMult;
      const obstacles = [];
      if(type === 'road'){
        const n = Math.max(1, Math.round((2 + Math.floor(_rng()*3)) * diffCfg().countMult));
        for(let i=0;i<n;i++) obstacles.push(_rng()*COLS);
      } else if(type === 'river'){
        const n = Math.max(1, Math.round((2 + Math.floor(_rng()*2)) * diffCfg().countMult));
        for(let i=0;i<n;i++){ obstacles.push({ pos: _rng()*COLS, len: 1 + Math.floor(_rng()*2) }); }
      }
      rows.push({ type, dir, speed, obstacles });
    }
    player = { row: START_ROW, col: Math.floor(COLS/2), shield: 0 };
    gameOver = false;
    furthest = START_ROW;
    score = 0; bonus = 0;
    confettiFx = 0; nextMilestone = MILESTONE_STEP;
    boss = null; wave = 1;
    // 道具：随机撒在若干格（coin 加分 / shield 免一次死）
    pickups = [];
    for(let i=0;i<5;i++){
      const r = 1 + Math.floor(_rng()*(ROWS-2));
      const c = Math.floor(_rng()*COLS);
      pickups.push({ type: _rng()<0.7 ? 'coin' : 'shield', row: r, col: c });
    }
  }

  function reset(seed){
    if(typeof seed==='number') _rng = mk(seed>>>0);
    genField();
    return getState();
  }
  function newGame(seed){ return reset(seed); }

  function onLog(row, col){
    return row.obstacles.some(l => (col+0.5) >= l.pos && (col+0.5) <= l.pos + l.len);
  }
  function carHit(row, col){
    return row.obstacles.some(c => Math.abs(c - col) < 0.6);
  }
  function checkHere(){
    if(gameOver) return;
    const row = rows[player.row];
    if(row.type === 'road'){
      if(carHit(row, player.col)) die();
    } else if(row.type === 'river'){
      if(!onLog(row, player.col)) die();
    }
  }
  // 死亡：有护盾则消耗护盾免死，否则结束（注入式分支，shield=0 时行为不变）
  function die(){
    if(player.shield > 0){ player.shield--; if(J) J.sfx('block'); return; }
    gameOver = true; if(J) J.sfx('lose');
  }
  function collectPickups(){
    for(let i=pickups.length-1;i>=0;i--){
      const p = pickups[i];
      if(p.row === player.row && p.col === player.col){
        if(p.type === 'coin'){ bonus += COIN_VALUE; if(J) J.sfx('pickup'); }
        else if(p.type === 'shield'){ player.shield++; if(J) J.sfx('pickup'); }
        pickups.splice(i,1);
      }
    }
    score = (START_ROW - furthest) + bonus;
    checkMilestone();
  }

  function hop(dir){
    if(gameOver) return;
    if(dir === 'up')    player.row = Math.max(0, player.row - 1);
    else if(dir === 'down')  player.row = Math.min(ROWS-1, player.row + 1);
    else if(dir === 'left')  player.col = Math.max(0, player.col - 1);
    else if(dir === 'right') player.col = Math.min(COLS-1, player.col + 1);
    if(player.row < furthest){
      furthest = player.row;
      wave++;                                  // 里程碑 +1
      if(!boss && isBossWave(wave)) spawnBoss(); // 到达 Boss 波召唤鹰
    }
    score = (START_ROW - furthest) + bonus;
    if(J) J.sfx('click'); if(J) J.addTrauma(0.1);
    if(J) J.burst(player.col*40+20, player.row*40+20, { color:'#02c076', n:6, speed:100 });
    collectPickups();
    checkHere();
  }

  function moveRowObstacles(row, dt){
    for(let i=0;i<row.obstacles.length;i++){
      const o = row.obstacles[i];
      if(typeof o === 'number'){
        let c = o + row.dir * row.speed * dt;
        if(c < 0) c += COLS; if(c >= COLS) c -= COLS;
        row.obstacles[i] = c;
      } else {
        o.pos += row.dir * row.speed * dt;
      }
    }
  }

  function step(dt){
    if(gameOver) return;
    dt = dt || 1;
    // Boss 波：走独立分支（暂停普通车流/河流危险，专注躲鹰）
    if(boss){ updateBoss(dt); return; }
    const prow = player.row;
    const riverPlayer = rows[prow].type === 'river';
    for(let r=0;r<ROWS;r++){
      if(riverPlayer && r === prow) continue;   // 玩家所在河流行稍后与玩家同步移动
      moveRowObstacles(rows[r], dt);
    }
    const row = rows[prow];
    if(row.type === 'road'){
      if(carHit(row, player.col)) die();
    } else if(row.type === 'river'){
      if(!onLog(row, player.col)) die();
      else {
        const d = row.dir * row.speed * dt;
        player.col += d;
        for(const l of row.obstacles) l.pos += d;   // 浮木与玩家同步漂动，保持相对位置
        if(player.col < 0 || player.col > COLS-1) die();
        else if(!onLog(row, player.col)) die();
      }
    }
  }

  function isGameOver(){ return gameOver; }
  function getScore(){ return score; }
  function getState(){
    return {
      player: { row: player.row, col: player.col },
      rows: rows.map(r => ({
        type: r.type, dir: r.dir, speed: r.speed,
        obstacles: r.obstacles.map(o => typeof o==='number' ? o : { pos: o.pos, len: o.len })
      })),
      gameOver, score, furthest, startRow: START_ROW, wave,
      boss: boss ? { hp:boss.hp, maxHp:boss.maxHp, phase:boss.phase, diving:boss.diving, diveCol:boss.diveCol, diveProgress:boss.diveProgress } : null,
      pickups: pickups.map(p => ({ type: p.type, row: p.row, col: p.col })),
      shield: player.shield, bonus
    };
  }

  // ---- 测试辅助 setter（不影响核心玩法，便于确定性测试） ----
  function setRow(r, type){ rows[r].type = type; }
  function setObstacles(r, arr){ rows[r].obstacles = arr.map(o => typeof o==='number' ? o : { pos:o.pos, len:o.len }); }
  function setPlayer(r, c){ player.row = r; player.col = c; if(r < furthest) furthest = r; score = (START_ROW - furthest) + bonus; }
  function setRowDir(r, d){ rows[r].dir = d; }
  function setRowSpeed(r, s){ rows[r].speed = s; }

  // ---------- Boss：鹰 ----------
  // 召唤鹰：基于当前里程碑 wave 与难度 bossHpMult 计算 maxHp；
  // 玩家每成功前进一行削减 dmgPerRow，归零即击败（见 updateBoss）。
  function spawnBoss(){
    const maxHp = Math.round((28 + wave * 6) * diffCfg().bossHpMult);
    // dmgPerRow 取「刚好能在到达顶端前推进削空」的量级，确保可击败
    const dmgPerRow = Math.max(1, Math.ceil(maxHp / Math.max(3, furthest)));
    boss = {
      hp: maxHp, maxHp: maxHp, phase: 1,
      diving: false, diveCol: player.col, diveProgress: 0,
      diveCd: 2.4, diveDur: 0.55,         // 阶段1：俯冲间隔/俯冲时长（秒）
      dmgPerRow: dmgPerRow,
      lastFurthest: furthest
    };
    if(J) J.sfx('levelup');
  }
  // 返回 true 表示本帧击败 Boss
  function updateBoss(dt){
    if(!boss) return false;
    dt = dt || 0.016;
    // 半血狂暴：更快、更密的俯冲
    if(boss.phase === 1 && boss.hp <= boss.maxHp / 2){
      boss.phase = 2;
      boss.diveCd = Math.max(0.8, boss.diveCd * 0.55);
      boss.diveDur *= 0.7;
      if(J) J.flash('#f6465d');
    }
    // 俯冲周期：锁定玩家当前列 → 下扑 → 落点命中判定（护盾优先）
    if(boss.diving){
      boss.diveProgress += dt / boss.diveDur;
      if(boss.diveProgress >= 1){
        if(player.col === boss.diveCol) bossHitPlayer(); // 仍在俯冲列 → 受击（die 内含护盾免死）
        boss.diving = false;
        boss.diveCd = (boss.phase === 2) ? 1.4 : 2.4;
      }
    } else {
      boss.diveCd -= dt;
      if(boss.diveCd <= 0){
        boss.diving = true; boss.diveProgress = 0;
        boss.diveCol = player.col; // 锁定玩家当前列
      }
    }
    // 玩家成功前进（行号更小的 furthest）→ 削减 Boss 血
    const adv = boss.lastFurthest - furthest;
    if(adv > 0){ boss.hp -= adv * boss.dmgPerRow; boss.lastFurthest = furthest; }
    // 击败：奖励 + 掉落 + 清空 + 安全着陆（清掉脚下障碍，避免刚胜利就被冻结的车/水秒杀）
    if(boss.hp <= 0){
      const reward = 100 * wave;
      bonus += reward;
      score = (START_ROW - furthest) + bonus;
      checkMilestone();
      rows[player.row].type = 'safe';
      rows[player.row].obstacles = [];
      pickups.push({ type: 'coin', row: Math.max(0, player.row - 1), col: player.col });
      if(J){ J.sfx('win'); J.flash('#02c076'); }
      boss = null;
      return true;
    }
    return false;
  }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv = $('board'); if(!cv) return;
    const vw = (typeof window!=='undefined') ? window.innerWidth : 800;
    const vh = (typeof window!=='undefined') ? window.innerHeight : 600;
    const cw = Math.min(cv.width, vw - 20);
    const ch = Math.min(cv.height, Math.max(200, vh - 160));
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    const cellW = cv.width / COLS;
    const cellH = cv.height / ROWS;
    for(let r=0;r<ROWS;r++){
      const row = rows[r];
      if(row.type === 'road') ctx.fillStyle = '#1a2230';
      else if(row.type === 'river') ctx.fillStyle = '#0d2433';
      else ctx.fillStyle = (r % 2 === 0) ? '#13251c' : '#16291f';
      ctx.fillRect(0, r*cellH, cv.width, cellH);
      // 障碍
      if(row.type === 'road'){
        ctx.fillStyle = '#f6465d';
        for(const c of row.obstacles){ ctx.fillRect(((c+COLS)%COLS)*cellW+cellW*0.2, r*cellH+cellH*0.3, cellW*0.6, cellH*0.4); }
      } else if(row.type === 'river'){
        ctx.fillStyle = '#7a5230';
        for(const l of row.obstacles){ const p=((l.pos%COLS)+COLS)%COLS; ctx.fillRect(p*cellW, r*cellH+cellH*0.2, l.len*cellW, cellH*0.6); }
      }
    }
    // 道具
    for(const p of pickups){
      const px = p.col*cellW+cellW*0.5, py = p.row*cellH+cellH*0.5;
      ctx.beginPath(); ctx.arc(px, py, cellW*0.28, 0, 7);
      ctx.fillStyle = p.type==='coin' ? 'rgba(255,207,90,0.25)' : 'rgba(80,180,255,0.25)';
      ctx.fill();
      ctx.fillStyle = p.type==='coin' ? '#ffcf5a' : '#5ab4ff';
      ctx.font = (cellH*0.42|0)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.type==='coin' ? '💰' : '🛡', px, py);
    }
    // ---- 鹰 Boss（多边形本体 + 顶部血条 + 俯冲预警）----
    if(boss){
      // 顶部血条（横贯）
      const barX=0, barY=2, barW=cv.width, frac=Math.max(0, boss.hp/boss.maxHp);
      ctx.fillStyle='#2a2f3a'; ctx.fillRect(barX, barY, barW, 6);
      ctx.fillStyle = boss.phase===2 ? '#f6465d' : '#f0b90b';
      ctx.fillRect(barX, barY, barW*frac, 6);
      ctx.fillStyle='#fff'; ctx.font='10px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('鹰 BOSS' + (boss.phase===2?' · 狂暴':''), cv.width/2, barY+8);
      ctx.textAlign='left';
      // 俯冲预警：目标列红色竖带
      if(boss.diving){
        ctx.fillStyle='rgba(246,70,93,0.18)';
        ctx.fillRect(boss.diveCol*cellW, 0, cellW, cv.height);
      }
      // 鹰本体
      let cx = cv.width/2, cy = 26;
      if(boss.diving){
        cx = (boss.diveCol+0.5)*cellW;
        const targetY = player.row*cellH + cellH*1.5;
        cy = 26 + (targetY-26)*Math.min(1, boss.diveProgress);
      }
      const col = boss.phase===2 ? '#f6465d' : '#9b6bff';
      ctx.save();
      ctx.shadowColor=col; ctx.shadowBlur=12; ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(cx, cy-16);
      ctx.lineTo(cx+22, cy);
      ctx.lineTo(cx, cy+10);
      ctx.lineTo(cx-22, cy);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#ffcf5a'; // 喙
      ctx.beginPath(); ctx.moveTo(cx, cy-16); ctx.lineTo(cx+5, cy-22); ctx.lineTo(cx-5, cy-22); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#0a0e14'; // 眼
      ctx.beginPath(); ctx.arc(cx-7, cy-2, 2.5, 0, 7); ctx.arc(cx+7, cy-2, 2.5, 0, 7); ctx.fill();
      ctx.restore();
    }
    // 玩家
    ctx.fillStyle = '#02c076';
    ctx.fillRect(player.col*cellW+cellW*0.2, player.row*cellH+cellH*0.2, cellW*0.6, cellH*0.6);
    if(player.shield > 0){
      ctx.strokeStyle = '#5ab4ff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(player.col*cellW+cellW*0.5, player.row*cellH+cellH*0.5, cellW*0.42, 0, 7); ctx.stroke();
    }
    const sc = $('score'); if(sc) sc.textContent = String(score);
    const st = $('st'); if(st) st.textContent = gameOver ? '结束' : '进行中';
    const msg = $('msg'); if(msg){
      if(gameOver){ msg.className='msg over'; msg.textContent='💀 撞车或落水，游戏结束。'; }
      else if(boss){ msg.className='msg'; msg.textContent='⚠ 鹰 BOSS 来袭！躲开红色俯冲列，向前推进削弱它。'; }
      else msg.className='msg';
    }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    document.querySelectorAll('.controls button[data-d]').forEach(b => {
      b.onclick = () => { hop(b.getAttribute('data-d')); render(); };
    });
    const nb = $('new'); if(nb) nb.onclick = () => { reset(); render(); };
  }
  function buildDiffBar(){
    var bar = (typeof document!=='undefined') ? document.getElementById('diffbar') : null;
    if(!bar) return;
    bar.innerHTML = '';
    DIFF_ORDER.forEach(function(k){
      var b = document.createElement('button');
      b.textContent = DIFFICULTY[k].label;
      if(k === difficulty) b.className = 'active';
      b.addEventListener('click', function(){ setDifficulty(k); buildDiffBar(); render(); });
      bar.appendChild(b);
    });
  }

  reset();
  if(typeof document!=='undefined'){ bindUI(); buildDiffBar(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', render); else render();
    // 动画循环：驱动障碍移动 / Boss 俯冲（harness 中 requestAnimationFrame 为 no-op，不会自走）
    let lastT = 0;
    function frame(ts){
      const dt = Math.min(0.05, (ts - lastT)/1000 || 0.016); lastT = ts;
      step(dt); render();
      if(typeof requestAnimationFrame!=='undefined') requestAnimationFrame(frame);
    }
    if(typeof requestAnimationFrame!=='undefined') requestAnimationFrame(frame);
  }
  if(typeof window!=='undefined'){
    window.__t = { setRand, reset, newGame, hop, step, isGameOver, getScore, getState,
      setRow, setObstacles, setPlayer, setRowDir, setRowSpeed,
      // ---- 难度系统钩子（D1） ----
      DIFFICULTY, DIFF_ORDER, setDifficulty, getDifficulty, diffCfg,
      // ---- 道具系统钩子 ----
      spawnPickup:(type,row,col)=>{ pickups.push({ type:type, row:row, col:col }); },
      getPickups:()=>pickups.length,
      getShield:()=>player.shield, setShield:(v)=>{ player.shield=v; },
      getBonus:()=>bonus,
      applyPickup:(type)=>{ if(type==='coin'){ bonus+=COIN_VALUE; score=(START_ROW-furthest)+bonus; } else if(type==='shield'){ player.shield++; } checkMilestone(); },
      collectPickups,
      // ---- Boss 系统钩子（B6 鹰 Boss）----
      BOSS_EVERY, isBossWave, spawnBoss, updateBoss,
      getBoss:()=>boss ? { hp:boss.hp, maxHp:boss.maxHp, phase:boss.phase, diving:boss.diving, diveCol:boss.diveCol, diveProgress:boss.diveProgress, dmgPerRow:boss.dmgPerRow } : null,
      setBossHp:(v)=>{ if(boss) boss.hp=v; },
      setBoss:(v)=>{ boss=v; },
      getWave:()=>wave, setWave:(v)=>{ wave=v; },
      update:step,
      confettiFired:()=>confettiFx };
  }
})();
</script>
</body>
