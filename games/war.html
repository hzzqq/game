<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 比大小</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .arena{display:flex;justify-content:space-around;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:10px}
  .side{text-align:center}
  .side .lbl{color:var(--dim);font-size:12px;margin-bottom:6px}
  .big{width:70px;height:96px;border:1px solid var(--border);border-radius:10px;background:#0e141d;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:700}
  .vs{color:var(--dim);font-size:20px}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>比大小</b> WAR</span></div>
  <div class="wrap">
    <div class="hud"><span>玩家1 牌堆 · <span class="st" id="c1">0</span></span><span>玩家2 牌堆 · <span class="st" id="c2">0</span></span></div>
    <div class="arena">
      <div class="side"><div class="lbl">玩家1</div><div class="big" id="b1">—</div></div>
      <div class="vs">VS</div>
      <div class="side"><div class="lbl">玩家2</div><div class="big" id="b2">—</div></div>
    </div>
    <div class="controls">
      <button id="flip">翻牌 FLIP</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="msg" id="msg">双方各翻一张：点数大者收走两张入自己牌堆底；相同则开战（各压 3 张再比）。谁先没钱谁输。</div>
  </div>
  <div class="foot">战争（War）：经典比大小纸牌，平局加注再战，赢家通吃，耗光对手牌堆者获胜。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  let p1, p2, over, winner, last;
  let _wonPrev=false, _confettiFired=0;

  // ---- 注入：掉落道具/增益系统（纯反馈分支，不改核心玩法）----
  // 真实浏览器判定：node 测试 harness 的 navigator.userAgent 固定为 'node-test'
  const IN_BROWSER = !(typeof navigator!=='undefined' && navigator.userAgent === 'node-test');
  function mk(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  const PICKUPS = {
    coin:  {emoji:'💰', color:'#f0b90b'},
    shield:{emoji:'🛡', color:'#3aa0ff'},
    heart: {emoji:'❤', color:'#f6465d'},
  };
  let pickups, shield, rngPick;
  function makePickup(type,x,y){ const d=PICKUPS[type]||PICKUPS.coin; return {type:type,x:x,y:y,t:0}; }
  function applyPickup(type){
    if(type==='coin') p1.push({r:14});            // 战利品：强牌入底
    else if(type==='heart'){ for(let k=0;k<3;k++) p1.push({r:Math.floor(rngPick()*13)+2}); } // 援军
    else if(type==='shield') shield = 1;
    if(typeof Juice!=='undefined') Juice.sfx('pickup');
  }
  function updatePickups(dt){ for(const p of pickups){ p.t+=dt; p.y += Math.sin(p.t*3)*0.3; } }
  function collectPickup(i){
    if(i<0 || i>=pickups.length) return;
    applyPickup(pickups[i].type); pickups.splice(i,1);
  }
  function spawnPickupAt(x,y){
    const roll=rngPick();
    const type = roll<0.5?'coin': roll<0.8?'shield':'heart';
    pickups.push(makePickup(type, x, y));
  }

  function rank(r){ return r; } // 2..14，A=14 最大
  function newGame(){ p1=[{r:10},{r:7},{r:3}]; p2=[{r:5},{r:7},{r:2}]; over=false; winner=null; last=null; pickups=[]; shield=0; rngPick=mk(0x7A5B3C1D); _wonPrev=false; _confettiFired=0; }
  function step(){
    if(over) return null;
    const pot=[];
    while(true){
      if(!p1.length||!p2.length) break;
      const c1=p1.shift(), c2=p2.shift(); pot.push(c1,c2);
      if(c1.r===c2.r){ // 战争：各压若干暗牌，但各留 1 张翻面比
        const down=Math.min(3, Math.max(0, Math.min(p1.length,p2.length)-1));
        for(let k=0;k<down;k++){ pot.push(p1.shift()); pot.push(p2.shift()); }
        continue;
      }
      const w = c1.r>c2.r ? p1 : p2;
      // 注入：护盾反败为胜（仅当 p1 本该输且持有护盾）
      let resolvedW = w;
      if(w===p2 && shield>0){ shield--; resolvedW = p1; }
      resolvedW.push(...pot);
      last={c1:c1.r,c2:c2.r,win:resolvedW===p1?1:2};
      // 注入：翻牌掉落（仅真实游玩，局部 PRNG）
      if(IN_BROWSER && rngPick()<0.3) spawnPickupAt(150, 150);
      if(!p1.length||!p2.length){ over=true; winner=p1.length?1:2; }
      if(over){ Juice.sfx('win'); Juice.flash('#02c076', .5); if(winner===1 && !_wonPrev){ _wonPrev=true; _confettiFired++; if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); if(typeof Juice!=='undefined' && Juice.burst) Juice.burst(window.innerWidth/2, window.innerHeight*0.3, {color:'#02c076', n:30}); } }
      else { Juice.sfx('hit'); Juice.addTrauma(.2); }
      return last;
    }
    over=true; winner = p1.length>p2.length?1:(p2.length>p1.length?2:'draw');
    if(over){ Juice.sfx('win'); Juice.flash('#02c076', .5); if(winner===1 && !_wonPrev){ _wonPrev=true; _confettiFired++; if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); if(typeof Juice!=='undefined' && Juice.burst) Juice.burst(window.innerWidth/2, window.innerHeight*0.3, {color:'#02c076', n:30}); } }
    return last;
  }
  function getDecks(){ return { p1:p1.length, p2:p2.length }; }
  function getWinner(){ return winner; }
  function isOver(){ return over; }
  function getLast(){ return last; }
  function setDecks(d1,d2){ p1=d1.map(c=>({...c})); p2=d2.map(c=>({...c})); over=false; winner=null; last=null; _wonPrev=false; _confettiFired=0; }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const b1=$('b1'),b2=$('b2'),c1=$('c1'),c2=$('c2');
    if(b1) b1.textContent=last?last.c1:'—';
    if(b2) b2.textContent=last?last.c2:'—';
    if(c1) c1.textContent=p1.length; if(c2) c2.textContent=p2.length;
    const msg=$('msg');
    if(msg){ if(over){ msg.className='msg win'; msg.textContent= winner==='draw'?'🏁 平局！':('🏁 玩家'+winner+' 获胜！'); } else { msg.className='msg'; if(pickups.length) msg.textContent='掉落战利品：'+pickups.map(p=>PICKUPS[p.type].emoji).join(' '); } }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const fl=$('flip'),nb=$('new');
    if(fl) fl.onclick=()=>{ step(); render(); };
    if(nb) nb.onclick=()=>{ newGame(); render(); };
  }
  newGame();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ bindUI(); render(); });
    else { bindUI(); render(); }
  }
  if(typeof window!=='undefined'){
    window.__t={
      newGame, step, getDecks, getWinner, isOver, getLast, setDecks, rank, PICKUPS,
      reset: newGame,
      update: step,
      getState:()=>({over,winner,p1:p1.length,p2:p2.length,shield,pickups:pickups.length}),
      spawnPickup:(type,x,y)=>{ pickups.push(makePickup(type,x,y)); },
      stepPickups:(dt)=>{ updatePickups(dt); },
      applyPickup:(type)=>{ applyPickup(type); },
      getPickups:()=>pickups,
      collectPickup:(i)=>{ collectPickup(i); },
      getShield:()=>shield, setShield:(v)=>{shield=v;},
      confettiFired:()=>_confettiFired,
    };
  }
})();
</script>
</body>
</html>
