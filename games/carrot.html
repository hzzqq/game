<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>保卫萝卜 // CARROT_FANTASY_TD</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(246,70,93,.08), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.02) 1px, transparent 1px) 0 0/100% 3px,
      var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:14px;
  }
  .window{
    width:min(680px,100%);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:0 0 40px rgba(0,0,0,.6), 0 0 0 1px rgba(246,70,93,.08);
    overflow:hidden;
  }
  .titlebar{
    display:flex; align-items:center; gap:10px;
    padding:10px 14px;
    background:linear-gradient(180deg,#16202c,#10161f);
    border-bottom:1px solid var(--border);
  }
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}
  .stats{
    display:flex; flex-wrap:wrap; gap:6px 14px;
    padding:10px 14px; border-bottom:1px solid var(--border);
    background:#0e141d; font-size:13px;
  }
  .stats .s{color:var(--dim)}
  .stats .s b{color:var(--text); letter-spacing:1px}
  .stats .coin b{color:var(--gold)}
  .stats .life b{color:var(--green)}
  .stats .score b{color:var(--red)}
  .stage{position:relative; background:var(--bg); line-height:0}
  canvas{width:100%; height:auto; display:block; touch-action:none; cursor:crosshair}
  .overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(10,14,20,.82); backdrop-filter:blur(2px);
  }
  .overlay.hidden{display:none}
  .ov-box{
    text-align:center; padding:30px 36px; border:1px solid var(--border);
    border-radius:12px; background:var(--panel); box-shadow:0 0 30px rgba(0,0,0,.6);
  }
  .ov-title{font-size:30px; letter-spacing:3px; margin-bottom:10px}
  .ov-title.win{color:var(--green); text-shadow:0 0 18px rgba(2,192,118,.5)}
  .ov-title.lose{color:var(--red); text-shadow:0 0 18px rgba(246,70,93,.5)}
  .ov-msg{color:var(--dim); font-size:13px; margin-bottom:20px; line-height:1.7}
  .controls{padding:12px 14px; border-top:1px solid var(--border); background:#0e141d}
  .palette{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px}
  .tbtn{
    flex:1 1 0; min-width:96px;
    background:#111824; color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:9px 8px; font-family:inherit; font-size:12px;
    cursor:pointer; transition:.15s ease; letter-spacing:.5px;
  }
  .tbtn small{display:block; color:var(--dim); font-size:10px; margin-top:2px}
  .tbtn:active{transform:translateY(1px)}
  .tbtn.cannon{border-color:rgba(246,70,93,.4)}
  .tbtn.frost{border-color:rgba(2,192,118,.4)}
  .tbtn.aoe{border-color:rgba(240,185,11,.4)}
  .tbtn.active{background:#16202c; box-shadow:0 0 14px rgba(240,185,11,.25)}
  .tbtn.cannon.active{box-shadow:0 0 14px rgba(246,70,93,.3)}
  .tbtn.frost.active{box-shadow:0 0 14px rgba(2,192,118,.3)}
  .tbtn.aoe.active{box-shadow:0 0 14px rgba(240,185,11,.3)}
  .actions{display:flex; gap:8px; margin-bottom:10px}
  .btn{
    flex:1 1 0; background:#111824; color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:11px; font-family:inherit; font-size:13px; cursor:pointer;
    transition:.15s ease; letter-spacing:1px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(180deg,#16202c,#10161f); border-color:var(--gold); color:var(--gold)}
  .btn.primary:disabled{opacity:.45; cursor:not-allowed; color:var(--dim); border-color:var(--border)}
  .towerInfo{
    border:1px solid var(--border); border-radius:8px; padding:10px 12px;
    background:#0b1019; font-size:12px; min-height:42px; display:flex;
    flex-direction:column; gap:7px; justify-content:center;
  }
  .towerInfo .hint{color:var(--dim)}
  .ti-row{display:flex; justify-content:space-between; align-items:center; gap:8px}
  .ti-actions{display:flex; gap:8px}
  .ti-actions button{
    flex:1; background:#111824; border:1px solid var(--border); color:var(--text);
    border-radius:6px; padding:7px; font-family:inherit; font-size:12px; cursor:pointer;
  }
  .ti-actions button:disabled{opacity:.4; cursor:not-allowed}
  .ti-actions #upBtn{border-color:var(--gold); color:var(--gold)}
  .ti-actions #sellBtn{border-color:var(--red); color:var(--red)}
  .foot{margin-top:10px; color:var(--dim); font-size:11px; text-align:center; line-height:1.6}
  .blink{color:var(--red); animation:bl 1.1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="t">TERMINAL // <b>保卫萝卜</b> · CARROT_FANTASY_TD</span>
    </div>
    <div class="stats">
      <div class="s coin">💰 COIN <b id="coins">0</b></div>
      <div class="s life">🥕 LIVES <b id="lives">0</b></div>
      <div class="s wave">WAVE <b id="wave">0 / 0</b></div>
      <div class="s score">SCORE <b id="score">0</b></div>
    </div>
    <div class="stage">
      <canvas id="game"></canvas>
      <div id="overlay" class="overlay hidden">
        <div class="ov-box">
          <div id="ovTitle" class="ov-title"></div>
          <div id="ovMsg" class="ov-msg"></div>
          <button id="ovBtn" class="btn primary">新局 / RESTART</button>
        </div>
      </div>
    </div>
    <div class="controls">
      <div class="palette" id="palette">
        <button class="tbtn cannon" data-type="cannon">炮塔 ¥50<small>单体 · 中伤</small></button>
        <button class="tbtn frost" data-type="frost">冰冻 ¥45<small>减速 · 低伤</small></button>
        <button class="tbtn aoe" data-type="aoe">群攻 ¥75<small>范围 · 溅射</small></button>
      </div>
      <div class="actions">
        <button id="startBtn" class="btn primary">开始下一波</button>
        <button id="restartBtn" class="btn">新局</button>
      </div>
      <div class="towerInfo" id="towerInfo"></div>
      <div class="foot">选炮塔→点空地建造 · 点已建炮塔可升级/出售 · 敌人漏过萝卜扣血 <span class="blink">_</span></div>
    </div>
  </div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";

  // ---------- 常量 / 配置 ----------
  const W = 600, H = 440, T = 40, COLS = 15, ROWS = 11;

  // 路径拐角（网格坐标，起点在屏幕左侧外）
  const corners = [[-1,1],[13,1],[13,4],[1,4],[1,8],[13,8]];

  const TOWERS = {
    cannon:{ name:'炮塔', cost:50, range:96, damage:22, rate:1.0,
             color:'#f6465d', projColor:'#f6465d', projSpeed:340, splash:0, slow:0, slowDur:0, desc:'单体炮弹' },
    frost: { name:'冰冻塔', cost:45, range:88, damage:7, rate:1.4,
             color:'#02c076', projColor:'#02c076', projSpeed:300, splash:0, slow:0.5, slowDur:1.6, desc:'减速敌人' },
    aoe:   { name:'群攻塔', cost:75, range:82, damage:15, rate:0.8,
             color:'#f0b90b', projColor:'#f0b90b', projSpeed:250, splash:50, slow:0, slowDur:0, desc:'范围溅射' }
  };

  const ENEMIES = {
    normal:{ hp:60,  speed:95,  reward:8,  color:'#e6edf3', r:11 },
    fast:  { hp:34,  speed:175, reward:6,  color:'#02c076', r:9  },
    tank:  { hp:230, speed:110, reward:26, color:'#f6465d', r:15 }
  };

  // 至少 6 波，数量/难度递增
  const WAVES = [
    [ {type:'normal', count:8,  gap:700} ],
    [ {type:'normal', count:10, gap:600}, {type:'fast', count:4,  gap:450, delay:2500} ],
    [ {type:'fast',   count:14, gap:350}, {type:'normal', count:8, gap:500, delay:2000} ],
    [ {type:'tank',   count:4,  gap:1400}, {type:'normal', count:12, gap:450, delay:2000} ],
    [ {type:'tank',   count:6,  gap:1100}, {type:'fast', count:16, gap:280, delay:1500}, {type:'normal', count:10, gap:400, delay:3500} ],
    [ {type:'tank',   count:8,  gap:900},  {type:'fast', count:20, gap:220, delay:1500}, {type:'normal', count:16, gap:300, delay:3000} ]
  ];

  // ---------- 路径构建 ----------
  const pathCells = new Set();
  const wp = [];
  for(let i=0;i<corners.length;i++){
    const c = corners[i][0], r = corners[i][1];
    wp.push({ x:c*T + T/2, y:r*T + T/2 });
    pathCells.add(c + ',' + r);
    if(i>0){
      const pc = corners[i-1][0], pr = corners[i-1][1];
      const dc = Math.sign(c-pc), dr = Math.sign(r-pr);
      let cc = pc, rr = pr;
      while(cc!==c || rr!==r){ cc+=dc; rr+=dr; pathCells.add(cc + ',' + rr); }
    }
  }
  const SEG = [], CUM = [0];
  for(let i=1;i<wp.length;i++){
    const d = Math.hypot(wp[i].x-wp[i-1].x, wp[i].y-wp[i-1].y);
    SEG.push(d); CUM.push(CUM[i-1]+d);
  }
  const TOTAL = CUM[CUM.length-1];
  function posAt(dist){
    if(dist >= TOTAL) return { x:wp[wp.length-1].x, y:wp[wp.length-1].y, done:true };
    let i = 0;
    while(i < SEG.length && CUM[i+1] <= dist) i++;
    const t = (dist - CUM[i]) / SEG[i];
    return { x:wp[i].x + (wp[i+1].x-wp[i].x)*t, y:wp[i].y + (wp[i+1].y-wp[i].y)*t, done:false };
  }

  // ---------- 画布 ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  // ---------- 游戏状态 ----------
  const occupied = new Set();
  const state = {};
  function resetState(){
    state.coins = 120;
    state.lives = 10;
    state.score = 0;
    state.waveIndex = 0;
    state.waveActive = false;
    state.spawnQueue = [];
    state.waveTime = 0;
    state.enemies = [];
    state.towers = [];
    state.projectiles = [];
    state.effects = [];
    state.pickups = [];
    state.energyTimer = 0;
    state.selectedType = null;
    state.selectedTower = null;
    state.gameOver = false;
    state.won = false;
    state.running = true;
    occupied.clear();
    hideOverlay();
    updatePalette();
    updateTowerInfo();
    updateStartBtn();
    updateStats();
  }

  // ---------- 工具 ----------
  function buildable(c, r){
    if(c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
    if(pathCells.has(c + ',' + r)) return false;
    if(occupied.has(c + ',' + r)) return false;
    return true;
  }
  function inRange(t, e){ return Math.hypot(t.x-e.x, t.y-e.y) <= t.range; }
  function upgradeCost(t){ return Math.floor(TOWERS[t.type].cost * 0.75 * t.level); }

  // ---------- 建造 / 升级 / 出售 ----------
  function selectType(type){
    state.selectedType = type;
    state.selectedTower = null;
    updatePalette();
    updateTowerInfo();
  }
  function tryBuild(c, r){
    if(!state.selectedType) return;
    const type = state.selectedType;
    if(!buildable(c, r)) return;
    const def = TOWERS[type];
    if(state.coins < def.cost) return;
    state.coins -= def.cost;
    const tower = {
      type, name:def.name, col:c, row:r,
      x:c*T + T/2, y:r*T + T/2,
      level:1, damage:def.damage, range:def.range, rate:def.rate,
      cooldown:0, cooldownMax:1000/def.rate,
      color:def.color, projColor:def.projColor, projSpeed:def.projSpeed,
      splash:def.splash, slow:def.slow, slowDur:def.slowDur,
      invested:def.cost
    };
    state.towers.push(tower);
    occupied.add(c + ',' + r);
    if(typeof Juice!=='undefined'){ Juice.sfx('click'); Juice.popup(tower.x, tower.y-18, '建塔', tower.color, {size:13}); }
    updateStats();
  }
  function selectTower(t){
    state.selectedTower = t;
    state.selectedType = null;
    updatePalette();
    updateTowerInfo();
  }
  function upgradeTower(){
    const t = state.selectedTower;
    if(!t || t.level >= 3) return;
    const cost = upgradeCost(t);
    if(state.coins < cost) return;
    state.coins -= cost;
    t.invested += cost;
    t.level++;
    t.damage = Math.round(t.damage * 1.5);
    t.range += 14;
    t.rate *= 1.15;
    t.cooldownMax = 1000 / t.rate;
    updateTowerInfo();
    updateStats();
  }
  function sellTower(){
    const t = state.selectedTower;
    if(!t) return;
    state.coins += Math.floor(t.invested * 0.6);
    occupied.delete(t.col + ',' + t.row);
    state.towers = state.towers.filter(x => x !== t);
    state.selectedTower = null;
    updateTowerInfo();
    updateStats();
  }

  // ---------- 波次 ----------
  function buildQueue(def){
    const q = [];
    for(const g of def){
      let t = g.delay || 0;
      for(let i=0;i<g.count;i++){ q.push({ type:g.type, at:t }); t += g.gap; }
    }
    q.sort((a,b)=>a.at - b.at);
    return q;
  }
  function startWave(){
    if(state.waveActive || state.gameOver || state.won) return;
    if(state.waveIndex >= WAVES.length) return;
    state.spawnQueue = buildQueue(WAVES[state.waveIndex]);
    state.waveActive = true;
    state.waveTime = 0;
    if(typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.popup(W/2, H/2-40, 'WAVE '+(state.waveIndex+1), '#f0b90b', {size:22, big:true}); }
    updateStartBtn();
  }
  function spawnEnemy(type){
    const b = ENEMIES[type];
    state.enemies.push({
      type, hp:b.hp, maxHp:b.hp, speed:b.speed, reward:b.reward,
      color:b.color, r:b.r, x:wp[0].x, y:wp[0].y, dist:0,
      slowTimer:0, dead:false, reached:false
    });
  }

  // ---------- 目标选择 ----------
  function findTarget(t){
    let best = null, bestDist = -1;
    for(const e of state.enemies){
      if(e.dead || e.reached) continue;
      if(inRange(t, e) && e.dist > bestDist){ best = e; bestDist = e.dist; }
    }
    return best;
  }

  // ---------- 投射物 ----------
  function fire(t, target){
    state.projectiles.push({
      x:t.x, y:t.y, target, lastX:target.x, lastY:target.y,
      damage:t.damage, speed:t.projSpeed, ptype:t.type,
      splash:t.splash, slow:t.slow, slowDur:t.slowDur,
      color:t.projColor, done:false
    });
    beep(620, 0.03, 'square', 0.018);
  }
  function damageEnemy(e, dmg){
    if(e.dead || e.reached) return;
    e.hp -= dmg;
    if(e.hp <= 0){
      e.dead = true;
      state.coins += e.reward;
      state.score += e.reward;
      beep(300, 0.05, 'square', 0.03);
      if(typeof Juice!=='undefined'){ Juice.sfx('boom'); Juice.burst(e.x, e.y, {color:e.color, n:10, speed:180}); Juice.popup(e.x, e.y-10, '+'+e.reward, '#f0b90b', {size:13}); }
      spawnParticle(e.x, e.y, e.color, {n:10, speed:180}); addShake(0.3);
      // 击杀掉落道具
      if(Math.random() < 0.32){
        const r = Math.random();
        const type = r < 0.6 ? 'coin' : (r < 0.8 ? 'energy' : 'shield');
        state.pickups.push({ type, x:e.x, y:e.y, age:0, done:false });
      }
      updateStats();
    }
  }
  function applyHit(p, x, y){
    if(p.ptype === 'aoe'){
      for(const e of state.enemies){
        if(e.dead || e.reached) continue;
        if(Math.hypot(e.x - x, e.y - y) <= p.splash) damageEnemy(e, p.damage);
      }
      state.effects.push({ x, y, age:0, life:0.3, type:'aoe', r:p.splash });
    } else {
      if(p.target && !p.target.dead && !p.target.reached){
        damageEnemy(p.target, p.damage);
        if(p.ptype === 'frost') p.target.slowTimer = p.slowDur;
      }
      state.effects.push({ x, y, age:0, life:0.18, type:'hit', r:8 });
    }
  }

  // ===== 注入：手感(震动/粒子) + 确定性拾取道具（纯附加，不改核心逻辑）=====
  var particles = [];
  var shake = 0;
  var _rand = Math.random;
  function setRand(fn){ _rand = fn || Math.random; }
  function spawnParticle(x, y, color, opts){
    opts = opts || {};
    var n = opts.n || 8, speed = opts.speed || 180, life = opts.life || 0.4, i;
    for (i=0;i<n;i++){
      var ang = (Math.PI*2)*(i/n);
      var sp = speed*(0.6 + 0.4*((i%3)/2));
      particles.push({ x:x, y:y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, age:0, life:life, color:color });
    }
  }
  function addParticle(p){ particles.push(p); }
  function addShake(v){ if (v>shake) shake=v; }
  function updateParticles(dt){
    for (var i=particles.length-1;i>=0;i--){
      var p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=400*dt; p.age+=dt;
      if (p.age>=p.life) particles.splice(i,1);
    }
  }
  function makePickup(type, x, y){
    state.pickups.push({ type: type||'coin', x:(x!=null?x:300), y:(y!=null?y:220), age:0, done:false });
    return state.pickups[state.pickups.length-1];
  }
  function applyPickup(p){
    if (!p) return;
    if (p.type === 'coin') state.coins += 20;
    else if (p.type === 'energy') state.energyTimer = 5;
    else state.lives += 1;
  }
  function winConfetti(){
    if (typeof Juice !== 'undefined' && Juice.confetti){
      Juice.confetti(W/2, H/2, { n: 80, colors:['#f6465d','#02c076','#f0b90b'], spread:0.9, life:1.2, up:true });
    }
  }

  // ---------- 更新 ----------
  function update(dt){
    // 波次生成
    if(state.waveActive){
      state.waveTime += dt * 1000;
      while(state.spawnQueue.length && state.spawnQueue[0].at <= state.waveTime){
        spawnEnemy(state.spawnQueue.shift().type);
      }
      if(state.spawnQueue.length === 0 && state.enemies.length === 0){
        state.waveActive = false;
        state.waveIndex++;
        if(state.waveIndex >= WAVES.length){
          state.won = true; state.running = false;
          showOverlay('WIN');
        }
        updateStartBtn();
      }
    }

    // 敌人移动
    for(const e of state.enemies){
      if(e.dead || e.reached) continue;
      let sp = e.speed;
      if(e.slowTimer > 0){ sp *= 0.5; e.slowTimer -= dt; }
      e.dist += sp * dt;
      const p = posAt(e.dist);
      e.x = p.x; e.y = p.y;
      if(p.done){
        e.reached = true;
        state.lives--;
        updateStats();
        if(typeof Juice!=='undefined'){ Juice.sfx('lose'); Juice.addTrauma(0.35); Juice.flash('#f6465d',0.3); }
        if(state.lives <= 0){ state.gameOver = true; showOverlay('LOSE'); }
      }
    }

    // 炮塔开火
    for(const t of state.towers){
      t.cooldown -= dt * 1000 * (state.energyTimer > 0 ? 1.4 : 1);
      if(t.cooldown <= 0){
        const target = findTarget(t);
        if(target){ fire(t, target); t.cooldown = t.cooldownMax; }
      }
    }

    // 掉落道具（短时后自动拾取）
    for(const pk of state.pickups){
      pk.age += dt;
      if(pk.age >= 1.0 && !pk.done){
        pk.done = true;
        if(pk.type === 'coin'){ state.coins += 20; if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); Juice.popup(pk.x, pk.y, '+20 💰', '#f0b90b', {size:13}); } }
        else if(pk.type === 'energy'){ state.energyTimer = 5; if(typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.burst(pk.x, pk.y, {color:'#3aa0ff', n:12, speed:200}); Juice.popup(pk.x, pk.y, '全图加速!', '#3aa0ff', {size:14, big:true}); } }
        else { state.lives += 1; if(typeof Juice!=='undefined'){ Juice.sfx('win'); Juice.burst(pk.x, pk.y, {color:'#02c076', n:12, speed:200}); Juice.popup(pk.x, pk.y, '+1 🥕', '#02c076', {size:14, big:true}); } }
        updateStats();
      }
    }
    state.pickups = state.pickups.filter(pk => !pk.done);
    if(state.energyTimer > 0) state.energyTimer = Math.max(0, state.energyTimer - dt);

    // 投射物
    for(const p of state.projectiles){
      let tx, ty;
      if(p.target && !p.target.dead && !p.target.reached){
        tx = p.target.x; ty = p.target.y; p.lastX = tx; p.lastY = ty;
      } else {
        tx = p.lastX; ty = p.lastY;
      }
      if(tx === undefined || ty === undefined){ p.done = true; continue; }
      const dx = tx - p.x, dy = ty - p.y;
      const d = Math.hypot(dx, dy);
      const step = p.speed * dt;
      if(d <= step){
        applyHit(p, tx, ty);
        p.done = true;
      } else {
        p.x += dx / d * step;
        p.y += dy / d * step;
      }
    }

    // 特效
    for(const ef of state.effects){ ef.age += dt; }

    // 清理
    state.enemies = state.enemies.filter(e => !e.dead && !e.reached);
    state.projectiles = state.projectiles.filter(p => !p.done);
    state.effects = state.effects.filter(ef => ef.age < ef.life);
    updateParticles(dt);
  }

  // ---------- 渲染 ----------
  let hoverX = -1, hoverY = -1;
  function render(){
    ctx.clearRect(0, 0, W, H);
    if(typeof Juice!=='undefined') Juice.begin(ctx);
    ctx.save();
    if (shake > 0) ctx.translate(Math.sin(shake*37.7)*shake*6, Math.cos(shake*21.3)*shake*6);
    // 背景网格
    ctx.strokeStyle = '#111824';
    ctx.lineWidth = 1;
    for(let c=0;c<=COLS;c++){ ctx.beginPath(); ctx.moveTo(c*T,0); ctx.lineTo(c*T,H); ctx.stroke(); }
    for(let r=0;r<=ROWS;r++){ ctx.beginPath(); ctx.moveTo(0,r*T); ctx.lineTo(W,r*T); ctx.stroke(); }

    // 路径
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.lineWidth = T * 0.74; ctx.strokeStyle = '#16202c';
    ctx.beginPath(); ctx.moveTo(wp[0].x, wp[0].y);
    for(let i=1;i<wp.length;i++) ctx.lineTo(wp[i].x, wp[i].y);
    ctx.stroke();
    ctx.lineWidth = T * 0.5; ctx.strokeStyle = '#1d2a3a';
    ctx.beginPath(); ctx.moveTo(wp[0].x, wp[0].y);
    for(let i=1;i<wp.length;i++) ctx.lineTo(wp[i].x, wp[i].y);
    ctx.stroke();

    // 建造预览
    if(state.selectedType && hoverX >= 0){
      const c = Math.floor(hoverX / T), r = Math.floor(hoverY / T);
      if(buildable(c, r)){
        const def = TOWERS[state.selectedType];
        ctx.fillStyle = 'rgba(240,185,11,.12)';
        ctx.fillRect(c*T+2, r*T+2, T-4, T-4);
        ctx.beginPath();
        ctx.arc(c*T + T/2, r*T + T/2, def.range, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(240,185,11,.35)';
        ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = def.color;
        ctx.beginPath(); ctx.arc(c*T + T/2, r*T + T/2, 10, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = 'rgba(246,70,93,.18)';
        ctx.fillRect(c*T+2, r*T+2, T-4, T-4);
      }
    }

    // 萝卜基地
    drawCarrot();

    // 选中炮塔射程
    if(state.selectedTower){
      const t = state.selectedTower;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.range, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(240,185,11,.4)';
      ctx.lineWidth = 1.5; ctx.stroke();
    }

    // 炮塔
    for(const t of state.towers) drawTower(t);

    // 敌人
    for(const e of state.enemies) drawEnemy(e);

    // 掉落道具
    for(const pk of state.pickups) drawPickup(pk);

    // 投射物
    for(const p of state.projectiles){
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    }

    // 特效
    for(const ef of state.effects){
      const k = ef.age / ef.life;
      ctx.globalAlpha = 1 - k;
      if(ef.type === 'aoe'){
        ctx.strokeStyle = '#f0b90b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r * (0.4 + 0.6*k), 0, Math.PI*2); ctx.stroke();
      } else {
        ctx.strokeStyle = '#e6edf3'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r * (0.5 + k), 0, Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    for (const pp of particles) { const pk = 1 - pp.age/pp.life; ctx.save(); ctx.globalAlpha = Math.max(0, pk); ctx.fillStyle = pp.color; ctx.beginPath(); ctx.arc(pp.x, pp.y, 2.5*pk+0.5, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
    ctx.restore();
    if(typeof Juice!=='undefined'){ Juice.mid(ctx); Juice.end(ctx); }
  }

  function drawCarrot(){
    const p = wp[wp.length-1];
    ctx.save();
    ctx.fillStyle = '#0a0e14';
    ctx.strokeStyle = '#f0b90b';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, 17, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#f0b90b';
    ctx.beginPath();
    ctx.moveTo(p.x-7, p.y-3); ctx.lineTo(p.x+7, p.y-3); ctx.lineTo(p.x, p.y+11); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#02c076'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y-3); ctx.lineTo(p.x-4, p.y-12);
    ctx.moveTo(p.x, p.y-3); ctx.lineTo(p.x, p.y-13);
    ctx.moveTo(p.x, p.y-3); ctx.lineTo(p.x+4, p.y-12);
    ctx.stroke();
    ctx.restore();
  }

  function drawTower(t){
    ctx.save();
    // 底座
    ctx.fillStyle = '#0e141d';
    ctx.strokeStyle = t.color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(t.x, t.y, 14, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // 核心
    ctx.fillStyle = t.color;
    ctx.beginPath(); ctx.arc(t.x, t.y, 8, 0, Math.PI*2); ctx.fill();
    // 类型标记
    ctx.fillStyle = '#0a0e14';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const mark = t.type === 'cannon' ? 'C' : (t.type === 'frost' ? 'F' : 'A');
    ctx.fillText(mark, t.x, t.y);
    // 等级点
    for(let i=0;i<t.level;i++){
      ctx.fillStyle = '#f0b90b';
      ctx.beginPath(); ctx.arc(t.x - 8 + i*8, t.y + 18, 2.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawPickup(pk){
    const bob = Math.sin(pk.age * 5 + pk.x * 0.1) * 3;
    const map = { coin:'#f0b90b', energy:'#3aa0ff', shield:'#02c076' };
    const icon = { coin:'💰', energy:'⚡', shield:'🛡' };
    const col = map[pk.type];
    ctx.save();
    ctx.translate(pk.x, pk.y + bob);
    ctx.shadowBlur = 12; ctx.shadowColor = col;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0a0e14';
    ctx.font = 'bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(icon[pk.type], 0, 1);
    ctx.restore();
  }
  function drawEnemy(e){
    ctx.save();
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
    if(e.slowTimer > 0){
      ctx.strokeStyle = '#02c076'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 3, 0, Math.PI*2); ctx.stroke();
    }
    // 血条
    const bw = e.r * 2, bh = 4, bx = e.x - e.r, by = e.y - e.r - 9;
    ctx.fillStyle = '#1f2a38';
    ctx.fillRect(bx, by, bw, bh);
    const hpr = Math.max(0, e.hp / e.maxHp);
    ctx.fillStyle = hpr > 0.5 ? '#02c076' : (hpr > 0.25 ? '#f0b90b' : '#f6465d');
    ctx.fillRect(bx, by, bw * hpr, bh);
    ctx.restore();
  }

  // ---------- UI 更新 ----------
  function updateStats(){
    document.getElementById('coins').textContent = state.coins;
    document.getElementById('lives').textContent = Math.max(0, state.lives);
    document.getElementById('wave').textContent = Math.min(state.waveIndex + 1, WAVES.length) + ' / ' + WAVES.length;
    document.getElementById('score').textContent = state.score;
  }
  function updatePalette(){
    document.querySelectorAll('.tbtn').forEach(b=>{
      b.classList.toggle('active', b.dataset.type === state.selectedType);
    });
  }
  function updateTowerInfo(){
    const el = document.getElementById('towerInfo');
    const t = state.selectedTower;
    if(!t){
      el.innerHTML = '<span class="hint">点击已建炮塔可升级 / 出售 · 选炮塔后点空地建造</span>';
      return;
    }
    const uc = upgradeCost(t);
    const maxed = t.level >= 3;
    const canUp = !maxed && state.coins >= uc;
    el.innerHTML =
      '<div class="ti-row"><b style="color:' + t.color + '">' + t.name + '</b>' +
      '<span style="color:var(--dim)">Lv.' + t.level + (maxed ? ' · 满级' : '') + '</span></div>' +
      '<div class="ti-row"><span style="color:var(--dim)">DMG ' + t.damage +
      ' · RNG ' + Math.round(t.range) + ' · ' + t.rate.toFixed(2) + '/s</span></div>' +
      '<div class="ti-actions">' +
      '<button id="upBtn" ' + (canUp ? '' : 'disabled') + '>' + (maxed ? '已满级' : '升级 ¥' + uc) + '</button>' +
      '<button id="sellBtn">出售 +¥' + Math.floor(t.invested * 0.6) + '</button>' +
      '</div>';
    document.getElementById('upBtn').onclick = upgradeTower;
    document.getElementById('sellBtn').onclick = sellTower;
  }
  function updateStartBtn(){
    const b = document.getElementById('startBtn');
    if(state.gameOver || state.won){ b.disabled = true; b.textContent = '—'; return; }
    if(state.waveActive){ b.disabled = true; b.textContent = '第 ' + (state.waveIndex + 1) + ' 波 进行中…'; }
    else if(state.waveIndex >= WAVES.length){ b.disabled = true; b.textContent = '已通关'; }
    else { b.disabled = false; b.textContent = '开始第 ' + (state.waveIndex + 1) + ' 波'; }
  }
  function showOverlay(kind){
    winConfetti();
    const ov = document.getElementById('overlay');
    const title = document.getElementById('ovTitle');
    const msg = document.getElementById('ovMsg');
    if(kind === 'WIN'){
      title.textContent = '通关 WIN';
      title.className = 'ov-title win';
      msg.innerHTML = '萝卜安然无恙！<br/>最终得分 ' + state.score + ' · 剩余萝卜 ' + Math.max(0, state.lives);
    } else {
      title.textContent = '萝卜失守 LOSE';
      title.className = 'ov-title lose';
      msg.innerHTML = '萝卜被吃光了…<br/>坚持到第 ' + Math.min(state.waveIndex + 1, WAVES.length) + ' 波 · 得分 ' + state.score;
    }
    ov.classList.remove('hidden');
    if(typeof Juice!=='undefined'){
      const b = Juice.best('carrot', state.score); const rk = Juice.rank(state.score);
      if(kind === 'WIN'){ Juice.sfx('win'); Juice.flash('#02c076',0.4); Juice.achievement('🏆 通关！得分 '+state.score+' · 段位 '+rk); }
      else { Juice.sfx('lose'); Juice.addTrauma(0.5); Juice.flash('#f6465d',0.4); Juice.achievement('得分 '+state.score+' · 段位 '+rk); }
      if(b.isNew && state.score>0) Juice.achievement('🏆 新纪录 '+state.score+'！段位 '+rk);
    }
  }
  function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }

  // ---------- 输入 ----------
  function canvasPos(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    return { x, y };
  }
  canvas.addEventListener('pointermove', e=>{
    const p = canvasPos(e);
    hoverX = p.x; hoverY = p.y;
  });
  canvas.addEventListener('pointerdown', e=>{
    ensureAudio();
    const p = canvasPos(e);
    hoverX = p.x; hoverY = p.y;
    if(state.gameOver || state.won) return;
    const c = Math.floor(p.x / T), r = Math.floor(p.y / T);
    const tower = state.towers.find(t => t.col === c && t.row === r);
    if(tower){ selectTower(tower); return; }
    if(state.selectedType){ tryBuild(c, r); return; }
    if(state.selectedTower){ state.selectedTower = null; updateTowerInfo(); }
  });

  document.querySelectorAll('.tbtn').forEach(b=>{
    b.addEventListener('click', ()=> selectType(b.dataset.type));
  });
  document.getElementById('startBtn').addEventListener('click', startWave);
  document.getElementById('restartBtn').addEventListener('click', resetState);
  document.getElementById('ovBtn').addEventListener('click', resetState);

  // 每帧轻量刷新升级按钮可用性（不重建 DOM）
  function refreshTowerInfoBtn(){
    if(state.selectedTower){
      const up = document.getElementById('upBtn');
      if(up){
        const t = state.selectedTower;
        const uc = upgradeCost(t);
        const canUp = t.level < 3 && state.coins >= uc;
        up.disabled = !canUp;
        up.textContent = t.level >= 3 ? '已满级' : '升级 ¥' + uc;
      }
    }
  }

  // ---------- 音效（可选） ----------
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(err) { audioCtx = null; }
    }
    if(audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume().catch(()=>{}); }
  }
  function beep(freq, dur, type, vol){
    if(!audioCtx) return;
    try {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      g.gain.value = vol || 0.04;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.stop(audioCtx.currentTime + dur);
    } catch(err) {}
  }

  // ---------- 主循环 ----------
  let lastTime = performance.now();
  function loop(now){
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    if(dt > 0.05) dt = 0.05;
    if(typeof Juice!=='undefined') Juice.update(dt);
    if(state.running && !state.gameOver && !state.won) update(dt);
    render();
    if (shake>0) shake=Math.max(0, shake - dt*1.5);
    refreshTowerInfoBtn();
    requestAnimationFrame(loop);
  }

  resetState();
  requestAnimationFrame(loop);

  // 测试钩子（不影响正常玩法）
  window.__t = {
    state,
    spawnPickup(type, x, y){ state.pickups.push({ type, x:x||300, y:y||220, age:0, done:false }); },
    agePickups(dt){
      for(const pk of state.pickups){
        pk.age += dt;
        if(pk.age >= 1.0 && !pk.done){
          pk.done = true;
          if(pk.type==='coin'){ state.coins += 20; }
          else if(pk.type==='energy'){ state.energyTimer = 5; }
          else { state.lives += 1; }
        }
      }
      state.pickups = state.pickups.filter(p => !p.done);
      if(state.energyTimer > 0) state.energyTimer = Math.max(0, state.energyTimer - dt);
    },
    getPickups(){ return state.pickups.length; },
    getEnergy(){ return state.energyTimer; },
    getLives(){ return state.lives; },
    getCoins(){ return state.coins; },
    // ---- 注入：手感 / 拾取道具 钩子 ----
    setRand: setRand,
    makePickup: makePickup,
    applyPickup: applyPickup,
    spawnPickupAt: function(type,x,y){ return makePickup(type,x,y); },
    getPickups: function(){ return state.pickups.length; },
    getParticles: function(){ return particles.length; },
    spawnParticle: spawnParticle,
    addParticle: addParticle,
    getShake: function(){ return shake; },
    setShake: function(v){ shake=v; },
    forceWin: winConfetti
  };
})();
</script>
</body>
