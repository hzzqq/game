<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 多连块 FILLOMINO</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(240,185,11,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--gold)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--green);font-weight:700}
  .board{display:grid;gap:4px;margin:0 auto 10px;width:max-content;background:var(--panel);padding:10px;border-radius:14px;border:1px solid var(--border)}
  .cell{width:54px;height:54px;border-radius:8px;background:#0e141d;border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;cursor:pointer;user-select:none}
  .cell.clue{color:var(--gold);cursor:default}
  .cell.cur{color:var(--text)}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--gold);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>多连块</b> FILLOMINO</span></div>
  <div class="wrap">
    <div class="hud"><span>尺寸 N · <span class="st" id="n">5</span></span><span id="status">相邻同数连通块大小须等于该数</span></div>
    <div class="board" id="board"></div>
    <div class="controls">
      <button id="new">新局 NEW</button>
      <button id="reset" class="ghost">清空 RESET</button>
    </div>
    <div class="msg" id="msg">点空格循环填数。每个连通同数块的大小须等于该数；相同数字的不同块不可相邻。给定格（金）不可改。</div>
  </div>
  <div class="foot">Fillomino（多连块）：将网格分成若干连通同数块，每块的大小等于块中显示的数字，且相同数字的不同块不能相邻。每局由随机分区派生，必可解。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  function mk(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  let _rng = mk(0x77112233);
  function setRand(fn){ if(typeof fn==='function') _rng=fn; }

  const N=5, MAXBASE=5;
  let clue;    // N×N, 0=空（隐藏），>0=给定
  let grid;    // N×N 玩家填数
  let sol;     // N×N 规范解
  let won=false;
  let maxVal=5;

  function inb(r,c){ return r>=0&&r<N&&c>=0&&c<N; }
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(_rng()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function genBase(){
    const owner=Array.from({length:N},()=>new Array(N).fill(-1));
    let id=0;
    const cells=[]; for(let r=0;r<N;r++) for(let c=0;c<N;c++) cells.push([r,c]);
    shuffle(cells);
    for(const [r,c] of cells){
      if(owner[r][c]!==-1) continue;
      const myId=id++; owner[r][c]=myId;
      const target=1+Math.floor(_rng()*MAXBASE);
      let added=1;
      while(added<target){
        const frontier=[];
        for(let rr=0;rr<N;rr++) for(let cc=0;cc<N;cc++){
          if(owner[rr][cc]!==myId) continue;
          const nb=[[rr-1,cc],[rr+1,cc],[rr,cc-1],[rr,cc+1]];
          for(const [nr,nc] of nb){ if(inb(nr,nc) && owner[nr][nc]===-1) frontier.push([nr,nc]); }
        }
        if(frontier.length===0) break;
        const pick=frontier[Math.floor(_rng()*frontier.length)];
        owner[pick[0]][pick[1]]=myId; added++;
      }
    }
    return owner;
  }
  function buildRegions(owner){
    const map=new Map();
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){ const id=owner[r][c]; if(!map.has(id)) map.set(id,{id,cells:[]}); map.get(id).cells.push([r,c]); }
    return map;
  }
  function mergeInto(owner,from,to){ for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(owner[r][c]===from) owner[r][c]=to; }
  // 合并相邻同尺寸区域，直到无相邻同尺寸 → 保证合法多连块
  function mergeFix(owner){
    let changed=true, guard=0;
    while(changed && guard++<2000){
      changed=false;
      const map=buildRegions(owner);
      const sizeOf=id=>map.get(id).cells.length;
      outer:
      for(let r=0;r<N;r++) for(let c=0;c<N;c++){
        const id=owner[r][c];
        if(c+1<N){ const nb=owner[r][c+1]; if(nb!==id && sizeOf(nb)===sizeOf(id)){ mergeInto(owner,nb,id); changed=true; break outer; } }
        if(r+1<N){ const nb=owner[r+1][c]; if(nb!==id && sizeOf(nb)===sizeOf(id)){ mergeInto(owner,nb,id); changed=true; break outer; } }
      }
    }
  }
  function newPuzzle(seed){
    if(typeof seed==='number') _rng = mk(seed>>>0);
    const owner=genBase();
    mergeFix(owner);
    const map=buildRegions(owner);
    sol=Array.from({length:N},()=>new Array(N).fill(0));
    for(const [id,reg] of map){ for(const [r,c] of reg.cells) sol[r][c]=reg.cells.length; }
    maxVal=0; for(let r=0;r<N;r++) for(let c=0;c<N;c++) maxVal=Math.max(maxVal,sol[r][c]);
    // 派生线索：每区域至少揭示一格，其余随机揭示
    clue=Array.from({length:N},()=>new Array(N).fill(0));
    for(const [id,reg] of map){ const cells=reg.cells.slice(); shuffle(cells); let revealed=false;
      for(let k=0;k<cells.length;k++){ if(_rng()<0.45 || (!revealed && k===cells.length-1)){ clue[cells[k][0]][cells[k][1]]=sol[cells[k][0]][cells[k][1]]; revealed=true; } }
    }
    grid=Array.from({length:N},()=>new Array(N).fill(0));
    won=false;
    return getState();
  }

  function components(){
    const seen=Array.from({length:N},()=>new Array(N).fill(false));
    const comps=[];
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      if(seen[r][c] || grid[r][c]<=0) continue;
      const val=grid[r][c]; const stack=[[r,c]]; seen[r][c]=true; let size=0; const cells=[];
      while(stack.length){ const [cr,cc]=stack.pop(); size++; cells.push([cr,cc]);
        const nb=[[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]];
        for(const [nr,nc] of nb){ if(inb(nr,nc)&&!seen[nr][nc]&&grid[nr][nc]===val){ seen[nr][nc]=true; stack.push([nr,nc]); } }
      }
      comps.push({val,size,cells});
    }
    return comps;
  }
  function isWin(){
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(grid[r][c]<=0) return false;
    const comps=components();
    for(const cm of comps) if(cm.size!==cm.val) return false;
    // 相同数字的不同块不可相邻：等价地，相邻同值必同块（已由 components 处理）；
    // 额外校验：若相邻两格同值但被划分为不同 comp，则前面已合并，不会触发。
    // 线索匹配
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(clue[r][c]>0 && grid[r][c]!==clue[r][c]) return false;
    return true;
  }

  function setCell(r,c,v){
    if(!inb(r,c)) return false;
    if(clue[r][c]>0) return false; // 给定不可改
    v=Math.max(0,Math.min(N*N, v|0));
    grid[r][c]=v;
    won=isWin();
    if(won && typeof Juice!=='undefined') Juice.sfx('levelup');
    if (typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4});
    return true;
  }
  function cycle(r,c){ if(clue[r][c]>0) return false; const cur=grid[r][c]; const nxt=(cur>=maxVal)?0:cur+1; return setCell(r,c,nxt); }
  function reset(){ grid=Array.from({length:N},()=>new Array(N).fill(0)); won=false; return getState(); }
  function applySolution(){ grid=sol.map(row=>row.slice()); won=isWin(); return won; }
  function getSolution(){ return sol.map(row=>row.slice()); }
  function getState(){ return { N, clue:clue.map(r=>r.slice()), grid:grid.map(r=>r.slice()), maxVal, won }; }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function buildBoard(){
    if(typeof document==='undefined') return;
    const b=$('board'); if(!b) return;
    b.style.gridTemplateColumns='repeat('+N+',54px)';
    b.innerHTML='';
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      const el=document.createElement('div'); el.className='cell'; el.dataset.r=r; el.dataset.c=c;
      el.addEventListener('click',()=>{ cycle(r,c); render(); });
      b.appendChild(el);
    }
  }
  function render(){
    if(typeof document==='undefined') return;
    const b=$('board'),nEl=$('n'),msg=$('msg'),st=$('status');
    if(!b) return;
    const cells=b.children;
    for(let i=0;i<cells.length;i++){
      const r=+cells[i].dataset.r, c=+cells[i].dataset.c;
      const isClue=clue[r][c]>0;
      cells[i].className='cell'+(isClue?' clue':' cur');
      cells[i].textContent = grid[r][c]>0 ? grid[r][c] : '';
    }
    if(nEl) nEl.textContent=N;
    if(st) st.textContent = won?'已通关':'相邻同数连通块大小须等于该数';
    if(msg){ if(won){ msg.className='msg win'; msg.textContent='🎉 完成！所有同数块大小匹配且无相邻同数块。'; } else msg.className='msg'; }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const nb=$('new'),rb=$('reset');
    if(nb) nb.onclick=()=>{ newPuzzle(); buildBoard(); render(); };
    if(rb) rb.onclick=()=>{ reset(); render(); };
  }
  newPuzzle();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ buildBoard(); bindUI(); render(); });
    else { buildBoard(); bindUI(); render(); }
  }
  if(typeof window!=='undefined'){
    window.__t = { N, setRand, newPuzzle, reset, isWin, setCell, cycle, applySolution, getSolution, getState, components, MAXBASE };
  }
})();
</script>
</body>
</html>
