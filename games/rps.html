<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 石头剪刀布</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .arena{display:flex;justify-content:space-around;align-items:center;margin:14px 0}
  .hand{width:90px;height:90px;border:1px solid var(--border);border-radius:14px;background:#0e141d;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);font-weight:700;text-align:center}
  .vs{font-size:24px;color:var(--dim)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>石头剪刀布</b> RPS</span></div>
  <div class="wrap">
    <div class="hud"><span>比分 · <span class="st" id="sc">0 : 0</span></span><span>回合 · <span class="st" id="rd">0</span></span></div>
    <div class="arena">
      <div class="hand" id="p0">?</div>
      <div class="vs">VS</div>
      <div class="hand" id="p1">?</div>
    </div>
    <div class="msg" id="msg">出拳！石头(R)砸剪刀、剪刀(S)剪布、布(P)包石头。三局两胜决胜负。</div>
    <div class="controls">
      <button data-m="R">✊ 石头</button>
      <button data-m="P">✋ 布</button>
      <button data-m="S">✊✂ 剪刀</button>
    </div>
  </div>
  <div class="foot">石头剪刀布（Rock Paper Scissors）：最经典的零和博弈，三局两胜。也可与内置 AI 对战。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const MAP={ R:'石头', P:'布', S:'剪刀' };
  let score=[0,0], round=0, last=[null,null];
  let _rand=Math.random;
  function setRand(fn){ _rand=fn; }
  function beats(a,b){ return (a==='R'&&b==='S')||(a==='S'&&b==='P')||(a==='P'&&b==='R'); }
  function play(p0,p1){
    if(!['R','P','S'].includes(p0)||!['R','P','S'].includes(p1)) return null;
    last=[p0,p1]; round++;
    let w;
    if(p0===p1) w=-1; else if(beats(p0,p1)) w=0; else w=1;
    if(w===0) score[0]++; else if(w===1) score[1]++;
    if(w===0||w===1){ Juice.sfx('hit'); Juice.addTrauma(.2); } else { Juice.sfx('click'); }
    return w;
  }
  function randomMove(){ const k=['R','P','S']; return k[Math.floor(_rand()*3)]; }
  function getScore(){ return score.slice(); }
  function getRound(){ return round; }
  function getLast(){ return last.slice(); }
  function reset(){ score=[0,0]; round=0; last=[null,null]; }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const a=$('p0'),b=$('p1'),sc=$('sc'),rd=$('rd');
    if(a)a.textContent=last[0]?MAP[last[0]]:'?'; if(b)b.textContent=last[1]?MAP[last[1]]:'?';
    if(sc)sc.textContent=score[0]+' : '+score[1]; if(rd)rd.textContent=round;
    const msg=$('msg'); if(msg&&last[0]){ const w=play(last[0],last[1]); if(w===0){msg.className='msg win';msg.textContent='✅ 你赢了这回合！';} else if(w===-1){msg.className='msg';msg.textContent='🤝 平局。';} else {msg.className='msg';msg.textContent='❌ 这回合输了。';} }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    document.querySelectorAll('.controls button').forEach(btn=>{
      btn.onclick=()=>{ const m=btn.getAttribute('data-m'); const ai=randomMove(); play(m,ai); render(); };
    });
  }
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',render); else render(); }
  if(typeof window!=='undefined'){ window.__t={ beats, play, randomMove, getScore, getRound, getLast, reset, setRand }; }
})();
</script>
</body>
</html>
