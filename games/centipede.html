<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 蜈蚣 CENTIPEDE</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .controls button{flex:1;min-width:56px;background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.over{color:var(--red);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>蜈蚣</b> CENTIPEDE</span></div>
  <div class="wrap">
    <div class="hud"><span>得分 · <span class="st" id="score">0</span></span><span>状态 · <span class="st" id="st">进行中</span></span></div>
    <div class="boardwrap"><canvas id="board" width="450" height="600"></canvas></div>
    <div class="controls">
      <button data-d="left">←左</button><button data-d="right">→右</button>
      <button data-d="up">↑上</button><button data-d="down">↓下</button>
      <button id="shoot">射击 FIRE</button><button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="msg" id="msg">方向键移动，空格射击。击中蜈蚣一节会使其分裂并长出蘑菇；被蜈蚣碰到即结束。</div>
  </div>
  <div class="foot">Centipede（蜈蚣）：在蘑菇田间射击自上而下推进的蜈蚣。每击中一节，蜈蚣一分为二并生成蘑菇。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x5eed1234);
  function setRand(fn){ if(typeof fn==='function') _rng=fn; }

  const ROWS = 20, COLS = 15;
  let mush, centi, player, bullets, gameOver, score;

  function inMush(r,c){ return r>=0 && r<ROWS && c>=0 && c<COLS && mush[r][c]; }
  function mushroomList(){ const out=[]; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(mush[r][c]) out.push([r,c]); return out; }

  function genField(){
    mush = Array.from({length:ROWS},()=>new Array(COLS).fill(false));
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(r < ROWS-6 && _rng() < 0.12) mush[r][c] = true;   // 顶部蘑菇田
    }
    centi = [];
    const len = 10;
    for(let i=0;i<len;i++) centi.push({ row: 0, col: i, dir: 1 });
    player = { row: ROWS-1, col: Math.floor(COLS/2) };
    bullets = [];
    gameOver = false;
    score = 0;
  }

  function reset(seed){
    if(typeof seed==='number') _rng = mk(seed>>>0);
    genField();
    return getState();
  }
  function newGame(seed){ return reset(seed); }

  function move(dir){
    if(gameOver) return;
    if(dir==='left')  player.col = Math.max(0, player.col-1);
    else if(dir==='right') player.col = Math.min(COLS-1, player.col+1);
    else if(dir==='up')    player.row = Math.max(0, player.row-1);
    else if(dir==='down')  player.row = Math.min(ROWS-1, player.row+1);
    if(J) J.sfx('click');
  }
  function shoot(){
    if(gameOver) return;
    bullets.push({ row: player.row-1, col: player.col });
    if(J) J.sfx('pew');
  }

  function hitSegment(segIndex){
    const seg = centi[segIndex];
    mush[seg.row][seg.col] = true;          // 被击中的一节变成蘑菇
    centi.splice(segIndex, 1);
    score += 10;
    if(J) J.sfx('pop'); if(J) J.addTrauma(0.15);
    // 分裂：原“之后”的那一节反向，作为新的头部
    if(segIndex < centi.length){
      centi[segIndex].dir *= -1;
    }
  }

  function step(){
    if(gameOver) return;
    // 1) 子弹上移
    for(const b of bullets) b.row -= 1;
    // 2) 子弹碰撞（先蜈蚣，再蘑菇）
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      let consumed = false;
      const si = centi.findIndex(s => s.row===b.row && s.col===b.col);
      if(si >= 0){ hitSegment(si); consumed = true; }
      else if(inMush(b.row, b.col)){ mush[b.row][b.col] = false; consumed = true; if(J) J.sfx('break'); }
      if(consumed || b.row < 0) bullets.splice(i,1);
    }
    // 3) 蜈蚣移动
    for(const s of centi){
      let nc = s.col + s.dir;
      const blocked = (nc < 0 || nc >= COLS || inMush(s.row, nc));
      if(blocked){
        s.dir *= -1;
        s.row += 1;                 // 下移到下一行
        if(s.row >= ROWS){ gameOver = true; if(J) J.sfx('lose'); }
      } else {
        s.col = nc;
      }
    }
    // 4) 玩家被击中
    for(const s of centi){
      if(s.row === player.row && s.col === player.col){ gameOver = true; if(J) J.sfx('lose'); break; }
    }
  }

  function isGameOver(){ return gameOver; }
  function getScore(){ return score; }
  function getState(){
    return {
      centipede: centi.map(s => ({ row:s.row, col:s.col, dir:s.dir })),
      mushrooms: mushroomList(),
      player: { row: player.row, col: player.col },
      bullets: bullets.map(b => ({ row:b.row, col:b.col })),
      gameOver, score
    };
  }

  // ---- 测试辅助 setter ----
  function setCentipede(arr){ centi = arr.map(s => ({ row:s.row, col:s.col, dir:s.dir||1 })); }
  function setMushrooms(arr){ mush = Array.from({length:ROWS},()=>new Array(COLS).fill(false)); for(const [r,c] of arr) if(r>=0&&r<ROWS&&c>=0&&c<COLS) mush[r][c]=true; }
  function setPlayer(r,c){ player.row=r; player.col=c; }
  function setBullets(arr){ bullets = arr.map(b => ({ row:b.row, col:b.col })); }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv = $('board'); if(!cv) return;
    const vw = (typeof window!=='undefined') ? window.innerWidth : 800;
    const ch = Math.min(cv.height, Math.max(220, ((typeof window!=='undefined')?window.innerHeight:600) - 170));
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    const cw = cv.width / COLS, chh = cv.height / ROWS;
    // 蘑菇
    ctx.fillStyle = '#8a5a2b';
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(mush[r][c]) ctx.fillRect(c*cw+cw*0.25, r*chh+chh*0.25, cw*0.5, chh*0.5);
    // 蜈蚣
    ctx.fillStyle = '#f6465d';
    for(const s of centi) ctx.fillRect(s.col*cw+cw*0.2, s.row*chh+chh*0.2, cw*0.6, chh*0.6);
    // 子弹
    ctx.fillStyle = '#f0b90b';
    for(const b of bullets) ctx.fillRect(b.col*cw+cw*0.4, b.row*chh+chh*0.1, cw*0.2, chh*0.6);
    // 玩家
    ctx.fillStyle = '#02c076';
    ctx.fillRect(player.col*cw+cw*0.2, player.row*chh+chh*0.2, cw*0.6, chh*0.6);
    const sc = $('score'); if(sc) sc.textContent = String(score);
    const st = $('st'); if(st) st.textContent = gameOver ? '结束' : '进行中';
    const msg = $('msg'); if(msg){ if(gameOver){ msg.className='msg over'; msg.textContent='💀 被蜈蚣击中，游戏结束。'; } else msg.className='msg'; }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    document.querySelectorAll('.controls button[data-d]').forEach(b => {
      b.onclick = () => { move(b.getAttribute('data-d')); render(); };
    });
    const sh = $('shoot'); if(sh) sh.onclick = () => { shoot(); render(); };
    const nb = $('new'); if(nb) nb.onclick = () => { reset(); render(); };
  }

  reset();
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', render); else render(); }
  if(typeof window!=='undefined'){
    window.__t = { setRand, reset, newGame, move, shoot, step, isGameOver, getScore, getState,
      setCentipede, setMushrooms, setPlayer, setBullets };
  }
})();
</script>
</body>
</html>
