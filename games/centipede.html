<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 蜈蚣 CENTIPEDE</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .controls button{flex:1;min-width:56px;background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.over{color:var(--red);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>蜈蚣</b> CENTIPEDE</span></div>
  <div class="wrap">
    <div class="hud"><span>得分 · <span class="st" id="score">0</span></span><span>状态 · <span class="st" id="st">进行中</span></span></div>
    <div class="boardwrap"><canvas id="board" width="450" height="600"></canvas></div>
    <div class="controls">
      <button data-d="left">←左</button><button data-d="right">→右</button>
      <button data-d="up">↑上</button><button data-d="down">↓下</button>
      <button id="shoot">射击 FIRE</button><button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="msg" id="msg">方向键移动，空格射击。击中蜈蚣一节会使其分裂并长出蘑菇；被蜈蚣碰到即结束。</div>
  </div>
  <div class="foot">Centipede（蜈蚣）：在蘑菇田间射击自上而下推进的蜈蚣。每击中一节，蜈蚣一分为二并生成蘑菇。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x5eed1234);
  function setRand(fn){ if(typeof fn==='function') _rng=fn; }

  const ROWS = 20, COLS = 15;
  let mush, centi, player, bullets, gameOver, score, pickups, killStreak;

  // —— Boss 系统（每 BOSS_EVERY 波出现"蜈蚣女王"）——
  const BOSS_EVERY = 3;
  function isBossWave(w){ return w>0 && w % BOSS_EVERY === 0; }
  let wave = 1;        // 波次：每清完一整条普通蜈蚣 +1
  let boss = null;     // Boss 态：{col,row,w,h,hp,maxHp,phase,dir,fireT,down}
  let _confettiFired = false; // 过关 confetti 钩子（独立于 Juice，只读暴露）

  function inMush(r,c){ return r>=0 && r<ROWS && c>=0 && c<COLS && mush[r][c]; }
  function mushroomList(){ const out=[]; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(mush[r][c]) out.push([r,c]); return out; }

  function buildCentipede(){
    centi = [];
    const len = 10;
    for(let i=0;i<len;i++) centi.push({ row: 0, col: i, dir: 1 });
  }

  function genField(){
    mush = Array.from({length:ROWS},()=>new Array(COLS).fill(false));
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(r < ROWS-6 && _rng() < 0.12) mush[r][c] = true;   // 顶部蘑菇田
    }
    wave = 1; boss = null;   // 新局重置波次与 Boss
    buildCentipede();
    player = { row: ROWS-1, col: Math.floor(COLS/2), rapid: 0, spread: 0, shield: 0 };
    bullets = [];
    gameOver = false;
    score = 0; pickups = []; killStreak = 0;
    // 道具：随机撒在网格（coin 加分 / shield 护盾 / rapid 连射 / spread 散射）
    for(let i=0;i<4;i++){
      const r = 2 + Math.floor(_rng()*(ROWS-8));
      const c = Math.floor(_rng()*COLS);
      const t = _rng();
      pickups.push({ type: t<0.4?'coin' : t<0.7?'shield' : t<0.85?'rapid':'spread', row: r, col: c });
    }
  }

  function reset(seed){
    if(typeof seed==='number') _rng = mk(seed>>>0);
    _confettiFired = false;
    genField();
    return getState();
  }
  function newGame(seed){ return reset(seed); }

  function move(dir){
    if(gameOver) return;
    if(dir==='left')  player.col = Math.max(0, player.col-1);
    else if(dir==='right') player.col = Math.min(COLS-1, player.col+1);
    else if(dir==='up')    player.row = Math.max(0, player.row-1);
    else if(dir==='down')  player.row = Math.min(ROWS-1, player.row+1);
    if(J) J.sfx('click');
    collectPickups();
  }
  function shoot(){
    if(gameOver) return;
    const cs = player.spread > 0 ? [-1, 0, 1] : [0];
    for(const dc of cs) bullets.push({ row: player.row-1, col: player.col + dc });
    if(J) J.sfx('pew');
  }

  function hitSegment(segIndex){
    const seg = centi[segIndex];
    mush[seg.row][seg.col] = true;          // 被击中的一节变成蘑菇
    centi.splice(segIndex, 1);
    score += 10; killStreak++;
    if(killStreak % 3 === 0) pickups.push({ type: 'rapid', row: seg.row, col: seg.col }); // 每 3 杀掉道具
    if(J) J.sfx('pop'); if(J) J.addTrauma(0.15);
    if(J && J.burst) J.burst(seg.col*30+15, seg.row*30+15, { color:'#f6465d', n:8, speed:120 });
    if(J && J.shake) J.shake(0.2);
    // 分裂：原"之后"的那一节反向，作为新的头部
    if(segIndex < centi.length){
      centi[segIndex].dir *= -1;
    }
  }

  function step(){
    if(gameOver) return;
    // Boss 波：走独立分支（不清普通蜈蚣、击败后才进下一波）
    if(boss){
      if(player.rapid > 0){ player.rapid--; shoot(); }
      const beaten = updateBoss();
      collectPickups();
      if(!gameOver && beaten){
        wave++;
        if(isBossWave(wave)) spawnBoss(); else buildCentipede();
      }
      return;
    }
    if(player.rapid > 0){ player.rapid--; shoot(); }   // 连射增益：自动开火
    // 1) 子弹上移
    for(const b of bullets) b.row -= 1;
    // 2) 子弹碰撞（先蜈蚣，再蘑菇）
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      let consumed = false;
      const si = centi.findIndex(s => s.row===b.row && s.col===b.col);
      if(si >= 0){ hitSegment(si); consumed = true; }
      else if(inMush(b.row, b.col)){ mush[b.row][b.col] = false; consumed = true; if(J) J.sfx('break'); }
      if(consumed || b.row < 0) bullets.splice(i,1);
    }
    // 3) 蜈蚣移动
    for(const s of centi){
      let nc = s.col + s.dir;
      const blocked = (nc < 0 || nc >= COLS || inMush(s.row, nc));
      if(blocked){
        s.dir *= -1;
        s.row += 1;                 // 下移到下一行
        if(s.row >= ROWS){ gameOver = true; if(J) J.sfx('lose'); }
      } else {
        s.col = nc;
      }
    }
    // 4) 玩家被击中
    for(const s of centi){
      if(s.row === player.row && s.col === player.col){ die(); break; }
    }
    // 5) 全部清除 → 下一波（每 BOSS_EVERY 波出 Boss）
    if(!gameOver && centi.length === 0){
      wave++;
      if(isBossWave(wave)) spawnBoss(); else buildCentipede();
      if(!_confettiFired){ _confettiFired = true; if (typeof Juice !== 'undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); }
    }
  }
  // 死亡：有护盾则消耗护盾免死，否则结束（注入式分支，shield=0 时行为不变）
  function die(){
    if(player.shield > 0){ player.shield--; if(J) J.sfx('block'); return; }
    gameOver = true; if(J) J.sfx('lose');
  }

  // ---------- Boss：蜈蚣女王（带 HP 的大头，自顶部下压、左右摆动、周期弹幕）----------
  function spawnBoss(){
    const mult = (typeof diffCfg==='function' && diffCfg().bossHpMult) ? diffCfg().bossHpMult : 1;
    const maxHp = Math.round((28 + wave*6) * mult);
    const w = 5, h = 2;
    boss = {
      col: Math.floor((COLS - w)/2),   // 左上角列
      row: 0,
      w: w, h: h,
      hp: maxHp, maxHp: maxHp,
      phase: 1,
      dir: 1,
      fireT: 0,
      down: 0
    };
    centi = [];   // 清空普通蜈蚣
    if(J && J.sfx) J.sfx('levelup');
  }
  // 返回 true 表示本帧击败 Boss
  function updateBoss(){
    if(!boss) return false;
    // 半血进 phase2（更快、更密弹幕）
    if(boss.phase===1 && boss.hp <= boss.maxHp/2){ boss.phase = 2; if(J && J.flash) J.flash('#f6465d'); }
    // 玩家子弹上移
    for(const b of bullets){ if(!b.boss && !b.dead) b.row -= 1; }
    bullets = bullets.filter(b => b.boss || b.row >= 0);
    // 横向摆动 + 下压（phase2 更急）
    const stepX = boss.phase===2 ? 2 : 1;
    boss.col += boss.dir * stepX;
    if(boss.col <= 0){ boss.col = 0; boss.dir = 1; boss.row += 1; }
    else if(boss.col + boss.w >= COLS){ boss.col = COLS - boss.w; boss.dir = -1; boss.row += 1; }
    else { boss.down += (boss.phase===2 ? 0.6 : 0.35); if(boss.down >= 1){ boss.down -= 1; boss.row += 1; } }
    // 玩家子弹命中扣血
    for(const b of bullets){
      if(b.boss || b.dead) continue;
      if(b.col >= boss.col && b.col <= boss.col+boss.w-1 && b.row >= boss.row && b.row <= boss.row+boss.h-1){
        boss.hp -= 1; b.dead = true;
      }
    }
    bullets = bullets.filter(b=>!b.dead);
    // 弹幕：周期向下发射
    boss.fireT += 1;
    const interval = boss.phase===2 ? 3 : 5;
    if(boss.fireT >= interval){
      boss.fireT = 0;
      const mid = boss.col + Math.floor(boss.w/2);
      bullets.push({ row: boss.row + boss.h, col: mid, boss: true });
      if(boss.phase===2){
        bullets.push({ row: boss.row + boss.h, col: boss.col, boss: true });
        bullets.push({ row: boss.row + boss.h, col: boss.col + boss.w - 1, boss: true });
      }
    }
    // boss 子弹下移并命中玩家
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      if(!b.boss) continue;
      b.row += 1;
      if(b.row === player.row && b.col === player.col){ die(); bullets.splice(i,1); continue; }
      if(b.row > ROWS){ bullets.splice(i,1); }
    }
    // 接触玩家（头部压到玩家所在行）
    if(boss.row + boss.h >= player.row){ die(); }
    // 击败：奖励 + 掉落 + 置空
    if(boss.hp <= 0){
      score += 100 * wave;
      pickups.push({ type: 'rapid', row: boss.row, col: boss.col + Math.floor(boss.w/2) });
      if(J && J.sfx) J.sfx('win');
      boss = null;
      if(!_confettiFired){ _confettiFired = true; if (typeof Juice !== 'undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); }
      return true;
    }
    return false;
  }
  function applyPickup(type){
    if(type === 'coin'){ score += 50; if(J) J.sfx('pickup'); }
    else if(type === 'shield'){ player.shield++; if(J) J.sfx('pickup'); }
    else if(type === 'rapid'){ player.rapid = 8; if(J) J.sfx('pickup'); }
    else if(type === 'spread'){ player.spread = 8; if(J) J.sfx('pickup'); }
  }
  function collectPickups(){
    for(let i=pickups.length-1;i>=0;i--){
      const p = pickups[i];
      if(p.row === player.row && p.col === player.col){ applyPickup(p.type); pickups.splice(i,1); }
    }
  }

  function isGameOver(){ return gameOver; }
  function getScore(){ return score; }
  function getState(){
    return {
      centipede: centi.map(s => ({ row:s.row, col:s.col, dir:s.dir })),
      mushrooms: mushroomList(),
      player: { row: player.row, col: player.col },
      bullets: bullets.map(b => ({ row:b.row, col:b.col, boss: !!b.boss })),
      gameOver, score, wave,
      boss: boss ? { col:boss.col, row:boss.row, w:boss.w, h:boss.h, hp:boss.hp, maxHp:boss.maxHp, phase:boss.phase } : null,
      pickups: pickups.map(p => ({ type:p.type, row:p.row, col:p.col })),
      shield: player.shield, rapid: player.rapid, spread: player.spread
    };
  }

  // ---- 测试辅助 setter ----
  function setCentipede(arr){ centi = arr.map(s => ({ row:s.row, col:s.col, dir:s.dir||1 })); }
  function setMushrooms(arr){ mush = Array.from({length:ROWS},()=>new Array(COLS).fill(false)); for(const [r,c] of arr) if(r>=0&&r<ROWS&&c>=0&&c<COLS) mush[r][c]=true; }
  function setPlayer(r,c){ player.row=r; player.col=c; }
  function setBullets(arr){ bullets = arr.map(b => ({ row:b.row, col:b.col })); }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv = $('board'); if(!cv) return;
    const vw = (typeof window!=='undefined') ? window.innerWidth : 800;
    const ch = Math.min(cv.height, Math.max(220, ((typeof window!=='undefined')?window.innerHeight:600) - 170));
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    const cw = cv.width / COLS, chh = cv.height / ROWS;
    // 蘑菇
    ctx.fillStyle = '#8a5a2b';
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(mush[r][c]) ctx.fillRect(c*cw+cw*0.25, r*chh+chh*0.25, cw*0.5, chh*0.5);
    // 蜈蚣
    ctx.fillStyle = '#f6465d';
    for(const s of centi) ctx.fillRect(s.col*cw+cw*0.2, s.row*chh+chh*0.2, cw*0.6, chh*0.6);
    // 子弹（boss 弹幕标红）
    for(const b of bullets){
      ctx.fillStyle = b.boss ? '#f6465d' : '#f0b90b';
      ctx.fillRect(b.col*cw+cw*0.4, b.row*chh+chh*0.1, cw*0.2, chh*0.6);
    }
    // Boss：蜈蚣女王（多边形大头 + 顶部血条）
    if(boss){
      const bx = boss.col*cw, by = boss.row*chh, bw = boss.w*cw, bh = boss.h*chh;
      const bodyCol = boss.phase===2 ? '#f6465d' : '#9b6bff';
      ctx.save();
      ctx.shadowColor = bodyCol; ctx.shadowBlur = 14; ctx.fillStyle = bodyCol;
      ctx.beginPath();
      ctx.moveTo(bx+bw*0.5, by);
      ctx.lineTo(bx+bw, by+bh*0.3);
      ctx.lineTo(bx+bw*0.82, by+bh);
      ctx.lineTo(bx+bw*0.18, by+bh);
      ctx.lineTo(bx, by+bh*0.3);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0; ctx.fillStyle = '#0a0e14';
      ctx.fillRect(bx+bw*0.3, by+bh*0.35, bw*0.12, bh*0.22);
      ctx.fillRect(bx+bw*0.58, by+bh*0.35, bw*0.12, bh*0.22);
      ctx.restore();
      const barW = cv.width - 20, barX = 10, barY = 4, frac = Math.max(0, boss.hp/boss.maxHp);
      ctx.fillStyle = '#2a2f3a'; ctx.fillRect(barX, barY, barW, 6);
      ctx.fillStyle = boss.phase===2 ? '#f6465d' : '#f0b90b'; ctx.fillRect(barX, barY, barW*frac, 6);
    }
    // 玩家
    ctx.fillStyle = '#02c076';
    ctx.fillRect(player.col*cw+cw*0.2, player.row*chh+chh*0.2, cw*0.6, chh*0.6);
    if(player.shield > 0){
      ctx.strokeStyle = '#5ab4ff'; ctx.lineWidth = 2;
      ctx.strokeRect(player.col*cw+cw*0.1, player.row*chh+chh*0.1, cw*0.8, chh*0.8);
    }
    // 道具
    for(const p of pickups){
      const px = p.col*cw+cw*0.5, py = p.row*chh+chh*0.5;
      ctx.beginPath(); ctx.arc(px, py, cw*0.3, 0, 7);
      ctx.fillStyle = p.type==='coin' ? 'rgba(255,207,90,0.3)' : p.type==='shield' ? 'rgba(80,180,255,0.3)' : p.type==='rapid' ? 'rgba(240,185,11,0.3)' : 'rgba(255,99,132,0.3)';
      ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font=(chh*0.4|0)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.type==='coin'?'💰':p.type==='shield'?'🛡':p.type==='rapid'?'⚡':'✳', px, py);
    }
    const sc = $('score'); if(sc) sc.textContent = String(score);
    const st = $('st'); if(st) st.textContent = gameOver ? '结束' : '进行中';
    const msg = $('msg'); if(msg){ if(gameOver){ msg.className='msg over'; msg.textContent='💀 被蜈蚣击中，游戏结束。'; } else msg.className='msg'; }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    document.querySelectorAll('.controls button[data-d]').forEach(b => {
      b.onclick = () => { move(b.getAttribute('data-d')); render(); };
    });
    const sh = $('shoot'); if(sh) sh.onclick = () => { shoot(); render(); };
    const nb = $('new'); if(nb) nb.onclick = () => { reset(); render(); };
  }

  reset();
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', render); else render(); }
  if(typeof window!=='undefined'){
    window.__t = { setRand, reset, newGame, move, shoot, step, isGameOver, getScore, getState,
      setCentipede, setMushrooms, setPlayer, setBullets,
      // ---- 道具系统钩子 ----
      spawnPickup:(type,row,col)=>{ pickups.push({ type:type, row:row, col:col }); },
      getPickups:()=>pickups.length,
      getShield:()=>player.shield, setShield:(v)=>{ player.shield=v; },
      getRapid:()=>player.rapid, setRapid:(v)=>{ player.rapid=v; },
      getSpread:()=>player.spread, setSpread:(v)=>{ player.spread=v; },
      applyPickup, collectPickups,
      // ---- Boss 系统钩子（B4 蜈蚣女王）----
      BOSS_EVERY, isBossWave, spawnBoss, updateBoss,
      getBoss:()=> boss ? { col:boss.col, row:boss.row, w:boss.w, h:boss.h, hp:boss.hp, maxHp:boss.maxHp, phase:boss.phase, dir:boss.dir } : null,
      setBossHp:(v)=>{ if(boss) boss.hp = v; },
      setWave:(v)=>{ wave = v; },
      getWave:()=>wave,
      confettiFired:()=>_confettiFired,
      addBullet:(row,col)=>{ bullets.push({ row:row, col:col }); } };
  }
})();
</script>
</body>
</html>
