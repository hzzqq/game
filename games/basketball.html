<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 投篮</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex:justify-content:space-between;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  canvas{background:#0e141d;border:1px solid var(--border);border-radius:8px;max-width:98vw}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .controls input{width:70px;background:#0e141d;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-family:inherit;text-align:center}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>投篮</b> BASKETBALL</span></div>
  <div class="wrap">
    <div class="hud"><span>得分 · <span class="st" id="sc">0</span></span><span>状态 · <span class="st" id="st">瞄准中</span></span></div>
    <canvas id="cv" width="400" height="260"></canvas>
    <div class="msg" id="msg">调整出手角度与力度投出抛物线，让球落入篮筐（命中半径内）即得分。重力会影响轨迹。</div>
    <div class="controls">
      <input id="ang" placeholder="角度°" /><input id="pow" placeholder="力度" />
      <button id="shoot">投篮 SHOOT</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
  </div>
  <div class="foot">Basketball（投篮）：设定出手角度与力度，球受重力呈抛物线飞行，落入篮筐捕获范围即得分。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const W=400, H=260, G=0.4, CAP=16;
  let ball, hoop, score, made;

  // ---- 注入：掉落道具/增益系统（纯反馈分支，不改核心玩法）----
  // 真实浏览器判定：node 测试 harness 的 navigator.userAgent 固定为 'node-test'
  const IN_BROWSER = !(typeof navigator!=='undefined' && navigator.userAgent === 'node-test');
  function mk(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  const PICKUPS = {
    coin:  {emoji:'💰', color:'#f0b90b', r:10},
    boost: {emoji:'🚀', color:'#02c076', r:10},
    star:  {emoji:'⭐', color:'#e6edf3', r:10},
  };
  let pickups, boostTimer, rngPick;
  function makePickup(type,x,y){ const d=PICKUPS[type]||PICKUPS.coin; return {type:type,x:x,y:y,r:d.r,t:0}; }
  function applyPickup(type){
    if(type==='coin') score += 2;
    else if(type==='star') score += 5;
    else if(type==='boost') boostTimer = 6;
    if(typeof Juice!=='undefined') Juice.sfx('pickup');
  }
  function collectPickup(i){
    if(i<0 || i>=pickups.length) return;
    applyPickup(pickups[i].type); pickups.splice(i,1);
  }
  function updatePickups(dt){ for(const p of pickups){ p.t += dt; } if(boostTimer>0) boostTimer = Math.max(0, boostTimer-dt); }
  function spawnPickupAt(x,y){
    const roll=rngPick();
    const type = roll<0.5?'coin': roll<0.8?'boost':'star';
    pickups.push(makePickup(type, x, y));
  }

  function reset(){ ball={x:40,y:200}; hoop={x:330,y:110}; score=0; made=false; pickups=[]; boostTimer=0; rngPick=mk(0x0BADF00D); }
  function setBall(x,y){ ball={x,y}; }
  function setHoop(x,y){ hoop={x,y}; }
  function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }
  function shoot(angleDeg,power){
    made=false;
    if(typeof Juice!=='undefined') Juice.sfx('shoot');
    const a=angleDeg*Math.PI/180, vx=power*Math.cos(a); let vy=-power*Math.sin(a);
    let x=ball.x, y=ball.y;
    for(let s=0;s<400;s++){
      x+=vx; y+=vy; vy+=G;
      // 注入：飞行球拾取附近掉落物
      for(let i=pickups.length-1;i>=0;i--){
        if(Math.hypot(x-pickups[i].x, y-pickups[i].y) < 8+pickups[i].r){ collectPickup(i); }
      }
      if(dist(x,y,hoop.x,hoop.y)<=CAP){
        made=true; score += (boostTimer>0 ? 3 : 1);
        if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.addTrauma(.25); Juice.popup(x, y, '+1', '#f0b90b'); }
        ball.x=hoop.x; ball.y=hoop.y;
        // 注入：进球掉落（仅真实游玩，局部 PRNG）
        if(IN_BROWSER && rngPick()<0.4) spawnPickupAt(hoop.x, hoop.y-20);
        return;
      }
      if(x>W||y>H||x<0) break;
    }
    ball.x=x; ball.y=y;
  }
  function getScore(){ return score; }
  function isMade(){ return made; }
  function getBall(){ return {x:ball.x,y:ball.y}; }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv=$('cv'); if(!cv||!cv.getContext) return; const ctx=cv.getContext('2d');
    ctx.fillStyle='#0e141d'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#f0b90b'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(hoop.x,hoop.y,CAP,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#f6465d'; ctx.beginPath(); ctx.arc(ball.x,ball.y,8,0,Math.PI*2); ctx.fill();
    // 注入：掉落物（辉光圆 + emoji）
    for(const p of pickups){
      const d=PICKUPS[p.type];
      ctx.save();
      ctx.shadowBlur=12; ctx.shadowColor=d.color; ctx.fillStyle=d.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.fillStyle='#0a0e14'; ctx.font='bold 11px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(d.emoji, p.x, p.y+1);
      ctx.restore();
    }
    const sc=$('sc'),st=$('st'),msg=$('msg');
    if(sc)sc.textContent=score;
    if(st)st.textContent=made?'命中!':'瞄准中';
    if(msg)msg.textContent='调整出手角度与力度投出抛物线，让球落入篮筐即得分。'+(boostTimer>0?' 🚀强化':'');
  }
  let _lastT=0;
  function loop(now){
    if(typeof requestAnimationFrame==='undefined') return;
    if(IN_BROWSER){
      const t = (typeof performance!=='undefined' && performance.now) ? performance.now() : Date.now();
      const dt = _lastT ? Math.min(0.05, (t-_lastT)/1000) : 0; _lastT=t;
      updatePickups(dt);
    }
    render(); requestAnimationFrame(loop);
  }
  reset();
  if(typeof document!=='undefined'){ const sb=$('shoot'),nb=$('new'),ai=$('ang'),pi=$('pow'); if(sb)sb.onclick=()=>{ shoot(+ai.value||0,+pi.value||0); render(); }; if(nb)nb.onclick=()=>{ reset(); render(); }; if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ render(); loop(); }); else { render(); loop(); } }
  if(typeof window!=='undefined'){ window.__t={
    reset, setBall, setHoop, shoot, getScore, isMade, getBall, setScore:(v)=>{score=v;}, PICKUPS,
    update: shoot,
    getState:()=>({score,made,boostTimer,pickups:pickups.length}),
    spawnPickup:(type,x,y)=>{ pickups.push(makePickup(type,x,y)); },
    stepPickups:(dt)=>{ updatePickups(dt); },
    applyPickup:(type)=>{ applyPickup(type); },
    getPickups:()=>pickups,
    collectPickup:(i)=>{ collectPickup(i); },
    getBoost:()=>boostTimer, setBoost:(v)=>{boostTimer=v;},
  }; }
})();
</script>
</body>
</html>
