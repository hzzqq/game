<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 台球</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex:justify-content:space-between;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  canvas{background:#0b3d2e;border:1px solid var(--border);border-radius:8px;max-width:98vw}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .controls input{width:70px;background:#0e141d;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-family:inherit;text-align:center}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>台球</b> POOL</span></div>
  <div class="wrap">
    <div class="hud"><span>已收袋 · <span class="st" id="pk">0</span></span><span>状态 · <span class="st" id="st">瞄准中</span></span></div>
    <canvas id="cv" width="400" height="240"></canvas>
    <div class="msg" id="msg">调整角度与力度击打母球，母球撞到目标球后将其撞入球袋。把目标球全部打进即过关。</div>
    <div class="controls">
      <input id="ang" placeholder="角度°" /><input id="pow" placeholder="力度" />
      <button id="shoot">击球 SHOOT</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
  </div>
  <div class="foot">Pool（台球）：操控母球角度与力度，撞击目标球入袋。母球与目标球弹性碰撞传递动量，落袋即得分。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const W=400, H=240, R=7, PR=12;
  let cue, balls, pockets, pocketed;
  // ---- 注入：掉落道具/增益系统（纯附加，不改核心碰撞/入袋逻辑）----
  let coins=0, aimTimer=0, shield=false, pickups=[], pkid=0;
  function mk(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const _prng = mk(0x4b2c1d1f);
  const PICK = { COIN:'coin', AIM:'aim', SHIELD:'shield' };
  const GLY = { coin:'💰', aim:'🎯', shield:'🛡' };
  function makePickup(type,x,y){ return { type, x, y, r:11, age:0, id:pkid++ }; }
  function spawnPickup(type,x,y){ const p=makePickup(type,x,y); pickups.push(p); return p; }
  function spawnPickupAtRandom(){ const types=[PICK.COIN,PICK.AIM]; const t=types[Math.floor(_prng()*types.length)]; const x=20+_prng()*(W-40); const y=20+_prng()*(H-40); return spawnPickup(t,x,y); }
  function applyPickup(type){ if(type===PICK.COIN){ coins+=50; } else if(type===PICK.AIM){ aimTimer=6; } else if(type===PICK.SHIELD){ shield=true; } if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); } }
  function tryCollect(x,y){ for(let i=pickups.length-1;i>=0;i--){ const p=pickups[i]; if(Math.hypot(p.x-x,p.y-y)<=p.r+R){ const pk=pickups.splice(i,1)[0]; applyPickup(pk.type); } } }
  function updatePickups(dt){ if(aimTimer>0) aimTimer=Math.max(0,aimTimer-(dt||1)); for(let i=pickups.length-1;i>=0;i--){ pickups[i].age+=(dt||1); if(pickups[i].age>30) pickups.splice(i,1); } }
  function takeHit(){ if(shield){ shield=false; return false; } return true; }
  function getPickups(){ return pickups.map(p=>({type:p.type,x:p.x,y:p.y})); }
  function getCoins(){ return coins; }
  function getAim(){ return aimTimer; }
  function getShield(){ return shield; }
  function setShield(v){ shield=!!v; }
  function getBoost(){ return aimTimer; }
  function setBoost(v){ aimTimer=Math.max(0,v); }
  function defaultPockets(){ return [[0,0],[W,0],[0,H],[W,H],[W/2,0],[W/2,H]]; }
  function reset(){
    cue={x:60,y:H/2,vx:0,vy:0};
    balls=[{id:1,x:W/2,y:H/2,vx:0,vy:0},{id:2,x:W/2+30,y:H/2,vx:0,vy:0}];
    pockets=defaultPockets(); pocketed=[];
    coins=0; aimTimer=0; shield=false; pickups=[];
  }
  function setCue(x,y){ cue={x,y,vx:0,vy:0}; }
  function setBalls(arr){ balls=arr.map(b=>({id:b.id,x:b.x,y:b.y,vx:0,vy:0})); }
  function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }
  function inPocket(x,y){ return pockets.some(p=>dist(x,y,p[0],p[1])<=PR); }
  function shoot(angleDeg,power){
    pocketed=[];
    const a=angleDeg*Math.PI/180, dx=Math.cos(a), dy=Math.sin(a);
    cue.vx=dx*1.5; cue.vy=dy*1.5;
    if(typeof Juice!=='undefined'){ Juice.sfx('shoot'); Juice.addTrauma(0.2); }
    // 母球行进
    for(let s=0;s<power;s++){
      cue.x+=cue.vx; cue.y+=cue.vy; tryCollect(cue.x,cue.y);
      if(cue.x<R){cue.x=R;cue.vx=Math.abs(cue.vx);} if(cue.x>W-R){cue.x=W-R;cue.vx=-Math.abs(cue.vx);}
      if(cue.y<R){cue.y=R;cue.vy=Math.abs(cue.vy);} if(cue.y>H-R){cue.y=H-R;cue.vy=-Math.abs(cue.vy);}
      if(inPocket(cue.x,cue.y)){ pocketed.push('cue'); cue.vx=0; cue.vy=0; if(typeof Juice!=='undefined'){ Juice.sfx('error'); Juice.addTrauma(0.3);} break; }
      let hit=null;
      for(const b of balls){ if(dist(cue.x,cue.y,b.x,b.y)<=2*R){ hit=b; break; } }
      if(hit){ hit.vx=cue.vx; hit.vy=cue.vy; cue.vx=0; cue.vy=0; if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.addTrauma(0.25); Juice.burst(cue.x,cue.y,{color:'#f0b90b',n:12}); } break; }
    }
    // 目标球行进
    for(const b of balls){
      for(let s=0;s<power;s++){
        if(b.vx===0&&b.vy===0) break;
        b.x+=b.vx; b.y+=b.vy; tryCollect(b.x,b.y);
        if(b.x<R){b.x=R;b.vx=Math.abs(b.vx);} if(b.x>W-R){b.x=W-R;b.vx=-Math.abs(b.vx);}
        if(b.y<R){b.y=R;b.vy=Math.abs(b.vy);} if(b.y>H-R){b.y=H-R;b.vy=-Math.abs(b.vy);}
        if(inPocket(b.x,b.y)){ const px=b.x, py=b.y; pocketed.push(b.id); b.vx=0; b.vy=0; b.x=-100; b.y=-100; if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); Juice.burst(px,py,{color:'#02c076',n:16}); Juice.popup(px,py,'+1','#02c076'); } break; }
      }
    }
    updatePickups(1);
    if(typeof Juice!=='undefined'){ const tgt=pocketed.filter(x=>x!=='cue'); if(tgt.length>=balls.length){ Juice.sfx('win'); Juice.flash('#02c076',.5); Juice.addTrauma(.4); } }
  }
  function getBalls(){ return balls.map(b=>({id:b.id,x:b.x,y:b.y})); }
  function getCue(){ return {x:cue.x,y:cue.y}; }
  function getPocketed(){ return pocketed.slice(); }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv=$('cv'); if(!cv||!cv.getContext) return; const ctx=cv.getContext('2d');
    ctx.fillStyle='#0b3d2e'; ctx.fillRect(0,0,W,H);
    // pockets (gradient depth + highlight rim)
    for(const p of pockets){
      ctx.save();
      ctx.beginPath(); ctx.arc(p[0],p[1],PR,0,Math.PI*2);
      const g=ctx.createRadialGradient(p[0],p[1],2,p[0],p[1],PR);
      g.addColorStop(0,'#3a2e00'); g.addColorStop(1,'#f0b90b');
      ctx.fillStyle=g; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.stroke();
      ctx.restore();
    }
    // object balls (gradient + highlight + outline)
    for(const b of balls){ if(b.x<0)continue;
      ctx.save();
      ctx.beginPath(); ctx.arc(b.x,b.y,R,0,Math.PI*2);
      const g=ctx.createRadialGradient(b.x-R*0.3,b.y-R*0.3,1,b.x,b.y,R);
      g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#cfd6dd');
      ctx.fillStyle=g; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x-R*0.3,b.y-R*0.3,R*0.28,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
      ctx.restore();
    }
    // cue ball (gradient + highlight + outline)
    ctx.save();
    ctx.beginPath(); ctx.arc(cue.x,cue.y,R,0,Math.PI*2);
    const g=ctx.createRadialGradient(cue.x-R*0.3,cue.y-R*0.3,1,cue.x,cue.y,R);
    g.addColorStop(0,'#ff7a8a'); g.addColorStop(1,'#f6465d');
    ctx.fillStyle=g; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cue.x-R*0.3,cue.y-R*0.3,R*0.28,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
    ctx.restore();
    // pickups
    for(const p of pickups){ ctx.save(); ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle='rgba(240,185,11,.25)'; ctx.fill(); ctx.lineWidth=1.5; ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(GLY[p.type],p.x,p.y); ctx.restore(); }
    const pk=$('pk'),st=$('st'); if(pk)pk.textContent=pocketed.filter(x=>x!=='cue').length+(coins>0?(' · 💰'+coins):''); if(st)st.textContent=(pocketed.length?'击球完成':'瞄准中')+(aimTimer>0?' · 🎯':'');
  }
  function loop(){ if(typeof requestAnimationFrame==='undefined') return; render(); requestAnimationFrame(loop); }
  reset();
  if(typeof document!=='undefined'){ const sb=$('shoot'),nb=$('new'),ai=$('ang'),pi=$('pow'); if(sb)sb.onclick=()=>{ shoot(+ai.value||0,+pi.value||0); render(); }; if(nb)nb.onclick=()=>{ reset(); render(); }; if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ render(); loop(); }); else { render(); loop(); } }
  if(typeof window!=='undefined'){ window.__t={ reset, setCue, setBalls, shoot, getBalls, getCue, getPocketed,
    PICK, spawnPickup, spawnPickupAtRandom, applyPickup, tryCollect, updatePickups, takeHit,
    getPickups, getCoins, getAim, getShield, setShield, getBoost, setBoost,
    getState(){ return { coins, aimTimer, shield, pickups:pickups.length }; },
    stepPickups(dt){ updatePickups(dt); }
  }; }
})();
</script>
</body>
</html>
