<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 跳跳 JUMP JUMP</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(240,185,11,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(360px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--gold)}
  .wrap{width:min(360px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .sc{color:var(--gold);font-weight:700}.hud .st{color:var(--green);font-weight:700}
  .hud .buff{display:flex;gap:8px;color:var(--dim)}
  .hud .buff .on{color:var(--green);font-weight:700}
  .hud .buff .onb{color:var(--gold);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px;display:block;touch-action:none}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--gold);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.over{color:var(--red);font-weight:700}
  .foot{width:min(360px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>跳跳</b> JUMP JUMP</span></div>
  <div class="wrap">
    <div class="hud"><span>得分 <span class="sc" id="score">0</span></span><span class="buff"><span id="bShield">🛡×0</span><span id="bBoost">🚀×0</span></span><span>状态 <span class="st" id="st">进行中</span></span></div>
    <div class="boardwrap"><canvas id="cv" width="360" height="600"></canvas></div>
    <div class="controls">
      <button id="left">◀ 左</button>
      <button id="jump">⤒ 跳</button>
      <button id="right">▶ 右</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="msg" id="msg">小人自动弹跳向上攀登，左右移动对准平台；掉出屏幕底部即失败。捡道具：💰金币加分 · 🛡护盾免一次坠落 · 🚀加速跳更高（限时）。</div>
  </div>
  <div class="foot">Jump Jump（跳跳）：自动弹跳穿越平台、向上攀爬刷新高度分；收集增益道具助你跳得更高更安全。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;

  // 视口：只用 window.innerWidth/innerHeight，带兜底避免 NaN（harness 取 800/600 → 取 min 定值）
  const W = (typeof window!=='undefined' && window.innerWidth) ? Math.min(window.innerWidth, 360) : 360;
  const H = (typeof window!=='undefined' && window.innerHeight) ? Math.min(window.innerHeight, 600) : 600;

  // 局部种子 PRNG（mulberry32）：所有随机必须走它，禁止裸 Math.random
  function mk(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x4a55b00b);
  function setRand(fn){ if(typeof fn==='function') _rng = fn; }
  function reseed(s){ _rng = mk((s>>>0) || 1); }

  // 物理 / 玩法常量（核心玩法：自动弹跳 + 左右移动，向上攀爬计分）
  const R = 14;                 // 玩家半径
  const GRAVITY = 1500;         // px/s^2
  const JUMP_V = -640;          // 普通起跳速度（向上为负）
  const JUMP_V_BOOST = -980;    // 加速态起跳速度（更高）
  const COIN_VALUE = 50;        // 金币加分
  const BOOST_DUR = 5.0;        // 加速持续秒数
  const START_Y = 200;          // 玩家起始世界 y（向下为正）
  const PLAT_W = 64, PLAT_H = 12;

  // 核心状态（普通 JS 变量，逻辑脱离 DOM）
  let player, platforms, cam, score, maxClimbY, gameOver, pickups, spawnTimer;
  // ---- 里程碑正反馈：分数每跨越一个 MILESTONE_STEP 触发一次 confetti（只读钩子 confettiFired）----
  const MILESTONE_STEP = 50;
  let confettiFx = 0;
  let nextMilestone = MILESTONE_STEP;
  function milestoneFire(){ confettiFx++; if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); }
  function checkMilestone(){ if(score >= nextMilestone){ nextMilestone += MILESTONE_STEP; milestoneFire(); } }

  // ---------- 拾取增益道具系统（注入式，不改弹跳物理/计分公式本身）----------
  const PICKUP_TYPES = ['coin','shield','boost'];
  const PICKUP_PROB = 0.20;     // 新生成平台携带道具的概率
  const PICKUP_VY = 0;          // 道具静止于世界坐标，随世界滚动（由 cam 渲染偏移）
  const PICKUP_LIFE = 12;       // 道具存活秒数（兜底清理）
  const SYM = { coin:'💰', shield:'🛡', boost:'🚀' };
  function makePickup(type, x, y){
    return { type:type, x:x, y:y, r:13, sym:SYM[type]||'★', life:PICKUP_LIFE, vy:PICKUP_VY };
  }
  function spawnPickupAtRandom(plat){
    const type = PICKUP_TYPES[(_rng()*PICKUP_TYPES.length)|0];
    pickups.push(makePickup(type, plat.x + plat.w/2, plat.y - 16));
  }
  function applyPickup(type){
    if(type && typeof type==='object') type = type.type;   // 兼容对象式调用
    if(type==='coin'){ score += COIN_VALUE; if(J) J.sfx&&J.sfx('pickup'); }
    else if(type==='shield'){ player.shield = (player.shield||0)+1; if(J) J.sfx&&J.sfx('pickup'); }
    else if(type==='boost'){ player.boost = BOOST_DUR; if(J) J.sfx&&J.sfx('pickup'); }
    checkMilestone();
  }
  function stepPickups(dt){
    for(let i=pickups.length-1;i>=0;i--){
      const p = pickups[i];
      if(p.vy) p.y += p.vy*dt;
      p.life -= dt;
      // 玩家接触拾取（世界坐标直接比对）
      if(Math.abs(p.x - player.x) < player.r + p.r && Math.abs(p.y - player.y) < player.r + p.r){
        applyPickup(p.type); pickups.splice(i,1); continue;
      }
      if(p.life <= 0 || (p.y - cam) > H + 80){ pickups.splice(i,1); }
    }
  }

  // ---------- 平台生成（向上无限延伸，携带随机掉落）----------
  function ensurePlatforms(){
    let topY = Infinity;
    for(const p of platforms) if(p.y < topY) topY = p.y;
    if(!isFinite(topY)) topY = START_Y;
    while(topY > cam - 200){
      const gap = 50 + _rng()*50;
      topY -= gap;
      const x = _rng()*(W - PLAT_W);
      const plat = { x:x, y:topY, w:PLAT_W };
      platforms.push(plat);
      if(_rng() < PICKUP_PROB) spawnPickupAtRandom(plat);
    }
  }
  function cullPlatforms(){
    platforms = platforms.filter(p => (p.y - cam) <= H + 80);
  }

  function reset(seed){
    if(typeof seed==='number' && !isNaN(seed)) _rng = mk(seed>>>0);
    platforms = [];
    pickups = [];
    spawnTimer = 0;
    score = 0; maxClimbY = START_Y; gameOver = false;
    confettiFx = 0; nextMilestone = MILESTONE_STEP;
    player = { x: W/2, y: START_Y, vx:0, vy: JUMP_V, r: R, shield: 0, boost: 0, onGround:false };
    cam = player.y - H*0.7;
    platforms.push({ x: W/2 - PLAT_W/2, y: START_Y + 18, w: PLAT_W }); // 起始平台
    ensurePlatforms();
    return getState();
  }
  function newGame(seed){ return reset(seed); }

  // 仅横向移动（核心玩法：左右移动，跳跃由落地自动触发；可手动跳加力）
  function move(dir){
    if(gameOver) return;
    player.vx = dir * 240;
  }

  function updateScore(){
    if(player.y < maxClimbY){
      const gain = Math.floor((maxClimbY - player.y)/10);
      if(gain > 0){ score += gain; maxClimbY = player.y; checkMilestone(); }
    }
  }

  // 手动跳：给一个向上冲量（加速态更高）。核心仍然是落地自动弹跳，此函数仅叠加，不改计分/物理公式。
  function doJump(){
    if(gameOver) return;
    const v = (player.boost > 0) ? JUMP_V_BOOST : JUMP_V;
    player.vy = Math.min(player.vy, v);   // 仅向上修正，不会削弱已有更快上升
    player.onGround = false;
    if(J) J.sfx&&J.sfx('jump');
  }

  // 推进一帧模拟
  function step(dt){
    if(gameOver) return;
    dt = dt || 0.016;

    // 加速计时（仅影响弹跳初速与视觉，不改落地判定/计分公式）
    if(player.boost > 0) player.boost = Math.max(0, player.boost - dt);

    // 重力 + 积分
    player.vy += GRAVITY * dt;
    const prevFeet = player.y + player.r;        // 上一帧脚底（用于落地扫掠）
    player.x += player.vx * dt;
    player.y += player.vy * dt;
    if(player.x < 0) player.x += W;
    if(player.x > W) player.x -= W;

    // 相机只向上跟随（玩家下落时不动，从而掉出底部判负）
    const targetCam = player.y - H*0.4;
    if(targetCam < cam) cam = targetCam;

    // 落地检测：向下运动且脚底扫过某平台顶面 → 自动弹跳
    player.onGround = false;
    if(player.vy > 0){
      const feetNow = player.y + player.r;
      for(const p of platforms){
        if(player.x + player.r > p.x && player.x - player.r < p.x + p.w){
          if(prevFeet <= p.y + 2 && feetNow >= p.y){
            player.y = p.y - player.r;
            player.vy = (player.boost > 0) ? JUMP_V_BOOST : JUMP_V;
            player.onGround = true;
            if(J) J.sfx&&J.sfx('bounce');
            break;
          }
        }
      }
    }

    ensurePlatforms();
    cullPlatforms();
    updateScore();
    stepPickups(dt);

    // 坠落失败：玩家掉出屏幕底部；护盾优先消耗并救援，无盾才判负
    if(player.y - cam > H + player.r){
      if(player.shield > 0){
        player.shield--;
        player.y = cam + H*0.5;
        player.vy = JUMP_V;
        if(J) J.flash&&J.flash('#02c076', .3);
        if(J) J.sfx&&J.sfx('hit');
      } else {
        gameOver = true;
        if(J) J.sfx&&J.sfx('lose');
        if(J) J.best&&J.best('jumpjump', score);
      }
    }
  }

  function isGameOver(){ return gameOver; }
  function getScore(){ return score; }
  function getState(){
    return {
      player: { x:player.x, y:player.y, vx:player.vx, vy:player.vy, r:player.r, onGround:player.onGround },
      cam: cam, score, gameOver,
      shield: player.shield, boost: player.boost,
      platformCount: platforms.length,
      pickups: pickups.map(p=>({ type:p.type, x:+p.x.toFixed(2), y:+p.y.toFixed(2) })),
    };
  }

  // ---- 测试辅助 setter（不影响核心玩法，便于确定性测试）----
  function setPlayerX(v){ player.x = v; }
  function setPlayerY(v){ player.y = v; }
  function setVY(v){ player.vy = v; }
  function triggerFall(){ player.y = cam + H + 100; }   // 把玩家推到屏幕底外，触发坠落判定

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv = $('cv'); if(!cv) return;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const sy = (wy) => wy - cam;   // 世界 y -> 屏幕 y

    // 平台
    ctx.fillStyle = '#3a4a5e';
    for(const p of platforms){
      const y = sy(p.y);
      if(y < -PLAT_H || y > H) continue;
      ctx.fillRect(p.x, y, p.w, PLAT_H);
      ctx.fillStyle = 'rgba(255,255,255,.08)'; ctx.fillRect(p.x, y, p.w, 3);
      ctx.fillStyle = '#3a4a5e';
    }

    // 道具（玩家之前绘制：辉光圆 + emoji）
    for(const p of pickups){
      const px = p.x, py = sy(p.y);
      if(py < -20 || py > H + 20) continue;
      ctx.save();
      ctx.beginPath(); ctx.arc(px, py, p.r + 4, 0, Math.PI*2);
      ctx.fillStyle = (p.type==='coin') ? 'rgba(255,207,90,.12)' : (p.type==='boost') ? 'rgba(240,185,11,.14)' : 'rgba(2,192,118,.14)';
      ctx.fill();
      ctx.strokeStyle = (p.type==='coin') ? 'rgba(255,207,90,.8)' : (p.type==='boost') ? 'rgba(240,185,11,.8)' : 'rgba(2,192,118,.8)';
      ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = '16px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.sym, px, py);
      ctx.restore();
    }

    // 玩家
    const py = sy(player.y);
    const boosting = player.boost > 0;
    ctx.fillStyle = boosting ? '#f0b90b' : '#02c076';
    ctx.beginPath(); ctx.arc(player.x, py, player.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2; ctx.stroke();
    if(boosting){   // 加速尾迹小点
      ctx.fillStyle = 'rgba(240,185,11,.5)';
      ctx.beginPath(); ctx.arc(player.x, py + player.r + 6, 3, 0, Math.PI*2); ctx.fill();
    }
    // 护盾环
    if(player.shield > 0){
      ctx.strokeStyle = 'rgba(2,192,118,.85)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(player.x, py, player.r + 6, 0, Math.PI*2); ctx.stroke();
    }

    const sc = $('score'); if(sc) sc.textContent = String(score);
    const st = $('st'); if(st) st.textContent = gameOver ? '结束' : '进行中';
    const bSh = $('bShield'); if(bSh) bSh.textContent = '🛡×' + player.shield;
    const bBs = $('bBoost'); if(bBs) bBs.textContent = '🚀×' + (player.boost > 0 ? player.boost.toFixed(1) : '0');
    const msg = $('msg'); if(msg){ if(gameOver){ msg.className='msg over'; msg.textContent='💀 掉出屏幕，游戏结束 · 得分 '+score+' · 刷新重开'; } else msg.className='msg'; }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const l=$('left'), r=$('right'), j=$('jump'), n=$('new');
    if(l) l.onclick = () => { move(-1); render(); };
    if(r) r.onclick = () => { move(1); render(); };
    if(j) j.onclick = () => { doJump(); render(); };
    if(n) n.onclick = () => { reset(); render(); };
    if(typeof document!=='undefined'){
      document.addEventListener('keydown', e => {
        if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A'){ move(-1); render(); }
        else if(e.key==='ArrowRight'|| e.key==='d' || e.key==='D'){ move(1); render(); }
        else if(e.key===' ' || e.key==='ArrowUp' || e.key==='w' || e.key==='W'){ doJump(); render(); }
      });
    }
  }
  function loop(){
    step(0.016); render();
    if(typeof document!=='undefined') requestAnimationFrame(loop);
  }

  reset();
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', render); else render(); loop(); }
  if(typeof window!=='undefined'){
    window.__t = {
      W, H, R, START_Y, PLAT_W, JUMP_V, JUMP_V_BOOST, COIN_VALUE, BOOST_DUR,
      PICKUP_TYPES, PICKUP_PROB,
      setRand, reseed, newGame, reset, step, move, doJump, isGameOver, getScore, getState,
      setPlayerX, setPlayerY, setVY, triggerFall,
      // ---- 拾取增益道具系统钩子 ----
      spawnPickup:(type,x,y)=>{ pickups.push(makePickup(type, x, y)); },
      getPickups:()=>pickups.length,
      getShield:()=>player.shield, setShield:(v)=>{ player.shield=v; },
      getBoost:()=>player.boost, setBoost:(v)=>{ player.boost=v; },
      applyPickup, stepPickups,
      confettiFired:()=>confettiFx,
    };
  }
})();
</script>
</body>
</html>
