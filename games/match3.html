<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 消消乐</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
    --blue:#3aa0ff; --purple:#9b6bff; --cyan:#2ee6d6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:
      radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.06), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,
      var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex;flex-direction:column;align-items:center;padding:18px 12px}
  .titlebar{width:min(560px,96vw);display:flex;align-items:center;gap:10px;padding:10px 16px;
    background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}

  .hud{width:min(560px,96vw);display:flex;gap:10px;margin-bottom:12px}
  .stat{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;
    display:flex;flex-direction:column;gap:2px}
  .stat .k{color:var(--dim);font-size:11px;letter-spacing:1px}
  .stat .v{font-size:22px;font-weight:700}
  .stat.s .v{color:var(--gold)}
  .stat.m .v{color:var(--green)}
  .stat.m.low .v{color:var(--red)}

  .bar{width:min(560px,96vw);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:var(--dim);font-size:12px;padding:0 4px}
  .bar .combo{color:var(--red);font-weight:700;min-height:14px;letter-spacing:1px}

  .board-wrap{position:relative; width:min(560px,96vw); aspect-ratio:1; margin:0 auto}
  #board{position:relative; width:100%; height:100%; display:grid;
    grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
    background:var(--border);gap:2px;border:2px solid var(--border);border-radius:8px;overflow:hidden;
    touch-action:manipulation;user-select:none}
  /* juice 粒子/飘字叠层：仅视觉反馈，不参与交互 */
  #fx{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:5; border-radius:8px}
  .cell{background:#0d131c;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
  .gem{width:78%;height:78%;position:relative;transition:transform .14s ease, opacity .14s ease;
    display:flex;align-items:center;justify-content:center}
  .gem.pop{animation:pop .18s ease}
  @keyframes pop{0%{transform:scale(.5);opacity:.2}100%{transform:scale(1);opacity:1}}
  .cell.clearing .gem{animation:clear .22s ease forwards;z-index:3}
  @keyframes clear{0%{transform:scale(1)}55%{transform:scale(1.25);filter:brightness(1.7)}100%{transform:scale(0);opacity:0}}

  /* gem shapes / colors */
  .g0{background:var(--red);   border-radius:50%;box-shadow:0 0 10px rgba(246,70,93,.55)}
  .g1{background:var(--green); border-radius:20%;box-shadow:0 0 10px rgba(2,192,118,.55)}
  .g2{background:var(--gold);  border-radius:14%;transform:rotate(45deg);box-shadow:0 0 10px rgba(240,185,11,.55)}
  .g3{background:var(--blue);  clip-path:polygon(50% 4%,96% 96%,4% 96%);box-shadow:0 0 10px rgba(58,160,255,.5)}
  .g4{background:var(--purple);clip-path:polygon(25% 4%,75% 4%,100% 50%,75% 96%,25% 96%,0 50%);box-shadow:0 0 10px rgba(155,107,255,.5)}
  .g5{background:var(--cyan);  clip-path:polygon(50% 2%,63% 38%,100% 38%,70% 62%,82% 100%,50% 76%,18% 100%,30% 62%,0 38%,37% 38%);box-shadow:0 0 10px rgba(46,230,214,.5)}

  .cell.sel{background:#16202c}
  .cell.sel .gem{outline:3px solid var(--text);outline-offset:2px;filter:brightness(1.3)}

  .tools{width:min(560px,96vw);display:flex;gap:8px;margin-top:12px}
  .act{flex:1;background:#0e141d;border:1px solid var(--border);color:var(--text);border-radius:8px;
    padding:11px 0;cursor:pointer;font-family:inherit;font-size:13px;text-align:center}
  .act:hover{border-color:var(--red);color:var(--red)}

  #overlay{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;background:rgba(10,14,20,.92)}
  #overlay .box{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 40px;text-align:center;min-width:260px}
  #overlay h2{font-size:24px;margin-bottom:10px;color:var(--green);letter-spacing:1px}
  #overlay .big{font-size:40px;color:var(--gold);font-weight:700;margin:6px 0 4px}
  #overlay p{color:var(--dim);font-size:13px;margin-bottom:18px}
  #overlay .act{background:var(--red);color:#0a0e14;border:none;font-weight:700;padding:11px 26px;font-family:inherit;cursor:pointer;border-radius:8px;display:inline-block}
</style>
</head>
<body>
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>消消乐</b> MATCH-3</span>
  </div>

  <div class="hud">
    <div class="stat s"><span class="k">SCORE</span><span class="v" id="score">0</span></div>
    <div class="stat m" id="movesBox"><span class="k">MOVES</span><span class="v" id="moves">30</span></div>
  </div>

  <div class="bar">
    <span>点击宝石选中，再点相邻宝石交换 · 或滑动</span>
    <span class="combo" id="combo"></span>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
    <canvas id="fx"></canvas>
  </div>

  <div class="tools">
    <div class="act" id="restart">新局 / RESTART</div>
  </div>

  <div id="overlay">
    <div class="box">
      <h2>游戏结束 // GAME OVER</h2>
      <div class="big" id="finalScore">0</div>
      <p id="finalMsg">最终得分</p>
      <div class="act" id="again">再来一局 / NEW GAME</div>
    </div>
  </div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const SIZE = 8;
  const GEMS = 6;
  const START_MOVES = 30;

  let board = [];
  let cells = [];
  let score = 0;
  let moves = START_MOVES;
  let selected = null;
  let busy = false;
  let gameOver = false;

  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const movesEl = document.getElementById('moves');
  const movesBox = document.getElementById('movesBox');
  const comboEl = document.getElementById('combo');
  const overlay = document.getElementById('overlay');
  const finalScore = document.getElementById('finalScore');

  // ---- juice 叠层画布（粒子/飘字/光环在此绘制）----
  const fx = document.getElementById('fx');
  const fxc = fx.getContext('2d');
  const GEM_COLORS = ['#f6465d','#02c076','#f0b90b','#3aa0ff','#9b6bff','#2ee6d6'];
  function cellCenter(r,c){
    const rect = boardEl.getBoundingClientRect();
    const w = rect.width || 560, h = rect.height || 560;
    const cw = w / SIZE, ch = h / SIZE;
    return { x: c*cw + cw/2, y: r*ch + ch/2 };
  }
  function resizeFx(){
    const rect = boardEl.getBoundingClientRect();
    fx.width = rect.width || 560; fx.height = rect.height || 560;
  }
  if (typeof window !== 'undefined') window.addEventListener('resize', resizeFx);

  const delay = (ms) => new Promise(res => setTimeout(res, ms));
  const rnd = () => Math.floor(Math.random() * GEMS);

  function initBoard(){
    board = [];
    for(let r=0;r<SIZE;r++){
      board[r] = [];
      for(let c=0;c<SIZE;c++){
        let g;
        do { g = rnd(); }
        while(
          (c>=2 && board[r][c-1]===g && board[r][c-2]===g) ||
          (r>=2 && board[r-1][c]===g && board[r-2][c]===g)
        );
        board[r][c] = g;
      }
    }
  }

  function buildGrid(){
    boardEl.innerHTML = '';
    cells = [];
    for(let r=0;r<SIZE;r++){
      cells[r] = [];
      for(let c=0;c<SIZE;c++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        const gem = document.createElement('div');
        gem.className = 'gem';
        cell.appendChild(gem);
        cell.addEventListener('click', () => onCellClick(r,c));
        boardEl.appendChild(cell);
        cells[r][c] = cell;
      }
    }
  }

  function renderBoard(){
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const gem = cells[r][c].firstChild;
        const g = board[r][c];
        if(g === null){
          gem.className = 'gem';
        } else {
          gem.className = 'gem g' + g + ' pop';
        }
      }
    }
  }

  function setSel(){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++)
      cells[r][c].classList.remove('sel');
    if(selected){
      const [r,c] = selected;
      cells[r][c].classList.add('sel');
    }
  }

  function adjacent(a,b){
    return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) === 1;
  }

  function swapArr(a,b){
    const t = board[a[0]][a[1]];
    board[a[0]][a[1]] = board[b[0]][b[1]];
    board[b[0]][b[1]] = t;
  }

  function findMatches(){
    const set = new Set();
    // horizontal
    for(let r=0;r<SIZE;r++){
      let run = 1;
      for(let c=1;c<=SIZE;c++){
        if(c<SIZE && board[r][c]===board[r][c-1]) run++;
        else { if(run>=3){ for(let k=c-run;k<c;k++) set.add(r+','+k); } run=1; }
      }
    }
    // vertical
    for(let c=0;c<SIZE;c++){
      let run = 1;
      for(let r=1;r<=SIZE;r++){
        if(r<SIZE && board[r][c]===board[r-1][c]) run++;
        else { if(run>=3){ for(let k=r-run;k<r;k++) set.add(k+','+c); } run=1; }
      }
    }
    return Array.from(set).map(s => s.split(',').map(Number));
  }

  function applyGravity(){
    for(let c=0;c<SIZE;c++){
      let write = SIZE-1;
      for(let r=SIZE-1;r>=0;r--){
        if(board[r][c] !== null){
          if(write !== r){
            board[write][c] = board[r][c];
            board[r][c] = null;
          }
          write--;
        }
      }
      for(let r=write;r>=0;r--) board[r][c] = rnd();
    }
  }

  async function resolve(){
    let combo = 0;
    while(true){
      const matches = findMatches();
      if(matches.length === 0) break;
      combo++;
      score += matches.length * 10 * combo;
      updateHUD();
      if(typeof Juice!=='undefined') Juice.sfx('pickup');
      const gain = matches.length * 10 * combo;
      // 视觉反馈：每格粒子爆发 + 连击飘字 + 连击光环 + 震动
      if (typeof Juice !== 'undefined') {
        let sx = 0, sy = 0;
        matches.forEach(([r,c]) => {
          const p = cellCenter(r,c); sx += p.x; sy += p.y;
          Juice.burst(p.x, p.y, { color: GEM_COLORS[board[r][c]] || '#f0b90b', n: 10, speed: 180, life: 0.6 });
        });
        const cxp = sx / matches.length, cyp = sy / matches.length;
        Juice.popup(cxp, cyp, '+' + gain, '#f0b90b', { size: 18 });
        if (combo >= 2) {
          comboEl.textContent = 'COMBO x' + combo + '!';
          Juice.sfx('combo');
          Juice.ring(cxp, cyp, { color: '#f0b90b', r1: 64, life: 0.5 });
          Juice.addTrauma(Math.min(0.5, 0.18 + combo * 0.06));
        }
      } else if (combo >= 2) {
        comboEl.textContent = 'COMBO x' + combo + '!';
      }

      matches.forEach(([r,c]) => cells[r][c].classList.add('clearing'));
      await delay(220);
      matches.forEach(([r,c]) => { board[r][c] = null; cells[r][c].classList.remove('clearing'); });

      applyGravity();
      renderBoard();
      await delay(180);
    }
    comboEl.textContent = '';
  }

  async function trySwap(a,b){
    swapArr(a,b);
    renderBoard();
    await delay(150);
    const matches = findMatches();
    if(matches.length > 0){
      moves--;
      updateHUD();
      busy = true;
      await resolve();
      busy = false;
      if(moves <= 0) endGame();
    } else {
      swapArr(a,b); // revert
      renderBoard();
    }
  }

  function onCellClick(r,c){
    if(busy || gameOver) return;
    if(selected === null){
      selected = [r,c];
      setSel();
      if(typeof Juice!=='undefined') Juice.sfx('click');
      return;
    }
    const sr = selected[0], sc = selected[1];
    if(sr === r && sc === c){
      selected = null; setSel(); return;
    }
    if(adjacent(selected,[r,c])){
      const a = [sr,sc], b = [r,c];
      selected = null; setSel();
      trySwap(a,b);
    } else {
      selected = [r,c]; setSel();
    }
  }

  // swipe / drag support
  let dragStart = null;
  boardEl.addEventListener('pointerdown', (e) => {
    const cell = e.target.closest('.cell');
    if(!cell) return;
    dragStart = [parseInt(cell.dataset.r,10), parseInt(cell.dataset.c,10)];
  });
  boardEl.addEventListener('pointerup', (e) => {
    if(!dragStart || busy || gameOver) { dragStart = null; return; }
    const end = document.elementFromPoint(e.clientX, e.clientY);
    const cell = end && end.closest ? end.closest('.cell') : null;
    const start = dragStart;
    dragStart = null;
    if(!cell){ return; }
    const r = parseInt(cell.dataset.r,10), c = parseInt(cell.dataset.c,10);
    let dr = r - start[0], dc = c - start[1];
    if(Math.abs(dr)+Math.abs(dc) === 1){
      trySwap([start[0],start[1]],[r,c]);
    }
  });

  function updateHUD(){
    scoreEl.textContent = score;
    movesEl.textContent = moves;
    if(moves <= 5) movesBox.classList.add('low'); else movesBox.classList.remove('low');
  }

  function endGame(){
    gameOver = true;
    finalScore.textContent = score;
    document.getElementById('finalMsg').textContent = '最终得分 // 已用 ' + START_MOVES + ' 步';
    overlay.style.display = 'flex';
    if(typeof Juice!=='undefined'){ Juice.sfx('click'); const b=Juice.best('match3',score); Juice.rank(score); if(b.isNew) Juice.achievement('最佳分 '+score); }
  }

  function newGame(){
    score = 0;
    moves = START_MOVES;
    selected = null;
    busy = false;
    gameOver = false;
    comboEl.textContent = '';
    overlay.style.display = 'none';
    initBoard();
    renderBoard();
    setSel();
    updateHUD();
  }

  document.getElementById('restart').addEventListener('click', newGame);
  document.getElementById('again').addEventListener('click', newGame);

  buildGrid();
  newGame();
  resizeFx();

  // ---- juice 叠层渲染循环（纯视觉，沙箱无副作用）----
  if (typeof requestAnimationFrame !== 'undefined') {
    let _last = (typeof performance !== 'undefined') ? performance.now() : Date.now();
    (function frame(now){
      const t = (now == null) ? _last : now;
      const dt = Math.min(0.05, (t - _last) / 1000 || 0.016);
      _last = t;
      if (typeof Juice !== 'undefined') {
        Juice.update(dt);
        fxc.clearRect(0, 0, fx.width, fx.height);
        Juice.begin(fxc); Juice.mid(fxc); Juice.end(fxc);
      }
      requestAnimationFrame(frame);
    })(_last);
  }

  // ---- 测试钩子（非侵入，不影响玩法）----
  if (typeof window !== 'undefined') {
    window.__t = {
      SIZE, GEMS, START_MOVES,
      getBoard: () => board,
      setBoard(b){ board = b; },
      findMatches, swapArr, applyGravity, adjacent,
      getScore: () => score,
      getMoves: () => moves,
      newGame
    };
  }
})();
</script>
</body>
</html>
