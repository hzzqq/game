<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 掷骰 Pig</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .die{width:80px;height:80px;border:1px solid var(--gold);border-radius:14px;background:#0e141d;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:var(--gold);margin:10px auto}
  .scores{display:flex;justify-content:space-around;font-size:14px;color:var(--text)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>掷骰 Pig</b> DICE</span></div>
  <div class="wrap">
    <div class="hud"><span>回合 · <span class="st" id="turn">玩家0</span></span><span>本回合 · <span class="st" id="round">0</span></span></div>
    <div class="die" id="die">-</div>
    <div class="scores"><span>玩家0: <b id="s0">0</b></span><span>玩家1: <b id="s1">0</b></span></div>
    <div class="msg" id="msg">掷骰累加本回合点数，掷到 1 则回合作废换人；点数凑满则可「收手」银行积分。先到 100 胜。</div>
    <div class="controls">
      <button id="roll">掷骰 ROLL</button>
      <button id="hold" class="ghost">收手 HOLD</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
  </div>
  <div class="foot">Pig（掷骰游戏）：掷骰累加本回合点数，掷出 1 则本回合清零换人；玩家可在任意时刻「收手」把点数存入总分，先到 100 获胜。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const TARGET=100;
  let totals, roundScore, turn, over, winner, last;
  let _rand=Math.random;
  function setRand(fn){ _rand=fn; }
  function reset(){ totals=[0,0]; roundScore=0; turn=0; over=false; winner=-1; last=0; }
  function roll(){
    if(over) return last;
    const v=1+Math.floor(_rand()*6);
    last=v;
    if(v===1){ turn=1-turn; roundScore=0; }
    else {
      roundScore+=v;
      if(totals[turn]+roundScore>=TARGET){ over=true; winner=turn; }
    }
    return v;
  }
  function hold(){
    if(over) return;
    totals[turn]+=roundScore;
    roundScore=0;
    if(totals[turn]>=TARGET){ over=true; winner=turn; }
    else turn=1-turn;
  }
  function getTotal(p){ return totals[p]; }
  function getRound(){ return roundScore; }
  function getTurn(){ return turn; }
  function getLast(){ return last; }
  function isOver(){ return over; }
  function getWinner(){ return winner; }
  function setTotal(p,v){ totals[p]=v; }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const d=$('die'); if(d)d.textContent=last||'-';
    const r=$('round'),t=$('turn'),s0=$('s0'),s1=$('s1');
    if(r)r.textContent=roundScore; if(t)t.textContent='玩家'+turn;
    if(s0)s0.textContent=totals[0]; if(s1)s1.textContent=totals[1];
    const msg=$('msg'); if(msg&&over){ msg.className='msg win'; msg.textContent='🏆 玩家'+winner+' 达到 '+TARGET+' 分获胜！'; }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const rb=$('roll'),hb=$('hold'),nb=$('new');
    if(rb) rb.onclick=()=>{ roll(); render(); };
    if(hb) hb.onclick=()=>{ hold(); render(); };
    if(nb) nb.onclick=()=>{ reset(); render(); };
  }
  reset();
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',render); else render(); }
  if(typeof window!=='undefined'){ window.__t={ roll, hold, getTotal, getRound, getTurn, getLast, isOver, getWinner, setTotal, setRand, reset }; }
})();
</script>
</body>
</html>
