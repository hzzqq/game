<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 弹球</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  canvas{background:#0e141d;border:1px solid var(--border);border-radius:8px;max-width:98vw}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>弹球</b> PONG</span></div>
  <div class="wrap">
    <div class="hud"><span>比分 · <span class="st" id="sc">0 : 0</span></span><span>状态 · <span class="st" id="st">进行中</span></span></div>
    <canvas id="cv" width="400" height="300"></canvas>
    <div class="msg" id="msg">← → / W S 控制左右挡板，把球弹回对方半场。漏球则对方得分，先到 11 分胜。</div>
    <div class="controls"><button id="new" class="ghost">新局 NEW</button></div>
  </div>
  <div class="foot">Pong（弹球）：双人对战经典。控制挡板反弹小球，球越过对方挡板即得分，先到 11 分获胜。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const W=400, H=300, PW=8, PH=60, R=7, WIN=11;
  let ball, leftY, rightY, score, over, winner, confettiFired=false;
  // ---- 注入：掉落道具/增益系统（纯附加，不改核心碰撞/计分公式）----
  let coins=0, shieldL=false, shieldR=false, boostL=0, boostR=0, pickups=[], pkid=0;
  function mk(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const _prng = mk(0x1f123bb5);
  const PICK = { COIN:'coin', SHIELD:'shield', BOOST:'boost' };
  const GLY = { coin:'💰', shield:'🛡', boost:'🚀' };
  function makePickup(type,x,y){ return { type, x, y, vy:60, r:9, age:0, id:pkid++ }; }
  function spawnPickup(type,x,y){ const p=makePickup(type,x,y); pickups.push(p); return p; }
  function spawnPickupAtRandom(){ const types=[PICK.COIN,PICK.SHIELD,PICK.BOOST]; const t=types[Math.floor(_prng()*types.length)]; const x=20+_prng()*(W-40); return spawnPickup(t,x,-10); }
  function sideOf(x){ return x<W/2?'L':'R'; }
  function applyPickup(type, side){
    side=side||'L';
    if(type===PICK.COIN){ coins+=50; }
    else if(type===PICK.SHIELD){ if(side==='L') shieldL=true; else shieldR=true; }
    else if(type===PICK.BOOST){ if(side==='L') boostL=5; else boostR=5; }
    if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); }
  }
  function updatePickups(dt){
    dt=dt||1;
    if(boostL>0) boostL=Math.max(0,boostL-dt);
    if(boostR>0) boostR=Math.max(0,boostR-dt);
    for(let i=pickups.length-1;i>=0;i--){ const p=pickups[i]; p.age+=dt; p.y+=p.vy*dt; if(p.y>H+R+20||p.age>25) pickups.splice(i,1); }
    if(ball){ for(let i=pickups.length-1;i>=0;i--){ const p=pickups[i]; if(Math.abs(p.x-ball.x)<=p.r+R && Math.abs(p.y-ball.y)<=p.r+R){ const s=sideOf(p.x); pickups.splice(i,1); applyPickup(p.type,s); } } }
  }
  function takeHit(side){ if(side==='L'){ if(shieldL){ shieldL=false; return false; } } else { if(shieldR){ shieldR=false; return false; } } return true; }
  function getPickups(){ return pickups.map(p=>({type:p.type,x:p.x,y:p.y})); }
  function getCoins(){ return coins; }
  function getShield(side){ return side==='L'?shieldL:shieldR; }
  function setShield(side,v){ if(side==='L') shieldL=!!v; else shieldR=!!v; }
  function getBoost(side){ return side==='L'?boostL:boostR; }
  function setBoost(side,v){ if(side==='L') boostL=Math.max(0,v); else boostR=Math.max(0,v); }
  function reset(){
    ball={ x:W/2, y:H/2, vx:3, vy:1.5, speed:3 };
    leftY=H/2; rightY=H/2; score=[0,0]; over=false; winner=-1;
    coins=0; shieldL=false; shieldR=false; boostL=0; boostR=0; pickups=[]; confettiFired=false;
  }
  // 胜利彩带：玩家先到胜局分(WIN)时一次性触发，跳变防重复
  function fireVictory(){
    if(confettiFired) return;
    confettiFired = true;
    if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4});
    if(typeof Juice!=='undefined' && Juice.burst) Juice.burst(window.innerWidth/2, window.innerHeight/2, {color:'#02c076', n:30});
  }
  function setPaddle(side,y){ if(side==='left') leftY=y; else rightY=y; }
  function setBall(x,y,vx,vy){ ball.x=x; ball.y=y; ball.vx=vx; ball.vy=vy; }
  function step(dt){
    if(over) return;
    dt=dt||1;
    ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
    if(ball.y<R){ ball.y=R; ball.vy=Math.abs(ball.vy); }
    if(ball.y>H-R){ ball.y=H-R; ball.vy=-Math.abs(ball.vy); }
    // 左挡板
    if(ball.vx<0 && ball.x-R<=PW && ball.x-R>=0 && Math.abs(ball.y-leftY)<=PH/2) { ball.vx=Math.abs(ball.vx); if(boostL>0) ball.vx*=1.5; ball.x=PW+R; if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.addTrauma(0.25); Juice.burst(ball.x,ball.y,{color:'#f0b90b',n:10}); } }
    // 右挡板
    if(ball.vx>0 && ball.x+R>=W-PW && ball.x+R<=W && Math.abs(ball.y-rightY)<=PH/2) { ball.vx=-Math.abs(ball.vx); if(boostR>0) ball.vx*=1.5; ball.x=W-PW-R; if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.addTrauma(0.25); Juice.burst(ball.x,ball.y,{color:'#02c076',n:10}); } }
    if(ball.x<0){
      if(takeHit('L')){
        score[1]++; if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.addTrauma(0.3);}
        if(score[1]>=WIN){ over=true; winner=1; if(typeof Juice!=='undefined'){ Juice.sfx('win'); Juice.flash('#02c076',.5);} fireVictory(); } else resetBall(1);
      } else { resetBall(1); }
    }
    else if(ball.x>W){
      if(takeHit('R')){
        score[0]++; if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.addTrauma(0.3);}
        if(score[0]>=WIN){ over=true; winner=0; if(typeof Juice!=='undefined'){ Juice.sfx('win'); Juice.flash('#02c076',.5);} fireVictory(); } else resetBall(-1);
      } else { resetBall(-1); }
    }
    updatePickups(dt);
  }
  function resetBall(dir){ ball.x=W/2; ball.y=H/2; ball.vx=dir*3; ball.vy=(Math.random()*2-1)*1.5; }
  function getScore(){ return score.slice(); }
  function getBall(){ return {x:ball.x,y:ball.y,vx:ball.vx,vy:ball.vy}; }
  function isOver(){ return over; }
  function getWinner(){ return winner; }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv=$('cv'); if(!cv||!cv.getContext) return; const ctx=cv.getContext('2d');
    ctx.fillStyle='#0e141d'; ctx.fillRect(0,0,W,H);
    // paddles (gradient + highlight outline)
    for(const [px,py] of [[0,leftY],[W-PW,rightY]]){
      ctx.save();
      const g=ctx.createLinearGradient(px,py-PH/2,px,py+PH/2);
      g.addColorStop(0,'#ffd54a'); g.addColorStop(1,'#f0b90b');
      ctx.fillStyle=g; ctx.fillRect(px,py-PH/2,PW,PH);
      ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.strokeRect(px,py-PH/2,PW,PH);
      ctx.restore();
    }
    // ball (gradient + highlight + outline)
    ctx.save();
    ctx.beginPath(); ctx.arc(ball.x,ball.y,R,0,Math.PI*2);
    const g=ctx.createRadialGradient(ball.x-R*0.3,ball.y-R*0.3,1,ball.x,ball.y,R);
    g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#cfd6dd');
    ctx.fillStyle=g; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(ball.x-R*0.3,ball.y-R*0.3,R*0.3,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
    ctx.restore();
    for(const p of pickups){ ctx.save(); ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle='rgba(240,185,11,.22)'; ctx.fill(); ctx.lineWidth=1.5; ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(GLY[p.type],p.x,p.y); ctx.restore(); }
    const sc=$('sc'),st=$('st'); if(sc)sc.textContent=score[0]+' : '+score[1]; if(st)st.textContent=over?'结束':'进行中'+(coins>0?(' · 💰'+coins):'')+(shieldL||shieldR?' · 🛡':'');
  }
  function loop(){ if(typeof requestAnimationFrame==='undefined') return; step(1); render(); requestAnimationFrame(loop); }
  reset();
  if(typeof document!=='undefined'){ const nb=$('new'); if(nb) nb.onclick=()=>{ reset(); render(); }; if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ render(); loop(); }); else { render(); loop(); } }
  if(typeof window!=='undefined'){ window.__t={ reset, setPaddle, setBall, step, getScore, getBall, isOver, getWinner, confettiFired: function(){ return confettiFired; },
    PICK, spawnPickup, spawnPickupAtRandom, applyPickup, updatePickups, takeHit,
    getPickups, getCoins, getShield, setShield, getBoost, setBoost,
    getState(){ return { coins, shieldL, shieldR, boostL, boostR, pickups:pickups.length }; },
    stepPickups(dt){ updatePickups(dt); }
  }; }
})();
</script>
</body>
</html>
