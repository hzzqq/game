<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 汉诺塔</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--green);font-weight:700}
  .pegs{display:flex;gap:24px;justify-content:center;background:var(--panel);padding:16px;border-radius:14px;border:1px solid var(--border);margin-bottom:10px}
  .peg{width:140px;display:flex;flex-direction:column-reverse;align-items:center;cursor:pointer;padding:8px 0;border-radius:10px;transition:background .12s}
  .peg.sel{background:rgba(240,185,11,.12);box-shadow:inset 0 0 0 2px var(--gold)}
  .peg.base{width:140px;height:10px;background:var(--border);border-radius:4px;margin-top:4px}
  .disk{height:20px;border-radius:5px;margin:3px 0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0a0e14}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>汉诺塔</b> TOWER OF HANOI</span></div>
  <div class="wrap">
    <div class="hud"><span>步数 MOVES · <span class="st" id="moves">0</span> / 最少 <span class="st" id="min">7</span></span><span id="status">把所有盘移到最右柱</span></div>
    <div class="pegs" id="pegs"></div>
    <div class="controls">
      <button id="new">新局 NEW</button>
      <button id="reset" class="ghost">重来 RESET</button>
    </div>
    <div class="msg" id="msg">先点来源柱选中，再点目标柱移动。大盘不能压在小盘上。把整座塔从最左柱移到最右柱即过关。</div>
  </div>
  <div class="foot">经典汉诺塔：N 个大小不同的盘叠在左柱，每次移动顶部一盘，且大盘不能压小盘。把所有盘移到右柱即用最少 2^N−1 步通关。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  /* ===================== 纯逻辑核心 ===================== */
  const PEGS = 3;
  const TARGET = 2;     // 目标柱
  const COLORS = ['#f6465d','#f0b90b','#02c076','#3aa0ff','#b073ff','#ff8a3a','#27c93f','#ff5f56'];

  let N, pegs, moves, won, over, sel;
  function newGame(n){
    N = (n && n>=1 && n<=8) ? n : 3;
    pegs = [[],[],[]];
    for(let d=N; d>=1; d--) pegs[0].push(d); // 底大顶小
    moves=0; won=false; over=false; sel=null;
  }
  function reset(){ newGame(N); }
  function top(p){ return pegs[p].length ? pegs[p][pegs[p].length-1] : null; }
  function canMove(f,t){
    if(f===t) return false;
    if(pegs[f].length===0) return false;
    if(pegs[t].length===0) return true;
    return top(f) < top(t);
  }
  function move(f,t){
    if(over || !canMove(f,t)) return false;
    pegs[t].push(pegs[f].pop());
    moves++;
    sel=null;
    if(pegs[TARGET].length===N){ won=true; over=true; }
    if(typeof Juice!=='undefined'){
      if(won){ Juice.sfx('levelup'); Juice.best('hanoi', moves); if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); }
      else Juice.sfx('click');
    }
    return true;
  }
  function isWin(){ return won; }
  function isOver(){ return over; }
  function getMoves(){ return moves; }
  function getMinMoves(){ return Math.pow(2,N)-1; }
  function getPegs(){ return pegs.map(p=>p.slice()); }
  function getN(){ return N; }
  function getSel(){ return sel; }
  function select(p){ if(over) return; if(sel===null){ sel=p; } else { move(sel,p); } }
  function setPegs(p){ pegs=p.map(x=>x.slice()); moves=0; won=false; over=false; sel=null; }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  let columns = [];
  function buildPegs(){
    if(typeof document==='undefined') return;
    const c=$('pegs'); if(!c) return;
    c.innerHTML='';
    columns=[];
    for(let p=0;p<PEGS;p++){
      const col=document.createElement('div'); col.className='peg'; col.dataset.p=p;
      col.addEventListener('click',()=>{ select(p); render(); });
      c.appendChild(col);
      columns.push(col);
    }
  }
  function render(){
    if(typeof document==='undefined') return;
    const mv=$('moves'),mn=$('min'),msg=$('msg'),st=$('status');
    for(let p=0;p<columns.length;p++){
      const col=columns[p];
      col.className='peg'+(sel===p?' sel':'');
      col.innerHTML='';
      const maxW=120;
      pegs[p].forEach(d=>{
        const el=document.createElement('div'); el.className='disk';
        const w=40 + (d-1)*(maxW-40)/Math.max(1,N-1);
        el.style.width=Math.round(w)+'px';
        el.style.background=COLORS[(d-1)%COLORS.length];
        el.textContent=d;
        col.appendChild(el);
      });
      const base=document.createElement('div'); base.className='base'; col.appendChild(base);
    }
    if(mv) mv.textContent=moves;
    if(mn) mn.textContent=getMinMoves();
    if(st) st.textContent = won?'已通关':(over?'已结束':'把所有盘移到最右柱');
    if(msg){ if(won){ msg.className='msg win'; msg.textContent='🎉 通关！用了 '+moves+' 步（最少 '+getMinMoves()+'）。'; }
      else if(over){ msg.className='msg win'; msg.textContent='已结束。'; }
      else { msg.className='msg'; msg.textContent = sel===null?'点来源柱选中，再点目标柱移动。':'已选中来源柱，点目标柱放下。'; } }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const nb=$('new'),rb=$('reset');
    if(nb) nb.onclick=()=>{ newGame(); render(); };
    if(rb) rb.onclick=()=>{ reset(); render(); };
  }
  newGame();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ buildPegs(); bindUI(); render(); });
    else { buildPegs(); bindUI(); render(); }
  }
  if(typeof window!=='undefined'){
    window.__t = {
      PEGS, TARGET, COLORS,
      newGame, reset, move, canMove, isWin, isOver, getMoves, getMinMoves,
      getPegs, getN, getSel, select, setPegs, top,
    };
  }
})();
</script>
</body>
</html>
