<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // CUBECITY</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace}
  #stage{position:fixed;inset:0;z-index:0}
  #stage canvas{display:block;touch-action:none}
  #scan{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.06), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px}
  .titlebar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border-bottom:1px solid var(--border)}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}
  .titlebar .reset{margin-left:auto;background:transparent;color:var(--dim);border:1px solid var(--border);
    border-radius:6px;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:12px}
  .titlebar .reset:hover{color:var(--red);border-color:var(--red)}

  #hud{position:fixed;top:52px;left:16px;z-index:5;display:flex;gap:10px;flex-wrap:wrap}
  .stat{background:rgba(18,24,33,.85);border:1px solid var(--border);border-radius:8px;padding:8px 14px;min-width:96px;backdrop-filter:blur(4px)}
  .stat .k{color:var(--dim);font-size:11px;letter-spacing:.5px}
  .stat .v{font-size:19px;margin-top:2px}
  .v.money{color:var(--gold)} .v.pop{color:var(--red)} .v.inc{color:var(--green)}
  .v.happy{color:#7aa2ff} .v.score{color:var(--text)}

  #toolbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:5;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:96vw}
  .tool{background:rgba(18,24,33,.9);border:1px solid var(--border);border-radius:8px;padding:8px 12px;
    cursor:pointer;text-align:center;min-width:84px;transition:.15s;user-select:none}
  .tool:hover{border-color:var(--dim)}
  .tool.sel{border-color:var(--red);box-shadow:0 0 14px rgba(246,70,93,.4);background:rgba(246,70,93,.08)}
  .tool .nm{font-size:13px} .tool .cost{font-size:11px;color:var(--gold);margin-top:2px}
  .tool.demolish.sel{border-color:#ff5f56;box-shadow:0 0 14px rgba(255,95,86,.4)}
  .tool.upgrade.sel{border-color:var(--gold);box-shadow:0 0 14px rgba(240,185,11,.4)}

  #hint{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:5;color:var(--dim);font-size:12px;text-align:center;width:100%}
  #err{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;background:rgba(10,14,20,.94)}
  #err .box{max-width:520px;border:1px solid var(--border);border-radius:12px;padding:28px;background:var(--panel);text-align:center}
  #err h2{color:var(--red);margin-bottom:12px} #err p{color:var(--dim);line-height:1.8;font-size:13px}
  body.touch #hint{display:none}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="scan"></div>

  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>CUBECITY</b> · 3D 城市建设</span>
    <button class="reset" id="resetBtn">重新开始</button>
  </div>

  <div id="hud">
    <div class="stat"><div class="k">金币</div><div class="v money" id="m-money">¥1000</div></div>
    <div class="stat"><div class="k">人口</div><div class="v pop" id="m-pop">0</div></div>
    <div class="stat"><div class="k">收入/秒</div><div class="v inc" id="m-inc">0</div></div>
    <div class="stat"><div class="k">幸福度</div><div class="v happy" id="m-happy">60%</div></div>
    <div class="stat"><div class="k">评分</div><div class="v score" id="m-score">0</div></div>
  </div>

  <div id="hint">点击空地放置建筑 · 拖拽旋转 · 滚轮缩放 · 选「升级」点已有建筑升级 · 选「拆除」卖回</div>
  <div id="toolbar"></div>

  <div id="err"><div class="box"><h2>无法加载 Three.js</h2>
    <p>本游戏通过 CDN 加载 Three.js 3D 引擎，需要联网才能运行。<br/>请确认网络连接后刷新页面。（其余小游戏为纯离线，不受影响）</p></div></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
  <script>
  (function(){
    if (typeof THREE === 'undefined'){ document.getElementById('err').style.display='flex'; return; }
    if('ontouchstart' in window) document.body.classList.add('touch');

    const GRID=12, TILE=1, HALF=GRID/2, MAXLV=3;
    const TYPES={
      residential:{name:'住宅楼', cost:50,  color:0xf6465d, h:1.3,  income:3,  pop:20, happy:2},
      commercial: {name:'商业中心', cost:120, color:0x02c076, h:1.8,  income:7,  pop:0,  happy:0},
      industrial: {name:'工业园区', cost:90,  color:0xf0b90b, h:1.1,  income:12, pop:5,  happy:-4},
      park:       {name:'公园',   cost:40,  color:0x35c759, h:0.45, income:0,  pop:0,  happy:6},
      road:       {name:'道路',   cost:10,  color:0x55606b, h:0.06, income:0,  pop:0,  happy:0},
    };

    let money=1000, population=0, happiness=60, incomePerSec=0, score=0;
    const cells=Array.from({length:GRID},()=>Array(GRID).fill(null));
    let selected='residential';

    const stage=document.getElementById('stage');
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(window.innerWidth,window.innerHeight);
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    renderer.outputEncoding=THREE.sRGBEncoding;
    stage.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0a0e14);
    scene.fog=new THREE.Fog(0x0a0e14,22,46);
    const camera=new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight,0.1,200);

    scene.add(new THREE.AmbientLight(0x8899aa,0.55));
    const dir=new THREE.DirectionalLight(0xffffff,0.9);
    dir.position.set(10,18,8); dir.castShadow=true;
    dir.shadow.mapSize.set(1024,1024);
    dir.shadow.camera.left=-HALF-2; dir.shadow.camera.right=HALF+2;
    dir.shadow.camera.top=HALF+2; dir.shadow.camera.bottom=-HALF-2;
    dir.shadow.camera.near=1; dir.shadow.camera.far=60;
    scene.add(dir);

    const groundMat=new THREE.MeshStandardMaterial({color:0x0e141d,roughness:1,metalness:0});
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(GRID*TILE,GRID*TILE),groundMat);
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

    const grid=new THREE.GridHelper(GRID*TILE,GRID,0x1f2a38,0x16202c);
    grid.position.y=0.011; scene.add(grid);

    const hiMat=new THREE.MeshBasicMaterial({color:0xf6465d,transparent:true,opacity:0.28,side:THREE.DoubleSide});
    const hover=new THREE.Mesh(new THREE.PlaneGeometry(TILE*0.96,TILE*0.96),hiMat);
    hover.rotation.x=-Math.PI/2; hover.position.y=0.02; hover.visible=false; scene.add(hover);

    let radius=20, theta=Math.PI*0.25, phi=Math.PI*0.32;
    const target=new THREE.Vector3(0,0,0);
    function updateCamera(){
      camera.position.x=target.x+radius*Math.sin(phi)*Math.cos(theta);
      camera.position.y=target.y+radius*Math.cos(phi);
      camera.position.z=target.z+radius*Math.sin(phi)*Math.sin(theta);
      camera.lookAt(target);
    }
    updateCamera();

    const ray=new THREE.Raycaster(); const mouse=new THREE.Vector2();
    let dragging=false, moved=false, lastX=0, lastY=0, hoverCell=null;
    // 双指缩放
    let pinchDist=0;

    function cellFromEvent(e){
      mouse.x=(e.clientX/window.innerWidth)*2-1;
      mouse.y=-(e.clientY/window.innerHeight)*2+1;
      ray.setFromCamera(mouse,camera);
      const hit=ray.intersectObject(ground)[0];
      if(!hit) return null;
      const i=Math.floor(hit.point.x+HALF), j=Math.floor(hit.point.z+HALF);
      if(i<0||i>=GRID||j<0||j>=GRID) return null;
      return {i,j};
    }

    renderer.domElement.addEventListener('pointerdown',e=>{
      if(e.pointerType==='touch' && e.isPrimary===false) return;
      dragging=true; moved=false; lastX=e.clientX; lastY=e.clientY;
    });
    window.addEventListener('pointerup',e=>{
      if(dragging && !moved && hoverCell) handleClick(hoverCell);
      dragging=false;
    });
    renderer.domElement.addEventListener('pointermove',e=>{
      if(dragging){
        const dx=e.clientX-lastX, dy=e.clientY-lastY;
        if(Math.abs(dx)+Math.abs(dy)>4) moved=true;
        theta-=dx*0.006; phi-=dy*0.006; phi=Math.max(0.15,Math.min(1.4,phi));
        lastX=e.clientX; lastY=e.clientY; updateCamera();
      } else {
        const c=cellFromEvent(e); hoverCell=c;
        if(c){ hover.visible=true; hover.position.x=-HALF+c.i+0.5; hover.position.z=-HALF+c.j+0.5;
          const occupied=!!cells[c.i][c.j];
          if(selected==='demolish') hiMat.color.setHex(occupied?0xff5f56:0x55606b);
          else if(selected==='upgrade') hiMat.color.setHex(occupied?0xf0b90b:0x55606b);
          else hiMat.color.setHex((!occupied && money>=TYPES[selected].cost)?0x02c076:0xf6465d);
        } else hover.visible=false;
      }
    });
    renderer.domElement.addEventListener('wheel',e=>{
      e.preventDefault(); radius*=(1+e.deltaY*0.0012); radius=Math.max(8,Math.min(38,radius)); updateCamera();
    },{passive:false});

    // 触屏双指缩放
    renderer.domElement.addEventListener('touchstart',e=>{
      if(e.touches.length===2) pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    },{passive:true});
    renderer.domElement.addEventListener('touchmove',e=>{
      if(e.touches.length===2){ e.preventDefault();
        const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        if(pinchDist>0){ radius*=(pinchDist/d); radius=Math.max(8,Math.min(38,radius)); updateCamera(); }
        pinchDist=d;
      }
    },{passive:false});

    function upgradeCost(b){ return Math.round(TYPES[b.type].cost * b.level * 0.8); }

    function handleClick(c){
      const cur=cells[c.i][c.j];
      if(selected==='demolish'){
        if(cur){ scene.remove(cur.mesh); money+=Math.floor(TYPES[cur.type].cost*0.5); cells[c.i][c.j]=null; updateHUD(); }
        return;
      }
      if(selected==='upgrade'){
        if(!cur || cur.level>=MAXLV) return;
        const cost=upgradeCost(cur);
        if(money<cost) return;
        money-=cost; cur.level++;
        const t=TYPES[cur.type];
        cur.h = t.h*(1+0.4*(cur.level-1));
        cur.mesh.userData.h=cur.h;
        cur.mesh.material.emissiveIntensity=0.12+0.12*cur.level;
        // 重建更高更亮的楼
        cur.mesh.geometry.dispose();
        cur.mesh.geometry=new THREE.BoxGeometry(TILE*0.82, cur.h, TILE*0.82);
        cur.mesh.scale.y=0.001; // 重新生长动画
        updateHUD();
        return;
      }
      if(cur) return;
      const t=TYPES[selected];
      if(money<t.cost) return;
      money-=t.cost;
      const geo=new THREE.BoxGeometry(TILE*0.82, t.h, TILE*0.82);
      const mat=new THREE.MeshStandardMaterial({color:t.color,roughness:0.55,metalness:0.1,emissive:t.color,emissiveIntensity:0.12});
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.set(-HALF+c.i+0.5,0,-HALF+c.j+0.5); mesh.scale.y=0.001;
      mesh.userData.h=t.h; mesh.castShadow=true; mesh.receiveShadow=true;
      scene.add(mesh);
      cells[c.i][c.j]={type:selected, level:1, h:t.h, mesh};
      updateHUD();
    }

    // 连片加成：同类型正交相邻成簇，size>=2 时每多一栋 +25% 收入/幸福
    function computeClusters(){
      const seen=Array.from({length:GRID},()=>Array(GRID).fill(false));
      const bonus=Array.from({length:GRID},()=>Array(GRID).fill(1));
      for(let i=0;i<GRID;i++) for(let j=0;j<GRID;j++){
        const b=cells[i][j]; if(!b||seen[i][j]) continue;
        const type=b.type; const stack=[[i,j]]; const comp=[]; seen[i][j]=true;
        while(stack.length){
          const [x,y]=stack.pop(); comp.push([x,y]);
          [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
            const nx=x+dx, ny=y+dy;
            if(nx>=0&&nx<GRID&&ny>=0&&ny<GRID&&!seen[nx][ny]&&cells[nx][ny]&&cells[nx][ny].type===type){
              seen[nx][ny]=true; stack.push([nx,ny]);
            }
          });
        }
        if(comp.length>=2){ const m=1+0.25*(comp.length-1); comp.forEach(([x,y])=>bonus[x][y]=m); }
      }
      return bonus;
    }

    let acc=0;
    function applyEconomy(){
      const bonus=computeClusters();
      let inc=0, pop=0, happy=60;
      for(let i=0;i<GRID;i++) for(let j=0;j<GRID;j++){
        const b=cells[i][j]; if(!b) continue;
        const t=TYPES[b.type]; const lv=1+0.5*(b.level-1); const m=bonus[i][j];
        inc+=t.income*lv*m; pop+=t.pop*lv; happy+=t.happy*lv*m;
        // 连片高亮
        b.mesh.material.emissiveIntensity = m>1 ? 0.25+0.1*b.level : 0.12+0.12*b.level;
      }
      happiness=Math.max(0,Math.min(100,happy));
      const gain=Math.round(inc*(happiness/50));
      money+=gain; population=pop; incomePerSec=gain;
      score=Math.floor(money)+pop*5+Math.floor(happiness)*3;
      updateHUD();
    }

    const el=id=>document.getElementById(id);
    function updateHUD(){
      el('m-money').textContent='¥'+Math.floor(money);
      el('m-pop').textContent=population;
      el('m-inc').textContent='+'+incomePerSec;
      el('m-happy').textContent=happiness+'%';
      el('m-score').textContent=score;
    }

    const tb=document.getElementById('toolbar');
    function makeTool(key,label,cost,cls){
      const d=document.createElement('div');
      d.className='tool'+(cls?(' '+cls):'')+(key===selected?' sel':'');
      d.dataset.type=key;
      d.innerHTML='<div class="nm">'+label+'</div>'+(cost!=null?'<div class="cost">¥'+cost+'</div>':'<div class="cost">卖回50%</div>');
      d.onclick=()=>{ selected=key; [...tb.children].forEach(c=>c.classList.toggle('sel',c.dataset.type===key)); };
      return d;
    }
    Object.keys(TYPES).forEach(k=>tb.appendChild(makeTool(k,TYPES[k].name,TYPES[k].cost)));
    tb.appendChild(makeTool('upgrade','升级',null,'upgrade'));
    tb.appendChild(makeTool('demolish','拆除',null,'demolish'));

    el('resetBtn').onclick=()=>{
      for(let i=0;i<GRID;i++) for(let j=0;j<GRID;j++){ if(cells[i][j]){ scene.remove(cells[i][j].mesh); cells[i][j]=null; } }
      money=1000; population=0; happiness=60; incomePerSec=0; score=0; updateHUD();
    };

    const clock=new THREE.Clock();
    function animate(){
      requestAnimationFrame(animate);
      const dt=clock.getDelta(); acc+=dt;
      while(acc>=1){ acc-=1; applyEconomy(); }
      for(let i=0;i<GRID;i++) for(let j=0;j<GRID;j++){
        const b=cells[i][j]; if(!b) continue; const m=b.mesh;
        if(m.scale.y<0.999){ m.scale.y+=(1-m.scale.y)*0.18; if(m.scale.y>0.999)m.scale.y=1; m.position.y=(m.userData.h*m.scale.y)/2; }
      }
      renderer.render(scene,camera);
    }
    updateHUD(); animate();

    window.addEventListener('resize',()=>{
      camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
    });
  })();
  </script>
</body>
</html>
