<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TERMINAL // BREAKOUT</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --sub:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  /* 窗口外壳 */
  .window{
    position:relative;
    width:820px; max-width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    overflow:hidden;
  }
  /* 扫描线 / 网格叠层 */
  .window::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:5;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 3px),
      linear-gradient(0deg, rgba(31,42,56,.05), rgba(31,42,56,.05));
    mix-blend-mode:screen;
  }
  /* 标题栏 */
  .titlebar{
    display:flex; align-items:center; gap:10px;
    height:40px; padding:0 14px;
    background:linear-gradient(180deg,#161d28,#10151d);
    border-bottom:1px solid var(--border);
    position:relative; z-index:6;
  }
  .dots{ display:flex; gap:8px; }
  .dot{ width:12px; height:12px; border-radius:50%; }
  .dot.r{ background:#ff5f56; } .dot.y{ background:#ffbd2e; } .dot.g{ background:#27c93f; }
  .title{
    flex:1; text-align:center; font-size:13px; letter-spacing:2px;
    color:var(--text);
  }
  .title .accent{ color:var(--red); }
  .bar-btns{ display:flex; gap:8px; }
  button{
    font-family:inherit; font-size:12px; cursor:pointer;
    border-radius:6px; padding:6px 12px; border:1px solid var(--border);
    background:transparent; color:var(--text); transition:all .15s;
  }
  button:hover:not(:disabled){ border-color:var(--red); }
  button:disabled{ opacity:.35; cursor:default; }
  .btn-main{
    background:var(--red); color:#0a0e14; border-color:var(--red); font-weight:700;
    box-shadow:0 0 12px rgba(246,70,93,.35);
  }
  .btn-main:hover:not(:disabled){ filter:brightness(1.1); }
  /* 画布区 */
  .stage{ position:relative; z-index:6; padding:14px; background:var(--bg); }
  canvas{
    display:block; margin:0 auto;
    border:1px solid var(--border); border-radius:6px;
    background:var(--bg); cursor:crosshair;
    max-width:100%; height:auto;
    touch-action:none; -ms-touch-action:none;
  }
  .hint{
    margin-top:10px; text-align:center; font-size:11px; color:var(--sub);
    letter-spacing:1px;
  }
  .diffbar{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
  .diffbar button{ background:var(--panel,#121821); color:var(--sub,#6b7785); border:1px solid var(--border); border-radius:8px; padding:6px 13px; font-weight:700; cursor:pointer; font-family:inherit; font-size:12px; }
  .diffbar button.active{ background:var(--gold,#f0b90b); color:#0a0e14; border-color:var(--gold,#f0b90b); }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="dots">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      </div>
      <div class="title">TERMINAL <span class="accent">//</span> BREAKOUT</div>
      <div class="bar-btns">
        <button id="pauseBtn" disabled>暂停</button>
        <button id="startBtn" class="btn-main">开始游戏</button>
      </div>
    </div>
    <div class="stage">
      <canvas id="game" width="780" height="540"></canvas>
      <div class="hint">鼠标 / ←→ / 触屏拖动 移动挡板 · 接住掉落道具（宽/多/慢/♥/炸）· 打碎所有砖块过关</div>
      <div class="diffbar" id="diffbar"></div>
    </div>
  </div>

<script src="input.js"></script>
<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const FONT = "'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace";
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const HUD_H = 46;
  const STEP = 1000/60;

  const C = {
    bg:'#0a0e14', panel:'#121821', border:'#1f2a38',
    text:'#e6edf3', sub:'#6b7785',
    red:'#f6465d', green:'#02c076', gold:'#f0b90b'
  };

  // ---- 状态 ----
  let score=0, level=1, lives=3;
  let high = loadHigh();
  let state='menu'; // menu | ready | playing | paused | levelcomplete | gameover
  let now = performance.now();
  let levelClearTime=0;
  let _confettiFired=false; // 通关 confetti 已触发（独立于 Juice 的只读测试锁）
  let shakeTime=0, slowUntil=0, wideUntil=0;
  const baseSpeed = 4.2;

  // ---------- 难度系统（简单/普通/困难/地狱）----------
  // spdMult=球速倍率；rowBonus=额外砖块行数（越多越难）；capBonus=球速上限加成
  // normal=1.0/0 保持原有平衡（避免破坏既有单测）
  const DIFFICULTY = {
    easy:   { label:'简单', spdMult:0.82, rowBonus:0, capBonus:0 },
    normal: { label:'普通', spdMult:1.0,  rowBonus:0, capBonus:0 },
    hard:   { label:'困难', spdMult:1.2,  rowBonus:1, capBonus:1.5 },
    hell:   { label:'地狱', spdMult:1.45, rowBonus:2, capBonus:3 }
  };
  const DIFF_ORDER = ['easy','normal','hard','hell'];
  let difficulty = 'normal';
  function setDifficulty(d){ if(DIFFICULTY[d]){ difficulty=d; return true; } return false; }
  function getDifficulty(){ return difficulty; }
  function diffCfg(){ return DIFFICULTY[difficulty] || DIFFICULTY.normal; }

  const paddle = { baseW:110, w:110, h:12, x:0, y:H-34 };
  paddle.x = W/2 - paddle.w/2;

  let balls=[];
  let bricks=[];
  let powerups=[];
  let particles=[];

  let keyLeft=false, keyRight=false;

  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  // ---- 工具 ----
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function loadHigh(){
    try{ return parseInt(localStorage.getItem('breakout_high')||'0',10)||0; }
    catch(e){ return 0; }
  }
  function saveHigh(){
    try{ localStorage.setItem('breakout_high', String(high)); }catch(e){}
  }
  function setState(s){ state=s; updateUI(); }
  function updateUI(){
    if(state==='menu'){ startBtn.textContent='开始游戏'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
    else if(state==='ready'){ startBtn.textContent='发射'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
    else if(state==='playing'){ startBtn.textContent='重新开始'; pauseBtn.disabled=false; pauseBtn.textContent='暂停'; }
    else if(state==='paused'){ startBtn.textContent='重新开始'; pauseBtn.disabled=false; pauseBtn.textContent='继续'; }
    else if(state==='levelcomplete'){ startBtn.textContent='下一关'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
    else if(state==='gameover'){ startBtn.textContent='重新开始'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
  }

  function targetSpeed(){
    const cfg = diffCfg();
    let s = (baseSpeed + (level-1)*0.5) * cfg.spdMult;
    if(now < slowUntil) s *= 0.6;
    return Math.min(s, 11 + cfg.capBonus);
  }

  // ---- 关卡 / 球 / 砖块 ----
  function buildLevel(){
    bricks=[];
    const rows = Math.min(3 + level + diffCfg().rowBonus, 9);
    const cols = 10;
    const marginX=16, gap=8, top=HUD_H+20, bh=22;
    const bw = (W - marginX*2 - gap*(cols-1))/cols;
    const rowColors=[C.red, C.gold, C.green];
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        bricks.push({
          x: marginX + c*(bw+gap),
          y: top + r*(bh+gap),
          w: bw, h: bh,
          color: rowColors[r%3],
          points: (rows - r)*10 + 10,
          alive:true
        });
      }
    }
  }

  function makeBall(stuck){
    return { x:paddle.x+paddle.w/2, y:paddle.y-8, vx:0, vy:0, r:7, stuck:!!stuck };
  }
  function resetBall(){ balls=[ makeBall(true) ]; }

  function startGame(){
    score=0; lives=3; level=1;
    powerups=[]; particles=[];
    pickups=[]; boostTimer=0; shield=false; spawnTimer=12; plives=3; pdead=false;
    paddle.w=paddle.baseW; wideUntil=0; slowUntil=0;
    _confettiFired=false; // 新游戏重置通关反馈锁（仅视觉状态）
    buildLevel(); resetBall();
    setState('ready');
  }

  function launch(){
    if(state!=='ready' || !balls.length) return;
    const b = balls[0];
    const angle = (-Math.PI/2) + (Math.random()*0.5 - 0.25);
    const sp = targetSpeed();
    b.vx = Math.cos(angle)*sp;
    b.vy = Math.sin(angle)*sp;
    b.stuck = false;
    setState('playing');
  }

  // ---- 道具 ----
  function maybeDrop(x,y){
    if(Math.random()<0.16){
      const types=['wide','multi','slow','heart','bomb'];
      const t = types[(Math.random()*types.length)|0];
      powerups.push({ x:x-9, y:y-9, w:18, h:18, vy:1.7, type:t });
    }
  }
  function applyPower(t){
    if(t==='wide'){
      const cx = paddle.x + paddle.w/2;
      paddle.w = paddle.baseW*1.5;
      paddle.x = clamp(cx - paddle.w/2, 0, W-paddle.w);
      wideUntil = now + 12000;
    } else if(t==='slow'){
      slowUntil = now + 8000;
    } else if(t==='multi'){
      const extra=[];
      for(const b of balls){
        if(b.stuck) continue;
        extra.push({ x:b.x, y:b.y, r:b.r, vx:-b.vx, vy:b.vy, stuck:false });
      }
      for(const e of extra){ if(balls.length<6) balls.push(e); }
    } else if(t==='heart'){
      lives = Math.min(5, lives+1);
      if(typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.flash('#02c076',0.2); Juice.popup(W/2, paddle.y-30, '+♥', C.green, {size:18}); }
    } else if(t==='bomb'){
      // 清屏：清除最底部 2 行砖块
      const rowsSet = new Set();
      for(const br of bricks){ if(br.alive) rowsSet.add(Math.round(br.y)); }
      const rowsArr = [...rowsSet].sort((a,b)=>b-a).slice(0,2);
      let cleared = 0;
      for(const br of bricks){
        if(br.alive && rowsArr.includes(Math.round(br.y))){
          br.alive = false; score += br.points; cleared++;
          spawnParticles(br.x+br.w/2, br.y+br.h/2);
        }
      }
      if(cleared){ if(score>high){ high=score; saveHigh(); } }
      if(typeof Juice!=='undefined'){ Juice.sfx('boom'); Juice.addTrauma(0.3); Juice.flash('#f6465d',0.25); Juice.achievement('💥 炸弹清屏！'); }
    }
  }

  // ============================================================
  // 注入：能量胶囊掉落 / 增益系统（纯注入，不改动核心玩法逻辑）
  // 真实游玩随 spawnTimer 周期掉落；测试经 window.__t 钩子驱动。
  // ============================================================
  function mk(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  var _rng = mk(0x9ABC);
  var pickups=[];      // 掉落胶囊列表
  var boostTimer=0;    // 加速剩余秒数
  var shield=false;    // 护盾（布尔）
  var plives=3;        // 注入层生命（takeHit 演示用）
  var pdead=false;     // 注入层死亡标记
  var spawnTimer=12;   // 距离下次自动掉落秒数
  var FIELD_W=W, FIELD_H=H;
  var PICKUP_TYPES=['boost','shield','bomb'];
  var PICKUP_EMOJI={boost:'🚀',shield:'🛡',bomb:'💣'};
  var PICKUP_COLOR={boost:'#02c076',shield:'#3aa0ff',bomb:'#f6465d'};

  function makePickup(type,x,y){
    var p={type:type,x:x,y:y,vy:70,r:14,dead:false};
    pickups.push(p); return p;
  }
  function spawnPickupAtRandom(){
    var t=PICKUP_TYPES[Math.floor(_rng()*PICKUP_TYPES.length)];
    var x=_rng()*(FIELD_W-40)+20;
    return makePickup(t,x,-20);
  }
  function applyPickup(p){
    if(typeof Juice!=='undefined') Juice.sfx('pickup');
    if(p.type==='boost'){
      boostTimer=6;
      if(typeof Juice!=='undefined') Juice.popup(p.x,p.y,'🚀','#02c076',{size:16});
    } else if(p.type==='shield'){
      shield=true;
      if(typeof Juice!=='undefined') Juice.popup(p.x,p.y,'🛡','#3aa0ff',{size:16});
    } else if(p.type==='bomb'){
      // 炸行：清除最底部仍有砖的一行
      var maxRow=-1, k;
      for(k=0;k<bricks.length;k++){ if(bricks[k].alive){ var r=Math.round(bricks[k].y); if(r>maxRow) maxRow=r; } }
      if(maxRow>=0){
        for(k=0;k<bricks.length;k++){ if(bricks[k].alive && Math.round(bricks[k].y)===maxRow){ bricks[k].alive=false; score+=bricks[k].points; } }
        if(score>high){ high=score; saveHigh(); }
      }
      if(typeof Juice!=='undefined'){ Juice.sfx('boom'); Juice.addTrauma(0.3); Juice.flash('#f6465d',0.25); }
    }
  }
  function playerPositions(){
    return [{x:paddle.x+paddle.w/2, y:paddle.y}];
  }
  function updatePickups(dt){
    var pr=28;
    for(var i=0;i<pickups.length;i++){
      var p=pickups[i]; if(p.dead) continue;
      p.y += p.vy*dt;
      var ps=playerPositions(), j, hit=false;
      for(j=0;j<ps.length;j++){
        var dx=p.x-ps[j].x, dy=p.y-ps[j].y;
        if(dx*dx+dy*dy < (p.r+pr)*(p.r+pr)){ hit=true; applyPickup(p); break; }
      }
      if(hit || p.y>FIELD_H+30) p.dead=true;
    }
    pickups = pickups.filter(function(p){return !p.dead;});
  }
  function drawPickup(ctx){
    for(var i=0;i<pickups.length;i++){
      var p=pickups[i];
      ctx.save();
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=PICKUP_COLOR[p.type]||'#02c076';
      ctx.shadowColor=PICKUP_COLOR[p.type]||'#02c076'; ctx.shadowBlur=14;
      ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle='#0a0e14'; ctx.font='bold 13px '+FONT;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(PICKUP_EMOJI[p.type]||'?', p.x, p.y+1);
      ctx.restore();
    }
    ctx.save(); ctx.font='14px '+FONT; ctx.textAlign='left'; ctx.textBaseline='middle';
    var bx=14, by=HUD_H+18;
    if(shield){ ctx.fillStyle='#3aa0ff'; ctx.fillText('🛡 护盾', bx, by); bx+=78; }
    if(boostTimer>0){ ctx.fillStyle='#02c076'; ctx.fillText('🚀'+boostTimer.toFixed(1)+'s', bx, by); }
    ctx.restore();
  }
  function takeHit(i){
    i=i||1;
    if(shield){ shield=false; if(typeof Juice!=='undefined'){ Juice.flash('#3aa0ff',0.2); Juice.popup(FIELD_W/2, FIELD_H/2, '🛡 抵消', '#3aa0ff',{size:16}); } return; }
    plives=Math.max(0, plives-i);
    if(typeof Juice!=='undefined'){ Juice.addTrauma(0.3); Juice.flash('#f6465d',0.25); }
    if(plives<=0) pdead=true;
  }

  // ---- 粒子 ----
  function spawnParticles(x,y){
    for(let i=0;i<14;i++){
      const a=Math.random()*Math.PI*2;
      const sp=1+Math.random()*3.5;
      particles.push({
        x, y,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1,
        life:1,
        color: Math.random()<0.5 ? C.red : C.gold
      });
    }
  }

  // ---- 更新 ----
  function updateBalls(){
    const tgt = targetSpeed();
    for(let i=balls.length-1;i>=0;i--){
      const b = balls[i];
      if(b.stuck) continue;
      b.x += b.vx; b.y += b.vy;
      // 墙
      if(b.x-b.r<0){ b.x=b.r; b.vx=Math.abs(b.vx); }
      if(b.x+b.r>W){ b.x=W-b.r; b.vx=-Math.abs(b.vx); }
      if(b.y-b.r<HUD_H){ b.y=HUD_H+b.r; b.vy=Math.abs(b.vy); }
      // 挡板
      if(b.vy>0 &&
         b.y+b.r>=paddle.y && b.y-b.r<=paddle.y+paddle.h &&
         b.x>=paddle.x-b.r && b.x<=paddle.x+paddle.w+b.r){
        b.y = paddle.y - b.r;
        const hit = (b.x-(paddle.x+paddle.w/2))/(paddle.w/2);
        const h = clamp(hit,-1,1);
        const ang = h*(Math.PI/3);
        b.vx = Math.sin(ang)*tgt;
        b.vy = -Math.cos(ang)*tgt;
      }
      // 砖块
      for(const br of bricks){
        if(!br.alive) continue;
        const cx = clamp(b.x, br.x, br.x+br.w);
        const cy = clamp(b.y, br.y, br.y+br.h);
        const dx = b.x-cx, dy = b.y-cy;
        if(dx*dx+dy*dy <= b.r*b.r){
          br.alive=false;
          score += br.points;
          if(score>high){ high=score; saveHigh(); }
          spawnParticles(cx, cy);
          if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.burst(cx,cy,{color:br.color,n:6,speed:140}); Juice.ring(cx,cy,{color:br.color,r1:40}); Juice.popup(cx, cy-8, '+'+br.points, br.color, {size:13}); }
          if(cx===br.x || cx===br.x+br.w) b.vx=-b.vx; else b.vy=-b.vy;
          maybeDrop(br.x+br.w/2, br.y+br.h/2);
          break;
        }
      }
      // 底部出界
      if(b.y-b.r>H){ balls.splice(i,1); }
    }
    if(balls.length===0){
      lives--; shakeTime=350;
      if(typeof Juice!=='undefined'){ Juice.sfx('lose'); Juice.addTrauma(0.4); Juice.flash('#f6465d',0.3); }
      if(lives<=0){
        setState('gameover');
        if(typeof Juice!=='undefined'){
          const b=Juice.best('breakout',score); const rk=Juice.rank(score);
          if(b.isNew) Juice.achievement('🏆 新纪录 '+score+'！段位 '+rk);
        }
      }
      else { resetBall(); setState('ready'); }
    }
  }

  function updatePowerups(){
    for(let i=powerups.length-1;i>=0;i--){
      const p = powerups[i];
      p.y += p.vy;
      if(p.y+p.h>=paddle.y && p.y<=paddle.y+paddle.h &&
         p.x+p.w>=paddle.x && p.x<=paddle.x+paddle.w){
        applyPower(p.type); powerups.splice(i,1);
        if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); Juice.popup(p.x+p.w/2, p.y-8, '道具', C.green, {size:13}); }
        continue;
      }
      if(p.y>H){ powerups.splice(i,1); }
    }
  }

  function updateParticles(){
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.025;
      if(p.life<=0) particles.splice(i,1);
    }
  }

  function update(dt){
    dt = dt || (STEP/1000);
    // 挡板加宽到期还原
    if(now>wideUntil && paddle.w!==paddle.baseW){
      const cx = paddle.x + paddle.w/2;
      paddle.w = paddle.baseW;
      paddle.x = clamp(cx - paddle.w/2, 0, W-paddle.w);
    }
    // 挡板移动（共享输入层 input.js，失焦自动清键）
    if(state==='playing' || state==='ready'){
      const L = (typeof Input!=='undefined') ? Input.down('left') : keyLeft;
      const R = (typeof Input!=='undefined') ? Input.down('right') : keyRight;
      if(L) paddle.x -= 7;
      if(R) paddle.x += 7;
      paddle.x = clamp(paddle.x, 0, W-paddle.w);
    }
    // 待发射球跟随挡板
    if(state==='ready'){
      for(const b of balls){ if(b.stuck){ b.x=paddle.x+paddle.w/2; b.y=paddle.y-b.r-1; } }
    }
    if(shakeTime>0) shakeTime -= STEP;

    if(state==='playing'){
      updateBalls();
      updatePowerups();
      updateParticles();
      if(state==='playing' && bricks.every(b=>!b.alive)){
        setState('levelcomplete');
        levelClearTime = now + 1600;
        if(typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.flash('#02c076',0.2); Juice.achievement('第 '+level+' 关 通过 ✓'); }
        if(!_confettiFired){
          _confettiFired=true;
          if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4});
          if(typeof Juice!=='undefined' && Juice.shake) Juice.shake(0.4);
        }
      }
    } else if(state==='levelcomplete'){
      updateParticles();
      if(now > levelClearTime){
        level++; buildLevel(); resetBall(); powerups=[]; setState('ready');
      }
    } else {
      updateParticles();
    }
    // ===== 注入：能量胶囊掉落系统 =====
    spawnTimer -= dt;
    if(spawnTimer<=0){ spawnTimer = 6 + _rng()*4; spawnPickupAtRandom(); }
    updatePickups(dt);
  }

  // ---- 绘制 ----
  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawGrid(){
    ctx.strokeStyle='rgba(31,42,56,0.55)'; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=40){ ctx.beginPath(); ctx.moveTo(x,HUD_H); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=HUD_H;y<=H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  function drawHUD(){
    ctx.fillStyle=C.panel; ctx.fillRect(0,0,W,HUD_H);
    ctx.strokeStyle=C.border; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,HUD_H); ctx.lineTo(W,HUD_H); ctx.stroke();
    ctx.textBaseline='middle'; ctx.font='14px '+FONT;
    // 分数
    ctx.textAlign='left';
    ctx.fillStyle=C.sub; ctx.fillText('分数', 14, HUD_H/2);
    const sw = ctx.measureText('分数').width;
    ctx.fillStyle=C.gold; ctx.fillText(String(score), 14+sw+8, HUD_H/2);
    // 关卡
    ctx.textAlign='center';
    ctx.fillStyle=C.sub; ctx.fillText('关卡 LV '+level, W/2, HUD_H/2);
    // 最高分
    ctx.textAlign='right';
    ctx.fillStyle=C.sub; ctx.fillText('最高 '+high, W-92, HUD_H/2);
    // 命数
    ctx.font='16px '+FONT;
    let hx = W-14;
    for(let i=0;i<3;i++){
      ctx.fillStyle = i<lives ? C.red : C.border;
      ctx.fillText('♥', hx, HUD_H/2);
      hx -= 20;
    }
  }

  function drawBricks(){
    for(const br of bricks){
      if(!br.alive) continue;
      // 渐变填充（顶部更亮，营造体积高光）
      var grad = ctx.createLinearGradient(br.x, br.y, br.x, br.y+br.h);
      grad.addColorStop(0, 'rgba(255,255,255,0.22)');
      grad.addColorStop(0.5, br.color);
      grad.addColorStop(1, br.color);
      ctx.fillStyle = grad;
      roundRect(br.x, br.y, br.w, br.h, 4); ctx.fill();
      // 顶部高光
      ctx.fillStyle='rgba(255,255,255,0.18)';
      roundRect(br.x+2, br.y+2, br.w-4, 4, 2); ctx.fill();
      // 对比描边
      ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.5;
      roundRect(br.x, br.y, br.w, br.h, 4); ctx.stroke();
    }
  }

  function drawPaddle(){
    ctx.save();
    ctx.shadowColor='rgba(246,70,93,0.6)'; ctx.shadowBlur=14;
    // 渐变填充（上亮下深）
    var grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y+paddle.h);
    grad.addColorStop(0, '#ff7b72');
    grad.addColorStop(1, C.red);
    ctx.fillStyle = grad;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5); ctx.fill();
    ctx.restore();
    // 顶部高光 + 对比描边
    ctx.fillStyle='rgba(255,255,255,0.30)';
    roundRect(paddle.x+3, paddle.y+2, paddle.w-6, 3, 2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5); ctx.stroke();
  }

  function drawBalls(){
    ctx.save();
    ctx.shadowColor='rgba(246,70,93,0.7)'; ctx.shadowBlur=10;
    for(const b of balls){
      // 径向渐变（左上高光 → 主色）
      var grad = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.1, b.x, b.y, b.r);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(1, C.text);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      // 对比描边
      ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  function drawPowerups(){
    const style = { wide:C.green, multi:C.red, slow:C.gold, heart:'#ff5f56', bomb:C.gold };
    const label = { wide:'宽', multi:'多', slow:'慢', heart:'♥', bomb:'炸' };
    for(const p of powerups){
      ctx.save();
      ctx.fillStyle = style[p.type];
      ctx.shadowColor = style[p.type]; ctx.shadowBlur=10;
      roundRect(p.x, p.y, p.w, p.h, 4); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#0a0e14'; ctx.font='bold 12px '+FONT;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(label[p.type], p.x+p.w/2, p.y+p.h/2+1);
      ctx.restore();
    }
  }

  function drawParticles(){
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-2, p.y-2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawOverlay(){
    if(state==='playing') return;
    ctx.fillStyle='rgba(10,14,20,0.80)';
    ctx.fillRect(0, HUD_H, W, H-HUD_H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const cx=W/2, cy=H/2;
    function big(txt,color){ ctx.font='30px '+FONT; ctx.fillStyle=color||C.gold; ctx.fillText(txt,cx,cy-26); }
    function sub(txt,color){ ctx.font='15px '+FONT; ctx.fillStyle=color||C.text; ctx.fillText(txt,cx,cy+14); }
    function sub2(txt,color){ ctx.font='13px '+FONT; ctx.fillStyle=color||C.sub; ctx.fillText(txt,cx,cy+40); }
    if(state==='menu'){
      big('TERMINAL // BREAKOUT', C.red);
      sub('金融终端 · 打砖块');
      sub2('按 [开始游戏] 或 空格 开始');
    } else if(state==='ready'){
      big('第 '+level+' 关 · 准备', C.gold);
      sub('按 [发射] 或 空格 / 点击 发射小球');
    } else if(state==='paused'){
      big('已暂停', C.gold);
      sub('按 P 或 [继续] 恢复');
    } else if(state==='levelcomplete'){
      big('第 '+level+' 关 通过 ✓', C.green);
      sub('即将进入下一关...');
    } else if(state==='gameover'){
      big('GAME OVER', C.red);
      sub('最终分数 '+score+'    最高 '+high);
      sub2('按 [重新开始] 再来一局');
    }
  }

  function render(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
    if(typeof Juice!=='undefined') Juice.begin(ctx);
    let sx=0, sy=0;
    if(shakeTime>0){
      const m = (shakeTime/350)*8;
      sx=(Math.random()*2-1)*m; sy=(Math.random()*2-1)*m;
    }
    ctx.save(); ctx.translate(sx,sy);
    drawGrid();
    drawHUD();
    drawBricks();
    drawPaddle();
    drawBalls();
    drawPowerups();
    drawParticles();
    drawPickup(ctx);
    ctx.restore();
    drawOverlay();
    if(typeof Juice!=='undefined'){ Juice.mid(ctx); Juice.end(ctx); }
  }

  // ---- 主循环（固定步长）----
  let last = performance.now(), acc=0;
  function frame(t){
    now = t;
    let f = t - last; last = t;
    if(f>200) f=200;
    if (typeof Juice !== 'undefined') Juice.update(f/1000);
    if (typeof Input !== 'undefined') {
      if (Input.pressed('a')) primaryAction();   // 空格
      if (Input.pressed('pause')) togglePause();  // P
      Input.update();
    }
    acc += f;
    let steps=0;
    while(acc>=STEP && steps<5){ update(); acc-=STEP; steps++; }
    render();
    requestAnimationFrame(frame);
  }

  // ---- 输入 ----
  canvas.addEventListener('mousemove', function(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX-rect.left) * (W/rect.width);
    paddle.x = clamp(x - paddle.w/2, 0, W-paddle.w);
  });
  // 触屏拖动挡板（与鼠标逻辑一致的坐标缩放映射）
  function touchToCanvas(clientX){
    const rect = canvas.getBoundingClientRect();
    const x = (clientX-rect.left) * (W/rect.width);
    paddle.x = clamp(x - paddle.w/2, 0, W-paddle.w);
  }
  canvas.addEventListener('touchstart', function(e){
    if(e.touches && e.touches.length){ touchToCanvas(e.touches[0].clientX); }
  }, { passive:true });
  canvas.addEventListener('touchmove', function(e){
    if(e.touches && e.touches.length){ touchToCanvas(e.touches[0].clientX); }
    e.preventDefault(); // 阻止触屏滚动/缩放干扰
  }, { passive:false });
  canvas.addEventListener('click', primaryAction);
  // ---- 输入（共享输入层 input.js：失焦清键 + 快速点按缓冲，修复断触）----
  if (typeof Input !== 'undefined') {
    Input.init({ keymap: { 'KeyP':'pause' } });
  }
  function primaryAction(){
    if(state==='menu'||state==='gameover') startGame();
    else if(state==='ready') launch();
    else if(state==='levelcomplete'){ level++; buildLevel(); resetBall(); setState('ready'); }
  }
  function togglePause(){
    if(state==='playing') setState('paused');
    else if(state==='paused') setState('playing');
  }

  startBtn.addEventListener('click', function(){
    if(state==='playing'||state==='paused') startGame();
    else primaryAction();
  });
  pauseBtn.addEventListener('click', togglePause);

  function buildDiffBar(){
    if(typeof document==='undefined') return;
    var bar=document.getElementById('diffbar'); if(!bar) return;
    bar.innerHTML='';
    DIFF_ORDER.forEach(function(k){
      var b=document.createElement('button');
      b.textContent=DIFFICULTY[k].label;
      if(k===difficulty) b.className='active';
      b.addEventListener('click',function(){ setDifficulty(k); buildDiffBar(); });
      bar.appendChild(b);
    });
  }
  buildDiffBar();

  // ---- 启动 ----
  buildLevel(); // 仅为初始化（菜单态不显示）
  setState('menu');
  requestAnimationFrame(frame);

  // ---- 测试钩子 ----
  window.__t = {
    buildLevel: buildLevel, applyPower: applyPower, makeBall: makeBall, render,
    resetBall: resetBall, startGame: startGame, maybeDrop: maybeDrop, launch: launch,
    clamp: clamp,
    DIFFICULTY: DIFFICULTY, setDifficulty: setDifficulty, getDifficulty: getDifficulty,
    targetSpeed: targetSpeed,
    getBricks: function(){ return bricks.map(function(b){ return {x:b.x,y:b.y,w:b.w,h:b.h,color:b.color,points:b.points,alive:b.alive}; }); },
    getBalls: function(){ return balls.map(function(b){ return {x:b.x,y:b.y,vx:b.vx,vy:b.vy,r:b.r,stuck:b.stuck}; }); },
    getPowerups: function(){ return powerups.map(function(p){ return {x:p.x,y:p.y,w:p.w,h:p.h,vy:p.vy,type:p.type}; }); },
    getPaddle: function(){ return {baseW:paddle.baseW,w:paddle.w,h:paddle.h,x:paddle.x,y:paddle.y}; },
    getScore: function(){ return score; }, getLives: function(){ return lives; },
    getLevel: function(){ return level; }, getState: function(){ return state; },
    setLevel: function(v){ level=v; }, setNow: function(v){ now=v; },
    setLives: function(v){ lives=v; }, setScore: function(v){ score=v; },
    setBalls: function(arr){ balls = arr.map(function(b){ return {x:b.x,y:b.y,vx:b.vx,vy:b.vy,r:b.r||7,stuck:!!b.stuck}; }); },
    setBricks: function(arr){ bricks = arr.map(function(b){ return {x:b.x,y:b.y,w:b.w,h:b.h,color:b.color,points:b.points,alive:(b.alive!==false)}; }); },
    confettiFired: function(){ return _confettiFired; },
    getWideUntil: function(){ return wideUntil; }, getSlowUntil: function(){ return slowUntil; },
    // ===== 注入：能量胶囊钩子 =====
    reset: startGame, update: update,
    spawnPickup: makePickup,
    stepPickups: updatePickups,
    applyPickup: function(p){ if(typeof p==='string') p=makePickup(p, FIELD_W/2, FIELD_H/2); applyPickup(p); return p; },
    getPickups: function(){ return pickups.map(function(p){ return {type:p.type,x:p.x,y:p.y,dead:p.dead}; }); },
    getShield: function(){ return shield; }, setShield: function(v){ shield=!!v; },
    getBoost: function(){ return boostTimer; }, setBoost: function(v){ boostTimer=v; },
    takeHit: takeHit,
    getPLives: function(){ return plives; }, setPLives: function(v){ plives=v; }, getDead: function(){ return pdead; },
    getSpawnTimer: function(){ return spawnTimer; }
  };
})();
</script>
</body>
