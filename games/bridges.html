<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 连桥</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--green);font-weight:700}
  .board{margin:0 auto 12px;width:max-content;background:var(--panel);padding:10px;border-radius:14px;border:1px solid var(--border)}
  .board canvas{display:block;cursor:pointer}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>连桥</b> HASHI</span></div>
  <div class="wrap">
    <div class="hud"><span>岛屿 ISLANDS · <span class="st" id="islands">0</span></span><span id="status">连桥满足度数且全连通</span></div>
    <div class="board" id="board"><canvas id="cv" width="420" height="420"></canvas></div>
    <div class="controls">
      <button id="new">新局 NEW</button>
      <button id="reset" class="ghost">清空 RESET</button>
    </div>
    <div class="msg" id="msg">点一个岛，再点同行/同列且无遮挡的另一岛建桥；再点一次加为双桥，第三次拆除。满足每个岛的数字且不交叉、全连通即过关。</div>
  </div>
  <div class="foot">连桥（Hashiwokakero）：在岛屿间建 1~2 座桥，桥不能交叉或斜穿，每个岛连出的桥数必须等于其标注数字，且所有岛必须连成一片。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  /* ===================== 纯逻辑核心 ===================== */
  const N = 7;
  let _rand = Math.random;
  function setRand(fn){ _rand = fn; }

  let N_local = N;
  let islands = [];   // [{r,c,deg,used}]
  let bridges = {};   // "i-j"(i<j) -> count(1|2)
  let sol = [];       // 生成时的解：[{i,j,count}]
  let won = false;

  function key(i,j){ return i<j ? i+'-'+j : j+'-'+i; }
  function inb(r,c){ return r>=0 && r<N_local && c>=0 && c<N_local; }
  function islandAt(r,c){ return islands.findIndex(p=>p.r===r && p.c===c); }

  // 两岛是否同行/同列且中间无岛
  function alignedClear(i,j){
    const a=islands[i], b=islands[j];
    if(a.r===b.r){
      const r=a.r, lo=Math.min(a.c,b.c), hi=Math.max(a.c,b.c);
      for(let c=lo+1;c<hi;c++) if(islandAt(r,c)>=0) return false;
      return true;
    }
    if(a.c===b.c){
      const c=a.c, lo=Math.min(a.r,b.r), hi=Math.max(a.r,b.r);
      for(let r=lo+1;r<hi;r++) if(islandAt(r,c)>=0) return false;
      return true;
    }
    return false;
  }
  function usedOf(i){
    let s=0; for(const [k,cnt] of Object.entries(bridges)){ const [x,y]=k.split('-').map(Number); if(x===i||y===i) s+=cnt; } return s;
  }
  function bridgeCount(i,j){ return bridges[key(i,j)]||0; }

  // 线段（用于交叉检测）：返回 {r1,c1,r2,c2} 已归一化
  function seg(i,j){
    const a=islands[i], b=islands[j];
    return {r1:a.r,c1:a.c,r2:b.r,c2:b.c};
  }
  function segsCross(s1,s2){
    const n1=(r,c)=>({r,c});
    // 同一直线重叠（同行或同列且内部相交）
    const norm=(s)=>({r1:Math.min(s.r1,s.r2),c1:Math.min(s.c1,s.c2),r2:Math.max(s.r1,s.r2),c2:Math.max(s.c1,s.c2)});
    const A=norm(s1), B=norm(s2);
    const Ahoriz=A.r1===A.r2, Bhoriz=B.r1===B.r2;
    if(Ahoriz && Bhoriz && A.r1===B.r1){
      // 同行：列区间是否内部重叠
      return (A.c1 < B.c2 && B.c1 < A.c2);
    }
    if(!Ahoriz && !Bhoriz && A.c1===B.c1){
      return (A.r1 < B.r2 && B.r1 < A.r2);
    }
    if(Ahoriz !== Bhoriz){
      const H = Ahoriz?A:B, V = Ahoriz?B:A;
      const hR=H.r1, hc1=Math.min(H.c1,H.c2), hc2=Math.max(H.c1,H.c2);
      const vc=V.c1, vr1=Math.min(V.r1,V.r2), vr2=Math.max(V.r1,V.r2);
      // 严格内部相交
      if(vr1 < hR && hR < vr2 && hc1 < vc && vc < hc2) return true;
    }
    return false;
  }
  function crossAny(i,j){
    const ns=seg(i,j);
    for(const [k] of Object.entries(bridges)){
      const [x,y]=k.split('-').map(Number);
      if((x===i||y===i||x===j||y===j)) continue;
      if(segsCross(ns, seg(x,y))) return true;
    }
    return false;
  }

  // 玩家行动钩子：建/加/拆桥，count 为目标数量（1 或 2 表示增至；传 0 拆除）
  function addBridge(i,j,count){
    if(i==null||j==null||i===j) return false;
    if(!alignedClear(i,j)) return false;
    if(count!==1 && count!==2 && count!==0) return false;
    if(crossAny(i,j)) return false;
    const cur=bridgeCount(i,j);
    let target = count;
    if(count===1 && cur===0) target=1;
    else if(count===1 && cur===1) target=2; // 再点一次→双桥
    else if(count===2) target=2;
    else if(count===0) target=0;
    if(target>0){
      const remI=islands[i].deg-usedOf(i)+(cur), remJ=islands[j].deg-usedOf(j)+(cur);
      if(remI < target || remJ < target) return false; // 容量不足
      if(target>2) return false;
    }
    if(target===0) delete bridges[key(i,j)];
    else bridges[key(i,j)]=target;
    won=isWin();
    if(won && typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.best('bridges', islands.length); }
    return true;
  }
  function removeBridge(i,j){ return addBridge(i,j,0); }

  function connected(){
    const parent=islands.map((_,i)=>i);
    function find(x){ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; }
    function uni(a,b){ parent[find(a)]=find(b); }
    for(const [k] of Object.entries(bridges)){ const [x,y]=k.split('-').map(Number); uni(x,y); }
    if(!islands.length) return true;
    const root=find(0);
    return islands.every((_,i)=>find(i)===root);
  }
  function allSatisfied(){ return islands.every(p=>usedOf(islands.indexOf(p))===p.deg); }
  function isWin(){
    if(!islands.length) return false;
    for(const p of islands){ if(usedOf(islands.indexOf(p))!==p.deg) return false; }
    return connected();
  }

  function setBoard(islandList){
    N_local = Math.max.apply(null, islandList.flatMap(p=>[p.r,p.c])) + 1;
    islands = islandList.map(p=>({r:p.r,c:p.c,deg:p.deg,used:0}));
    bridges = {};
    sol = [];
    won=false;
    return {islands:islands.length, won:isWin()};
  }

  // 提示：套用生成解
  function solve(){
    bridges = {};
    for(const e of sol){ bridges[key(e.i,e.j)] = e.count; }
    won=isWin();
    return won;
  }

  /* ---- 随机可解布局 ---- */
  function shuffled(arr, rand){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(rand()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }
  function buildSolution(){
    const K = 5 + Math.floor(_rand()*3); // 5~7 岛
    for(let attempt=0;attempt<200;attempt++){
      // 随机布点
      const cells=[];
      const pool=[];
      for(let r=0;r<N;r++) for(let c=0;c<N;c++) pool.push([r,c]);
      const sh=shuffled(pool,_rand);
      const chosen=sh.slice(0,K);
      islands = chosen.map(([r,c])=>({r,c,deg:0,used:0}));
      bridges={};
      // 候选对齐边
      const cand=[];
      for(let i=0;i<K;i++) for(let j=i+1;j<K;j++) if(alignedClear(i,j)) cand.push([i,j]);
      const shc=shuffled(cand,_rand);
      // 1) 生成树（连通）
      const parent=islands.map((_,i)=>i);
      function find(x){ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; }
      let edgesAdded=0;
      const tree=[];
      for(const [i,j] of shc){
        if(find(i)!==find(j)){
          if(crossAny(i,j)) continue;
          bridges[key(i,j)]=1; parent[find(i)]=find(j); tree.push([i,j,1]); edgesAdded++;
        }
      }
      if(edgesAdded < K-1) { continue; } // 未连通，重试
      // 2) 加额外桥（最多双桥），提升趣味
      for(const [i,j] of shuffled(cand,_rand)){
        if(bridgeCount(i,j)>=2) continue;
        if(usedOf(i)>=islands[i].deg && usedOf(i)>=2) {}
        if(usedOf(i)>=8 || usedOf(j)>=8) continue;
        if(crossAny(i,j)) continue;
        const canAdd = Math.min(8-usedOf(i), 8-usedOf(j));
        if(canAdd>=1 && bridgeCount(i,j)===0){
          bridges[key(i,j)] = _rand()<0.4 ? 2 : 1;
          if(bridges[key(i,j)]===2 && (usedOf(i)>=8||usedOf(j)>=8)) bridges[key(i,j)]=1;
        } else if(bridgeCount(i,j)===1 && canAdd>=1 && _rand()<0.5){
          bridges[key(i,j)]=2;
        }
      }
      // 计算度数
      for(let i=0;i<K;i++) islands[i].deg = usedOf(i);
      // 保证每岛至少 1 桥（deg>=1，树已保证）
      sol = Object.entries(bridges).map(([k,cnt])=>{ const [x,y]=k.split('-').map(Number); return {i:x,j:y,count:cnt}; });
      // 清空供玩家解
      bridges={};
      return true;
    }
    return false;
  }
  function newGame(){
    let ok=false, guard=0;
    do { ok = buildSolution(); guard++; } while(!ok && guard<10);
    won=false;
  }
  function reset(){ newGame(); }

  function getState(){
    return {
      N: N_local,
      islands: islands.map((p,i)=>({r:p.r,c:p.c,deg:p.deg,used:usedOf(i)})),
      bridges: Object.fromEntries(Object.entries(bridges).map(([k,v])=>[k,v])),
      connected: connected(),
      won,
    };
  }
  function update(){ return getState(); }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  let sel=null;
  function cellPx(){ return Math.floor(420 / N_local); }
  function render(){
    if(typeof document==='undefined') return;
    const cv=$('cv'); if(!cv) return;
    const ctx=cv.getContext('2d');
    const S=cellPx();
    cv.width=N_local*S; cv.height=N_local*S;
    ctx.clearRect(0,0,cv.width,cv.height);
    // 桥
    ctx.strokeStyle='#6b7785'; ctx.lineWidth=Math.max(3,S*0.08);
    for(const [k,cnt] of Object.entries(bridges)){
      const [x,y]=k.split('-').map(Number);
      const a=islands[x], b=islands[y];
      const ax=a.c*S+S/2, ay=a.r*S+S/2, bx=b.c*S+S/2, by=b.r*S+S/2;
      if(cnt===2){
        const off=Math.max(3,S*0.08);
        const dx=(by-ay), dy=-(bx-ax); const len=Math.hypot(dx,dy)||1;
        const ox=dx/len*off, oy=dy/len*off;
        ctx.beginPath(); ctx.moveTo(ax+ox,ay+oy); ctx.lineTo(bx+ox,by+oy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ax-ox,ay-oy); ctx.lineTo(bx-ox,by-oy); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
      }
    }
    // 岛
    for(let i=0;i<islands.length;i++){
      const p=islands[i];
      const cx=p.c*S+S/2, cy=p.r*S+S/2, rad=S*0.32;
      ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2);
      ctx.fillStyle = (sel===i)?'#f0b90b':'#121821'; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle='#f6465d'; ctx.stroke();
      ctx.fillStyle = (sel===i)?'#0a0e14':'#e6edf3';
      ctx.font='bold '+Math.floor(S*0.34)+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.deg, cx, cy);
    }
    if($('islands')) $('islands').textContent=islands.length;
    const st=$('status'),msg=$('msg');
    if(st) st.textContent = won?'已通关':'连桥满足度数且全连通';
    if(msg){ if(won){ msg.className='msg win'; msg.textContent='🎉 全部连通！每岛度数皆满足。'; }
      else { msg.className='msg'; msg.textContent='点岛→点同行/同列岛建桥。'; } }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const cv=$('cv'), nb=$('new'), rb=$('reset');
    if(cv) cv.addEventListener('click',(e)=>{
      const S=cellPx();
      const rect=cv.getBoundingClientRect();
      const x=e.clientX-rect.left, y=e.clientY-rect.top;
      const c=Math.floor(x/S), r=Math.floor(y/S);
      const idx=islandAt(r,c);
      if(idx<0) return;
      if(sel===null){ sel=idx; }
      else if(sel===idx){ sel=null; }
      else { addBridge(sel, idx, 1); sel=null; }
      render();
    });
    if(nb) nb.onclick=()=>{ newGame(); sel=null; render(); };
    if(rb) rb.onclick=()=>{ bridges={}; won=false; sel=null; render(); };
  }
  newGame();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ bindUI(); render(); });
    else { bindUI(); render(); }
  }
  if(typeof window!=='undefined'){
    window.__t = {
      N, setRand, newGame, reset, setBoard, addBridge, removeBridge, isWin, solve,
      getState, update, alignedClear, usedOf, bridgeCount, connected, allSatisfied, islandAt,
    };
  }
})();
</script>
</body>
</html>
