<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // PACMAN</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:
      radial-gradient(1200px 700px at 50% -10%, rgba(240,185,11,.05), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,
      var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex;flex-direction:column;align-items:center;padding:18px 12px}
  .titlebar{width:min(480px,96vw);display:flex;align-items:center;gap:10px;padding:10px 16px;
    background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--gold)}

  .status{width:min(480px,96vw);display:flex;justify-content:space-between;align-items:center;
    background:#0e141d;border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:12px}
  .status .lab{color:var(--dim);font-size:11px;letter-spacing:1px}
  .status .num{font-size:24px;font-weight:700;letter-spacing:1px}
  .status .gold{color:var(--gold)} .status .green{color:var(--green)} .status .red{color:var(--red)}
  .status .col{display:flex;flex-direction:column;align-items:center;gap:2px}

  .stage{width:min(480px,96vw);display:flex;justify-content:center}
  canvas{background:#0a0e14;border:1px solid var(--border);border-radius:6px;touch-action:none;display:block;width:100%;height:auto}

  .bar{width:min(480px,96vw);display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px;justify-content:center}
  .act{background:#0e141d;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 16px;cursor:pointer;font-family:inherit;font-size:13px}
  .act:hover{border-color:var(--dim)}
  .act.gold{color:var(--gold);border-color:rgba(240,185,11,.4)}

  /* mobile d-pad */
  .pad{width:min(480px,96vw);display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(3,64px);
    gap:6px;justify-content:center;margin-top:14px}
  .pad button{background:#0e141d;border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:22px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
  .pad button:active{border-color:var(--gold);color:var(--gold)}
  .pad .pu{grid-column:2;grid-row:1}.pad .pl{grid-column:1;grid-row:2}.pad .pr{grid-column:3;grid-row:2}.pad .pd{grid-column:2;grid-row:3}

  #overlay{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;background:rgba(10,14,20,.92)}
  #overlay .box{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 40px;text-align:center;min-width:260px}
  #overlay h2{font-size:24px;margin-bottom:8px;letter-spacing:1px}
  #overlay h2.win{color:var(--gold)} #overlay h2.lose{color:var(--red)}
  #overlay .sub{color:var(--dim);font-size:12px;margin-bottom:14px}
  #overlay .score{font-size:40px;font-weight:700;color:var(--gold);margin-bottom:4px}
  #overlay .best{color:var(--dim);font-size:13px;margin-bottom:18px}
  #overlay .big{background:var(--gold);color:#0a0e14;border:none;font-weight:700;padding:11px 28px;font-family:inherit;cursor:pointer;border-radius:8px;font-size:14px}

  #tip{width:min(480px,96vw);color:var(--dim);font-size:12px;margin-top:10px;text-align:center;line-height:1.6}
  .diffbar{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .diffbar button{flex:0 0 auto;font:600 12px/1 inherit;color:var(--dim);background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;transition:.12s}
  .diffbar button:hover{color:#fff;border-color:#666}
  .diffbar button.active{color:#0a0e14;background:var(--gold);border-color:var(--gold)}
</style>
</head>
<body>
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>PACMAN</b> · 吃豆人</span>
  </div>

  <div class="status">
    <div class="col"><span class="lab">SCORE</span><span class="num gold" id="score">0</span></div>
    <div class="col"><span class="lab">LIVES</span><span class="num red" id="lives">3</span></div>
    <div class="col"><span class="lab">DOTS</span><span class="num green" id="dots">0</span></div>
  </div>

  <div class="stage">
    <canvas id="cv"></canvas>
  </div>

  <div class="pad">
    <button class="pu" data-action="up">▲</button>
    <button class="pl" data-action="left">◀</button>
    <button class="pr" data-action="right">▶</button>
    <button class="pd" data-action="down">▼</button>
  </div>

  <div class="bar">
    <button class="act" id="pauseBtn">⏸ 暂停 (空格)</button>
    <button class="act gold" id="newBtn">↻ 新局</button>
  </div>

  <div id="tip">方向键 / WASD 转向 · 手机滑动或点按方向键 · 吃光豆子即胜 · 能量豆可反吃鬼</div>
  <div class="diffbar" id="diffbar"></div>

  <div id="overlay">
    <div class="box">
      <h2 id="goTitle">GAME OVER</h2>
      <div class="sub" id="goSub">SESSION TERMINATED</div>
      <div class="score" id="goScore">0</div>
      <div class="best">DOTS LEFT <span id="goDots">0</span></div>
      <button class="big" id="goBtn">新 局</button>
    </div>
  </div>

<script src="input.js"></script>
<script src="juice.js"></script>
<script>
(function(){
  "use strict";

  // ---------- MAZE MAP ----------
  // '#' wall, '.' dot, 'o' power pellet, ' ' empty path, 'P' pacman start
  var MAZE = [
    "###################",
    "#........#........#",
    "#.##.###.#.###.##.#",
    "#o...............o#",
    "#.##.#.#####.#.##.#",
    "#....#...#...#....#",
    "####.###.#.###.####",
    "#......#...#......#",
    "####.#.#####.#.####",
    "#....#.......#....#",
    "#.##.#.#####.#.##.#",
    "#o...............o#",
    "#.##.#.#####.#.##.#",
    "#....#.......#....#",
    "####.#.#####.#.####",
    "#..........#......#",
    "#.##.#.#####.#.##.#",
    "#o.#.........#...o#",
    "#.##.###.#.###.##.#",
    "#........P........#",
    "###################"
  ];

  var COLS = MAZE[0].length;
  var ROWS = MAZE.length;
  var TILE = 24;

  var cv = document.getElementById('cv');
  cv.width = COLS * TILE;
  cv.height = ROWS * TILE;
  var ctx = cv.getContext('2d');

  var scoreEl = document.getElementById('score');
  var livesEl = document.getElementById('lives');
  var dotsEl  = document.getElementById('dots');
  var pauseBtn= document.getElementById('pauseBtn');
  var newBtn  = document.getElementById('newBtn');
  var overlay = document.getElementById('overlay');
  var goTitle = document.getElementById('goTitle');
  var goSub   = document.getElementById('goSub');
  var goScore = document.getElementById('goScore');
  var goDots  = document.getElementById('goDots');
  var goBtn   = document.getElementById('goBtn');

  // ---------- helpers ----------
  function cellAt(c, r){
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return '#';
    return MAZE[r][c];
  }
  function isWall(c, r){ return cellAt(c, r) === '#'; }

  // parse dynamic state from MAZE template
  var dots, totalDots, pacStart, ghostStarts;
  function parseMaze(){
    dots = [];
    pacStart = {c:1, r:1};
    ghostStarts = [];
    for (var r=0; r<ROWS; r++){
      var row = MAZE[r];
      for (var c=0; c<COLS; c++){
        var ch = row[c];
        if (ch === '.') { dots.push({c:c, r:r, type:'dot', eaten:false}); }
        else if (ch === 'o') { dots.push({c:c, r:r, type:'power', eaten:false}); }
        else if (ch === 'P') { pacStart = {c:c, r:r}; }
      }
    }
    totalDots = dots.length;
  }

  function findOpenNearCenter(){
    // pick open cells near the middle for ghosts
    var cc = Math.floor(COLS/2), cr = Math.floor(ROWS/2);
    var cand = [];
    for (var r=0; r<ROWS; r++) for (var c=0; c<COLS; c++){
      if (isWall(c,r)) continue;
      if (cellAt(c,r) === 'P') continue;
      var d = Math.abs(c-cc) + Math.abs(r-cr);
      cand.push({c:c, r:r, d:d});
    }
    cand.sort(function(a,b){ return a.d - b.d; });
    var picks = [];
    for (var i=0; i<cand.length && picks.length<4; i++){
      var ok = true;
      for (var j=0; j<picks.length; j++){
        if (Math.abs(cand[i].c - picks[j].c) + Math.abs(cand[i].r - picks[j].r) < 2) { ok = false; break; }
      }
      if (ok) picks.push(cand[i]);
    }
    return picks;
  }

  // ---------- entity ----------
  function makeEntity(c, r, color, type){
    return {
      x: c*TILE + TILE/2,
      y: r*TILE + TILE/2,
      dir: {x:0, y:0},
      want: {x:0, y:0},
      color: color,
      type: type,            // 'chase' | 'random' | 'ambush'
      frightened: false,
      eaten: false,
      eatTimer: 0
    };
  }

  var pac, ghosts, score, lives, dotsLeft, running, paused, gameOver, win, frightTimer;
  var SPEED = 3; // divides TILE (24) exactly -> no drift

  // ---- 难度选择系统（简单/普通/困难/地狱）----
  // ghostSpeed 必须整除 TILE(24) 以免漂移；normal=3=SPEED 保基线; frightMult 缩放能量豆畏惧时长
  var DIFFICULTY = {
    easy:   { label:'简单', ghostSpeed:2, frightMult:1.4 },
    normal: { label:'普通', ghostSpeed:3, frightMult:1.0 },
    hard:   { label:'困难', ghostSpeed:4, frightMult:0.8 },
    hell:   { label:'地狱', ghostSpeed:6, frightMult:0.6 }
  };
  var DIFF_ORDER = ['easy','normal','hard','hell'];
  var difficulty = 'normal';
  var ghostSpeed = 3;
  function setDifficulty(d){ if(DIFFICULTY[d]){ difficulty=d; ghostSpeed=DIFFICULTY[d].ghostSpeed; return true; } return false; }
  function getDifficulty(){ return difficulty; }
  function diffCfg(){ return DIFFICULTY[difficulty] || DIFFICULTY.normal; }

  // 局部种子 PRNG（mulberry32）：注入掉落随机必须走它，禁止 Math.random
  function mk(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  var _rng = mk(0x9ACF00D ^ (COLS*1009 + ROWS));
  function reseed(s){ _rng = mk((s>>>0) || 1); }
  function nowMs(){ return (typeof performance!=='undefined' && performance.now) ? performance.now() : 0; }

  // 掉落道具（纯注入，不改核心玩法）
  var pickups = [];
  var boostUntil = 0;   // ⭐加速
  var invulnUntil = 0;  // 🛡护盾（免一次鬼撞）
  var pickupTimer = 0;   // 自动掉落计时（仅真实循环 loop 驱动）

  function atCenter(e){
    return (((e.x - TILE/2) % TILE) === 0) && (((e.y - TILE/2) % TILE) === 0);
  }
  function tileOf(e){ return { c: Math.round((e.x - TILE/2)/TILE), r: Math.round((e.y - TILE/2)/TILE) }; }

  function resetPositions(){
    pac.x = pacStart.c*TILE + TILE/2;
    pac.y = pacStart.r*TILE + TILE/2;
    pac.dir = {x:0,y:0}; pac.want = {x:0,y:0};

    for (var i=0; i<ghosts.length; i++){
      var g = ghosts[i];
      var s = ghostStarts[i % ghostStarts.length];
      g.x = s.c*TILE + TILE/2;
      g.y = s.r*TILE + TILE/2;
      g.dir = {x:0,y:0}; g.want = {x:0,y:0};
      g.frightened = false; g.eaten = false; g.eatTimer = 0;
      // initial scatter directions
      var opts = validDirs(g);
      if (opts.length) g.dir = opts[Math.floor(Math.random()*opts.length)];
    }
    frightTimer = 0;
  }

  function startGame(){
    parseMaze();
    ghostSpeed = diffCfg().ghostSpeed;
    dotsLeft = totalDots;
    score = 0; lives = 3; gameOver = false; win = false; paused = false;
    frightTimer = 0;
    pickups = []; boostUntil = 0; invulnUntil = 0; pickupTimer = 0;
    reseed(0x9ACF00D ^ (COLS*1009 + ROWS));
    ghostStarts = findOpenNearCenter();
    if (ghostStarts.length === 0) ghostStarts = [{c:pacStart.c, r:pacStart.r}];

    pac = makeEntity(pacStart.c, pacStart.r, '#f0b90b', 'pac');
    // 4 ghosts: red=chase, green=random, gold=ambush, blue=random
    var palette = [
      {color:'#f6465d', type:'chase'},
      {color:'#02c076', type:'random'},
      {color:'#f0b90b', type:'ambush'},
      {color:'#3aa0ff', type:'random'}
    ];
    ghosts = [];
    for (var i=0; i<palette.length; i++){
      var s = ghostStarts[i % ghostStarts.length];
      ghosts.push(makeEntity(s.c, s.r, palette[i].color, palette[i].type));
    }
    resetPositions();
    running = true;
    overlay.style.display = 'none';
    updateHUD();
  }

  // ---------- movement ----------
  function validDirs(e){
    var t = tileOf(e);
    var out = [];
    var dirs = [ {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1} ];
    for (var i=0; i<dirs.length; i++){
      if (!isWall(t.c + dirs[i].x, t.r + dirs[i].y)) out.push(dirs[i]);
    }
    return out;
  }

  function movePac(){
    var spd = (nowMs() < boostUntil) ? SPEED*2 : SPEED; // ⭐加速（仍为 6，整除 TILE，无漂移）
    if (!atCenter(pac)) { pac.x += pac.dir.x*spd; pac.y += pac.dir.y*spd; return; }
    var t = tileOf(pac);
    // try desired direction
    if ((pac.want.x || pac.want.y) && !isWall(t.c+pac.want.x, t.r+pac.want.y)) {
      pac.dir = {x:pac.want.x, y:pac.want.y};
    }
    if (isWall(t.c+pac.dir.x, t.r+pac.dir.y)) {
      // blocked -> stop and eat at this tile
      pac.dir = {x:0, y:0};
    }
    pac.x += pac.dir.x*spd; pac.y += pac.dir.y*spd;
    eatAt(t.c, t.r);
    checkPickups(); // 拾取检测分支：pickups 为空时无害
  }

  function eatAt(c, r){
    for (var i=0; i<dots.length; i++){
      var d = dots[i];
      if (!d.eaten && d.c === c && d.r === r){
        d.eaten = true;
        dotsLeft--;
        if (d.type === 'power'){
          score += 50;
          frightTimer = Math.round(7 * 60 * diffCfg().frightMult); // ~7s at 60fps（按难度缩放）
          Juice.sfx('pickup');
          Juice.burst(d.c*TILE+TILE/2, d.r*TILE+TILE/2, {color:'#f0b90b', n:10, speed:160});
          Juice.popup(d.c*TILE+TILE/2, d.r*TILE+TILE/2-6, '能量!', '#f0b90b');
          for (var k=0; k<ghosts.length; k++){
            ghosts[k].frightened = true;
            ghosts[k].eaten = false;
          }
        } else {
          score += 10;
          Juice.popup(d.c*TILE+TILE/2, d.r*TILE+TILE/2-6, '+10', '#6b7785', {size:13});
        }
      }
    }
    updateHUD();
    if (dotsLeft <= 0){ winGame(); }
  }

  // ---------- 掉落道具（纯注入，不改核心玩法）----------
  function makePickup(type, c, r){ return { c:c, r:r, type:type }; }
  const PICKUP_TYPES = ['ghost','star','gem'];
  // 随机投放（局部 PRNG）：最多 2 个，避开墙/起点/已有道具
  function spawnPickupAtRandom(){
    if(pickups.length >= 2) return;
    let cells = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(isWall(c,r)) continue;
      if(c===pacStart.c && r===pacStart.r) continue;
      let taken=false;
      for(const p of pickups) if(p.c===c && p.r===r){ taken=true; break; }
      if(!taken) cells.push({c,r});
    }
    if(!cells.length) return;
    const cl = cells[(_rng()*cells.length)|0];
    const type = PICKUP_TYPES[(_rng()*PICKUP_TYPES.length)|0];
    pickups.push(makePickup(type, cl.c, cl.r));
  }
  // 拾取生效：返回 true 表示已应用
  function applyPickup(type){
    if(!pac) return false;
    const cx = pac.x, cy = pac.y;
    if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); Juice.burst(cx, cy, {color:'#f0b90b', n:10, speed:150}); }
    if(type==='ghost'){
      frightTimer = Math.max(frightTimer, Math.round(7*60*diffCfg().frightMult)) + 120; // 幽灵畏惧暂停（按难度缩放）
      for(const g of ghosts){ g.frightened = true; g.eaten = false; }
      if(typeof Juice!=='undefined') Juice.popup(cx, cy-10, '👻', '#3aa0ff', {size:16});
    } else if(type==='star'){
      boostUntil = nowMs() + 5000; // ⭐加速
      if(typeof Juice!=='undefined') Juice.popup(cx, cy-10, '⭐', '#f0b90b', {size:16});
    } else if(type==='gem'){
      score += 50; // 💰加分
      if(typeof Juice!=='undefined') Juice.popup(cx, cy-10, '+50', '#f0b90b', {size:16});
      updateHUD();
    } else { // shield：免一次鬼撞
      invulnUntil = nowMs() + 6000;
      if(typeof Juice!=='undefined') Juice.popup(cx, cy-10, '🛡', '#02c076', {size:16});
    }
    return true;
  }
  // 拾取检测：pac 处于道具格即拾取并移除
  function checkPickups(){
    if(!pac) return;
    const t = tileOf(pac);
    for(let i=pickups.length-1;i>=0;i--){
      if(pickups[i].c===t.c && pickups[i].r===t.r){ applyPickup(pickups[i].type); pickups.splice(i,1); }
    }
  }
  // 致死分支（护盾优先免死，无盾才扣命）
  function pacHit(){
    if(invulnUntil > nowMs()) return;
    lives--;
    updateHUD();
    if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.addTrauma(0.5); Juice.flash('#f6465d',0.35); }
    if(lives <= 0){ loseGame(); }
    else { resetPositions(); }
  }

  function ghostPickDir(g, pacTile){
    var opts = validDirs(g);
    if (opts.length === 0) return {x:0,y:0};
    // do not reverse unless dead-end
    var rev = {x:-g.dir.x, y:-g.dir.y};
    var filtered = [];
    for (var i=0; i<opts.length; i++){
      if (!(opts[i].x === rev.x && opts[i].y === rev.y)) filtered.push(opts[i]);
    }
    if (filtered.length === 0) filtered = opts; // dead-end: allow reverse

    if (g.frightened){
      // flee: maximize distance to pac
      var best = filtered[0], bestD = -1;
      for (var j=0; j<filtered.length; j++){
        var nc = g.x/TILE + filtered[j].x, nr = g.y/TILE + filtered[j].y;
        var dist = (nc - pacTile.c)*(nc - pacTile.c) + (nr - pacTile.r)*(nr - pacTile.r);
        if (dist > bestD){ bestD = dist; best = filtered[j]; }
      }
      return best;
    }
    if (g.type === 'chase' || g.type === 'ambush'){
      var b2 = filtered[0], bd = 1e9;
      for (var m=0; m<filtered.length; m++){
        var tc = g.x/TILE + filtered[m].x, tr = g.y/TILE + filtered[m].y;
        var dd = (tc - pacTile.c)*(tc - pacTile.c) + (tr - pacTile.r)*(tr - pacTile.r);
        if (dd < bd){ bd = dd; b2 = filtered[m]; }
      }
      return b2;
    }
    // random
    return filtered[Math.floor(Math.random()*filtered.length)];
  }

  function moveGhost(g, pacTile){
    if (g.eaten){
      // return to center pen, then revive
      g.eatTimer--;
      if (g.eatTimer <= 0){
        g.eaten = false;
        g.frightened = false;
        var s = ghostStarts[0];
        g.x = s.c*TILE + TILE/2; g.y = s.r*TILE + TILE/2;
        g.dir = {x:0,y:0};
      }
      return;
    }
    if (!atCenter(g)) { g.x += g.dir.x*ghostSpeed; g.y += g.dir.y*ghostSpeed; return; }
    var dir = ghostPickDir(g, pacTile);
    g.dir = dir;
    g.x += g.dir.x*ghostSpeed; g.y += g.dir.y*ghostSpeed;
  }

  // ---------- collision ----------
  function checkCollisions(){
    var pt = tileOf(pac);
    for (var i=0; i<ghosts.length; i++){
      var g = ghosts[i];
      if (g.eaten) continue;
      var gt = tileOf(g);
      var sameTile = (gt.c === pt.c && gt.r === pt.r);
      var closePix = (Math.abs(g.x - pac.x) < TILE*0.6) && (Math.abs(g.y - pac.y) < TILE*0.6);
      if (sameTile || closePix){
        if (g.frightened){
          // eat ghost
          g.eaten = true;
          g.eatTimer = 60; // respawn after ~1s
          score += 200;
          updateHUD();
          Juice.sfx('boom');
          Juice.addTrauma(0.3);
          Juice.burst(g.x, g.y, {color:g.color, n:14, speed:200});
          Juice.popup(g.x, g.y-10, '+200', '#f0b90b', {size:16});
        } else {
          // pac dies（经 pacHit：护盾优先免死）
          pacHit();
          return;
        }
      }
    }
  }

  // ---------- game state ----------
  function winGame(){
    gameOver = true; running = false; win = true;
    showOverlay(true);
  }
  function loseGame(){
    gameOver = true; running = false; win = false;
    showOverlay(false);
  }
  function showOverlay(isWin){
    overlay.style.display = 'flex';
    Juice.sfx(isWin ? 'win' : 'lose');
    var rk = Juice.rank(score);
    var b = Juice.best('pacman', score);
    if (isWin){
      goTitle.textContent = 'YOU WIN';
      goTitle.className = 'win';
      goSub.textContent = 'ALL DOTS CONSUMED · 段位 '+rk;
      if(b.isNew) Juice.achievement('🏆 新纪录 '+score+'！段位 '+rk);
    } else {
      goTitle.textContent = 'GAME OVER';
      goTitle.className = 'lose';
      goSub.textContent = 'SESSION TERMINATED · 段位 '+rk;
      if(b.isNew) Juice.achievement('🏆 新纪录 '+score+'！段位 '+rk);
    }
    goScore.textContent = score;
    goDots.textContent = Math.max(0, dotsLeft);
  }

  function updateHUD(){
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    dotsEl.textContent = dotsLeft;
  }

  // ---------- drawing ----------
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    Juice.begin(ctx);
    // walls
    for (var r=0; r<ROWS; r++){
      for (var c=0; c<COLS; c++){
        if (MAZE[r][c] === '#'){
          ctx.fillStyle = '#101a26';
          ctx.fillRect(c*TILE, r*TILE, TILE, TILE);
          ctx.strokeStyle = '#1f2a38';
          ctx.lineWidth = 1;
          ctx.strokeRect(c*TILE+1.5, r*TILE+1.5, TILE-3, TILE-3);
        }
      }
    }
    // dots + power pellets
    for (var i=0; i<dots.length; i++){
      var d = dots[i];
      if (d.eaten) continue;
      var cx = d.c*TILE + TILE/2, cy = d.r*TILE + TILE/2;
      if (d.type === 'dot'){
        ctx.fillStyle = '#6b7785';
        ctx.beginPath(); ctx.arc(cx, cy, 2.2, 0, Math.PI*2); ctx.fill();
      } else {
        var pulse = 4 + Math.sin(Date.now()/200)*1.6;
        ctx.fillStyle = '#f0b90b';
        ctx.beginPath(); ctx.arc(cx, cy, pulse, 0, Math.PI*2); ctx.fill();
      }
    }
    drawPac();
    for (var k=0; k<ghosts.length; k++) drawGhost(ghosts[k]);
    // 掉落道具（辉光圆 + emoji）
    for (var pi=0; pi<pickups.length; pi++){
      var pp = pickups[pi];
      var pcx = pp.c*TILE + TILE/2, pcy = pp.r*TILE + TILE/2;
      var pcol = pp.type==='ghost' ? '#3aa0ff' : (pp.type==='star' ? '#f0b90b' : (pp.type==='gem' ? '#f0b90b' : '#02c076'));
      var psym = pp.type==='ghost' ? '👻' : (pp.type==='star' ? '⭐' : (pp.type==='gem' ? '💰' : '🛡'));
      ctx.save();
      ctx.shadowColor = pcol; ctx.shadowBlur = 12; ctx.fillStyle = pcol;
      ctx.beginPath(); ctx.arc(pcx, pcy, TILE*0.34, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#0a0e14'; ctx.font = 'bold 13px JetBrains Mono, monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(psym, pcx, pcy+1);
    }
    // 当前激活增益（左上角）
    var bx = 8, by = 8;
    if (frightTimer > 0){ ctx.fillStyle = '#3aa0ff'; ctx.font = 'bold 14px JetBrains Mono, monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText('👻', bx, by); by += 18; }
    if (nowMs() < boostUntil){ ctx.fillStyle = '#f0b90b'; ctx.font = 'bold 14px JetBrains Mono, monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText('⭐', bx, by); by += 18; }
    if (nowMs() < invulnUntil){ ctx.fillStyle = '#02c076'; ctx.font = 'bold 14px JetBrains Mono, monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText('🛡', bx, by); by += 18; }
    Juice.mid(ctx);
    Juice.end(ctx);
  }

  function drawPac(){
    var cx = pac.x, cy = pac.y;
    var ang = 0;
    if (pac.dir.x === 1) ang = 0;
    else if (pac.dir.x === -1) ang = Math.PI;
    else if (pac.dir.y === 1) ang = Math.PI/2;
    else if (pac.dir.y === -1) ang = -Math.PI/2;
    var mouth = (Math.abs(pac.dir.x)+Math.abs(pac.dir.y) === 0) ? 0.18 : (0.18 + 0.22*Math.abs(Math.sin(Date.now()/90)));
    var rad = TILE*0.42;
    // 渐变填充（顶部更亮，营造高光体积感）
    var grad = ctx.createLinearGradient(cx, cy - rad, cx, cy + rad);
    grad.addColorStop(0, '#ffe066');
    grad.addColorStop(1, '#c7940a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, rad, ang + mouth, ang + Math.PI*2 - mouth);
    ctx.closePath();
    ctx.fill();
    // 暗色描边（提升辨识度）
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(0,0,0,0.45)';
    ctx.stroke();
    // 顶部高光（光源在上方）
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(cx - rad*0.18, cy - rad*0.28, rad*0.18, 0, Math.PI*2);
    ctx.fill();
  }

  function drawGhost(g){
    var cx = g.x, cy = g.y, rad = TILE*0.40;
    var body = g.frightened ? (frightTimer < 120 && (Math.floor(Date.now()/200)%2) ? '#7a3a3a' : '#2746c0') : g.color;
    if (g.eaten) body = 'rgba(0,0,0,0)';
    ctx.beginPath();
    ctx.arc(cx, cy - rad*0.1, rad, Math.PI, 0);
    var bottom = cy + rad*0.9;
    ctx.lineTo(cx + rad, bottom);
    // wavy skirt
    var feet = 3;
    for (var i=0; i<feet; i++){
      var x0 = cx + rad - (2*rad)*(i+0.5)/feet;
      var x1 = cx + rad - (2*rad)*(i+1)/feet;
      ctx.lineTo(x0, bottom - rad*0.35);
      ctx.lineTo(x1, bottom);
    }
    ctx.closePath();
    if (g.eaten){
      ctx.fillStyle = body;
      ctx.fill();
    } else {
      // 主体填充（保留原配色）
      ctx.fillStyle = body;
      ctx.fill();
      // 对比描边（敌人统一暗描边）
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.stroke();
      // 顶部高光
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.beginPath();
      ctx.ellipse(cx, cy - rad*0.55, rad*0.5, rad*0.28, 0, 0, Math.PI*2);
      ctx.fill();
    }
    if (g.eaten){
      drawEyes(cx, cy, true);
    } else {
      drawEyes(cx, cy, false);
    }
  }
  function drawEyes(cx, cy, scared){
    var ex = TILE*0.16, ey = -TILE*0.05, er = TILE*0.10;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-ex, cy+ey, er, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ex, cy+ey, er, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = scared ? '#ff5f56' : '#0a0e14';
    var dx = pac.dir.x*er*0.4, dy = pac.dir.y*er*0.4;
    ctx.beginPath(); ctx.arc(cx-ex+dx, cy+ey+dy, er*0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ex+dx, cy+ey+dy, er*0.5, 0, Math.PI*2); ctx.fill();
  }

  // ---------- loop ----------
  function loop(){
    Juice.update(0.016);
    if (typeof Input !== 'undefined') readInput();
    if (running && !paused){
      var pt = tileOf(pac);
      movePac();
      for (var i=0; i<ghosts.length; i++) moveGhost(ghosts[i], pt);
      checkCollisions();
      // 自动掉落（仅真实循环触发；测试直接调 movePac 等不受影响）
      pickupTimer += 0.016;
      if(pickupTimer >= 5){ pickupTimer = 0; if(pickups.length < 2) spawnPickupAtRandom(); }
      if (frightTimer > 0){
        frightTimer--;
        if (frightTimer <= 0){
          for (var k=0; k<ghosts.length; k++){ ghosts[k].frightened = false; }
        }
      }
    }
    draw();
    if (typeof Input !== 'undefined') Input.update();
    requestAnimationFrame(loop);
  }

  // ---------- input（共享输入层 input.js：失焦清键，修复断触）----------
  if (typeof Input !== 'undefined') {
    Input.init({ keymap: { 'Space':'pause', 'KeyP':'pause' } });
  }
  function setDir(dx, dy){
    if (!pac) return;
    pac.want = {x:dx, y:dy};
  }
  function readInput(){
    if (typeof Input === 'undefined') return;
    if (Input.pressed('pause')) togglePause();
    if (running && !paused && pac){
      if(Input.pressed('up')) setDir(0,-1);
      else if(Input.pressed('down')) setDir(0,1);
      else if(Input.pressed('left')) setDir(-1,0);
      else if(Input.pressed('right')) setDir(1,0);
    }
  }
  // d-pad：走 input.js 虚拟按钮
  if (typeof Input !== 'undefined') {
    Input.bindVirtualButtons(document.querySelector('.pad'));
  }

  // swipe
  var touchStart = null;
  cv.addEventListener('touchstart', function(e){
    if (e.touches.length) touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  }, {passive:true});
  cv.addEventListener('touchmove', function(e){ e.preventDefault(); }, {passive:false});
  cv.addEventListener('touchend', function(e){
    if (!touchStart) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)){
      if (Math.abs(dx) > 16) setDir(dx > 0 ? 1 : -1, 0);
    } else {
      if (Math.abs(dy) > 16) setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  }, {passive:true});

  function togglePause(){
    if (gameOver) return;
    paused = !paused;
    pauseBtn.textContent = paused ? '▶ 继续 (空格)' : '⏸ 暂停 (空格)';
  }
  pauseBtn.addEventListener('click', togglePause);
  newBtn.addEventListener('click', startGame);
  goBtn.addEventListener('click', startGame);

  // ---- 难度选择条 ----
  function buildDiffBar(){
    var bar = document.getElementById('diffbar');
    if(!bar) return;
    bar.innerHTML = '';
    DIFF_ORDER.forEach(function(k){
      var b = document.createElement('button');
      b.textContent = DIFFICULTY[k].label;
      if(k === difficulty) b.className = 'active';
      b.addEventListener('click', function(){ setDifficulty(k); startGame(); buildDiffBar(); });
      bar.appendChild(b);
    });
  }
  buildDiffBar();

  // ---------- boot ----------
  startGame();
  requestAnimationFrame(loop);

  // ---- 测试钩子（非侵入，不影响玩法）----
  if (typeof window !== 'undefined') {
    window.__t = {
      ROWS, COLS, TILE, MAZE,
      isWall, cellAt, validDirs, movePac, eatAt, checkCollisions, tileOf, makeEntity, startGame, draw,
      DIFFICULTY, setDifficulty, getDifficulty,
      getGhostSpeed: () => ghostSpeed,
      getFrightTimer: () => frightTimer,
      getPac: () => pac,
      setPac(p){ pac = p; },
      getGhosts: () => ghosts,
      getDots: () => dots,
      getDotsLeft: () => dotsLeft,
      getScore: () => score,
      getLives: () => lives,
      getGameOver: () => gameOver,
      getWin: () => win,
      // —— 标准掉落钩子 ——
      start: startGame,
      spawnPickup: (type, c, r) => { pickups.push(makePickup(type, c, r)); },
      applyPickup: (type) => applyPickup(type),
      getPickups: () => pickups.map(p => ({ c:p.c, r:p.r, type:p.type })),
      setPickups: (arr) => { pickups = (arr||[]).map(p => ({ c:p.c, r:p.r, type:p.type })); },
      stepPickups: () => { /* 网格静态道具：无移动逻辑 */ },
      makePickup: (type, c, r) => makePickup(type, c, r),
      getBoost: () => nowMs() < boostUntil,
      setBoost: (v) => { boostUntil = v ? nowMs() + 1e9 : 0; },
      getShield: () => nowMs() < invulnUntil,
      setShield: (v) => { invulnUntil = v ? nowMs() + 1e9 : 0; },
      getState: () => ({
        score, lives, dotsLeft, gameOver, win,
        boost: nowMs() < boostUntil, shield: nowMs() < invulnUntil,
        frightTimer, pickups: pickups.map(p => ({ c:p.c, r:p.r, type:p.type }))
      }),
      setPacTile(c,r){ if(pac){ pac.x = c*TILE + TILE/2; pac.y = r*TILE + TILE/2; pac.dir = {x:0,y:0}; pac.want = {x:0,y:0}; } },
      setScore(n){ score = n; },
      setLives(n){ lives = n; }
    };
  }
})();
</script>
</body>
