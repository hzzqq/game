<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 攀爬 CLIMB</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(2,192,118,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(420px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--green)}
  .wrap{width:min(420px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .controls button{flex:1;min-width:56px;background:var(--green);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.over{color:var(--red);font-weight:700}.msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(420px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>攀爬</b> CLIMB</span></div>
  <div class="wrap">
    <div class="hud"><span>高度 · <span class="st" id="score">0</span></span><span>状态 · <span class="st" id="st">攀爬中</span></span></div>
    <div class="boardwrap"><canvas id="board" width="360" height="600"></canvas></div>
    <div class="controls">
      <button data-d="up">↑上</button><button data-d="left">←左</button>
      <button data-d="down">↓下</button><button data-d="right">→右</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="msg" id="msg">上下左右跳跃攀爬高塔，躲避落石。碰到落石即结束（护盾可挡一次）；越往上高度分越高，登顶获胜。</div>
  </div>
  <div class="foot">Climb（攀爬）：操纵角色向上跳跃登塔，落石从塔顶不断滚落，移动躲避。拾取 💰金币 / 🛡护盾 / 🚀加速 增益。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;
  // 局部 PRNG（mulberry32）—— 生成只用它，绝不用 Math.random
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x9E3779B9);
  function setRand(fn){ if(typeof fn==='function') _rng=fn; }

  const COLS = 9, ROWS = 18;
  const START_ROW = ROWS - 1;
  const COIN_VALUE = 20;
  const BOOST_DUR = 40;        // 🚀加速持续帧数（每帧自动向上冲一格）
  const ROCK_INTERVAL = 14;    // 落石生成间隔（步）
  let player, rocks, pickups, gameOver, win, score, bonus, furthest, rockTimer, confettiFired = false;

  function genField(){
    player = { row: START_ROW, col: Math.floor(COLS/2), shield: 0, boost: 0 };
    rocks = [];
    pickups = [];
    score = 0; bonus = 0; furthest = START_ROW;
    gameOver = false; win = false;
    confettiFired = false;  // 重置成就标记
    rockTimer = ROCK_INTERVAL;
    // 道具：随机撒在塔身若干格（coin 加分 / shield 护盾 / boost 加速）
    for(let i=0;i<5;i++){
      const r = 1 + Math.floor(_rng()*(ROWS-2));
      const c = Math.floor(_rng()*COLS);
      const x = _rng();
      const type = x < 0.6 ? 'coin' : (x < 0.8 ? 'shield' : 'boost');
      pickups.push({ type, row: r, col: c });
    }
  }

  function reset(seed){
    if(typeof seed==='number') _rng = mk(seed>>>0);
    genField();
    return getState();
  }
  function newGame(seed){ return reset(seed); }

  function die(){
    // 护盾优先抵挡一次（注入式分支，shield=0 时行为不变）
    if(player.shield > 0){ player.shield--; if(J) J.sfx('block'); return; }
    gameOver = true; if(J) J.sfx('lose');
  }
  function collectPickups(){
    for(let i=pickups.length-1;i>=0;i--){
      const p = pickups[i];
      if(p.row === player.row && p.col === player.col){ applyPickup(p.type); pickups.splice(i,1); }
    }
    score = (START_ROW - furthest) + bonus;
  }
  function applyPickup(type){
    if(type === 'coin'){ bonus += COIN_VALUE; if(J) J.sfx('pickup'); }
    else if(type === 'shield'){ player.shield++; if(J) J.sfx('pickup'); }
    else if(type === 'boost'){ player.boost = BOOST_DUR; if(J) J.sfx('pickup'); }
  }

  function hop(dir){
    if(gameOver || win) return;
    if(dir === 'up')    player.row = Math.max(0, player.row - 1);
    else if(dir === 'down')  player.row = Math.min(ROWS-1, player.row + 1);
    else if(dir === 'left')  player.col = Math.max(0, player.col - 1);
    else if(dir === 'right') player.col = Math.min(COLS-1, player.col + 1);
    if(player.row < furthest) furthest = player.row;
    score = (START_ROW - furthest) + bonus;
    if(J) J.sfx('click'); if(J) J.addTrauma(0.08);
    collectPickups();
    if(player.row === 0){ win = true; if(J) J.sfx('levelup'); if(!confettiFired){ confettiFired=true; if(typeof Juice!=='undefined'){ if(Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); if(Juice.burst) Juice.burst(window.innerWidth/2, window.innerHeight*0.4, {color:'#02c076', n:34, speed:280}); } } }
  }

  function step(dt){
    if(gameOver || win) return;
    dt = dt || 1;
    // 注入分支：🚀加速期间每帧自动向上冲一格（不改动手动 hop 逻辑）
    if(player.boost > 0){ player.boost--; hop('up'); if(gameOver || win) return; }
    // 落石下滚一格（走纯状态推进，无 DOM 依赖）
    for(let i=0;i<rocks.length;i++) rocks[i].row += 1;
    rocks = rocks.filter(rk => rk.row < ROWS);
    // 落石砸中玩家 → 死亡（护盾优先）
    if(rocks.some(rk => rk.row === player.row && rk.col === player.col)) die();
    if(gameOver) return;
    // 落石定时生成（走局部 PRNG，绝不裸 Math.random）
    rockTimer--;
    if(rockTimer <= 0){
      rockTimer = ROCK_INTERVAL;
      const c = Math.floor(_rng()*COLS);
      rocks.push({ row: 0, col: c });
    }
    // 拾取处理（护盾/金币/加速道具）
    collectPickups();
  }

  function isGameOver(){ return gameOver; }
  function isWin(){ return win; }
  function getScore(){ return score; }
  function getState(){
    return {
      player: { row: player.row, col: player.col },
      rocks: rocks.map(rk => ({ row: rk.row, col: rk.col })),
      score, bonus, furthest, startRow: START_ROW,
      gameOver, win,
      pickups: pickups.map(p => ({ type: p.type, row: p.row, col: p.col })),
      shield: player.shield, boost: player.boost
    };
  }

  // ---- 测试辅助 setter（不影响核心玩法，便于确定性测试） ----
  function setPlayer(r, c){ player.row = r; player.col = c; if(r < furthest) furthest = r; score = (START_ROW - furthest) + bonus; }
  function setRocks(arr){ rocks = (arr||[]).map(rk => ({ row: rk.row, col: rk.col })); }
  function clearRocks(){ rocks = []; }
  function setRockTimer(v){ rockTimer = v; }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv = $('board'); if(!cv) return;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    const cellW = cv.width / COLS;
    const cellH = cv.height / ROWS;
    // 塔身背景（交替深浅，营造向上纵深）
    for(let r=0;r<ROWS;r++){
      ctx.fillStyle = (r % 2 === 0) ? '#13251c' : '#16291f';
      ctx.fillRect(0, r*cellH, cv.width, cellH);
    }
    // 落石（灰岩）
    ctx.fillStyle = '#8b95a1';
    for(const rk of rocks){
      ctx.beginPath();
      ctx.arc(rk.col*cellW+cellW*0.5, rk.row*cellH+cellH*0.5, cellW*0.34, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#5b6571'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    // 道具（辉光圆 + emoji），玩家前绘制
    for(const p of pickups){
      const px = p.col*cellW+cellW*0.5, py = p.row*cellH+cellH*0.5;
      ctx.save();
      ctx.beginPath(); ctx.arc(px, py, cellW*0.32, 0, Math.PI*2);
      ctx.fillStyle = p.type==='coin' ? 'rgba(255,207,90,0.25)' : p.type==='shield' ? 'rgba(80,180,255,0.25)' : 'rgba(240,185,11,0.25)';
      ctx.fill();
      ctx.strokeStyle = p.type==='coin' ? '#ffcf5a' : p.type==='shield' ? '#5ab4ff' : '#f0b90b';
      ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = (cellH*0.42|0)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.type==='coin' ? '💰' : p.type==='shield' ? '🛡' : '🚀', px, py);
      ctx.restore();
    }
    // 玩家（加速时更亮）
    ctx.fillStyle = player.boost > 0 ? '#7CFFB0' : '#02c076';
    ctx.fillRect(player.col*cellW+cellW*0.2, player.row*cellH+cellH*0.2, cellW*0.6, cellH*0.6);
    // 护盾环（只改绘制层）
    if(player.shield > 0){
      ctx.strokeStyle = '#5ab4ff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(player.col*cellW+cellW*0.5, player.row*cellH+cellH*0.5, cellW*0.42, 0, Math.PI*2); ctx.stroke();
    }
    const sc = $('score'); if(sc) sc.textContent = String(score);
    const st = $('st'); if(st) st.textContent = win ? '登顶' : (gameOver ? '结束' : '攀爬中');
    const msg = $('msg');
    if(msg){
      if(win){ msg.className='msg win'; msg.textContent='🏆 登顶成功！高度 '+score; }
      else if(gameOver){ msg.className='msg over'; msg.textContent='💀 被落石击中，游戏结束。'; }
      else msg.className='msg';
    }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    document.querySelectorAll('.controls button[data-d]').forEach(b => {
      b.onclick = () => { hop(b.getAttribute('data-d')); render(); };
    });
    const nb = $('new'); if(nb) nb.onclick = () => { reset(); render(); };
    if(typeof document!=='undefined'){
      document.addEventListener('keydown', e => {
        if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){ e.preventDefault(); hop('up'); render(); }
        else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){ e.preventDefault(); hop('down'); render(); }
        else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){ e.preventDefault(); hop('left'); render(); }
        else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){ e.preventDefault(); hop('right'); render(); }
      });
    }
  }

  reset();
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', render); else render(); }
  if(typeof window!=='undefined'){
    window.__t = { setRand, reset, newGame, hop, step, isGameOver, isWin, getScore, getState,
      setPlayer, setRocks, clearRocks, setRockTimer,
      // ---- 道具系统钩子 ----
      spawnPickup:(type,x,y)=>{ pickups.push({ type:type, row:y, col:x }); },
      getPickups:()=>pickups.length,
      getPickup:(i)=>pickups[i],
      getShield:()=>player.shield, setShield:(v)=>{ player.shield=v; },
      getBoost:()=>player.boost, setBoost:(v)=>{ player.boost=v; },
      applyPickup, collectPickups,
      stepPickups:()=>{ if(player.boost>0) player.boost--; collectPickups(); },
      confettiFired:()=>confettiFired };
  }
})();
</script>
</body>
</html>
