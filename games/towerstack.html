<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // TOWER STACK</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
    display:flex;flex-direction:column;align-items:center;padding:18px 12px}
  .titlebar{width:min(440px,96vw);display:flex;align-items:center;gap:10px;padding:10px 16px;
    background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}
  .bar{width:min(440px,96vw);display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;justify-content:center}
  .act{background:#0e141d;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;cursor:pointer;font-family:inherit;font-size:13px}
  .act.gold{color:var(--gold);border-color:rgba(240,185,11,.4)}
  .hud{width:min(440px,96vw);display:flex;justify-content:space-between;background:#0e141d;border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:12px;font-size:13px;color:var(--dim)}
  .hud b{color:var(--text)}
  #cv{background:#070a0f;border:1px solid var(--border);border-radius:10px;touch-action:none;max-width:96vw}
  .msg{width:min(440px,96vw);text-align:center;color:var(--dim);font-size:12px;margin-top:10px;line-height:1.7}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>TOWER STACK</b> · 叠塔</span></div>
  <div class="bar"><button class="act gold" id="newBtn">新游戏</button>
    <span style="color:var(--dim);font-size:12px">点击 / 空格 落下方块</span></div>
  <div class="hud"><span>层数 LAYERS <b id="hL">0</b>/<b id="hT">12</b></span>
    <span id="hStat" style="color:var(--gold)">运行中</span></div>
  <canvas id="cv" width="400" height="600"></canvas>
  <div class="msg">方块从一侧滑入，点击让它落下。与下方方块重叠的部分保留，超出部分被切掉。完全错过即失败，叠到目标层数即胜利。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x77AB);
  function setSeed(s){ _rng = mk(s>>>0); }

  const W=400, H=600, SPEED=130, LAYER=34, TARGET=12;

  let blocks, current, gameOver, won, target;

  function reset(){
    target=TARGET;
    blocks=[{ x:0, w:W }];
    spawnCurrent(W);
    gameOver=false; won=false;
  }
  function start(){ reset(); }

  function spawnCurrent(w){
    const fromLeft = _rng()<0.5;
    const x = fromLeft ? 0 : W-w;
    current = { x, w, dir: fromLeft?1:-1 };
  }

  function setBlocks(arr){ blocks = arr.map(b=>({x:b.x, w:b.w})); gameOver=false; won=false; }
  function setCurrent(c){ current = { x:c.x, w:c.w, dir:(c.dir==null?1:c.dir) }; }
  function setTarget(n){ target=n; }

  function step(dt){
    if(gameOver||!current) return getState();
    current.x += current.dir*SPEED*dt;
    if(current.x<=0){ current.x=0; current.dir=1; }
    if(current.x+current.w>=W){ current.x=W-current.w; current.dir=-1; }
    render();
    return getState();
  }

  function drop(){
    if(gameOver||!current) return getState();
    const top=blocks[blocks.length-1];
    const ol=Math.max(current.x, top.x);
    const orr=Math.min(current.x+current.w, top.x+top.w);
    if(orr<=ol){ // 完全错过
      gameOver=true; won=false;
      if(typeof Juice!=='undefined'){ Juice.sfx('boom'); Juice.addTrauma(.5); }
      render(); return getState();
    }
    const nw=orr-ol;
    blocks.push({ x:ol, w:nw });
    if(blocks.length>=target){ gameOver=false; won=true; gameOver=true;
      if(typeof Juice!=='undefined'){ Juice.sfx('win'); Juice.achievement('叠塔通关'); } render(); return getState(); }
    spawnCurrent(nw);
    if(typeof Juice!=='undefined') Juice.sfx('click');
    render();
    return getState();
  }

  function getState(){
    return { blocks: blocks.map(b=>({x:b.x,w:b.w})), current: current?{x:current.x,w:current.w,dir:current.dir}:null,
      gameOver, won, over: gameOver, target, layers: blocks.length };
  }

  function render(){
    const cv=document.getElementById('cv'); if(!cv) return;
    const ctx=cv.getContext('2d'); if(!ctx) return;
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#070a0f'; ctx.fillRect(0,0,W,H);
    for(let i=0;i<blocks.length;i++){
      const b=blocks[i]; const y=H-(i+1)*LAYER;
      ctx.fillStyle = (i%2===0)? '#f0b90b' : '#02c076';
      ctx.fillRect(b.x, y, b.w, LAYER-2);
    }
    if(current && !gameOver){ const y=H-(blocks.length+1)*LAYER; ctx.fillStyle='#e6edf3'; ctx.fillRect(current.x, y, current.w, LAYER-2); }
    const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
    set('hL', blocks.length-1); set('hT', target);
    set('hStat', gameOver?(won?'通关':'失败'):'运行中');
  }

  function bindUI(){
    const dropFn=()=>{ if(!gameOver){ drop(); } };
    window.addEventListener('keydown',e=>{ if(e.code==='Space'){ dropFn(); e.preventDefault(); } });
    const cv=document.getElementById('cv'); if(cv) cv.addEventListener('pointerdown',dropFn);
    const nb=document.getElementById('newBtn'); if(nb) nb.onclick=()=>{ reset(); render(); };
  }

  reset();
  if(typeof document!=='undefined'){ bindUI(); render(); }
  if(typeof window!=='undefined'){
    window.__t={ W,H,SPEED,TARGET, setSeed, reset, start, step, drop, setBlocks, setCurrent, setTarget, getState };
  }
})();
</script>
</body>
</html>
