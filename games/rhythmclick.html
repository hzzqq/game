<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // RHYTHMCLICK</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace}
  #stage{position:fixed;inset:0;z-index:0}
  #stage canvas{display:block;touch-action:none}
  #scan{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(1200px 700px at 50% -10%, rgba(240,185,11,.06), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px}
  .titlebar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border-bottom:1px solid var(--border)}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--gold)}
  .titlebar .btn{margin-left:auto;background:transparent;color:var(--dim);border:1px solid var(--border);
    border-radius:6px;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:12px}
  .titlebar .btn:hover{color:var(--gold);border-color:var(--gold)}
  #hud{position:fixed;top:52px;left:16px;right:16px;z-index:5;display:flex;justify-content:space-between;align-items:flex-start}
  .stat{background:rgba(18,24,33,.85);border:1px solid var(--border);border-radius:8px;padding:8px 14px;backdrop-filter:blur(4px)}
  .stat .k{color:var(--dim);font-size:11px;letter-spacing:.5px}
  .stat .v{font-size:19px;margin-top:2px}
  .v.score{color:var(--gold)} .v.lives{color:var(--red)} .v.level{color:var(--green)}
  #overlay{position:fixed;inset:0;z-index:7;display:flex;align-items:center;justify-content:center;background:rgba(10,14,20,.88)}
  #overlay .box{text-align:center;border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 40px;max-width:90vw}
  #overlay h1{font-size:26px;letter-spacing:2px;margin-bottom:10px;text-shadow:0 0 18px rgba(240,185,11,.35)}
  #overlay p{color:var(--dim);font-size:13px;line-height:1.9;margin-bottom:18px}
  #overlay .start{background:var(--gold);color:#0a0e14;border:none;border-radius:8px;padding:12px 28px;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;box-shadow:0 0 14px rgba(240,185,11,.4)}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;color:var(--dim);font-size:12px;text-align:center;width:100%}
  #btns{position:fixed;bottom:40px;left:0;right:0;z-index:6;display:flex;gap:20px;justify-content:center}
  .rb{width:140px;height:80px;border-radius:14px;border:2px solid var(--border);background:rgba(18,24,33,.9);
    color:var(--text);font-family:inherit;font-size:16px;font-weight:700;cursor:pointer}
  .rb.l{border-color:var(--green)} .rb.r{border-color:var(--red)}
  .rb:active{transform:scale(.96)}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="scan"></div>
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>RHYTHMCLICK</b> · 双键节奏</span>
    <button class="btn" id="pauseBtn">暂停</button>
  </div>
  <div id="hud">
    <div class="stat"><div class="k">得分</div><div class="v score" id="score">0</div></div>
    <div class="stat"><div class="k">连击</div><div class="v level" id="combo">0</div></div>
    <div class="stat"><div class="k">最大连击</div><div class="v" id="maxc">0</div></div>
    <div class="stat"><div class="k">失误</div><div class="v lives" id="miss">0</div></div>
  </div>
  <div id="hint">音符落到判定线时，按对应键：左(←/A) 绿键 · 右(→/D) 红键 · 越准分越高</div>
  <div id="btns">
    <button class="rb l" id="btnL">◀ 左</button>
    <button class="rb r" id="btnR">右 ▶</button>
  </div>
  <div id="overlay">
    <div class="box">
      <h1>♪ 双键节奏</h1>
      <p>金色音符顺两条轨道下落，落到 <b style="color:var(--gold)">判定线</b> 时按下对应键。<br/>正中=100，接近=50，错过或错键=失误并断连击。连击越长分越高。</p>
      <button class="start" id="startBtn">开始演奏</button>
    </div>
  </div>

  <script src="juice.js"></script>
  <script>
  (function(){
    if('ontouchstart' in window) document.body.classList.add('touch');
    const stage=document.getElementById('stage');
    let W=window.innerWidth, H=window.innerHeight;
    const cv=document.createElement('canvas');
    cv.width=W; cv.height=H; stage.appendChild(cv);
    const ctx=cv.getContext('2d');
    const J=(typeof Juice!=='undefined')?Juice:null;

    const HIT=H-100, PERFECT=20, GOOD=50, PASS=60, MAXMISS=10;
    let S=null;
    function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
    function fresh(){
      return {
        notes:[], score:0, combo:0, maxCombo:0, misses:0,
        speed:240, running:false, paused:false, over:false,
        hitLineY:HIT, spawnTimer:0, spawnEnabled:true, rng:mulberry32(3)
      };
    }

    function reset(){ S=fresh(); syncHud(); }
    function start(){ reset(); S.running=true; S.over=false; if(overlay)overlay.style.display='none'; syncHud(); }
    function setRand(seed){ S.rng=mulberry32(seed>>>0); }
    function spawnNote(lane,y){ S.notes.push({lane:lane?1:0,y:y,hit:false,missed:false}); }
    function setSpeed(v){ S.speed=v; }

    function applyAction(btn){
      if(!S.running||S.over||S.paused) return;
      let best=null, bestDiff=1e9;
      for(const n of S.notes){
        if(n.hit||n.missed||n.lane!==btn) continue;
        const d=Math.abs(n.y-S.hitLineY);
        if(d<bestDiff){bestDiff=d;best=n;}
      }
      if(!best){ // 误触：无对应音符却按键
        S.combo=0; S.misses++;
        if(S.misses>=MAXMISS){ S.over=true; S.running=false; showOver(); }
        return;
      }
      if(bestDiff<=PERFECT){
        S.score+=100; S.combo++;
        if(J)J.popup&&J.popup('PERFECT');
      } else if(bestDiff<=GOOD){
        S.score+=50; S.combo++;
        if(J)J.popup&&J.popup('GOOD');
      } else {
        S.combo=0; S.misses++; best.missed=true;
        if(J)J.flash&&J.flash('#f6465d');
        if(S.misses>=MAXMISS){ S.over=true; S.running=false; showOver(); }
        return;
      }
      if(S.combo>S.maxCombo)S.maxCombo=S.combo;
      best.hit=true;
      if(J)J.sfx&&J.sfx('tick');
    }

    function update(dt){
      if(!S.running||S.paused||S.over) return;
      // 自动下落
      for(const n of S.notes){ n.y+=S.speed*dt; }
      // 漏接判定（越过 PASS 仍未命中）
      for(const n of S.notes){
        if(!n.hit && !n.missed && n.y > S.hitLineY+PASS){
          n.missed=true; S.combo=0; S.misses++;
          if(J)J.flash&&J.flash('#f6465d');
        }
      }
      S.notes=S.notes.filter(n=>!n.hit && !n.missed);
      // 自动生成
      S.spawnTimer-=dt;
      if(S.spawnEnabled && S.spawnTimer<=0){
        S.spawnTimer=0.6 - Math.min(0.35, S.score/3000);
        const lane=Math.floor(S.rng()*2);
        spawnNote(lane, -20);
      }
      if(S.misses>=MAXMISS){ S.over=true; S.running=false; showOver(); }
      syncHud();
    }

    function getState(){
      return {
        score:S.score, combo:S.combo, maxCombo:S.maxCombo, misses:S.misses,
        running:S.running, over:S.over, hitLineY:S.hitLineY, speed:S.speed,
        notes:S.notes.map(n=>({lane:n.lane,y:+n.y.toFixed(2),hit:n.hit,missed:n.missed})),
        noteCount:S.notes.length
      };
    }

    window.__t={
      reset, start, update, getState, setRand,
      spawnNote, setNotes(arr){S.notes=arr.map(n=>({lane:n.lane?1:0,y:n.y,hit:false,missed:false}));},
      clearNotes(){S.notes=[];},
      applyAction, setSpeed, setSpawnEnabled(v){S.spawnEnabled=!!v;},
      setMisses(n){S.misses=n;}
    };

    function render(){
      ctx.clearRect(0,0,W,H);
      const laneW=W/2;
      ctx.strokeStyle='#1f2a38';
      ctx.beginPath();ctx.moveTo(laneW,0);ctx.lineTo(laneW,H);ctx.stroke();
      // 判定线
      ctx.strokeStyle='#f0b90b';ctx.beginPath();ctx.moveTo(0,S.hitLineY);ctx.lineTo(W,S.hitLineY);ctx.stroke();
      for(const n of S.notes){
        const cx=laneW*(n.lane+0.5);
        ctx.beginPath();ctx.arc(cx,n.y,16,0,7);
        ctx.fillStyle=n.lane===0?'#02c076':'#f6465d';ctx.fill();
      }
    }

    const $=id=>document.getElementById(id);
    const overlay=$('overlay'); const startBtn=$('startBtn');
    function syncHud(){
      if($('score'))$('score').textContent=S.score;
      if($('combo'))$('combo').textContent=S.combo;
      if($('maxc'))$('maxc').textContent=S.maxCombo;
      if($('miss'))$('miss').textContent=S.misses;
    }
    function showOver(){
      if(overlay){overlay.style.display='flex';const h1=overlay.querySelector('h1');if(h1)h1.textContent='✗ 演奏中断 · 得分 '+S.score;const b=overlay.querySelector('.start');if(b)b.textContent='再来一次';}
    }
    if(startBtn)startBtn.addEventListener('click',start);
    if($('pauseBtn'))$('pauseBtn').addEventListener('click',()=>{S.paused=!S.paused;});
    if($('btnL'))$('btnL').addEventListener('pointerdown',()=>applyAction(0));
    if($('btnR'))$('btnR').addEventListener('pointerdown',()=>applyAction(1));
    window.addEventListener('keydown',e=>{
      if(e.code==='ArrowLeft'||e.code==='KeyA')applyAction(0);
      if(e.code==='ArrowRight'||e.code==='KeyD')applyAction(1);
      if(e.code==='KeyP')S.paused=!S.paused;
    });

    reset();
    let last=0;
    function frame(t){
      const dt=Math.min(0.05,(t-last)/1000||0.016); last=t;
      update(dt); render();
      if(typeof requestAnimationFrame!=='undefined')requestAnimationFrame(frame);
    }
    if(typeof requestAnimationFrame!=='undefined')requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
