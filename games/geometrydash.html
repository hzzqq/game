<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>NEON DASH // 几何冲刺</title>
<style>
  :root{
    --bg:#070b12; --panel:#101622; --border:#1d2a3a;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b; --blue:#3aa0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    -webkit-tap-highlight-color:transparent;user-select:none}
  #stage{position:fixed;inset:0;z-index:0}
  #stage canvas{display:block;touch-action:none}
  #scan{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(1000px 600px at 50% -10%, rgba(58,160,255,.06), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.02) 1px, transparent 1px) 0 0/100% 3px}
  .titlebar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border-bottom:1px solid var(--border)}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--blue)}
  #hud{position:fixed;top:52px;left:16px;right:16px;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
  .stat{background:rgba(16,22,34,.85);border:1px solid var(--border);border-radius:8px;padding:8px 14px;backdrop-filter:blur(4px)}
  .stat .k{color:var(--dim);font-size:11px;letter-spacing:.5px}
  .stat .v{font-size:19px;margin-top:2px}
  .v.dist{color:var(--gold)} .v.best{color:var(--green)} .v.bst{color:var(--blue)}
  #buff{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px}
  .badge{background:rgba(16,22,34,.9);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px}
  .badge.shield{border-color:var(--blue);color:var(--blue)}
  .badge.boost{border-color:var(--gold);color:var(--gold)}
  #overlay{position:fixed;inset:0;z-index:7;display:flex;align-items:center;justify-content:center;background:rgba(7,11,18,.88)}
  #overlay .box{text-align:center;border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 40px;max-width:90vw}
  #overlay h1{font-size:26px;letter-spacing:2px;margin-bottom:10px;text-shadow:0 0 18px rgba(58,160,255,.35)}
  #overlay p{color:var(--dim);font-size:13px;line-height:1.9;margin-bottom:18px}
  #overlay .start{background:var(--blue);color:#070b12;border:none;border-radius:8px;padding:12px 28px;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;box-shadow:0 0 14px rgba(58,160,255,.4)}
  #jbtn{position:fixed;bottom:22px;right:22px;z-index:6;width:96px;height:96px;border-radius:50%;
    background:rgba(58,160,255,.12);border:2px solid var(--blue);color:var(--blue);
    font-family:inherit;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;display:none}
  #jbtn:active{background:rgba(58,160,255,.3)}
  body.touch #jbtn{display:block}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;color:var(--dim);font-size:12px;text-align:center;width:100%}
  body.touch #hint{display:none}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="scan"></div>

  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">NEON // <b>GEOMETRY DASH</b> · 几何冲刺</span>
  </div>

  <div id="hud">
    <div class="stat"><div class="k">DIST / 距离</div><div class="v dist" id="distEl">0</div></div>
    <div class="stat"><div class="k">BEST / 最佳</div><div class="v best" id="bestEl">0</div></div>
    <div class="stat"><div class="k">SPEED / 速度</div><div class="v spd" id="spdEl">1.0x</div></div>
  </div>
  <div id="buff"></div>

  <button id="jbtn">跳跃<br>JUMP</button>
  <div id="hint">SPACE / ↑ / W 或 点击跳跃（可二段跳）· 🟢能量球加分 · 🚀加速计分×2 · 🛡护盾免撞击一次</div>

  <div id="overlay">
    <div class="box">
      <h1 id="ovTitle">GEOMETRY DASH // 几何冲刺</h1>
      <p id="ovText">自动向前冲刺。跳过红色尖刺与方块，撞到即结束。<br>SPACE / ↑ / W 或 点屏跳跃（可二段跳）。<br>距离是唯一的分数。</p>
      <button class="start" id="startBtn">新局 / START</button>
    </div>
  </div>

<script>
(function(){
  "use strict";
  // 守卫：逻辑单测用桩 Juice（harness 已提供），真实浏览器走 juice.js
  var J = (typeof Juice !== 'undefined') ? Juice : null;

  // ---- 局部 PRNG（mulberry32）---- 所有随机只走它，绝不用裸 Math.random
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  var _rng = mk(0x9e3779b9);
  function setRand(fn){ if (typeof fn === 'function') _rng = fn; }

  var stage = document.getElementById('stage');
  var canvas = document.createElement('canvas');
  stage.appendChild(canvas);
  var ctx = canvas.getContext('2d');

  var distEl = document.getElementById('distEl');
  var bestEl = document.getElementById('bestEl');
  var spdEl  = document.getElementById('spdEl');
  var buffEl = document.getElementById('buff');
  var overlay = document.getElementById('overlay');
  var ovTitle = document.getElementById('ovTitle');
  var ovText  = document.getElementById('ovText');
  var startBtn= document.getElementById('startBtn');
  var jbtn    = document.getElementById('jbtn');

  var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) document.body.classList.add('touch');

  var W = 0, H = 0, DPR = 1;
  var GROUND_Y = 0;
  var groundH = 90;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth || 800;
    H = window.innerHeight || 600;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    GROUND_Y = H - groundH;
  }
  window.addEventListener('resize', resize);
  resize();

  // ===== 道具参数（标准样板 §4：orb/boost/shield）=====
  var ORB_BONUS = 25;    // 能量球给的距离奖励
  var BOOST_DUR = 300;   // 加速增益持续帧数（约 5s @60fps），期间距离计分 ×2
  var HIT_INVULN = 24;   // 护盾抵挡后短暂无敌，避免被同一障碍连续判定

  // ===== game state =====
  var state = 'menu';    // menu | play | over
  var best = 0;
  try { best = parseInt(localStorage.getItem('gd_best') || '0', 10) || 0; } catch(e){ best = 0; }
  bestEl.textContent = best;

  var player, obstacles, particles, pickups;
  var speed, baseSpeed, distance, score, spawnTimer, spawnGap, frame, scroll, bgScroll, farScroll, lastTime;
  var pickTimer, boostTimer;

  function reset(){
    player = { x: 120, y: GROUND_Y, w: 30, h: 30, vy: 0, onGround: true, jumps: 0,
               shield: 0, invuln: 0 };
    obstacles = [];
    particles = [];
    pickups = [];
    speed = 4.5;
    baseSpeed = 4.5;
    distance = 0;
    score = 0;
    boostTimer = 0;          // 加速增益计时
    spawnTimer = 0;
    spawnGap = 70;
    pickTimer = 90;          // 首枚道具刷新前的帧数
    frame = 0;
    scroll = 0;
    bgScroll = 0;
    farScroll = 0;
    lastTime = 0;
  }

  var GRAV = 0.72;
  var JUMP_V = -12.4;

  function jump(){
    if (state !== 'play') return;
    if (player.jumps < 2){
      player.vy = JUMP_V;
      player.onGround = false;
      player.jumps++;
      if (J) J.sfx('shoot');
      spawnParticles(player.x + player.w/2, GROUND_Y, 5, false);
    }
  }

  function spawnObstacle(){
    var r = _rng();
    var ob;
    if (r < 0.55){
      // 尖刺（地面三角）
      ob = { type: 'spike', x: W + 30, w: 26, h: 30, y: GROUND_Y - 30 };
    } else if (r < 0.85){
      // 方块（需跳过）
      var bh = 40 + _rng() * 50;
      ob = { type: 'block', x: W + 30, w: 28 + _rng() * 14, h: bh, y: GROUND_Y - bh };
    } else {
      // 高墙（需二段跳）
      var hh = 60 + _rng() * 40;
      ob = { type: 'wall', x: W + 30, w: 26, h: hh, y: GROUND_Y - hh };
    }
    obstacles.push(ob);
  }

  function spawnParticles(x, y, n, up){
    for (var i = 0; i < n; i++){
      particles.push({
        x: x, y: y,
        vx: (_rng() - 0.5) * 3,
        vy: up ? -_rng() * 4 - 1 : (_rng() - 0.5) * 3,
        life: 18 + _rng() * 14,
        col: _rng() < 0.5 ? '#3aa0ff' : '#f0b90b'
      });
    }
  }

  // ===== 道具：🟢能量球(加分) / 🚀加速(计分×2) / 🛡护盾(免一次撞击) =====
  function makePickup(type, x, y){
    var sym = { orb: '🟢', boost: '🚀', shield: '🛡' }[type] || '★';
    var col = { orb: '#02c076', boost: '#f0b90b', shield: '#3aa0ff' }[type] || '#ffffff';
    return { type: type, x: x, y: y, r: 11, sym: sym, col: col, bob: _rng() * Math.PI * 2, life: 12 };
  }

  function spawnPickup(type, x, y){
    if (!type){
      var rr = _rng();
      type = rr < 0.5 ? 'orb' : (rr < 0.75 ? 'boost' : 'shield');
    }
    var px = (x === undefined) ? (W + 24) : x;
    var py = (y === undefined) ? (GROUND_Y - 60 - _rng() * 70) : y;
    pickups.push(makePickup(type, px, py));
  }

  function applyPickup(arg){
    var type = (typeof arg === 'object' && arg) ? arg.type : arg;
    if (type === 'orb'){
      distance += ORB_BONUS;          // 距离奖励（拾取增益，不动基础计分公式）
      score += ORB_BONUS;
      if (J){ J.sfx('pickup'); J.popup(player.x, player.y - player.h - 22, '+能量', '#02c076'); J.burst(player.x, player.y - player.h, { color: '#02c076', n: 8, speed: 120 }); }
    } else if (type === 'boost'){
      boostTimer = BOOST_DUR;
      if (J){ J.sfx('pickup'); J.popup(player.x, player.y - player.h - 22, '🚀 加速', '#f0b90b'); J.burst(player.x, player.y - player.h, { color: '#f0b90b', n: 10, speed: 140 }); }
    } else if (type === 'shield'){
      player.shield = (player.shield || 0) + 1;
      if (J){ J.sfx('pickup'); J.popup(player.x, player.y - player.h - 22, '🛡 护盾', '#3aa0ff'); J.burst(player.x, player.y - player.h, { color: '#3aa0ff', n: 10, speed: 120 }); }
    }
  }

  // 道具随场景向左滚（与障碍同一滚动速度），玩家 AABB 碰撞拾取（可被 stepPickups 独立驱动）
  function updatePickups(dt){
    var rx = player.x, ry = player.y - player.h, rw = player.w, rh = player.h;
    for (var i = pickups.length - 1; i >= 0; i--){
      var p = pickups[i];
      p.x -= speed * dt;            // 随场景滚动
      p.bob += 0.12 * dt;
      p.life -= dt;
      if (p.life <= 0 || p.x + p.r < -20){ pickups.splice(i, 1); continue; }
      var pbx = p.x - p.r, pby = p.y - p.r, pbw = p.r * 2, pbh = p.r * 2;
      if (rx < pbx + pbw && rx + rw > pbx && ry < pby + pbh && ry + rh > pby){
        applyPickup(p);
        pickups.splice(i, 1);
        continue;
      }
    }
  }

  // 碰撞检测（核心玩法，不改）：玩家方块 vs 障碍方块
  function hitTest(){
    var rx = player.x, ry = player.y - player.h, rw = player.w, rh = player.h;
    for (var i = 0; i < obstacles.length; i++){
      var o = obstacles[i];
      var ox = o.x, oy = o.y, ow = o.w, oh = o.h;
      if (rx < ox + ow && rx + rw > ox && ry < oy + oh && ry + rh > oy){
        return true;
      }
    }
    return false;
  }

  function update(dt){
    frame++;
    // 难度爬升：速度随距离增长；生成间隔收紧（核心玩法，不动）
    speed = baseSpeed + Math.min(7.5, distance / 480);
    var diff = distance / 480;
    spawnGap = Math.max(34, 78 - diff * 30);

    scroll += speed;
    bgScroll += speed * 0.35;
    farScroll += speed * 0.12;
    distance += speed * 0.1;        // 基础计分（距离）—— 不动
    score += speed * 0.1;

    // 拾取增益：加速期间距离计分 ×2（在基础计分之外叠加，不改基础公式）
    if (boostTimer > 0){
      distance += speed * 0.1;
      score += speed * 0.1;
      boostTimer -= dt;
      if (boostTimer < 0) boostTimer = 0;
    }

    // 玩家物理（核心玩法，不动）
    player.vy += GRAV;
    player.y += player.vy;
    if (player.y >= GROUND_Y){
      player.y = GROUND_Y;
      player.vy = 0;
      if (!player.onGround) spawnParticles(player.x + player.w/2, GROUND_Y, 4, false);
      player.onGround = true;
      player.jumps = 0;
    }

    // 生成障碍
    spawnTimer++;
    if (spawnTimer >= spawnGap){
      spawnTimer = 0;
      spawnObstacle();
    }

    // 移动障碍
    for (var i = obstacles.length - 1; i >= 0; i--){
      var o = obstacles[i];
      o.x -= speed;
      if (o.x + o.w < -40) obstacles.splice(i, 1);
    }

    // 粒子
    for (var p = particles.length - 1; p >= 0; p--){
      var pt = particles[p];
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life--;
      if (pt.life <= 0) particles.splice(p, 1);
    }

    // 道具刷新（按计时器随机掉落，走局部 PRNG）
    pickTimer -= dt;
    if (pickTimer <= 0){
      spawnPickup();
      pickTimer = 80 + Math.floor(_rng() * 90);
    }

    // 道具随场景滚动 + 碰撞拾取
    updatePickups(dt);

    // 护盾 / 失败判定：护盾优先消耗，无盾才判失败（注入式分支，不动核心碰撞）
    if (player.invuln > 0) player.invuln -= dt;
    if (player.invuln <= 0 && hitTest()){
      if (player.shield > 0){
        player.shield--;
        player.invuln = HIT_INVULN;
        if (J){
          J.sfx('hit');
          J.burst(player.x + player.w/2, player.y - player.h/2, { color: '#3aa0ff', n: 14, speed: 160 });
          J.addTrauma(0.3);
        }
      } else {
        gameOver();
      }
    }
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    if (J) J.begin(ctx);
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0b1019');
    g.addColorStop(1, '#070b12');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // 远层视差
    ctx.fillStyle = 'rgba(29,42,58,0.5)';
    var fs = farScroll % 60;
    for (var x = -fs; x < W; x += 60){
      var bh = 60 + ((x * 7) % 90);
      ctx.fillRect(x, GROUND_Y - bh * 0.4 - 20, 30, bh * 0.4 + 20);
    }
    // 中层视差
    ctx.fillStyle = 'rgba(40,54,72,0.45)';
    var bs = bgScroll % 44;
    for (var x2 = -bs; x2 < W; x2 += 44){
      ctx.fillRect(x2, GROUND_Y + 8, 24, 4);
    }

    // 地面
    ctx.fillStyle = '#101622';
    ctx.fillRect(0, GROUND_Y, W, groundH);
    ctx.strokeStyle = '#1d2a3a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();
    ctx.fillStyle = 'rgba(58,160,255,0.22)';
    var ds = scroll % 40;
    for (var x3 = -ds; x3 < W; x3 += 40){
      ctx.fillRect(x3, GROUND_Y + 2, 18, 2);
    }

    // 障碍
    for (var i = 0; i < obstacles.length; i++){
      var o = obstacles[i];
      ctx.fillStyle = '#f6465d';
      if (o.type === 'spike'){
        ctx.beginPath();
        ctx.moveTo(o.x, GROUND_Y);
        ctx.lineTo(o.x + o.w / 2, o.y);
        ctx.lineTo(o.x + o.w, GROUND_Y);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(o.x + o.w / 2 - 1, o.y, 2, o.h);
      } else {
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(o.x, o.y, o.w, 4);
        ctx.strokeStyle = '#ff8a96';
        ctx.lineWidth = 1;
        ctx.strokeRect(o.x + 0.5, o.y + 0.5, o.w - 1, o.h - 1);
      }
    }

    // 道具（在玩家前绘制：辉光圆 + emoji）
    for (var pk = 0; pk < pickups.length; pk++){
      var pp = pickups[pk];
      var by = pp.y + Math.sin(pp.bob) * 3;
      ctx.beginPath(); ctx.arc(pp.x, by, pp.r + 4, 0, Math.PI * 2);
      ctx.fillStyle = pp.col; ctx.globalAlpha = 0.18; ctx.fill(); ctx.globalAlpha = 1;
      ctx.strokeStyle = pp.col; ctx.lineWidth = 2;
      ctx.shadowColor = pp.col; ctx.shadowBlur = 12; ctx.stroke(); ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 15px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(pp.sym, pp.x, by + 1);
    }
    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';

    // 粒子
    for (var p = 0; p < particles.length; p++){
      var pt = particles[p];
      ctx.globalAlpha = Math.max(0, pt.life / 30);
      ctx.fillStyle = pt.col;
      ctx.fillRect(pt.x, pt.y, 3, 3);
    }
    ctx.globalAlpha = 1;

    drawPlayer();

    ctx.fillStyle = 'rgba(107,119,133,0.6)';
    ctx.font = '12px monospace';
    ctx.fillText('AUTO-RUN', 16, GROUND_Y - 60);
    if (J){ J.mid(ctx); J.end(ctx); }
  }

  function drawPlayer(){
    var rx = player.x, ry = player.y - player.h, rw = player.w, rh = player.h;
    // 身体（方块，几何风格高光描边）
    ctx.fillStyle = boostTimer > 0 ? '#f0b90b' : '#02c076';
    ctx.fillRect(rx, ry, rw, rh);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(rx + 4, ry + 4, rw - 8, 6);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(rx + 0.5, ry + 0.5, rw - 1, rh - 1);
    // 朝向眼
    ctx.fillStyle = '#070b12';
    ctx.fillRect(rx + rw - 9, ry + 8, 4, 4);

    // 护盾环（绘制层，不动玩法）
    if (player.shield > 0){
      ctx.strokeStyle = 'rgba(58,160,255,0.85)';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#3aa0ff'; ctx.shadowBlur = 10;
      ctx.strokeRect(rx - 4, ry - 4, rw + 8, rh + 8);
      ctx.shadowBlur = 0;
    }
  }

  function renderBuff(){
    if (!buffEl) return;
    var html = '';
    if (player && player.shield > 0) html += '<span class="badge shield">🛡 ×' + player.shield + '</span>';
    if (boostTimer > 0) html += '<span class="badge boost">🚀 ' + Math.ceil(boostTimer / 60) + 's</span>';
    buffEl.innerHTML = html;
  }

  var loopPrevT = 0;
  function loop(ts){
    var fdt = loopPrevT ? Math.min(0.05, (ts - loopPrevT) / 1000) : 0.016;
    loopPrevT = ts;
    if (J) J.update(fdt);
    if (typeof Input !== 'undefined'){
      if (Input.pressed('a') || Input.pressed('up')) onAction();
      Input.update();
    }
    if (state === 'play'){
      if (!lastTime) lastTime = ts;
      var dt = (ts - lastTime) / 16.6667;
      lastTime = ts;
      if (dt > 3) dt = 3;
      update(dt);
    }
    draw();
    distEl.textContent = Math.floor(distance);
    spdEl.textContent = (boostTimer > 0 ? (speed / baseSpeed * 2).toFixed(1) : (speed / baseSpeed).toFixed(1)) + 'x';
    renderBuff();
    requestAnimationFrame(loop);
  }

  function startGame(){
    reset();
    state = 'play';
    overlay.style.display = 'none';
    lastTime = 0;
  }

  function gameOver(){
    state = 'over';
    spawnParticles(player.x + player.w/2, player.y - player.h/2, 22, true);
    if (J){ J.sfx('lose'); J.addTrauma(0.6); J.flash('#f6465d', 0.4); }
    draw();
    var d = Math.floor(distance);
    var nb = false;
    if (d > best){
      best = d; nb = true;
      try { localStorage.setItem('gd_best', String(best)); } catch(e){}
    }
    bestEl.textContent = best;
    ovTitle.textContent = 'GAME OVER // 撞毁';
    ovTitle.style.color = '#f6465d';
    ovText.innerHTML = '本次距离 <b style="color:#f0b90b">' + d + '</b>' +
      (nb ? ' · <b style="color:#02c076">新纪录!</b>' : '') +
      '<br>最佳 ' + best + '<br>再来一局？';
    startBtn.textContent = '新局 / RETRY';
    overlay.style.display = 'flex';
    if (J){ var rk = J.rank(d); if (d > 0 && nb) J.achievement('🏆 新纪录 ' + d + '！段位 ' + rk); }
  }

  function onAction(e){
    if (state === 'menu' || state === 'over'){
      startGame();
    } else if (state === 'play'){
      jump();
    }
    if (e && e.preventDefault) e.preventDefault();
  }

  if (typeof Input !== 'undefined'){ Input.init(); }

  window.addEventListener('keydown', function(e){
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === 'w' || e.key === 'W'){
      e.preventDefault(); onAction(e);
    }
  });
  stage.addEventListener('pointerdown', function(e){ onAction(e); });
  jbtn.addEventListener('pointerdown', function(e){ e.preventDefault(); onAction(e); });
  startBtn.addEventListener('click', function(e){ e.stopPropagation(); startGame(); });

  // ===== 测试钩子（不影响正常玩法）=====
  window.__t = {
    GROUND_Y: function(){ return GROUND_Y; },
    reset: reset,
    update: update,
    hitTest: hitTest,
    startGame: startGame,
    setRand: setRand,
    // ---- 道具系统钩子（标准样板 §4）----
    spawnPickup: spawnPickup,          // (type, x, y)
    getPickups: function(){ return pickups.map(function(p){ return { type: p.type, x: p.x, y: p.y, r: p.r }; }); },
    applyPickup: applyPickup,          // (type | pickupObj)
    stepPickups: updatePickups,        // (dt)
    getShield: function(){ return player ? player.shield : 0; },
    setShield: function(v){ if (player) player.shield = v; },
    getBoost: function(){ return boostTimer; },
    setBoost: function(v){ boostTimer = v; },
    // ---- 辅助钩子（驱动碰撞/计分断言）----
    getDistance: function(){ return distance; },
    getScore: function(){ return score; },
    isGameOver: function(){ return state === 'over'; },
    getState: function(){
      return {
        distance: distance, over: state === 'over', speed: speed, boost: boostTimer,
        player: { x: player.x, y: player.y, w: player.w, h: player.h,
                  shield: player.shield, invuln: player.invuln, onGround: player.onGround }
      };
    },
    setObstacles: function(arr){ obstacles = arr; },
    spawnObstacle: spawnObstacle,
    jump: jump
  };

  reset();
  state = 'menu';
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
