<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 炸弹人</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .board{display:grid;gap:1px;justify-content:center;margin:6px auto;width:max-content;background:var(--border);padding:1px;border-radius:6px}
  .cell{width:26px;height:26px;background:#0e141d;display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1}
  .cell.block{background:#7a5230}
  .cell.wall{background:#3b4654}
  .cell.blast{background:var(--gold)}
  .cell.bomb{background:var(--red)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>炸弹人</b> BOMBERMAN</span></div>
  <div class="wrap">
    <div class="hud"><span>范围 · <span class="st" id="rg">2</span></span><span>状态 · <span class="st" id="st">布弹中</span></span><span id="buff"></span></div>
    <div class="board" id="board"></div>
    <div class="msg" id="msg">放置炸弹后十字爆破，炸毁可破坏砖块、击杀爆炸范围内的角色。规划走位用爆破清场。</div>
    <div class="controls">
      <button id="bomb">放弹 BOMB</button>
      <button id="boom" class="ghost">引爆 DETONATE</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
  </div>
  <div class="foot">Bomberman（炸弹人）：放置定时炸弹，爆炸沿十字方向波及，摧毁可破坏砖块并击杀范围内角色，利用爆破开路。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  let W,H, blocks, walls, bombs, players, range, pickups, score, shield, bombCap, fire, blastSet;
  function setup(w,h,blockList){
    W=w; H=h; blocks=new Set((blockList||[]).map(b=>b[0]+','+b[1])); walls=new Set(); bombs=[]; players=[]; range=2; pickups=[]; score=0;
    shield=0; bombCap=1; fire=0; blastSet=new Set();
  }
  function setRange(r){ range=r; }
  function setBomb(x,y){ if(bombs.length>=bombCap) return false; bombs.push({x,y}); return true; }
  function setPlayers(arr){ players=arr.map(p=>({x:p.x,y:p.y,dead:false})); }
  // ---- 注入式掉落道具系统（本地种子 PRNG，禁止 Math.random）----
  function mk(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const pickupRng = mk(0x1b873593);   // 复用游戏已有局部 PRNG，绝不裸 Math.random
  const PICKUP_SYM = { bombs:'💣', shield:'🛡', fire:'⚡', range:'💣', coin:'💰' };
  function makePickup(type,r,c){ return {type:type, r:r, c:c, life:8}; }
  function applyPickup(arg){
    var type, p=null;
    if(typeof arg==='string'){ type=arg; }
    else { p=arg; if(!p) return; type=p.type; }
    if(type==='range'){ range+=1; if(typeof Juice!=='undefined'&&Juice.popup) Juice.popup('💣 范围+'); }
    else if(type==='coin'){ score+=50; if(typeof Juice!=='undefined'&&Juice.popup) Juice.popup('💰 +50'); }
    else if(type==='bombs'){ bombCap+=1; if(typeof Juice!=='undefined'&&Juice.popup) Juice.popup('💣 弹容+1'); }
    else if(type==='shield'){ shield+=1; if(typeof Juice!=='undefined'&&Juice.popup) Juice.popup('🛡 护盾'); }
    else if(type==='fire'){ fire+=1; if(typeof Juice!=='undefined'&&Juice.popup) Juice.popup('⚡ 火力+1'); }
    if(p){ var idx=pickups.indexOf(p); if(idx>=0) pickups.splice(idx,1); }
  }
  // 玩家走到拾取格 → 生效并移除（注入分支，不影响核心玩法）
  function collectPickups(){
    for(var i=pickups.length-1;i>=0;i--){
      var p=pickups[i], got=false;
      for(var j=0;j<players.length;j++){ var pl=players[j]; if(pl.x===p.c && pl.y===p.r){ got=true; break; } }
      if(got){ applyPickup(p); }
    }
  }
  function updatePickups(dt){ collectPickups(); for(var i=pickups.length-1;i>=0;i--){ pickups[i].life-=dt; if(pickups[i].life<=0) pickups.splice(i,1); } }
  function inBlast(r,c){ return blastSet.has(r+','+c); }
  function explode(){
    blastSet=new Set();
    if(!bombs.length) return [];
    var cells=[];
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    var R=range+fire;   // 火力加成：爆炸范围 +fire（核心十字公式不变）
    for(var bi=0;bi<bombs.length;bi++){
      var bc=bombs[bi].x, br=bombs[bi].y;        // bombs.x=列, bombs.y=行（与 render 一致）
      if(!cells.some(function(c){return c[0]===br&&c[1]===bc;})) cells.push([br,bc]);
      for(var d=0;d<dirs.length;d++){
        var dr=dirs[d][0], dc=dirs[d][1];
        for(var i=1;i<=R;i++){
          var r=br+dr*i, c=bc+dc*i;
          if(r<0||c<0||r>=H||c>=W) break;
          cells.push([r,c]);
          if(blocks.has(r+','+c)){
            blocks.delete(r+','+c);
            if(pickupRng()<0.6){
              var types=['range','coin','bombs','shield','fire'];
              pickups.push(makePickup(types[Math.floor(pickupRng()*types.length)%types.length], r, c));
            }
            break;
          }
        }
      }
    }
    blastSet=new Set(cells.map(function(c){return c[0]+','+c[1];}));
    // 击杀：护盾优先消耗，无盾才判死（注入分支，核心爆破判定不变）
    for(var k=0;k<players.length;k++){
      var p=players[k];
      if(cells.some(function(c){return c[0]===p.y&&c[1]===p.x;})){
        if(shield>0){ shield--; }
        else { p.dead=true; }
      }
    }
    if(typeof Juice!=='undefined'){ if(Juice.sfx) Juice.sfx('boom'); if(Juice.addTrauma) Juice.addTrauma(.4); }
    bombs.length=0;
    return cells;
  }
  function getBlast(){ return Array.from(blastSet).map(function(s){return s.split(',').map(Number);}); }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    var bd=$('board'); if(bd){ bd.style.gridTemplateColumns='repeat('+W+',26px)'; bd.innerHTML=''; for(var r=0;r<H;r++){ for(var c=0;c<W;c++){ var d=document.createElement('div'); var cls='cell'; var k=r+','+c; if(walls.has(k))cls+=' wall'; else if(blocks.has(k))cls+=' block'; if(bombs.some(function(b){return b.x===c&&b.y===r;}))cls+=' bomb'; if(blastSet.has(k))cls+=' blast'; var d1=d; d1.className=cls;
      var pk=pickups.find(function(q){return q.r===r&&q.c===c;});
      // 玩家前画掉落物（辉光圆 + emoji）——只改绘制层
      if(pk){ d.textContent = PICKUP_SYM[pk.type]||'★'; d.style.color='#fff'; d.style.textShadow='0 0 8px rgba(255,207,90,.95)'; d.style.background='rgba(255,207,90,.14)'; d.style.borderRadius='50%'; }
      var pl=players.find(function(q){return q.x===c&&q.y===r;});
      if(pl){ d.textContent = pl.dead?'💀':'🧨'; if(shield>0){ d.style.boxShadow='inset 0 0 0 2px #5ab4ff, 0 0 9px #5ab4ff'; d.style.borderRadius='50%'; } }
      bd.appendChild(d); } } }
    var rg=$('rg'),st=$('st'),bf=$('buff');
    if(rg)rg.textContent=range+fire;
    if(st)st.textContent=bombs.length?'已布弹':'布弹中';
    if(bf){ var s=''; if(score>0)s+='💰'+score+' '; s+='💣x'+(range+fire)+' '; if(bombCap>1)s+='🧨x'+bombCap+' '; if(shield>0)s+='🛡'+shield+' '; bf.textContent=s; }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    var bb=$('bomb'),bm=$('boom'),nb=$('new');
    if(bb) bb.onclick=function(){ setBomb(2,2); render(); };
    if(bm) bm.onclick=function(){ explode(); render(); };
    if(nb) nb.onclick=function(){ setup(8,8,[]); render(); };
  }
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){ setup(8,8,[]); render(); }); else { setup(8,8,[]); render(); } }
  if(typeof window!=='undefined'){ window.__t={ setup, setRange, setBomb, setPlayers, explode, getBlast, inBlast,
    getState(){ return {range:range, fire:fire, score:score, pickups:pickups.length, shield:shield, bombCap:bombCap}; },
    // ---- 掉落道具系统钩子 ----
    spawnPickup(type,r,c){ pickups.push(makePickup(type||'coin', r, c)); },
    stepPickups(dt){ updatePickups(dt); },
    applyPickup(arg){ applyPickup(arg); },
    collectPickups(){ collectPickups(); },
    getPickups(){ return pickups.length; },
    getPickup(i){ return pickups[i]; },
    getScore(){ return score; },
    getRange(){ return range; },
    getFire(){ return fire; },
    setFire(v){ fire=v; },
    getShield(){ return shield; },
    setShield(v){ shield=v; },
    getBombs(){ return bombCap; },
    setBombs(v){ bombCap=v; },
    getBombCount(){ return bombs.length; },
    getPlayers(){ return players.map(function(p){return {x:p.x,y:p.y,dead:p.dead};}); }
  }; }
})();
</script>
</body>
</html>
