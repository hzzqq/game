<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 中国象棋 XIANGQI</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(240,185,11,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--gold)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--green);font-weight:700}
  .hud .st.b{color:var(--red)}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px;cursor:pointer}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--gold);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .msg.check{color:var(--red);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>中国象棋</b> XIANGQI</span></div>
  <div class="wrap">
    <div class="hud"><span>回合 · <span class="st" id="turn">红方</span></span><span id="status">点击棋子选中，再点目标格落子</span></div>
    <div class="boardwrap"><canvas id="board" width="420" height="468"></canvas></div>
    <div class="controls">
      <button id="new">新局 NEW</button>
      <button id="reset" class="ghost">重置 RESET</button>
    </div>
    <div class="msg" id="msg">红先。将死对方主帅即胜。</div>
  </div>
  <div class="foot">Xiangqi（中国象棋）：9×10 棋盘，含飞将、蹩马腿、塞象眼、炮架等完整规则。落子后若令己方主帅被将或将面对脸，则该着非法。</div>

<script src="juice.js"></script>
<script src="input.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice !== 'undefined') ? Juice : null;
  // 局部 PRNG（mulberry32）—— 生成一律走这里，绝不用 Math.random
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x9e3779b9);
  function setRand(fn){ if(typeof fn==='function') _rng=fn; }

  const COLS = 9, ROWS = 10;
  let board;        // ROWS×COLS，元素 null 或 {t,s}
  let turn = 'r';   // 'r' 红先
  let sel = null;   // 选中格 [r,c]（仅 UI）
  let over = null;  // 胜利方 'r'/'b'/null
  let confettiFired = false;

  const SYM = {
    r: { k:'帅', a:'仕', e:'相', h:'馬', r:'車', c:'炮', p:'兵' },
    b: { k:'将', a:'士', e:'象', h:'馬', r:'車', c:'砲', p:'卒' }
  };

  function inside(r,c){ return r>=0 && r<ROWS && c>=0 && c<COLS; }
  function inPalace(s,r,c){
    if(c<3 || c>5) return false;
    if(s==='r') return r>=7 && r<=9;
    return r>=0 && r<=2;
  }
  function clone(b){ return b.map(row=>row.map(p=> p? {t:p.t,s:p.s} : null)); }
  function other(s){ return s==='r' ? 'b' : 'r'; }

  function initialBoard(){
    const b = Array.from({length:ROWS},()=>new Array(COLS).fill(null));
    const back = ['r','h','e','a','k','a','e','h','r'];
    for(let c=0;c<COLS;c++){ b[0][c]={t:back[c],s:'b'}; b[9][c]={t:back[c],s:'r'}; }
    // 炮
    b[2][1]={t:'c',s:'b'}; b[2][7]={t:'c',s:'b'};
    b[7][1]={t:'c',s:'r'}; b[7][7]={t:'c',s:'r'};
    // 兵/卒
    for(const c of [0,2,4,6,8]){ b[3][c]={t:'p',s:'b'}; b[6][c]={t:'p',s:'r'}; }
    return b;
  }

  // 伪合法走法（忽略己方被将 / 飞将，含主帅飞将吃子）
  function rawTargets(b, r, c){
    const p = b[r][c]; if(!p) return [];
    const s = p.s, t = p.t, res = [];
    const add = (nr,nc)=>{ if(!inside(nr,nc)) return; const q=b[nr][nc]; if(!q) res.push([nr,nc]); else if(q.s!==s) res.push([nr,nc]); };
    if(t==='k'){
      for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const nr=r+dr, nc=c+dc;
        if(inPalace(s,nr,nc)) add(nr,nc);
      }
      // 飞将：同列且中间无子 → 可吃敌帅
      let fk=null;
      for(let rr=0;rr<ROWS;rr++){ const q=b[rr][c]; if(q && q.t==='k' && q.s!==s){ fk=[rr,c]; break; } }
      if(fk){
        let clear=true; const lo=Math.min(r,fk[0]), hi=Math.max(r,fk[0]);
        for(let rr=lo+1;rr<hi;rr++) if(b[rr][c]){ clear=false; break; }
        if(clear) res.push([fk[0],fk[1]]);
      }
    } else if(t==='a'){
      for(const [dr,dc] of [[1,1],[1,-1],[-1,1],[-1,-1]]){
        const nr=r+dr, nc=c+dc;
        if(inPalace(s,nr,nc)) add(nr,nc);
      }
    } else if(t==='e'){
      for(const [dr,dc] of [[2,2],[2,-2],[-2,2],[-2,-2]]){
        const nr=r+dr, nc=c+dc;
        if(!inside(nr,nc)) continue;
        if(s==='r' && nr<5) continue;   // 相不过河
        if(s==='b' && nr>4) continue;   // 象不过河
        const er=(r+nr)/2, ec=(c+nc)/2;
        if(b[er][ec]) continue;         // 塞象眼
        add(nr,nc);
      }
    } else if(t==='h'){
      const cand=[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]];
      for(const [dr,dc] of cand){
        const nr=r+dr, nc=c+dc;
        if(!inside(nr,nc)) continue;
        let lr,lc;
        if(Math.abs(dr)===2){ lr=r+dr/2; lc=c; } else { lr=r; lc=c+dc/2; }
        if(b[lr][lc]) continue;         // 蹩马腿
        add(nr,nc);
      }
    } else if(t==='r'){
      for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
        let nr=r+dr, nc=c+dc;
        while(inside(nr,nc)){
          const q=b[nr][nc];
          if(!q){ res.push([nr,nc]); }
          else { if(q.s!==s) res.push([nr,nc]); break; }
          nr+=dr; nc+=dc;
        }
      }
    } else if(t==='c'){
      for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
        let nr=r+dr, nc=c+dc, jumped=false;
        while(inside(nr,nc)){
          const q=b[nr][nc];
          if(!jumped){
            if(!q){ res.push([nr,nc]); }
            else { jumped=true; }
          } else {
            if(q){ if(q.s!==s) res.push([nr,nc]); break; }
          }
          nr+=dr; nc+=dc;
        }
      }
    } else if(t==='p'){
      const fwd = (s==='r') ? -1 : 1;
      const crossed = (s==='r') ? r<=4 : r>=5;
      add(r+fwd, c);
      if(crossed){ add(r, c-1); add(r, c+1); }
    }
    return res;
  }

  function facingKings(b){
    let k1=null, k2=null;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const q=b[r][c]; if(q && q.t==='k'){ if(!k1) k1=[r,c,q.s]; else k2=[r,c,q.s]; }
    }
    if(!k1 || !k2) return false;
    if(k1[1]!==k2[1]) return false;
    const c=k1[1], lo=Math.min(k1[0],k2[0]), hi=Math.max(k1[0],k2[0]);
    for(let r=lo+1;r<hi;r++) if(b[r][c]) return false;
    return true;
  }

  // side 的主帅是否被将
  function inCheck(b, side){
    let kr=-1, kc=-1;
    for(let r=0;r<ROWS && kr<0;r++) for(let c=0;c<COLS;c++){
      const q=b[r][c]; if(q && q.t==='k' && q.s===side){ kr=r; kc=c; break; }
    }
    if(kr<0) return false; // 主帅已被吃
    const enemy = other(side);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const q=b[r][c];
      if(q && q.s===enemy){
        const tg = rawTargets(b,r,c);
        for(const [tr,tc] of tg) if(tr===kr && tc===kc) return true;
      }
    }
    return false;
  }

  function legalMoves(from){
    const [fr,fc]=from; const p=board[fr][fc]; if(!p) return [];
    const side=p.s;
    const raw = rawTargets(board, fr, fc);
    const res=[];
    for(const [tr,tc] of raw){
      const nb = clone(board);
      nb[tr][tc] = p; nb[fr][fc] = null;
      if(facingKings(nb)) continue;     // 飞将非法
      if(inCheck(nb, side)) continue;   // 不可送将
      res.push([tr,tc]);
    }
    return res;
  }

  function move(from, to){
    const [fr,fc]=from, [tr,tc]=to;
    const p=board[fr][fc]; if(!p) return false;
    const lm = legalMoves(from);
    if(!lm.some(([r,c])=> r===tr && c===tc)) return false;
    board[tr][tc] = p; board[fr][fc] = null;
    turn = other(turn);
    over = isWin(other(turn)) ? other(turn) : null;
    if(over && J) J.sfx('levelup');
    return true;
  }

  function newGame(seed){
    if(typeof seed==='number') _rng = mk(seed>>>0);
    board = initialBoard();
    turn = 'r';
    sel = null; over = null;
    return getState();
  }
  function reset(){ return newGame(); }

  // 测试/调试：直接载入自定义局面
  function setup(b, t){
    board = clone(b);
    if(t==='r'||t==='b') turn=t;
    sel=null; over=null;
    return getState();
  }

  function getState(){
    return { board: clone(board), turn: turn, cols: COLS, rows: ROWS, over: over };
  }
  function isWin(side){
    // side 获胜 = 对方无合法走法（将死或困毙）
    const opp = other(side);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const q=board[r][c];
      if(q && q.s===opp && legalMoves([r,c]).length>0) return false;
    }
    return true;
  }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  const PAD = 30; let cell = 44;
  function layout(){
    if(typeof window==='undefined') return;
    const size = Math.max(280, Math.min((window.innerWidth||800)-32, 460));
    cell = Math.floor((size - 2*PAD)/(COLS-1));
    const cv=$('board'); if(cv){ cv.width=(COLS-1)*cell+2*PAD; cv.height=(ROWS-1)*cell+2*PAD; }
  }
  function render(){
    if(typeof document==='undefined') return;
    const cv=$('board'); if(!cv) return;
    const ctx=cv.getContext('2d');
    const Wd=cv.width, Hd=cv.height;
    ctx.clearRect(0,0,Wd,Hd);
    // 网格
    ctx.strokeStyle='#2a3a4d'; ctx.lineWidth=1;
    for(let r=0;r<ROWS;r++){ ctx.beginPath(); ctx.moveTo(PAD,r*cell+PAD); ctx.lineTo(PAD+(COLS-1)*cell, r*cell+PAD); ctx.stroke(); }
    for(let c=0;c<COLS;c++){ ctx.beginPath(); ctx.moveTo(c*cell+PAD, PAD); ctx.lineTo(c*cell+PAD, PAD+(ROWS-1)*cell); ctx.stroke(); }
    // 楚河汉界
    ctx.fillStyle='#6b7785'; ctx.font='14px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('楚 河', PAD+2*cell, PAD+4*cell+cell/2);
    ctx.fillText('漢 界', PAD+6*cell, PAD+4*cell+cell/2);
    // 九宫斜线
    ctx.strokeStyle='#2a3a4d';
    for(const s of ['b','r']){
      const r0 = (s==='b')?0:7, r1=(s==='b')?2:9;
      ctx.beginPath(); ctx.moveTo(PAD+3*cell, PAD+r0*cell); ctx.lineTo(PAD+5*cell, PAD+r1*cell); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(PAD+5*cell, PAD+r0*cell); ctx.lineTo(PAD+3*cell, PAD+r1*cell); ctx.stroke();
    }
    // 棋子
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const p=board[r][c]; if(!p) continue;
      const x=PAD+c*cell, y=PAD+r*cell;
      ctx.beginPath(); ctx.arc(x,y,cell*0.42,0,Math.PI*2);
      ctx.fillStyle = (p.s==='r') ? '#2a1418' : '#101a16';
      ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle = (p.s==='r') ? '#f6465d' : '#02c076'; ctx.stroke();
      ctx.fillStyle = (p.s==='r') ? '#f6465d' : '#02c076';
      ctx.font='bold '+Math.floor(cell*0.5)+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(SYM[p.s][p.t], x, y+1);
    }
    // 选中高亮
    if(sel){ const x=PAD+sel[1]*cell, y=PAD+sel[0]*cell; ctx.strokeStyle='#f0b90b'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(x,y,cell*0.46,0,Math.PI*2); ctx.stroke(); }
    const tn=$('turn'); if(tn){ tn.textContent = (turn==='r')?'红方':'黑方'; tn.className='st'+(turn==='b'? ' b':''); }
    const stt=$('status'); if(stt) stt.textContent = over? '对局结束' : '点击棋子选中，再点目标格落子';
    const msg=$('msg');
    if(msg){
      if(over){ msg.className='msg win'; msg.textContent = (over==='r'?'红方':'黑方')+'胜！'; if(!confettiFired){ confettiFired=true; if(J&&J.confetti) J.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); } }
      else if(inCheck(board, turn)){ msg.className='msg check'; msg.textContent='将军！'+((turn==='r')?'红方':'黑方')+'被将。'; confettiFired=false; }
      else { msg.className='msg'; confettiFired=false; }
    }
  }
  function hit(mx,my){
    const c=Math.round((mx-PAD)/cell), r=Math.round((my-PAD)/cell);
    if(r<0||r>=ROWS||c<0||c>=COLS) return null;
    const dx=(mx-PAD)/cell-c, dy=(my-PAD)/cell-r;
    if(Math.abs(dx)<=0.45 && Math.abs(dy)<=0.45) return [r,c];
    return null;
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const cv=$('board'), nb=$('new'), rb=$('reset');
    if(cv) cv.addEventListener('click', e=>{
      const rect=cv.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(cv.width/rect.width);
      const my=(e.clientY-rect.top)*(cv.height/rect.height);
      const k=hit(mx,my); if(!k) return;
      const [r,c]=k; const p=board[r][c];
      if(sel){
        if(move(sel,k)){ sel=null; render(); }
        else if(p && p.s===turn){ sel=k; render(); }
        else { sel=null; render(); }
      } else if(p && p.s===turn){ sel=k; render(); }
    });
    if(nb) nb.onclick=()=>{ newGame(); layout(); render(); };
    if(rb) rb.onclick=()=>{ reset(); layout(); render(); };
  }
  newGame();
  layout();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ bindUI(); render(); });
    else { bindUI(); render(); }
  }
  if(typeof window!=='undefined'){
    window.__t = {
      setRand, newGame, reset, setup, getState, legalMoves, move,
      inCheck: function(side){ return inCheck(board, side); },
      isWin,
      rawTargets: function(b,r,c){ return rawTargets(b,r,c); },
      facingKings: function(b){ return facingKings(b); },
      COLS, ROWS
    };
  }
})();
</script>
</body>
</html>
