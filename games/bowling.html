<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 保龄球</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(480px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(480px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .frames{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;margin:6px 0}
  .frame{width:34px;height:34px;border:1px solid var(--border);border-radius:4px;background:#0e141d;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold)}
  .scores{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
  .score{width:34px;text-align:center;font-size:13px;color:var(--text)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .controls{display:flex;gap:8px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .controls input{width:70px;background:#0e141d;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-family:inherit;text-align:center}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .foot{width:min(480px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>保龄球</b> BOWLING</span></div>
  <div class="wrap">
    <div class="hud"><span>总分 · <span class="st" id="tot">0</span></span><span>第 · <span class="st" id="fr">1</span> 格</span></div>
    <div class="frames" id="frames"></div>
    <div class="scores" id="scores"></div>
    <div class="msg" id="msg">每格投两球，全中(Strike)与补中(Spare)有奖励分。输入击倒瓶数投球，凑满 10 格算总分。</div>
    <div class="controls">
      <input id="pins" placeholder="瓶数" />
      <button id="roll">投球 ROLL</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
  </div>
  <div class="foot">Bowling（保龄球）：标准十瓶制计分。全中加下两球、补中加下一球作为奖励分，满 10 格后结算总分（满分 300）。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  let rolls, frame, standing, ballInFrame;
  function reset(){ rolls=[]; frame=0; standing=10; ballInFrame=0; }
  function setRolls(arr){ rolls=arr.slice(); }
  function roll(pins){
    pins=Math.max(0,Math.min(10,pins));
    rolls.push(pins);
  }
  function score(){
    let total=0, i=0;
    for(let f=0;f<10;f++){
      if(i>=rolls.length) break;
      if(rolls[i]===10){ total+=10+(rolls[i+1]||0)+(rolls[i+2]||0); i+=1; }
      else if((rolls[i]+rolls[i+1])===10 && rolls[i+1]!==undefined){ total+=10+(rolls[i+2]||0); i+=2; }
      else { total+=(rolls[i]||0)+(rolls[i+1]||0); i+=2; }
    }
    return total;
  }
  function isPerfect(){ return score()===300; }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const fr=$('frames'),sc=$('scores'),tot=$('tot');
    if(fr){ fr.innerHTML=''; sc.innerHTML=''; for(let f=0;f<10;f++){ const d=document.createElement('div'); d.className='frame'; d.textContent=(rolls[f*2]!==undefined)?(rolls[f*2]+(rolls[f*2+1]!==undefined?','+rolls[f*2+1]:'')):''; fr.appendChild(d); const s=document.createElement('div'); s.className='score'; s.textContent=''; sc.appendChild(s); } }
    if(tot)tot.textContent=score();
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const rb=$('roll'),nb=$('new'),pi=$('pins');
    if(rb) rb.onclick=()=>{ roll(+pi.value||0); render(); };
    if(nb) nb.onclick=()=>{ reset(); render(); };
  }
  reset();
  if(typeof document!=='undefined'){ bindUI(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',render); else render(); }
  if(typeof window!=='undefined'){ window.__t={ reset, setRolls, roll, score, isPerfect }; }
})();
</script>
</body>
</html>
