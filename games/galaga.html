<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 加拉加 俯冲突战机</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(2,192,118,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--green)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .sc{color:var(--gold);font-weight:700}.hud .lv{color:var(--green);font-weight:700}.hud .en{color:var(--red);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:10px}
  canvas{background:#0a0e14;border-radius:8px;display:block;touch-action:none}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--green);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .msg.over{color:var(--red);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>加拉加</b> GALAGA</span></div>
  <div class="wrap">
    <div class="hud"><span>得分 <span class="sc" id="score">0</span></span><span>敌机 <span class="en" id="enemies">0</span></span><span>命 <span class="lv" id="lives">3</span></span></div>
    <div class="boardwrap"><canvas id="cv"></canvas></div>
    <div class="controls">
      <button id="left">◀ 左 (←/A)</button>
      <button id="fire">开火 (空格/↑)</button>
      <button id="right">右 (→/D) ▶</button>
    </div>
    <div class="msg" id="msg">左右移动飞船，空格开火。击落全部敌机获胜；命数归零结束。</div>
  </div>
  <div class="foot">Galaga 俯冲突战机：底部飞船左右移动 + 射击，上方敌机编队并周期性俯冲反击。清空编队胜利，3 命耗尽结束。</div>

<script src="juice.js"></script>
<script src="input.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;

  // 坐标只用 window.innerWidth / window.innerHeight，绝不裸写 innerWidth
  const W = (typeof window!=='undefined' && window.innerWidth) ? Math.min(window.innerWidth, 800) : 800;
  const H = (typeof window!=='undefined' && window.innerHeight) ? Math.min(window.innerHeight, 600) : 600;

  // 编队 / 玩家 / 子弹参数
  const COLS = 8, ROWS = 4, AW = 32, AH = 24, GX = 12, GY = 14;
  const PLAYER_Y = H - 40, PLAYER_W = 42, PLAYER_SPEED = 22;
  const PBULLET_VY = -9, EBULLET_VY = 5, DIVE_VY = 4;
  const FIRE_COOLDOWN = 6;
  const DIVE_PROB = 0.04;   // 每帧触发一次俯冲的概率（用局部 PRNG）
  const START_LIVES = 3;
  const KILL_SCORE = 100;

  // 局部种子 PRNG（mulberry32）：所有随机必须走它，禁止 Math.random
  function mk(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x9E3779B9);
  function reseed(s){ _rng = mk((s>>>0) || 1); }
  function setRand(fn){ if(typeof fn==='function') _rng = fn; }

  // 编队几何：以窗口宽度居中
  const formW = COLS*AW + (COLS-1)*GX;
  const startX = Math.max(20, (W - formW)/2);
  const TOP = 50;
  function formationX(a){ return startX + a.col*(AW+GX); }
  function formationY(a){ return TOP + a.row*(AH+GY); }

  // 核心状态（普通 JS 变量，逻辑脱离 DOM）
  let player, aliens, pbullets, ebullets, score, lives, over, win, cooldown, diveEnabled;

  function buildAliens(){
    aliens = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const a = { col:c, row:r, alive:true, diving:false, vx:0 };
      a.x = formationX(a); a.y = formationY(a);
      aliens.push(a);
    }
  }
  function aliveCount(){ let n=0; for(const a of aliens) if(a.alive) n++; return n; }

  function reset(){
    player = { x: W/2 };
    aliens = []; pbullets = []; ebullets = [];
    score = 0; lives = START_LIVES; over = false; win = false; cooldown = 0;
    diveEnabled = true;
    buildAliens();
  }
  function newGame(seed){ if(typeof seed==='number' && !isNaN(seed)) reseed(seed); reset(); }

  function move(dir){
    if(over||win) return;
    player.x += dir*PLAYER_SPEED;
    if(player.x < PLAYER_W/2) player.x = PLAYER_W/2;
    if(player.x > W - PLAYER_W/2) player.x = W - PLAYER_W/2;
  }
  function fire(){
    if(over||win||cooldown>0) return false;
    pbullets.push({ x:player.x, y:PLAYER_Y-18, vy:PBULLET_VY });
    cooldown = FIRE_COOLDOWN;
    if(J) J.sfx('click');
    return true;
  }
  // 测试钩子：在指定坐标生成敌弹（确定性，不依赖俯冲 RNG）
  function spawnEnemyBullet(x,y){ ebullets.push({ x, y, vy:EBULLET_VY }); }

  function startDive(a){
    a.diving = true;
    const dx = player.x - a.x;
    a.vx = Math.abs(dx) > 4 ? (dx>0 ? 2 : -2) : 0;
    if(J) J.sfx('whoosh');
  }
  function playerHit(){
    lives--;
    if(J) J.flash('#f6465d');
    if(lives <= 0){ lives = 0; over = true; if(J) J.best('galaga', score); }
  }

  // 推进一帧模拟：子弹移动、碰撞、敌机俯冲与反击
  function step(){
    if(over || win) return;
    if(cooldown>0) cooldown--;

    // 玩家子弹上移
    for(const b of pbullets) b.y += b.vy;
    // 敌弹下移
    for(const b of ebullets) b.y += b.vy;

    // 玩家子弹 vs 敌机
    for(const b of pbullets){
      if(b.dead) continue;
      for(const a of aliens){
        if(!a.alive) continue;
        if(b.x >= a.x && b.x <= a.x+AW && b.y >= a.y && b.y <= a.y+AH){
          a.alive = false; score += KILL_SCORE; b.dead = true;
          if(J) J.sfx('pickup');
          break;
        }
      }
    }
    pbullets = pbullets.filter(b => !b.dead && b.y > -20);

    // 敌弹 vs 玩家
    for(const b of ebullets){
      if(b.dead) continue;
      if(b.x > player.x-PLAYER_W/2 && b.x < player.x+PLAYER_W/2 && b.y > PLAYER_Y-10 && b.y < PLAYER_Y+14){
        b.dead = true; playerHit();
        if(over) return;
      }
    }
    ebullets = ebullets.filter(b => !b.dead && b.y < H+20);

    // 敌机俯冲行为
    if(diveEnabled){
      if(_rng() < DIVE_PROB){
        const pool = aliens.filter(a=>a.alive && !a.diving);
        if(pool.length){
          const idx = (_rng()*pool.length)|0;
          startDive(pool[idx]);
        }
      }
    }
    for(const a of aliens){
      if(!a.alive || !a.diving) continue;
      a.x += a.vx; a.y += DIVE_VY;
      // 俯冲中开火
      if(_rng() < 0.06) spawnEnemyBullet(a.x + AW/2, a.y + AH);
      // 飞出底部 → 回到编队槽位
      if(a.y > H + AH){ a.diving = false; a.x = formationX(a); a.y = formationY(a); }
    }

    // 胜负判定
    if(aliveCount() === 0){ win = true; if(J) J.sfx('levelup'); }
  }

  function isWin(){ return win; }
  function isGameOver(){ return over; }
  function getScore(){ return score; }
  function getLives(){ return lives; }
  function getAliens(){ return aliens.map(a=>({col:a.col,row:a.row,alive:a.alive,x:a.x,y:a.y,diving:a.diving})); }

  function getState(){
    return {
      player: { x:player.x, y:PLAYER_Y },
      lives, score, over, win,
      enemyCount: aliveCount(),
      enemies: getAliens(),
      bullets: pbullets.map(b=>({x:b.x,y:b.y})),
      enemyBullets: ebullets.map(b=>({x:b.x,y:b.y})),
    };
  }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  let ctx=null, cv=null;
  function render(){
    if(typeof document==='undefined' || !ctx) return;
    ctx.clearRect(0,0,W,H);
    // 敌机
    for(const a of aliens){ if(!a.alive) continue; ctx.fillStyle = a.diving ? '#f0b90b' : '#f6465d'; ctx.fillRect(a.x, a.y, AW, AH); }
    // 玩家子弹
    ctx.fillStyle='#f0b90b'; for(const b of pbullets) ctx.fillRect(b.x-2, b.y-8, 4, 8);
    // 敌弹
    ctx.fillStyle='#02c076'; for(const b of ebullets){ ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill(); }
    // 玩家飞船
    ctx.fillStyle='#02c076'; ctx.fillRect(player.x-PLAYER_W/2, PLAYER_Y, PLAYER_W, 14);
  }
  function loop(){
    if(typeof Input!=='undefined'){
      if(Input.down('left')) move(-1);
      if(Input.down('right')) move(1);
      if(Input.consume('a') || Input.consume('up')) fire();
      Input.update();
    }
    step(); render(); uiTick();
    if(typeof document!=='undefined') requestAnimationFrame(loop);
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const l=$('left'),r=$('right'),f=$('fire');
    if(l) l.onclick=()=>move(-1);
    if(r) r.onclick=()=>move(1);
    if(f) f.onclick=()=>fire();
    if(typeof Input!=='undefined'){
      Input.init();
      Input.bindVirtualButtons(document);
    }
    if(typeof document!=='undefined'){
      document.addEventListener('keydown',e=>{
        if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') move(-1);
        if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') move(1);
        if(e.key===' '||e.key==='ArrowUp'){ e.preventDefault(); fire(); }
      });
    }
  }
  function uiTick(){
    if(typeof document==='undefined') return;
    const sc=$('score'),en=$('enemies'),lv=$('lives'),msg=$('msg');
    if(sc) sc.textContent=score; if(en) en.textContent=aliveCount(); if(lv) lv.textContent=lives;
    if(msg){
      if(win){ msg.className='msg win'; msg.textContent='胜利！清空全部敌机 · 得分 '+score; }
      else if(over){ msg.className='msg over'; msg.textContent='游戏结束 · 得分 '+score+' · 重开请刷新'; }
      else { msg.className='msg'; }
    }
  }

  newGame();
  if(typeof document!=='undefined'){
    cv=$('cv');
    if(cv){ cv.width=W; cv.height=H; ctx=cv.getContext('2d'); bindUI(); loop(); }
  }

  if(typeof window!=='undefined'){
    window.__t = {
      W, H, COLS, ROWS, AW, AH, PLAYER_Y, PLAYER_W, START_LIVES, DIVE_PROB,
      setRand, reseed, newGame, reset, move, fire, step, isWin, isGameOver,
      getScore, getLives, getAliens, getState, spawnEnemyBullet,
      setPlayerX:(v)=>{ player.x=v; },
      setLives:(v)=>{ lives=v; if(lives<=0){lives=0;over=true;} },
      setDiveEnabled:(v)=>{ diveEnabled=!!v; },
      getOver:()=>over, getWin:()=>win,
    };
  }
})();
</script>
</body>
</html>
