<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 加拉加 俯冲突战机</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(2,192,118,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--green)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .sc{color:var(--gold);font-weight:700}.hud .lv{color:var(--green);font-weight:700}.hud .en{color:var(--red);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:10px}
  canvas{background:#0a0e14;border-radius:8px;display:block;touch-action:none}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--green);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .msg.over{color:var(--red);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>加拉加</b> GALAGA</span></div>
  <div class="wrap">
    <div class="hud"><span>得分 <span class="sc" id="score">0</span></span><span>敌机 <span class="en" id="enemies">0</span></span><span>命 <span class="lv" id="lives">3</span></span></div>
    <div class="boardwrap"><canvas id="cv"></canvas></div>
    <div class="controls">
      <button id="left">◀ 左 (←/A)</button>
      <button id="fire">开火 (空格/↑)</button>
      <button id="right">右 (→/D) ▶</button>
    </div>
    <div class="msg" id="msg">左右移动飞船，空格开火。击落全部敌机获胜；命数归零结束。</div>
  </div>
  <div class="foot">Galaga 俯冲突战机：底部飞船左右移动 + 射击，上方敌机编队并周期性俯冲反击。清空编队胜利，3 命耗尽结束。</div>

<script src="juice.js"></script>
<script src="input.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;

  // 坐标只用 window.innerWidth / window.innerHeight，绝不裸写 innerWidth
  const W = (typeof window!=='undefined' && window.innerWidth) ? Math.min(window.innerWidth, 800) : 800;
  const H = (typeof window!=='undefined' && window.innerHeight) ? Math.min(window.innerHeight, 600) : 600;

  // 编队 / 玩家 / 子弹参数
  const COLS = 8, ROWS = 4, AW = 32, AH = 24, GX = 12, GY = 14;
  const PLAYER_Y = H - 40, PLAYER_W = 42, PLAYER_SPEED = 22;
  const PBULLET_VY = -9, EBULLET_VY = 5, DIVE_VY = 4;
  const FIRE_COOLDOWN = 6;
  const DIVE_PROB = 0.04;   // 每帧触发一次俯冲的概率（用局部 PRNG）
  const START_LIVES = 3;
  const KILL_SCORE = 100;

  // 局部种子 PRNG（mulberry32）：所有随机必须走它，禁止 Math.random
  function mk(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x9E3779B9);
  function reseed(s){ _rng = mk((s>>>0) || 1); }
  function setRand(fn){ if(typeof fn==='function') _rng = fn; }

  // 编队几何：以窗口宽度居中
  const formW = COLS*AW + (COLS-1)*GX;
  const startX = Math.max(20, (W - formW)/2);
  const TOP = 50;
  function formationX(a){ return startX + a.col*(AW+GX); }
  function formationY(a){ return TOP + a.row*(AH+GY); }

  // 核心状态（普通 JS 变量，逻辑脱离 DOM）
  let player, aliens, pbullets, ebullets, score, lives, over, win, cooldown, diveEnabled, pickups, wave, boss;

  // ---------- 掉落道具系统（击落敌机随机掉落，下坠拾取增益）----------
  const DROP_PROB = 0.22;          // 敌机被击落时掉落道具概率
  const PICKUP_VY = 2.2;           // 道具下坠速度
  const PICKUP_TYPES = ['rapid','spread','shield','life'];
  const RAPID_DUR = 360, SPREAD_DUR = 360; // 增益持续帧数
  function makePickup(type, x, y){ return { type:type, x:x, y:y, vy:PICKUP_VY, r:9, life:600 }; }
  function dropPickup(x, y, seedType){
    const type = seedType || PICKUP_TYPES[(_rng()*PICKUP_TYPES.length)|0];
    pickups.push(makePickup(type, x, y));
    return pickups.length-1;
  }
  function applyPickup(p){
    if(!p) return;
    if(p.type==='rapid'){ player.rapidT = RAPID_DUR; if(J) J.popup&&J.popup(player.x,PLAYER_Y-20,'连射!','#f0b90b',{life:.7}); }
    else if(p.type==='spread'){ player.spreadT = SPREAD_DUR; if(J) J.popup&&J.popup(player.x,PLAYER_Y-20,'散射!','#3aa0ff',{life:.7}); }
    else if(p.type==='shield'){ player.shield = 1; if(J) J.popup&&J.popup(player.x,PLAYER_Y-20,'护盾','#02c076',{life:.7}); }
    else if(p.type==='life'){ lives = Math.min(5, lives+1); if(J) J.popup&&J.popup(player.x,PLAYER_Y-20,'+1命','#f6465d',{life:.7}); }
    if(J) J.sfx&&J.sfx('pickup');
  }
  function updatePickups(){
    for(let i=pickups.length-1;i>=0;i--){
      const p = pickups[i];
      p.y += p.vy; p.life--;
      // 拾取：与玩家飞船区域重叠
      if(p.x > player.x-PLAYER_W/2-6 && p.x < player.x+PLAYER_W/2+6 && p.y > PLAYER_Y-8 && p.y < PLAYER_Y+16){
        applyPickup(p); pickups.splice(i,1); continue;
      }
      if(p.life<=0 || p.y > H+20){ pickups.splice(i,1); }
    }
    if(player.rapidT>0) player.rapidT--;
    if(player.spreadT>0) player.spreadT--;
  }

  function buildAliens(){
    aliens = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const a = { col:c, row:r, alive:true, diving:false, vx:0 };
      a.x = formationX(a); a.y = formationY(a);
      aliens.push(a);
    }
  }
  function aliveCount(){ let n=0; for(const a of aliens) if(a.alive) n++; return n; }

  // ---------- Boss 系统（每 BOSS_EVERY 波出现一次：居中上方、左右巡航+周期下压、向玩家射击、多阶段）----------
  const BOSS_EVERY = 3;
  function isBossWave(w){ return w > 0 && w % BOSS_EVERY === 0; }
  // galaga 无独立 DIFFICULTY，bossHpMult 缺省为 1，纯按 wave 缩放。若后续接入难度系统，返回对应倍率即可。
  function bossHpMult(){ return (typeof diffCfg==='function') ? (diffCfg().bossHpMult || 1) : 1; }
  function spawnBoss(){
    const bw = Math.round(W*0.34), bh = 46;
    const maxHp = Math.round((28 + wave*6) * bossHpMult());
    boss = {
      x: W/2 - bw/2, y: TOP + 6, w: bw, h: bh,
      hp: maxHp, maxHp: maxHp,
      phase: 1, dir: 1, vx: (1.5 + wave*0.2),   // px/帧，向左↔右巡航
      down: 0, fireT: 30
    };
    aliens = [];   // boss 波不刷普通编队
    if(J) J.sfx && J.sfx('levelup');
  }
  // 返回 true 表示本帧 boss 被击败
  function updateBoss(dt){
    if(!boss) return false;
    dt = dt || 1;
    // 半血进 phase2（更快、更密弹幕）
    if(boss.phase===1 && boss.hp <= boss.maxHp/2){
      boss.phase = 2; boss.vx *= 1.4;
      if(J) J.flash && J.flash('#f6465d', .3);
    }
    // 左右巡航 + 撞墙下压
    boss.x += boss.dir * boss.vx * dt;
    if(boss.x < 20){ boss.x = 20; boss.dir = 1; boss.down += (boss.phase===2 ? 12 : 8); }
    else if(boss.x + boss.w > W-20){ boss.x = W-20-boss.w; boss.dir = -1; boss.down += (boss.phase===2 ? 12 : 8); }
    boss.y = TOP + 6 + boss.down;
    // 玩家子弹命中扣血
    for(const b of pbullets){
      if(b.dead) continue;
      if(b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h){
        boss.hp -= 1; b.dead = true;
        if(J) J.sfx && J.sfx('pickup');
      }
    }
    pbullets = pbullets.filter(b => !b.dead && b.y > -20);
    // 向玩家射击（phase2 三连）
    boss.fireT -= dt;
    if(boss.fireT <= 0){
      boss.fireT = (boss.phase===2 ? 26 : 42);
      spawnEnemyBullet(player.x, boss.y + boss.h);
      if(boss.phase===2){
        spawnEnemyBullet(boss.x + boss.w*0.25, boss.y + boss.h);
        spawnEnemyBullet(boss.x + boss.w*0.75, boss.y + boss.h);
      }
    }
    // 接触玩家造成伤害
    if(boss.y + boss.h >= PLAYER_Y){ playerHit(); }
    // 击败：奖励 + 掉落
    if(boss.hp <= 0){
      score += 100 * wave;
      pickups.push(makePickup('rocket', boss.x + boss.w/2, boss.y + boss.h));
      if(J){ J.sfx && J.sfx('win'); J.flash && J.flash('#02c076', .4); }
      boss = null;
      return true;
    }
    return false;
  }

  function reset(){
    player = { x: W/2, shield:0, rapidT:0, spreadT:0 };
    aliens = []; pbullets = []; ebullets = []; pickups = [];
    score = 0; lives = START_LIVES; over = false; win = false; cooldown = 0;
    diveEnabled = true;
    wave = 1; boss = null;
    buildAliens();
  }
  function newGame(seed){ if(typeof seed==='number' && !isNaN(seed)) reseed(seed); reset(); }

  function move(dir){
    if(over||win) return;
    player.x += dir*PLAYER_SPEED;
    if(player.x < PLAYER_W/2) player.x = PLAYER_W/2;
    if(player.x > W - PLAYER_W/2) player.x = W - PLAYER_W/2;
  }
  function fire(){
    if(over||win||cooldown>0) return false;
    if(player.spreadT>0){
      // 散射：三连弹（中路直上 + 两侧带横向速度）
      pbullets.push({ x:player.x, y:PLAYER_Y-18, vx:0,    vy:PBULLET_VY });
      pbullets.push({ x:player.x, y:PLAYER_Y-18, vx:-2.4, vy:PBULLET_VY });
      pbullets.push({ x:player.x, y:PLAYER_Y-18, vx:2.4,  vy:PBULLET_VY });
    } else {
      pbullets.push({ x:player.x, y:PLAYER_Y-18, vx:0, vy:PBULLET_VY });
    }
    // 连射：冷却减半
    cooldown = player.rapidT>0 ? Math.max(2, Math.floor(FIRE_COOLDOWN/2)) : FIRE_COOLDOWN;
    if(J) J.sfx('click');
    return true;
  }
  // 测试钩子：在指定坐标生成敌弹（确定性，不依赖俯冲 RNG）
  function spawnEnemyBullet(x,y){ ebullets.push({ x, y, vy:EBULLET_VY }); }

  function startDive(a){
    a.diving = true;
    const dx = player.x - a.x;
    a.vx = Math.abs(dx) > 4 ? (dx>0 ? 2 : -2) : 0;
    if(J) J.sfx('whoosh');
  }
  function playerHit(){
    // 护盾优先抵挡一次
    if(player.shield>0){ player.shield=0; if(J){ J.flash&&J.flash('#02c076',.3); J.sfx&&J.sfx('hit'); } return; }
    lives--;
    if(J) J.flash('#f6465d');
    if(lives <= 0){ lives = 0; over = true; if(J) J.best('galaga', score); }
  }

  // 推进一帧模拟：子弹移动、碰撞、敌机俯冲与反击
  function step(){
    if(over || win) return;
    // Boss 波：独立分支（击败后才推进下一波；boss 波不刷普通编队）
    if(boss){
      for(const b of pbullets){ b.y += b.vy; b.x += (b.vx||0); }
      pbullets = pbullets.filter(b => !b.dead && b.y > -20);
      updatePickups();
      const beaten = updateBoss(1);
      for(const b of ebullets) b.y += b.vy;
      for(const b of ebullets){
        if(b.dead) continue;
        if(b.x > player.x-PLAYER_W/2 && b.x < player.x+PLAYER_W/2 && b.y > PLAYER_Y-10 && b.y < PLAYER_Y+14){
          b.dead = true; playerHit(); if(over) break;
        }
      }
      ebullets = ebullets.filter(b => !b.dead && b.y < H+20);
      if(!over && beaten){ wave++; buildAliens(); }
      return;
    }
    if(cooldown>0) cooldown--;

    // 玩家子弹上移（散射弹带横向速度）
    for(const b of pbullets){ b.y += b.vy; b.x += (b.vx||0); }
    // 敌弹下移
    for(const b of ebullets) b.y += b.vy;

    // 玩家子弹 vs 敌机
    for(const b of pbullets){
      if(b.dead) continue;
      for(const a of aliens){
        if(!a.alive) continue;
        if(b.x >= a.x && b.x <= a.x+AW && b.y >= a.y && b.y <= a.y+AH){
          a.alive = false; score += KILL_SCORE; b.dead = true;
          if(_rng() < DROP_PROB) dropPickup(a.x + AW/2, a.y + AH/2);
          if(J) J.sfx('pickup');
          break;
        }
      }
    }
    pbullets = pbullets.filter(b => !b.dead && b.y > -20);

    // 敌弹 vs 玩家
    for(const b of ebullets){
      if(b.dead) continue;
      if(b.x > player.x-PLAYER_W/2 && b.x < player.x+PLAYER_W/2 && b.y > PLAYER_Y-10 && b.y < PLAYER_Y+14){
        b.dead = true; playerHit();
        if(over) return;
      }
    }
    ebullets = ebullets.filter(b => !b.dead && b.y < H+20);

    // 敌机俯冲行为
    if(diveEnabled){
      if(_rng() < DIVE_PROB){
        const pool = aliens.filter(a=>a.alive && !a.diving);
        if(pool.length){
          const idx = (_rng()*pool.length)|0;
          startDive(pool[idx]);
        }
      }
    }
    for(const a of aliens){
      if(!a.alive || !a.diving) continue;
      a.x += a.vx; a.y += DIVE_VY;
      // 俯冲中开火
      if(_rng() < 0.06) spawnEnemyBullet(a.x + AW/2, a.y + AH);
      // 飞出底部 → 回到编队槽位
      if(a.y > H + AH){ a.diving = false; a.x = formationX(a); a.y = formationY(a); }
    }

    // 道具下坠与拾取
    updatePickups();

    // 胜负判定
    if(aliveCount() === 0){ win = true; if(J) J.sfx('levelup'); }
  }

  function isWin(){ return win; }
  function isGameOver(){ return over; }
  function getScore(){ return score; }
  function getLives(){ return lives; }
  function getAliens(){ return aliens.map(a=>({col:a.col,row:a.row,alive:a.alive,x:a.x,y:a.y,diving:a.diving})); }

  function getState(){
    return {
      player: { x:player.x, y:PLAYER_Y },
      lives, score, over, win,
      enemyCount: aliveCount(),
      enemies: getAliens(),
      bullets: pbullets.map(b=>({x:b.x,y:b.y})),
      enemyBullets: ebullets.map(b=>({x:b.x,y:b.y})),
      pickups: pickups.map(p=>({type:p.type,x:+p.x.toFixed(2),y:+p.y.toFixed(2)})),
      shield: player.shield, rapidT: player.rapidT, spreadT: player.spreadT,
    };
  }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  let ctx=null, cv=null;
  function render(){
    if(typeof document==='undefined' || !ctx) return;
    ctx.clearRect(0,0,W,H);
    // 敌机
    for(const a of aliens){ if(!a.alive) continue; ctx.fillStyle = a.diving ? '#f0b90b' : '#f6465d'; ctx.fillRect(a.x, a.y, AW, AH); }
    // Boss 本体（多边形，紫/红，phase2 转红）+ 顶部血条
    if(boss){
      const col = boss.phase===2 ? '#f6465d' : '#9b6bff';
      const bx=boss.x, by=boss.y, bw=boss.w, bh=boss.h;
      ctx.save();
      ctx.shadowColor=col; ctx.shadowBlur=14; ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(bx+bw*0.5, by);
      ctx.lineTo(bx+bw*0.92, by+bh*0.45);
      ctx.lineTo(bx+bw*0.78, by+bh);
      ctx.lineTo(bx+bw*0.22, by+bh);
      ctx.lineTo(bx+bw*0.08, by+bh*0.45);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0; ctx.fillStyle='#0a0e14';
      ctx.beginPath(); ctx.arc(bx+bw*0.5, by+bh*0.5, bh*0.16, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // 顶部血条（横贯）
      const barW = W - 2*20, barX = 20, barY = 3, frac = Math.max(0, boss.hp/boss.maxHp);
      ctx.fillStyle='#2a2f3a'; ctx.fillRect(barX, barY, barW, 5);
      ctx.fillStyle = boss.phase===2 ? '#f6465d' : '#f0b90b';
      ctx.fillRect(barX, barY, barW*frac, 5);
    }
    // 玩家子弹
    ctx.fillStyle='#f0b90b'; for(const b of pbullets) ctx.fillRect(b.x-2, b.y-8, 4, 8);
    // 敌弹
    ctx.fillStyle='#02c076'; for(const b of ebullets){ ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill(); }
    // 道具
    for(const p of pickups){
      const col = p.type==='rapid'?'#f0b90b':p.type==='spread'?'#3aa0ff':p.type==='shield'?'#02c076':'#f6465d';
      const sym = p.type==='rapid'?'»':p.type==='spread'?'⋔':p.type==='shield'?'◈':'♥';
      ctx.save();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r+3, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fill();
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle=col; ctx.font='12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(sym, p.x, p.y); ctx.restore();
    }
    // 玩家飞船
    ctx.fillStyle = player.rapidT>0 ? '#f0b90b' : (player.spreadT>0 ? '#3aa0ff' : '#02c076');
    ctx.fillRect(player.x-PLAYER_W/2, PLAYER_Y, PLAYER_W, 14);
    if(player.shield>0){ ctx.strokeStyle='rgba(2,192,118,.8)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(player.x, PLAYER_Y+7, PLAYER_W*0.7, 0, Math.PI*2); ctx.stroke(); }
  }
  function loop(){
    if(typeof Input!=='undefined'){
      if(Input.down('left')) move(-1);
      if(Input.down('right')) move(1);
      if(Input.consume('a') || Input.consume('up')) fire();
      Input.update();
    }
    step(); render(); uiTick();
    if(typeof document!=='undefined') requestAnimationFrame(loop);
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const l=$('left'),r=$('right'),f=$('fire');
    if(l) l.onclick=()=>move(-1);
    if(r) r.onclick=()=>move(1);
    if(f) f.onclick=()=>fire();
    if(typeof Input!=='undefined'){
      Input.init();
      Input.bindVirtualButtons(document);
    }
    if(typeof document!=='undefined'){
      document.addEventListener('keydown',e=>{
        if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') move(-1);
        if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') move(1);
        if(e.key===' '||e.key==='ArrowUp'){ e.preventDefault(); fire(); }
      });
    }
  }
  function uiTick(){
    if(typeof document==='undefined') return;
    const sc=$('score'),en=$('enemies'),lv=$('lives'),msg=$('msg');
    if(sc) sc.textContent=score; if(en) en.textContent=aliveCount(); if(lv) lv.textContent=lives;
    if(msg){
      if(win){ msg.className='msg win'; msg.textContent='胜利！清空全部敌机 · 得分 '+score; }
      else if(over){ msg.className='msg over'; msg.textContent='游戏结束 · 得分 '+score+' · 重开请刷新'; }
      else { msg.className='msg'; }
    }
  }

  newGame();
  if(typeof document!=='undefined'){
    cv=$('cv');
    if(cv){ cv.width=W; cv.height=H; ctx=cv.getContext('2d'); bindUI(); loop(); }
  }

  if(typeof window!=='undefined'){
    window.__t = {
      W, H, COLS, ROWS, AW, AH, PLAYER_Y, PLAYER_W, START_LIVES, DIVE_PROB,
      setRand, reseed, newGame, reset, move, fire, step, isWin, isGameOver,
      getScore, getLives, getAliens, getState, spawnEnemyBullet,
      setPlayerX:(v)=>{ player.x=v; },
      setLives:(v)=>{ lives=v; if(lives<=0){lives=0;over=true;} },
      setDiveEnabled:(v)=>{ diveEnabled=!!v; },
      getOver:()=>over, getWin:()=>win,
      // ---- 掉落道具系统钩子 ----
      DROP_PROB, PICKUP_TYPES,
      spawnPickup:(type,x,y)=>dropPickup(x!==undefined?x:player.x, y!==undefined?y:0, type),
      stepPickups:()=>updatePickups(),
      applyPickup:(p)=>applyPickup(p),
      getPickups:()=>pickups.length,
      getPickup:(i)=>pickups[i],
      getShield:()=>player.shield, setShield:(v)=>{ player.shield=v; },
      getRapid:()=>player.rapidT, setRapid:(v)=>{ player.rapidT=v; },
      getSpread:()=>player.spreadT, setSpread:(v)=>{ player.spreadT=v; },
      // ---- Boss 系统钩子 ----
      BOSS_EVERY, isBossWave, spawnBoss, updateBoss,
      getBoss:()=> boss ? { x:boss.x, y:boss.y, w:boss.w, h:boss.h, hp:boss.hp, maxHp:boss.maxHp, phase:boss.phase, dir:boss.dir } : null,
      setBossHp:(v)=>{ if(boss) boss.hp = v; },
      setWave:(v)=>{ wave = v; },
      getWave:()=>wave,
      addBullet:(x,y,strong)=>{ pbullets.push({ x, y, vx:0, vy:PBULLET_VY, strong:!!strong }); },
    };
  }
})();
</script>
</body>
</html>
