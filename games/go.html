<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 围棋</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(560px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(560px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .board{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;background:var(--panel);padding:8px;border:1px solid var(--border);border-radius:10px;width:min(480px,92vw);margin:0 auto}
  .cell{aspect-ratio:1/1;background:#0e141d;border:1px solid #1a2230;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
  .cell .s{width:74%;height:74%;border-radius:50%}
  .cell .b{background:#0a0e14;border:1px solid #2a3340}
  .cell .w{background:#e6edf3}
  .controls{display:flex;gap:8px;margin-top:10px;justify-content:center}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(560px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>围棋</b> GO 9×9</span></div>
  <div class="wrap">
    <div class="hud"><span>轮到 TURN · <span class="st" id="turn">黑</span></span><span>提子 CAP · 黑<span class="st" id="cb">0</span> / 白<span class="st" id="cw">0</span></span></div>
    <div class="board" id="board"></div>
    <div class="controls">
      <button id="pass" class="ghost">停一手 PASS</button>
      <button id="new">新局 NEW</button>
    </div>
    <div class="msg" id="msg">黑先。点空格落子：吃子规则自动结算（无气即提）。连续两手停则终局按目数判胜。</div>
  </div>
  <div class="foot">经典围棋（9 路）：围地吃子，比终局目数。简化：含无气提子、禁自杀、基础劫争（ko）。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const N=9;
  let board,turn,captures,ko,over,winner,passes;
  function newGame(){ board=Array.from({length:N},()=>new Array(N).fill(null)); turn='b'; captures={b:0,w:0}; ko=null; over=false; winner=null; passes=0; }
  function inb(r,c){ return r>=0&&r<N&&c>=0&&c<N; }
  function opp(x){ return x==='b'?'w':'b'; }
  function group(r,c){
    const col=board[r][c]; if(!col) return null;
    const seen=new Set(), stones=[], lib=new Set(), st=[[r,c]]; seen.add(r*N+c);
    while(st.length){ const [cr,cc]=st.pop(); stones.push([cr,cc]);
      const nb=[[1,0],[-1,0],[0,1],[0,-1]];
      for(const [dr,dc] of nb){ const nr=cr+dr,nc=cc+dc; if(!inb(nr,nc)) continue; const k=nr*N+nc; const v=board[nr][nc];
        if(v===null) lib.add(k); else if(v===col && !seen.has(k)){ seen.add(k); st.push([nr,nc]); } } }
    return {stones,lib};
  }
  // 落子；color 缺省用当前 turn
  function place(r,c,color){
    if(over) return {ok:false,reason:'over'};
    if(!inb(r,c)||board[r][c]!==null) return {ok:false,reason:'occupied'};
    const col=color||turn;
    if(ko && ko[0]===r && ko[1]===c) return {ok:false,reason:'ko'};
    const enemy=opp(col);
    board[r][c]=col;
    let captured=[];
    const nb=[[1,0],[-1,0],[0,1],[0,-1]];
    for(const [dr,dc] of nb){ const nr=r+dr,nc=c+dc;
      if(inb(nr,nc)&&board[nr][nc]===enemy){ const g=group(nr,nc); if(g.lib.size===0){ for(const [sr,sc] of g.stones){ board[sr][sc]=null; captured.push([sr,sc]); } } } }
    const myg=group(r,c);
    if(myg.lib.size===0 && captured.length===0){ board[r][c]=null; return {ok:false,reason:'suicide'}; }
    ko=null;
    if(captured.length===1 && myg.stones.length===1 && myg.lib.size===1){ ko=[captured[0][0],captured[0][1]]; }
    captures[col]+=captured.length;
    if(captured.length){ Juice.sfx('hit'); Juice.addTrauma(.25); }
    turn=enemy; passes=0;
    return {ok:true,captured};
  }
  function pass(){
    if(over) return false;
    passes++; turn=opp(turn);
    if(passes>=2){ finish(); }
    return true;
  }
  function resign(color){ if(over) return; over=true; winner=opp(color); Juice.sfx('win'); Juice.flash('#02c076',.5); }
  function finish(){ over=true; const s=score(); winner = s.b===s.w?null:(s.b>s.w?'b':'w'); if(winner){ Juice.sfx('win'); Juice.flash('#02c076',.5); } else { Juice.flash('#f0b90b',.4); } }
  function score(){
    let bs=0, ws=0; const seen=new Set();
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      if(board[r][c]==='b') bs++; else if(board[r][c]==='w') ws++;
      else if(!seen.has(r*N+c)){
        const st=[[r,c]], region=[]; seen.add(r*N+c); let touchB=false,touchW=false;
        while(st.length){ const [cr,cc]=st.pop(); region.push([cr,cc]);
          for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nr=cr+dr,nc=cc+dc; if(!inb(nr,nc)) continue; const k=nr*N+nc; const v=board[nr][nc];
            if(v==='b') touchB=true; else if(v==='w') touchW=true; else if(!seen.has(k)){ seen.add(k); st.push([nr,nc]); } } }
        if(touchB&&!touchW) bs+=region.length; else if(touchW&&!touchB) ws+=region.length;
      }
    }
    return {b:bs,w:ws};
  }
  function getBoard(){ return board.map(r=>r.slice()); }
  function getTurn(){ return turn; }
  function getCaptures(){ return {b:captures.b,w:captures.w}; }
  function isOver(){ return over; }
  function getWinner(){ return winner; }
  function getScore(){ return score(); }
  function setBoard(b,t){ board=b.map(r=>r.slice()); turn=t||'b'; over=false; winner=null; ko=null; passes=0; }

  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  let cellEls=[];
  function buildBoard(){
    if(typeof document==='undefined') return;
    const bd=$('board'); if(!bd) return; bd.innerHTML=''; cellEls=[];
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      const el=document.createElement('div'); el.className='cell'; el.dataset.r=r; el.dataset.c=c;
      el.addEventListener('click',()=>{ if(!over){ place(r,c); render(); } });
      bd.appendChild(el); cellEls.push(el);
    }
  }
  function render(){
    if(typeof document==='undefined') return;
    cellEls.forEach((el,i)=>{ const r=Math.floor(i/N),c=i%N; const v=board[r][c]; el.innerHTML=v?'<div class="s '+(v==='b'?'b':'w')+'"></div>':''; });
    const t=$('turn'),cb=$('cb'),cw=$('cw'),msg=$('msg');
    if(t) t.textContent=turn==='b'?'黑':'白';
    if(cb) cb.textContent=captures.b; if(cw) cw.textContent=captures.w;
    if(msg){ if(over){ msg.className='msg win'; msg.textContent='🏁 终局！'+(winner?((winner==='b'?'黑':'白')+'胜'):'和棋')+' （黑'+score().b+' 目 / 白'+score().w+' 目）'; } else { msg.className='msg'; msg.textContent='轮到 '+(turn==='b'?'黑':'白')+' 落子。'; } }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const pb=$('pass'),nb=$('new');
    if(pb) pb.onclick=()=>{ pass(); render(); };
    if(nb) nb.onclick=()=>{ newGame(); render(); };
  }
  newGame();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ buildBoard(); bindUI(); render(); });
    else { buildBoard(); bindUI(); render(); }
  }
  if(typeof window!=='undefined'){
    window.__t={ N, newGame, place, pass, resign, score, getBoard, getTurn, getCaptures, isOver, getWinner, getScore, group, setBoard };
  }
})();
</script>
</body>
</html>
