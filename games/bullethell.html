<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // BULLETHELL</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace}
  #stage{position:fixed;inset:0;z-index:0}
  #stage canvas{display:block;touch-action:none}
  #scan{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.06), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px}
  .titlebar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border-bottom:1px solid var(--border)}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}
  .titlebar .btn{margin-left:auto;background:transparent;color:var(--dim);border:1px solid var(--border);
    border-radius:6px;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:12px}
  .titlebar .btn:hover{color:var(--red);border-color:var(--red)}
  #hud{position:fixed;top:52px;left:16px;right:16px;z-index:5;display:flex;justify-content:space-between;align-items:flex-start}
  .stat{background:rgba(18,24,33,.85);border:1px solid var(--border);border-radius:8px;padding:8px 14px;backdrop-filter:blur(4px)}
  .stat .k{color:var(--dim);font-size:11px;letter-spacing:.5px}
  .stat .v{font-size:19px;margin-top:2px}
  .v.score{color:var(--gold)} .v.lives{color:var(--red)} .v.level{color:var(--green)}
  #overlay{position:fixed;inset:0;z-index:7;display:flex;align-items:center;justify-content:center;background:rgba(10,14,20,.88)}
  #overlay .box{text-align:center;border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 40px;max-width:90vw}
  #overlay h1{font-size:26px;letter-spacing:2px;margin-bottom:10px;text-shadow:0 0 18px rgba(246,70,93,.35)}
  #overlay p{color:var(--dim);font-size:13px;line-height:1.9;margin-bottom:18px}
  #overlay .start{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:12px 28px;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;box-shadow:0 0 14px rgba(246,70,93,.4)}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;color:var(--dim);font-size:12px;text-align:center;width:100%}
  .diffbar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:0 0 16px}
  .diffbar button{background:#0e141d;color:var(--dim);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px}
  .diffbar button.active{background:var(--gold,#ffcf5a);color:#0a0e14;border-color:var(--gold,#ffcf5a)}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="scan"></div>
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>BULLETHELL</b> · 弹幕躲避</span>
    <button class="btn" id="muteBtn">🔊</button>
    <button class="btn" id="pauseBtn">暂停</button>
  </div>
  <div id="hud">
    <div class="stat"><div class="k">得分</div><div class="v score" id="score">0</div></div>
    <div class="stat"><div class="k">波次</div><div class="v level" id="wave">1</div></div>
    <div class="stat"><div class="k">余机</div><div class="v lives" id="lives">♥♥♥</div></div>
    <div class="stat"><div class="k">生存</div><div class="v" id="time">0.0s</div></div>
  </div>
  <div id="hint">移动：方向键 / WASD（手机拖拽）· 躲开红色弹幕 · 生存满 8 秒进入下一波</div>
  <div id="overlay">
    <div class="box">
      <h1>✦ 弹幕躲避</h1>
      <p>红色弹幕从四面来袭，操控绿色机体灵活走位。<br/>每生存 <b style="color:var(--gold)">8 秒</b> 进入下一波（弹幕更密），被击中损失余机，余机耗尽即失败。</p>
      <div class="diffbar" id="diffbar"></div>
      <button class="start" id="startBtn">开始躲避</button>
    </div>
  </div>

  <script src="juice.js"></script>
  <script>
  (function(){
    if('ontouchstart' in window) document.body.classList.add('touch');
    const stage=document.getElementById('stage');
    let W=window.innerWidth, H=window.innerHeight;
    const cv=document.createElement('canvas');
    cv.width=W; cv.height=H; stage.appendChild(cv);
    const ctx=cv.getContext('2d');
    const J=(typeof Juice!=='undefined')?Juice:null;

    const DURATION=8; // 每波生存时长
    // ---------- 难度系统（简单/普通/困难/地狱）----------
    // bulletMult=每波弹幕数量倍率；speedMult=弹速倍率；rateMult=生成频率倍率
    const DIFFICULTY = {
      easy:   { label:'简单', bulletMult:0.6, speedMult:0.75, rateMult:0.7, bossHpMult:0.7 },
      normal: { label:'普通', bulletMult:1.0, speedMult:1.0,  rateMult:1.0, bossHpMult:1.0 },
      hard:   { label:'困难', bulletMult:1.4, speedMult:1.25, rateMult:1.3, bossHpMult:1.4 },
      hell:   { label:'地狱', bulletMult:1.9, speedMult:1.5,  rateMult:1.6, bossHpMult:1.9 },
    };
    const DIFF_ORDER = ['easy','normal','hard','hell'];
    let difficulty = 'normal';
    function setDifficulty(d){ if(DIFFICULTY[d]){ difficulty=d; return true; } return false; }
    function getDifficulty(){ return difficulty; }
    function diffCfg(){ return DIFFICULTY[difficulty] || DIFFICULTY.normal; }
    let S=null;
    function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
    function fresh(){
      return {
        player:{x:W/2,y:H-90,r:12,invuln:0},
        bullets:[], score:0, wave:1, lives:3, time:0,
        spawnTimer:0, spawnEnabled:true, running:false, paused:false, over:false,
        rng:mulberry32(1), keys:{up:false,down:false,left:false,right:false},
        pickups:[], coins:0, shield:0, boostTimer:0, boss:null
      };
    }

    // ---------- Boss 系统：每 BOSS_EVERY 波出现一次 Boss（生存耗竭型）----------
    const BOSS_EVERY = 3;
    function isBossWave(w){ return w > 0 && (w % BOSS_EVERY) === 0; }
    // 召唤 Boss：maxhp = 撑过所需秒数 * 60，随难度 bossHpMult 缩放（越难撑越久）
    function spawnBoss(){
      const cfg=diffCfg();
      const maxHp=Math.round((6 + S.wave*0.6) * 60 * cfg.bossHpMult);
      S.boss={ x:W/2, y:90, r:40, hp:maxHp, maxhp:maxHp, phase:1,
        vx:(80 + S.wave*6)*cfg.speedMult, dir:1, patternCd:0.6, flash:0 };
    }
    // 更新 Boss：hp 随生存流逝，撑到 0 视为击败，返回 true
    function updateBoss(dt){
      const b=S.boss; if(!b) return false;
      const cfg=diffCfg();
      // 半血进 phase2（更快移动 + 更密弹幕）
      if(b.phase===1 && b.hp <= b.maxhp*0.5){ b.phase=2; b.vx*=1.4; if(J){J.flash&&J.flash('#f6465d',.35);J.addTrauma&&J.addTrauma(.4);} }
      // 横向移动 + 反弹
      b.x += b.vx*b.dir*dt;
      if(b.x < b.r){ b.x=b.r; b.dir=1; } else if(b.x > W-b.r){ b.x=W-b.r; b.dir=-1; }
      b.flash=Math.max(0,b.flash-dt*4);
      // 弹幕图案：phase1 朝玩家扇形；phase2 环形 + 扇形
      b.patternCd-=dt;
      if(b.patternCd<=0){
        b.patternCd = (b.phase===2?0.5:0.75) / cfg.rateMult;
        const spd=(120 + S.wave*10)*cfg.speedMult;
        const p=S.player, aim=Math.atan2(p.y-b.y, p.x-b.x);
        const fan = b.phase===2?5:3;
        for(let i=0;i<fan;i++){ const a=aim + (i-(fan-1)/2)*0.24;
          spawnBullet(b.x, b.y, Math.cos(a)*spd, Math.sin(a)*spd, 8); }
        if(b.phase===2){ const ring=8; for(let i=0;i<ring;i++){ const a=i/ring*Math.PI*2;
          spawnBullet(b.x, b.y, Math.cos(a)*spd*0.8, Math.sin(a)*spd*0.8, 7); } }
      }
      // 生存耗竭
      b.hp -= dt*60;
      if(b.hp<=0){
        const pts=200 + S.wave*30;
        S.score+=pts;
        if(J){ J.popup&&J.popup('BOSS 击败 +'+pts); J.burst&&J.burst(b.x,b.y,{color:'#f6465d',n:40,speed:320,life:.9}); J.addTrauma&&J.addTrauma(.8); J.flash&&J.flash('#ffcf5a',.5); J.sfx&&J.sfx('win'); }
        S.pickups.push(makePickup('heal', b.x, b.y)); S.pickups.push(makePickup('coin', b.x+24, b.y));
        S.boss=null;
        return true;
      }
      return false;
    }

    // ---- 注入式掉落/增益系统（局部 PRNG，禁止 Math.random）----
    function mk(seed){let s=seed>>>0;return ()=>{s=(s*1664525+1013904223)>>>0;return (s&0x7fffffff)/0x7fffffff;};}
    let pickupRng = mk(0x1b001);
    function makePickup(type,x,y){ return {type:type,x:x,y:y,vy:60,r:11,life:14}; }
    function spawnPickupAtRandom(seed){ const r=(seed!==undefined)?mk(seed>>>0):pickupRng; const types=['coin','shield','boost','heal']; const type=types[Math.floor(r()*types.length)%types.length]; S.pickups.push(makePickup(type, r()*W, -20)); return S.pickups.length-1; }
    function applyPickup(p){ if(!p) return; if(p.type==='coin'){ S.coins++; S.score+=10; if(J)J.popup&&J.popup('+💰'); } else if(p.type==='shield'){ S.shield=Math.min(S.shield+1,3); if(J)J.popup&&J.popup('🛡'); } else if(p.type==='boost'){ S.boostTimer=8; if(J)J.popup&&J.popup('🚀'); } else if(p.type==='heal'){ S.lives=Math.min(S.lives+1,5); if(J)J.popup&&J.popup('❤'); } const idx=S.pickups.indexOf(p); if(idx>=0) S.pickups.splice(idx,1); }
    function updatePickups(dt){ const p=S.player; for(let i=S.pickups.length-1;i>=0;i--){ const pk=S.pickups[i]; pk.y+=pk.vy*dt; pk.life-=dt; const dx=pk.x-p.x, dy=pk.y-p.y; if(dx*dx+dy*dy < (pk.r+p.r)*(pk.r+p.r)){ applyPickup(pk); continue; } if(pk.life<=0 || pk.y>H+30) S.pickups.splice(i,1); } if(S.boostTimer>0) S.boostTimer=Math.max(0,S.boostTimer-dt); }
    function drawPickups(ctx){ for(const pk of S.pickups){ const sym=pk.type==='coin'?'💰':pk.type==='shield'?'🛡':pk.type==='boost'?'🚀':'❤'; ctx.save(); ctx.beginPath(); ctx.arc(pk.x,pk.y,pk.r+4,0,7); ctx.fillStyle='rgba(240,185,11,.15)'; ctx.fill(); ctx.strokeStyle='rgba(240,185,11,.6)'; ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='14px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(sym,pk.x,pk.y); ctx.restore(); } }
    function takeHit(){ if(S.shield>0){ S.shield--; if(J)J.flash&&J.flash('#02c076',.3); return; } S.lives--; }

    function reset(){ S=fresh(); syncHud(); }
    function start(){ reset(); S.running=true; S.over=false; if(overlay)overlay.style.display='none'; if(typeof Juice!=='undefined') Juice.sfx('click'); syncHud(); }
    function setRand(seed){ S.rng=mulberry32(seed>>>0); pickupRng=mk(seed>>>0); }

    function spawnBullet(x,y,vx,vy,r){ S.bullets.push({x,y,vx,vy,r:r||8}); }

    function update(dt){
      if(!S||!S.running||S.paused||S.over) return;
      const p=S.player;
      // 移动
      let dx=0,dy=0;
      if(S.keys.left)dx-=1; if(S.keys.right)dx+=1;
      if(S.keys.up)dy-=1; if(S.keys.down)dy+=1;
      const sp = 320 * (S.boostTimer>0?1.6:1);
      p.x+=dx*sp*dt; p.y+=dy*sp*dt;
      if(p.x<p.r)p.x=p.r; if(p.x>W-p.r)p.x=W-p.r;
      if(p.y<p.r)p.y=p.r; if(p.y>H-p.r)p.y=H-p.r;
      // 无敌帧
      if(p.invuln>0)p.invuln=Math.max(0,p.invuln-dt);
      // 弹幕生成（Boss 期间由 Boss 接管弹幕，抑制普通顶部刷弹）
      S.spawnTimer-=dt;
      if(S.spawnEnabled && !S.boss && S.spawnTimer<=0){
        const cfg=diffCfg();
        S.spawnTimer=(0.5 - Math.min(0.35, S.wave*0.03)) / cfg.rateMult;
        const n=Math.max(1, Math.round((2 + (S.wave%3)) * cfg.bulletMult));
        for(let i=0;i<n;i++){
          const x=S.rng()*W, speed=(120+S.wave*15) * cfg.speedMult;
          const ang=Math.PI/2 + (S.rng()-0.5)*0.8;
          spawnBullet(x,-10,Math.cos(ang)*speed,Math.sin(ang)*speed,8);
        }
      }
      // 弹幕移动
      for(const b of S.bullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
      // 碰撞
      if(p.invuln<=0){
        for(const b of S.bullets){
          const ddx=b.x-p.x, ddy=b.y-p.y;
          if(ddx*ddx+ddy*ddy<(b.r+p.r)*(b.r+p.r)){
            takeHit(); p.invuln=1.0; b.dead=true;
            if(J)J.flash&&J.flash('#f6465d');
            if(J){ J.burst(p.x,p.y,{color:'#f6465d',n:8}); J.addTrauma(0.25); }
            break;
          }
        }
      }
      S.bullets=S.bullets.filter(b=>!b.dead && b.x>-30 && b.x<W+30 && b.y>-30 && b.y<H+30);
      // 失败
      if(S.lives<=0){ S.over=true; S.running=false; showOver(); if(J){ J.sfx&&J.sfx('lose'); J.flash('#f6465d',0.3); J.achievement&&J.achievement('被弹幕吞没'); } }
      // Boss 更新（Boss 期间暂停时间累积推进，专心应对 Boss）
      if(S.boss){
        updateBoss(dt);
      } else {
        // 波次推进（生存满 DURATION）
        S.time+=dt;
        if(S.time>=DURATION){
          S.time-=DURATION; S.wave++; S.score+=50*S.wave;
          if(isBossWave(S.wave)){
            spawnBoss();
            if(J){ J.popup&&J.popup('⚠ BOSS 来袭'); J.sfx&&J.sfx('levelup'); }
          } else {
            if(J)J.popup&&J.popup('WAVE '+S.wave);
            if(J){ J.sfx&&J.sfx('levelup'); J.burst(S.player.x,S.player.y,{color:'#02c076',n:10}); }
          }
        }
      }
      updatePickups(dt);
      syncHud();
    }

    function getState(){
      return {
        score:S.score, wave:S.wave, lives:S.lives, time:+S.time.toFixed(3),
        running:S.running, over:S.over, spawnEnabled:S.spawnEnabled,
        coins:S.coins, shield:S.shield, boostTimer:+S.boostTimer.toFixed(3), pickups:S.pickups.length,
        player:{x:+S.player.x.toFixed(2),y:+S.player.y.toFixed(2),r:S.player.r,invuln:+S.player.invuln.toFixed(3)},
        bullets:S.bullets.map(b=>({x:+b.x.toFixed(2),y:+b.y.toFixed(2),r:b.r})),
        bulletCount:S.bullets.length,
        boss: S.boss?{x:+S.boss.x.toFixed(2),y:+S.boss.y.toFixed(2),r:S.boss.r,hp:+S.boss.hp.toFixed(1),maxhp:S.boss.maxhp,phase:S.boss.phase}:null
      };
    }

    window.__t={
      reset, start, update, getState, setRand,
      setPlayer(x,y){S.player.x=x;S.player.y=y;},
      setInvuln(v){S.player.invuln=v;},
      setTime(v){S.time=v;},
      setLives(n){S.lives=n;},
      setSpawnEnabled(v){S.spawnEnabled=!!v;},
      spawnBullet, clearBullets(){S.bullets=[];},
      setKeys(u,d,l,r){S.keys.up=!!u;S.keys.down=!!d;S.keys.left=!!l;S.keys.right=!!r;},
      // ---- 掉落/增益钩子 ----
      getPickups(){ return S.pickups.length; },
      getPickup(i){ return S.pickups[i]; },
      spawnPickup(a,b,c){ if(typeof a==='number') return spawnPickupAtRandom(a>>>0); S.pickups.push(makePickup(a,b,c)); return S.pickups.length-1; },
      spawnPickupAtRandom,
      applyPickup(i){ applyPickup(S.pickups[i]); },
      takeHit, getShield(){ return S.shield; }, setShield(v){ S.shield=v; },
      getCoins(){ return S.coins; }, setCoins(v){ S.coins=v; },
      getBoost(){ return S.boostTimer; }, setBoost(v){ S.boostTimer=v; },
      getLives(){ return S.lives; },
      // ---- 难度系统钩子 ----
      DIFFICULTY, setDifficulty, getDifficulty,
      // ---- Boss 系统钩子 ----
      BOSS_EVERY, isBossWave, spawnBoss, updateBoss,
      getBoss(){ return S.boss; }, setBoss(v){ S.boss=v; },
      setBossHp(v){ if(S.boss) S.boss.hp=v; },
      setWave(n){ S.wave=n; }
    };

    function render(){
      ctx.clearRect(0,0,W,H);
      for(const b of S.bullets){ ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fillStyle='#f6465d';ctx.fill(); }
      drawPickups(ctx);
      // Boss
      if(S.boss){
        const b=S.boss, bc=b.phase===2?'#f6465d':'#8a5cf0';
        ctx.strokeStyle=b.phase===2?'rgba(246,70,93,.5)':'rgba(138,92,240,.45)';
        ctx.lineWidth=4; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+7+(b.flash>0?4:0),0,7); ctx.stroke();
        ctx.fillStyle=b.flash>0?'#fff':bc;
        ctx.beginPath();
        for(let k=0;k<8;k++){ const pa=k/8*Math.PI*2-Math.PI/2, rr=b.r*(k%2===0?1:0.72);
          const px=b.x+Math.cos(pa)*rr, py=b.y+Math.sin(pa)*rr;
          if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='#0f0f14'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.34,0,7); ctx.fill();
        ctx.fillStyle=b.phase===2?'#ffcf5a':'#c3a6ff'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.16,0,7); ctx.fill();
        const bw=W*0.6, bx=(W-bw)/2, by=14;
        ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(bx-2,by-2,bw+4,12);
        ctx.fillStyle=bc; ctx.fillRect(bx,by,bw*Math.max(0,b.hp/b.maxhp),8);
        ctx.fillStyle='#fff'; ctx.font='11px system-ui'; ctx.textAlign='center';
        ctx.fillText('BOSS '+(b.phase===2?'· 狂暴':''), W/2, by+7); ctx.textAlign='left';
      }
      const p=S.player;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fillStyle=p.invuln>0?'#6b7785':'#02c076';ctx.fill();
    }

    const $=id=>document.getElementById(id);
    const overlay=$('overlay'); const startBtn=$('startBtn');
    function syncHud(){
      if($('score'))$('score').textContent=S.score;
      if($('wave'))$('wave').textContent=S.wave;
      if($('lives'))$('lives').textContent='♥'.repeat(Math.max(0,S.lives));
      if($('time'))$('time').textContent=S.time.toFixed(1)+'s';
    }
    function showOver(){
      if(overlay){overlay.style.display='flex';const h1=overlay.querySelector('h1');if(h1)h1.textContent='☠ 被弹幕吞没 · 得分 '+S.score;const b=overlay.querySelector('.start');if(b)b.textContent='再躲一次';}
    }
    function buildDiffBar(){
      const bar=$('diffbar'); if(!bar) return;
      bar.innerHTML='';
      DIFF_ORDER.forEach(k=>{
        const b=document.createElement('button');
        b.textContent=DIFFICULTY[k].label;
        if(k===difficulty) b.className='active';
        b.addEventListener('click',()=>{ setDifficulty(k); buildDiffBar(); });
        bar.appendChild(b);
      });
    }
    buildDiffBar();
    if(startBtn)startBtn.addEventListener('click',start);
    if($('pauseBtn'))$('pauseBtn').addEventListener('click',()=>{S.paused=!S.paused;});
    if($('muteBtn'))$('muteBtn').addEventListener('click',()=>{if(J&&J.toggleMute)J.toggleMute();});

    window.addEventListener('keydown',e=>{
      if(e.code==='ArrowLeft'||e.code==='KeyA')S.keys.left=true;
      if(e.code==='ArrowRight'||e.code==='KeyD')S.keys.right=true;
      if(e.code==='ArrowUp'||e.code==='KeyW')S.keys.up=true;
      if(e.code==='ArrowDown'||e.code==='KeyS')S.keys.down=true;
      if(e.code==='KeyP')S.paused=!S.paused;
    });
    window.addEventListener('keyup',e=>{
      if(e.code==='ArrowLeft'||e.code==='KeyA')S.keys.left=false;
      if(e.code==='ArrowRight'||e.code==='KeyD')S.keys.right=false;
      if(e.code==='ArrowUp'||e.code==='KeyW')S.keys.up=false;
      if(e.code==='ArrowDown'||e.code==='KeyS')S.keys.down=false;
    });
    let dragId=null;
    cv.addEventListener('pointerdown',e=>{dragId=e.pointerId;moveTo(e.clientX,e.clientY);});
    cv.addEventListener('pointermove',e=>{if(e.pointerId===dragId)moveTo(e.clientX,e.clientY);});
    const endD=e=>{if(e.pointerId===dragId)dragId=null;};
    cv.addEventListener('pointerup',endD);cv.addEventListener('pointercancel',endD);
    function moveTo(cx,cy){const r=cv.getBoundingClientRect();S.player.x=cx-r.left;S.player.y=cy-r.top;}

    reset();
    let last=0;
    function frame(t){
      const dt=Math.min(0.05,(t-last)/1000||0.016); last=t;
      update(dt); render();
      if(typeof requestAnimationFrame!=='undefined')requestAnimationFrame(frame);
    }
    if(typeof requestAnimationFrame!=='undefined')requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
