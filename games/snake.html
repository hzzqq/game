<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // SNAKE</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:
      radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.06), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,
      var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex;flex-direction:column;align-items:center;padding:18px 12px}
  .titlebar{width:min(520px,96vw);display:flex;align-items:center;gap:10px;padding:10px 16px;
    background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}

  .status{width:min(520px,96vw);display:flex;justify-content:space-between;align-items:center;
    background:#0e141d;border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:12px}
  .status .lab{color:var(--dim);font-size:11px;letter-spacing:1px}
  .status .num{font-size:24px;font-weight:700;letter-spacing:1px}
  .status .red{color:var(--red)} .status .gold{color:var(--gold)}
  .status .col{display:flex;flex-direction:column;align-items:center;gap:2px}

  .stage{width:min(520px,96vw);display:flex;justify-content:center}
  canvas{background:#0a0e14;border:1px solid var(--border);border-radius:6px;touch-action:none;display:block;width:100%;height:auto}

  .bar{width:min(520px,96vw);display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px;justify-content:center}
  .act{background:#0e141d;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 16px;cursor:pointer;font-family:inherit;font-size:13px}
  .act:hover{border-color:var(--dim)}
  .act.gold{color:var(--gold);border-color:rgba(240,185,11,.4)}

  #overlay{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;background:rgba(10,14,20,.92)}
  #overlay .box{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 40px;text-align:center;min-width:260px}
  #overlay h2{font-size:24px;margin-bottom:8px;letter-spacing:1px;color:var(--red)}
  #overlay .sub{color:var(--dim);font-size:12px;margin-bottom:14px}
  #overlay .score{font-size:40px;font-weight:700;color:var(--gold);margin-bottom:4px}
  #overlay .best{color:var(--dim);font-size:13px;margin-bottom:18px}
  #overlay .big{background:var(--red);color:#0a0e14;border:none;font-weight:700;padding:11px 28px;font-family:inherit;cursor:pointer;border-radius:8px;font-size:14px}

  #tip{width:min(520px,96vw);color:var(--dim);font-size:12px;margin-top:10px;text-align:center;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>SNAKE</b> · 贪吃蛇</span>
  </div>

  <div class="status">
    <div class="col"><span class="lab">SCORE</span><span class="num red" id="score">0</span></div>
    <div class="col"><span class="lab">BEST</span><span class="num gold" id="best">0</span></div>
    <div class="col"><span class="lab">SPEED</span><span class="num" id="spd">1.0x</span></div>
  </div>

  <div class="stage">
    <canvas id="cv" width="400" height="400"></canvas>
  </div>

  <div class="bar">
    <button class="act" id="pauseBtn">⏸ 暂停 (空格)</button>
    <button class="act gold" id="newBtn">↻ 新局</button>
  </div>

  <div id="tip">方向键 / WASD 转向 · 空格 / P 暂停 · 手机滑动转向 · 吃 ⚡加速 / 🛡护盾 / 💎宝石 · 撞墙或撞到自己即结束</div>

  <div id="overlay">
    <div class="box">
      <h2>GAME OVER</h2>
      <div class="sub" id="goSub">SESSION TERMINATED</div>
      <div class="score" id="goScore">0</div>
      <div class="best">BEST <span id="goBest">0</span></div>
      <button class="big" id="goBtn">新 局</button>
    </div>
  </div>

<script src="input.js"></script>
<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  var GRID = 20;
  var CELL = 20;                 // canvas 400 / 20
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');

  var scoreEl = document.getElementById('score');
  var bestEl  = document.getElementById('best');
  var spdEl   = document.getElementById('spd');
  var pauseBtn= document.getElementById('pauseBtn');
  var newBtn  = document.getElementById('newBtn');
  var overlay = document.getElementById('overlay');
  var goScore = document.getElementById('goScore');
  var goBest  = document.getElementById('goBest');
  var goSub   = document.getElementById('goSub');
  var goBtn   = document.getElementById('goBtn');

  var BEST_KEY = 'term_snake_best';

  var snake, dir, nextDir, food, score, best, alive, paused, level;
  var powerups=[], boostUntil=0, shieldUntil=0;
  var stepMs, acc, lastT, raf;

  function nowMs(){ return (typeof performance!=='undefined' && performance.now) ? performance.now() : 0; }

  try { best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch(e) { best = 0; }
  bestEl.textContent = best;

  function reset(){
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    level = 0;
    stepMs = 140;
    acc = 0;
    lastT = 0;
    alive = true;
    paused = false;
    powerups = [];
    boostUntil = 0;
    shieldUntil = 0;
    spawnFood();
    overlay.style.display = 'none';
    pauseBtn.textContent = '⏸ 暂停 (空格)';
    updateHud();
  }

  function updateHud(){
    scoreEl.textContent = score;
    bestEl.textContent = best;
    spdEl.textContent = (140/stepMs).toFixed(1) + 'x';
  }

  function occupied(x,y){
    for(var i=0;i<snake.length;i++){ if(snake[i].x===x && snake[i].y===y) return true; }
    return false;
  }

  function spawnFood(){
    var free = [];
    for(var y=0;y<GRID;y++){
      for(var x=0;x<GRID;x++){
        if(!occupied(x,y)) free.push({x:x,y:y});
      }
    }
    if(free.length===0){ food=null; return; }   // win-ish: board full
    food = free[Math.floor(Math.random()*free.length)];
    if(Math.random() < 0.18) spawnPowerup();
  }

  // 在空格随机掉落一个道具（最多同时存在 2 个，不与食物/蛇身重叠）
  function spawnPowerup(){
    if(powerups.length >= 2) return;
    var free = [];
    for(var y=0;y<GRID;y++){
      for(var x=0;x<GRID;x++){
        if(!occupied(x,y) && !(food && food.x===x && food.y===y)) free.push({x:x,y:y});
      }
    }
    if(free.length===0) return;
    var cell = free[Math.floor(Math.random()*free.length)];
    var types = ['speed','shield','gem'];
    powerups.push({ x:cell.x, y:cell.y, type:types[Math.floor(Math.random()*types.length)] });
  }

  // 拾取道具：返回 true 表示蛇身应增长一格（仅宝石）
  function applyPower(type, x, y){
    var px = x*CELL+CELL/2, py = y*CELL+CELL/2;
    if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); Juice.burst(px, py, {color:'#f0b90b', n:8, speed:160}); }
    if(type==='speed'){
      boostUntil = nowMs() + 5000;
      if(typeof Juice!=='undefined'){ Juice.popup(px, py, '⚡', '#f6465d', {size:16}); Juice.achievement('⚡ 加速 5s'); }
      return false;
    } else if(type==='shield'){
      shieldUntil = nowMs() + 4000;
      if(typeof Juice!=='undefined'){ Juice.popup(px, py, '🛡', '#02c076', {size:16}); Juice.achievement('🛡 护盾 4s'); }
      return false;
    } else { // gem：大幅加分并增长
      score += 5;
      if(score > best){ best = score; try { localStorage.setItem(BEST_KEY, String(best)); } catch(e){} }
      if(typeof Juice!=='undefined') Juice.popup(px, py, '+5', '#f0b90b', {size:16});
      updateHud();
      return true;
    }
  }

  function setDir(nx,ny){
    // cannot reverse directly into self
    if(snake.length>1 && nx===-dir.x && ny===-dir.y) return;
    nextDir = {x:nx,y:ny};
  }

  function step(){
    dir = nextDir;
    var head = snake[0];
    var nx = head.x + dir.x;
    var ny = head.y + dir.y;
    var ghost = nowMs() < shieldUntil;   // 护盾：可穿墙 + 穿身

    // wall：护盾状态下环绕穿过，否则结束
    if(nx<0 || ny<0 || nx>=GRID || ny>=GRID){
      if(ghost){ nx=(nx+GRID)%GRID; ny=(ny+GRID)%GRID; }
      else return gameOver();
    }
    // self collision：护盾状态下允许穿过自身
    if(occupied(nx,ny) && !ghost){ return gameOver(); }

    snake.unshift({x:nx,y:ny});

    // 道具拾取
    var ate = false;
    for(var pi=powerups.length-1; pi>=0; pi--){
      if(powerups[pi].x===nx && powerups[pi].y===ny){
        if(applyPower(powerups[pi].type, nx, ny)) ate = true;
        powerups.splice(pi,1);
        break;
      }
    }

    if(food && nx===food.x && ny===food.y){
      var fx = nx*CELL+CELL/2, fy = ny*CELL+CELL/2;
      score += 1;
      ate = true;
      Juice.sfx('pickup');
      Juice.popup(fx, fy, '+1', '#02c076');
      Juice.burst(fx, fy, {color:'#02c076', n:6, speed:140});
      if(score % 4 === 0 && level < 8){   // ramp speed, capped
        level += 1;
        stepMs = Math.max(60, 140 - level*10);
        Juice.sfx('levelup');
        Juice.achievement('加速 → '+(140/stepMs).toFixed(1)+'x');
      }
      if(score > best){ best = score; try { localStorage.setItem(BEST_KEY, String(best)); } catch(e){} }
      spawnFood();
      updateHud();
    }
    if(!ate) snake.pop();
  }

  function gameOver(){
    alive = false;
    if(score > best){ best = score; try { localStorage.setItem(BEST_KEY, String(best)); } catch(e){} }
    var rk = Juice.rank(score);
    Juice.sfx('lose');
    Juice.addTrauma(0.5);
    Juice.flash('#f6465d', 0.35);
    if(score > 0 && score >= best){ Juice.achievement('🏆 新纪录 '+score+'！段位 '+rk); }
    updateHud();
    goScore.textContent = score;
    goBest.textContent = best;
    goSub.textContent = (score>=best && score>0) ? ('NEW HIGH SCORE · 段位 '+rk) : ('SESSION TERMINATED · 段位 '+rk);
    overlay.style.display = 'flex';
  }

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.fillStyle = '#0a0e14';
    ctx.fillRect(0,0,cv.width,cv.height);
    Juice.begin(ctx);

    // grid lines
    ctx.strokeStyle = 'rgba(31,42,56,0.6)';
    ctx.lineWidth = 1;
    for(var i=1;i<GRID;i++){
      var p = i*CELL + 0.5;
      ctx.beginPath(); ctx.moveTo(p,0); ctx.lineTo(p,cv.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,p); ctx.lineTo(cv.width,p); ctx.stroke();
    }

    // food (gold) with glow
    if(food){
      ctx.save();
      ctx.shadowColor = '#f0b90b';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#f0b90b';
      roundRect(food.x*CELL+3, food.y*CELL+3, CELL-6, CELL-6, 4);
      ctx.fill();
      ctx.restore();
    }

    // 道具（带辉光 + 符号）
    for(var k=0;k<powerups.length;k++){
      var p = powerups[k];
      var pcol = p.type==='speed' ? '#f6465d' : (p.type==='shield' ? '#02c076' : '#f0b90b');
      var psym = p.type==='speed' ? '⚡' : (p.type==='shield' ? '🛡' : '💎');
      ctx.save();
      ctx.shadowColor = pcol; ctx.shadowBlur = 12; ctx.fillStyle = pcol;
      roundRect(p.x*CELL+3, p.y*CELL+3, CELL-6, CELL-6, 4);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#0a0e14';
      ctx.font = 'bold 12px JetBrains Mono, monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(psym, p.x*CELL+CELL/2, p.y*CELL+CELL/2+1);
    }

    // 当前激活的增益（左上角）
    var by = 8;
    if(nowMs() < boostUntil){ drawBuff('⚡', '#f6465d', by); by += 20; }
    if(nowMs() < shieldUntil){ drawBuff('🛡', '#02c076', by); by += 20; }

    // snake body (green) + head (red)
    for(var j=snake.length-1;j>=0;j--){
      var s = snake[j];
      if(j===0){
        ctx.fillStyle = '#f6465d';
        ctx.shadowColor = 'rgba(246,70,93,0.5)';
        ctx.shadowBlur = 10;
      } else {
        ctx.fillStyle = '#02c076';
        ctx.shadowBlur = 0;
      }
      roundRect(s.x*CELL+2, s.y*CELL+2, CELL-4, CELL-4, 4);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    Juice.mid(ctx);
    Juice.end(ctx);

    if(paused && alive){
      ctx.fillStyle = 'rgba(10,14,20,0.7)';
      ctx.fillRect(0,0,cv.width,cv.height);
      ctx.fillStyle = '#e6edf3';
      ctx.font = '700 26px JetBrains Mono, monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', cv.width/2, cv.height/2);
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawBuff(sym, col, y){
    ctx.save();
    ctx.fillStyle = col;
    ctx.font = 'bold 14px JetBrains Mono, monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(sym, 8, y);
    ctx.restore();
  }

  function loop(t){
    raf = requestAnimationFrame(loop);
    var dt = lastT ? Math.min(0.05,(t-lastT)/1000) : 0.016;
    Juice.update(dt);
    readInput();
    if(!alive || paused){ lastT = t; draw(); if(typeof Input!=='undefined') Input.update(); return; }
    if(!lastT) lastT = t;
    acc += (t - lastT);
    lastT = t;
    var ms = (nowMs() < boostUntil) ? Math.max(45, stepMs*0.55) : stepMs;
    while(acc >= ms){
      acc -= ms;
      step();
      if(!alive) break;
    }
    draw();
    if(typeof Input!=='undefined') Input.update();
  }

  function togglePause(){
    if(!alive) return;
    paused = !paused;
    pauseBtn.textContent = paused ? '▶ 继续 (空格)' : '⏸ 暂停 (空格)';
  }

  // ---- input (共享输入层 input.js：失焦清键 + 快速点按缓冲，修复断触) ----
  if (typeof Input !== 'undefined') {
    Input.init({ keymap: { 'Space':'pause', 'KeyP':'pause' } });
  }
  function readInput(){
    if (typeof Input === 'undefined') return;
    if (Input.pressed('pause')) togglePause();
    if (alive && !paused){
      if(Input.pressed('up')) setDir(0,-1);
      else if(Input.pressed('down')) setDir(0,1);
      else if(Input.pressed('left')) setDir(-1,0);
      else if(Input.pressed('right')) setDir(1,0);
    }
  }

  // swipe steering
  var tsx=0, tsy=0, tracking=false;
  cv.addEventListener('touchstart', function(e){
    var t = e.changedTouches[0];
    tsx = t.clientX; tsy = t.clientY; tracking = true;
    e.preventDefault();
  }, {passive:false});
  cv.addEventListener('touchmove', function(e){ e.preventDefault(); }, {passive:false});
  cv.addEventListener('touchend', function(e){
    if(!tracking) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - tsx, dy = t.clientY - tsy;
    if(Math.abs(dx)<20 && Math.abs(dy)<20){ tracking=false; return; }
    if(Math.abs(dx) > Math.abs(dy)){ setDir(dx>0?1:-1, 0); }
    else { setDir(0, dy>0?1:-1); }
    tracking = false;
    e.preventDefault();
  }, {passive:false});

  pauseBtn.addEventListener('click', togglePause);
  newBtn.addEventListener('click', reset);
  goBtn.addEventListener('click', reset);

  reset();
  raf = requestAnimationFrame(loop);

  // 测试钩子（不影响正常玩法）
  window.__t = {
    GRID,
    reset, step, spawnFood, spawnPowerup, applyPower, occupied, setDir, nowMs,
    setSnake(arr) { snake = arr.map(p => ({ x: p.x, y: p.y })); },
    setFood(obj) { food = obj ? { x: obj.x, y: obj.y } : null; },
    setPowerups(arr) { powerups = (arr||[]).map(p => ({ x:p.x, y:p.y, type:p.type })); },
    getPowerups() { return powerups.map(p => ({ x:p.x, y:p.y, type:p.type })); },
    getSnake() { return snake.map(p => ({ x: p.x, y: p.y })); },
    getFood() { return food ? { x: food.x, y: food.y } : null; },
    getScore() { return score; },
    getAlive() { return alive; },
    getBoost() { return nowMs() < boostUntil; },
    getShield() { return nowMs() < shieldUntil; },
    getDir() { return { x: dir.x, y: dir.y }; }
  };
})();
</script>
</body>
</html>
