<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 涂鸦跳跃 DOODLE JUMP</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(2,192,118,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(400px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--green)}
  .wrap{width:min(400px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .sc{color:var(--gold);font-weight:700}.hud .st{color:var(--green);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px;display:block;touch-action:none}
  .controls{display:flex;gap:8px}
  .controls button{flex:1;background:var(--green);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.over{color:var(--red);font-weight:700}
  .foot{width:min(400px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
  .diffbar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .diffbar button{background:var(--panel);color:var(--dim);border:1px solid var(--border);border-radius:8px;padding:6px 13px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px}
  .diffbar button.active{background:var(--gold);color:#0a0e14;border-color:var(--gold)}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>涂鸦跳跃</b> DOODLE JUMP</span></div>
  <div class="wrap">
    <div class="hud"><span>得分 <span class="sc" id="score">0</span></span><span>状态 <span class="st" id="st">进行中</span></span></div>
    <div class="boardwrap"><canvas id="cv" width="400" height="600"></canvas></div>
    <div class="controls">
      <button id="left">◀ 左</button>
      <button id="right">右 ▶</button>
      <button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="diffbar" id="diffbar"></div>
    <div class="msg" id="msg">小人自动跳上平台，越往上分数越高；掉出屏幕底部即失败。捡道具：🌀弹簧跳更高 · 🚀火箭升空 · 🛡护盾免一次坠落 · ⭐星星加分。</div>
  </div>
  <div class="foot">Doodle Jump（涂鸦跳跃）：自动跳跃穿越平台，向上攀登刷新高度分；收集增益道具助你飞得更高。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;

  // 视口：只用 window.innerWidth/innerHeight，带兜底避免 NaN（harness 取 800/600）
  const W = (typeof window!=='undefined' && window.innerWidth) ? Math.min(window.innerWidth, 400) : 400;
  const H = (typeof window!=='undefined' && window.innerHeight) ? Math.min(window.innerHeight, 600) : 600;

  // 局部种子 PRNG（mulberry32）：所有随机必须走它，禁止裸 Math.random
  function mk(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0xd00d1e);
  function setRand(fn){ if(typeof fn==='function') _rng = fn; }
  function reseed(s){ _rng = mk((s>>>0) || 1); }

  // 物理 / 玩法常量
  const R = 14;                 // 玩家半径
  const GRAVITY = 1400;         // px/s^2
  const JUMP_V = -640;          // 普通起跳速度（向上为负）
  const SPRING_V = -1100;       // 弹簧强力起跳
  const ROCKET_V = -640;        // 火箭持续上升速度
  const ROCKET_DUR = 3.0;       // 火箭持续秒数
  const STAR_VALUE = 50;        // 星星加分
  const START_Y = 200;          // 玩家起始世界 y（向下为正）
  const PLAT_W = 60, PLAT_H = 12;

  // ---------- 难度系统（倍率法，normal=1.0 保持经典手感）----------
  const DIFFICULTY = {
    easy:   { label:'简单', speedMult:0.75, countMult:0.7, bossHpMult:0.7 },
    normal: { label:'普通', speedMult:1.0,  countMult:1.0, bossHpMult:1.0 },
    hard:   { label:'困难', speedMult:1.25, countMult:1.3, bossHpMult:1.4 },
    hell:   { label:'地狱', speedMult:1.5,  countMult:1.7, bossHpMult:1.9 }
  };
  const DIFF_ORDER = ['easy','normal','hard','hell'];
  let difficulty = 'normal';
  function diffCfg(){ return DIFFICULTY[difficulty] || DIFFICULTY.normal; }
  function setDifficulty(d){ if(!DIFFICULTY[d]) return; difficulty=d; reset(); if(typeof buildDiffBar==='function') buildDiffBar(); }
  function getDifficulty(){ return difficulty; }
  // 重力随 speedMult 缩放（越高难度下落越快）；普通档不变 = 1400
  function curGravity(){ return GRAVITY * diffCfg().speedMult; }
  // 危险平台概率（倍率法）：破碎平台非致命仍可弹跳；尖刺平台致命且仅困难/地狱出现
  const HAZARD_BREAK_BASE = 0.12;   // 普通档破碎平台基础概率（非致命，保持经典手感）
  const HAZARD_SPIKE_BASE = 0.18;   // 尖刺基础系数（仅 countMult>1 时生效）
  function breakProb(){ return HAZARD_BREAK_BASE * diffCfg().countMult; }
  function spikeProb(){ return Math.max(0, diffCfg().countMult - 1.0) * HAZARD_SPIKE_BASE; }

  // ---------- 生存型 Boss 系统（每 BOSS_EVERY 高度里程碑出现，向上跳跃类无射击适配）----------
  // Boss 悬停在屏幕顶部拦截，向下砸落石块攻击；玩家持续上升使 boss.hp 递减，归零即击败并奖励。
  const BOSS_EVERY = 3;                 // 每 3 个高度里程碑出一次 Boss
  const SCORE_PER_MILESTONE = 200;      // 每个高度里程碑对应的分数推进（高度代理）
  const BOSS_SCREEN_Y = 64;             // Boss 悬停的屏幕 y
  const BOSS_DRAIN = 0.16;              // 每世界单位攀爬削减的 boss hp
  const BOSS_ROCK_R = 12;               // 坠落石块半径
  const BOSS_REWARD = 100;              // 击败奖励 = BOSS_REWARD * wave
  function isBossWave(w){ return w > 0 && (w % BOSS_EVERY) === 0; }

  // 核心状态（普通 JS 变量，逻辑脱离 DOM）
  let player, platforms, cam, score, maxClimbY, gameOver, pickups, spawnTimer;
  let confettiFx = 0;       // 成就命中次数（只读钩子 confettiFired）
  function milestoneFire(){ confettiFx++; if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4}); }
  let boss = null;                      // 生存型 Boss：{x,y,w,h,hp,maxHp,phase,dir,vx,fireT,climbRef}
  let wave = 0;                         // 当前高度里程碑（=Boss 波计数）
  let bossWaveMark = -1;                // 已为哪个里程碑生成过 Boss（避免重复触发）
  let bossRocks = [];                   // Boss 砸落的石块（世界坐标）

  // ---------- 拾取增益道具系统（注入式，不改跳跃物理/计分公式本身）----------
  const PICKUP_TYPES = ['spring','rocket','shield','star'];
  const PICKUP_PROB = 0.18;     // 新生成平台携带道具的概率
  const PICKUP_VY = 0;          // 道具静止于世界坐标，随世界滚动（由 cam 渲染偏移）
  const PICKUP_LIFE = 12;       // 道具存活秒数（兜底清理）
  const SYM = { spring:'🌀', rocket:'🚀', shield:'🛡', star:'⭐' };
  function makePickup(type, x, y){
    return { type:type, x:x, y:y, r:13, sym:SYM[type]||'★', life:PICKUP_LIFE, vy:PICKUP_VY };
  }
  function spawnPickupAtRandom(plat){
    const type = PICKUP_TYPES[(_rng()*PICKUP_TYPES.length)|0];
    pickups.push(makePickup(type, plat.x + plat.w/2, plat.y - 16));
  }
  function applyPickup(type){
    if(type && typeof type==='object') type = type.type;   // 兼容对象式调用
    if(type==='spring'){ player.vy = SPRING_V; if(J) J.sfx&&J.sfx('pickup'); }
    else if(type==='rocket'){ player.rocketTimer = ROCKET_DUR; if(J) J.sfx&&J.sfx('pickup'); }
    else if(type==='shield'){ player.shield = (player.shield||0)+1; if(J) J.sfx&&J.sfx('pickup'); }
    else if(type==='star'){ score += STAR_VALUE; if(J) J.sfx&&J.sfx('pickup'); }
  }
  function stepPickups(dt){
    for(let i=pickups.length-1;i>=0;i--){
      const p = pickups[i];
      if(p.vy) p.y += p.vy*dt;
      p.life -= dt;
      // 玩家接触拾取（世界坐标直接比对）
      if(Math.abs(p.x - player.x) < player.r + p.r && Math.abs(p.y - player.y) < player.r + p.r){
        applyPickup(p.type); pickups.splice(i,1); continue;
      }
      if(p.life <= 0 || (p.y - cam) > H + 80){ pickups.splice(i,1); }
    }
  }

  // ---------- 生存型 Boss：悬停拦截 + 周期攻击 + 上升削减 HP ----------
  function spawnBoss(){
    const cfg = diffCfg();
    const maxHp = Math.round((28 + wave*6) * (cfg.bossHpMult || 1));
    boss = {
      x: W/2, y: BOSS_SCREEN_Y, w: Math.round(W*0.34), h: 46,
      hp: maxHp, maxHp: maxHp, phase: 1,
      vx: (90 + wave*8) * cfg.speedMult, dir: 1,
      fireT: 1.0, climbRef: START_Y - maxClimbY
    };
    bossRocks = [];
    bossWaveMark = wave;
    if(J) J.flash && J.flash('#f0b90b', .3);
    if(J) J.sfx && J.sfx('levelup');
  }
  // 返回 true 表示本帧 Boss 被击败
  function updateBoss(dt){
    if(!boss) return false;
    const cfg = diffCfg();
    // 半血进入 phase2：移动更快、攻击更密
    if(boss.phase === 1 && boss.hp <= boss.maxHp/2){
      boss.phase = 2; boss.vx *= 1.4;
      if(J) J.flash && J.flash('#f6465d', .3);
    }
    // 横向巡逻 + 边界反弹
    boss.x += boss.vx * boss.dir * dt;
    if(boss.x < boss.w/2){ boss.x = boss.w/2; boss.dir = 1; }
    else if(boss.x > W - boss.w/2){ boss.x = W - boss.w/2; boss.dir = -1; }
    // 周期砸落石块
    boss.fireT -= dt;
    if(boss.fireT <= 0){
      boss.fireT = (boss.phase === 2 ? 0.6 : 1.0) / cfg.speedMult;
      const rx = boss.x + (boss.w*0.5) * (_rng()*2 - 1);
      bossRocks.push({ x: rx, y: cam + boss.y + boss.h, vy: 150 + wave*8, r: BOSS_ROCK_R });
    }
    // 石块下落 + 命中玩家（护盾优先消耗，无盾判负）
    for(let i=bossRocks.length-1;i>=0;i--){
      const rk = bossRocks[i];
      rk.y += rk.vy * dt;
      if(Math.abs(rk.x - player.x) < player.r + rk.r && Math.abs(rk.y - player.y) < player.r + rk.r){
        takeBossHit(); bossRocks.splice(i,1); continue;
      }
      if(rk.y - cam > H + 40) bossRocks.splice(i,1);
    }
    // 玩家上升使 boss.hp 递减（高度推进）：climb 随攀爬递增
    const climbNow = START_Y - maxClimbY;
    const gain = Math.max(0, climbNow - boss.climbRef);
    boss.climbRef = climbNow;
    boss.hp -= gain * BOSS_DRAIN;
    // 击败：奖励 + 掉落 + 清空
    if(boss.hp <= 0){
      score += BOSS_REWARD * wave;
      pickups.push(makePickup('rocket', boss.x, cam + boss.y));   // 掉落 🚀 助力继续上升
      milestoneFire();   // 击败 Boss 也是正反馈成就
      if(J) J.flash && J.flash('#02c076', .3);
      if(J) J.sfx && J.sfx('win');
      boss = null; bossRocks = [];
      return true;
    }
    return false;
  }
  // Boss 命中玩家：护盾优先消耗并救援，无盾才判负（不改坠落逻辑）
  function takeBossHit(){
    if(player.shield > 0){
      player.shield--;
      if(J) J.flash && J.flash('#02c076', .3);
      if(J) J.sfx && J.sfx('hit');
    } else {
      gameOver = true;
      if(J) J.sfx && J.sfx('lose');
      if(J) J.best && J.best('doodlejump', score);
    }
  }

  // ---------- 平台生成（向上无限延伸，携带随机掉落）----------
  function ensurePlatforms(){
    let topY = Infinity;
    for(const p of platforms) if(p.y < topY) topY = p.y;
    if(!isFinite(topY)) topY = START_Y;
    while(topY > cam - 200){
      const gap = 50 + _rng()*50;
      topY -= gap;
      const x = _rng()*(W - PLAT_W);
      const plat = { x:x, y:topY, w:PLAT_W, type:'normal' };
      // 危险平台（倍率法）：尖刺优先于破碎，二者均随 countMult 提升
      const sp = spikeProb(), bp = breakProb();
      const rr = _rng();
      if(rr < sp) plat.type = 'spike';
      else if(rr < sp + bp) plat.type = 'broken';
      platforms.push(plat);
      if(_rng() < PICKUP_PROB) spawnPickupAtRandom(plat);
    }
  }
  function cullPlatforms(){
    platforms = platforms.filter(p => (p.y - cam) <= H + 80 && !p.broken);
  }

  function reset(seed){
    if(typeof seed==='number' && !isNaN(seed)) _rng = mk(seed>>>0);
    platforms = [];
    pickups = [];
    spawnTimer = 0;
    score = 0; maxClimbY = START_Y; gameOver = false;
    confettiFx = 0;
    boss = null; bossRocks = []; wave = 0; bossWaveMark = -1;   // Boss 状态复位
    player = { x: W/2, y: START_Y, vy: JUMP_V, r: R, shield: 0, rocketTimer: 0 };
    cam = player.y - H*0.7;
    platforms.push({ x: W/2 - PLAT_W/2, y: START_Y + 18, w: PLAT_W, type:'normal' }); // 起始平台
    ensurePlatforms();
    return getState();
  }
  function newGame(seed){ return reset(seed); }

  // 仅横向移动（核心玩法：玩家只能左右，跳跃由落地自动触发）
  function move(dir){
    if(gameOver) return;
    player.x += dir * 6;
    if(player.x < 0) player.x += W;
    if(player.x > W) player.x -= W;
  }

  function updateScore(){
    if(player.y < maxClimbY){
      const gain = Math.floor((maxClimbY - player.y)/10);
      if(gain > 0){ score += gain; maxClimbY = player.y; }
    }
  }

  // 推进一帧模拟
  function step(dt){
    if(gameOver) return;
    dt = dt || 0.016;

    // 火箭：持续上升，覆盖重力与落地
    if(player.rocketTimer > 0){
      player.rocketTimer -= dt;
      player.vy = ROCKET_V;
    } else {
      player.vy += curGravity() * dt;
    }
    const prevFeet = player.y + player.r;        // 上一帧脚底（用于落地扫掠）
    player.y += player.vy * dt;

    // 相机只向上跟随（玩家下落时不动，从而掉出底部判负）
    const targetCam = player.y - H*0.4;
    if(targetCam < cam) cam = targetCam;

    // 落地检测：向下运动且脚底扫过某平台顶面
    if(player.vy > 0){
      const feetNow = player.y + player.r;
      for(const p of platforms){
        if(p.type==='spike'){
          // 尖刺平台：接触即受伤（护盾优先消耗并弹开；无盾坠落判负），不提供弹跳
          if(player.x + player.r > p.x && player.x - player.r < p.x + p.w){
            if(prevFeet <= p.y + 2 && feetNow >= p.y){
              if(player.shield > 0){
                player.shield--;
                player.y = p.y - player.r; player.vy = JUMP_V;
                if(J) J.flash&&J.flash('#f6465d', .3);
                if(J) J.sfx&&J.sfx('hit');
              } else {
                gameOver = true;
                if(J) J.sfx&&J.sfx('lose');
                if(J) J.best&&J.best('doodlejump', score);
              }
              break;
            }
          }
          continue;
        }
        if(player.x + player.r > p.x && player.x - player.r < p.x + p.w){
          if(prevFeet <= p.y + 2 && feetNow >= p.y){
            player.y = p.y - player.r;
            player.vy = JUMP_V;
            if(p.type==='broken') p.broken = true;  // 落地后破碎，稍后移除
            break;
          }
        }
      }
    }

    ensurePlatforms();
    cullPlatforms();
    updateScore();
    stepPickups(dt);

    // Boss 分支 / 高度里程碑推进
    if(boss){
      updateBoss(dt);   // 击败后才恢复普通生成
    } else {
      // 以分数（高度代理）计里程碑；每 BOSS_EVERY 个里程碑出一次 Boss
      const ms = Math.floor(score / SCORE_PER_MILESTONE);
      if(ms > wave){ wave = ms; milestoneFire(); }
      if(wave > 0 && isBossWave(wave) && wave !== bossWaveMark) spawnBoss();
    }

    // 坠落失败：玩家掉出屏幕底部；护盾优先消耗并救援，无盾才判负
    if(player.y - cam > H + player.r){
      if(player.shield > 0){
        player.shield--;
        player.y = cam + H*0.5;
        player.vy = JUMP_V;
        if(J) J.flash&&J.flash('#02c076', .3);
        if(J) J.sfx&&J.sfx('hit');
      } else {
        gameOver = true;
        if(J) J.sfx&&J.sfx('lose');
        if(J) J.best&&J.best('doodlejump', score);
      }
    }
  }

  function isGameOver(){ return gameOver; }
  function getScore(){ return score; }
  function getState(){
    return {
      player: { x:player.x, y:player.y, vy:player.vy, r:player.r },
      cam: cam, score, gameOver,
      shield: player.shield, rocketTimer: player.rocketTimer,
      platformCount: platforms.length,
      pickups: pickups.map(p=>({ type:p.type, x:+p.x.toFixed(2), y:+p.y.toFixed(2) })),
    };
  }

  // ---- 测试辅助 setter（不影响核心玩法，便于确定性测试）----
  function setPlayerX(v){ player.x = v; }
  function setPlayerY(v){ player.y = v; }
  function setVY(v){ player.vy = v; }
  function triggerFall(){ player.y = cam + H + 100; }   // 把玩家推到屏幕底外，触发坠落判定

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv = $('cv'); if(!cv) return;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const sy = (wy) => wy - cam;   // 世界 y -> 屏幕 y

    // 平台（含危险平台绘制）
    for(const p of platforms){
      const y = sy(p.y);
      if(y < -PLAT_H || y > H) continue;
      if(p.type==='spike'){
        ctx.fillStyle = '#5a2530';
        ctx.fillRect(p.x, y, p.w, PLAT_H);
        ctx.fillStyle = '#f6465d';
        for(let sx=p.x+5; sx<p.x+p.w-2; sx+=8){
          ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx+4, y-7); ctx.lineTo(sx+8, y); ctx.closePath(); ctx.fill();
        }
      } else if(p.type==='broken'){
        ctx.fillStyle = '#4a3a2a';
        ctx.fillRect(p.x, y, p.w, PLAT_H);
        ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(p.x+p.w*0.42, y); ctx.lineTo(p.x+p.w*0.5, y+PLAT_H); ctx.stroke();
      } else {
        ctx.fillStyle = '#3a4a5e';
        ctx.fillRect(p.x, y, p.w, PLAT_H);
      }
    }

    // 道具（玩家之前绘制：辉光圆 + emoji）
    for(const p of pickups){
      const px = p.x, py = sy(p.y);
      if(py < -20 || py > H + 20) continue;
      ctx.save();
      ctx.beginPath(); ctx.arc(px, py, p.r + 4, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,.08)'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,207,90,.7)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = '16px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.sym, px, py);
      ctx.restore();
    }

    // Boss（生存型：多边形怪物 + 顶部血条）+ 砸落石块（只改绘制层）
    for(const rk of bossRocks){
      const ry = sy(rk.y);
      if(ry < -20 || ry > H + 20) continue;
      ctx.fillStyle = '#caa15a';
      ctx.beginPath(); ctx.arc(rk.x, ry, rk.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.lineWidth = 1; ctx.stroke();
    }
    if(boss){
      const bc = boss.phase===2 ? '#f6465d' : '#9b6bff';
      const bx = boss.x - boss.w/2, by = boss.y;
      ctx.save();
      ctx.shadowColor = bc; ctx.shadowBlur = 14; ctx.fillStyle = bc;
      // 锯齿多边形怪物本体
      const teeth = 6;
      ctx.beginPath();
      ctx.moveTo(bx, by + boss.h*0.5);
      for(let k=0;k<=teeth;k++){
        const tx = bx + boss.w*(k/teeth);
        const ty = (k%2===0) ? by : by + boss.h;
        ctx.lineTo(tx, ty);
      }
      ctx.lineTo(bx + boss.w, by + boss.h*0.5);
      ctx.closePath(); ctx.fill();
      // 眼睛
      ctx.shadowBlur = 0; ctx.fillStyle = '#0a0e14';
      ctx.beginPath(); ctx.arc(boss.x - boss.w*0.12, by + boss.h*0.42, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(boss.x + boss.w*0.12, by + boss.h*0.42, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = boss.phase===2 ? '#ffcf5a' : '#c3a6ff';
      ctx.beginPath(); ctx.arc(boss.x - boss.w*0.12, by + boss.h*0.42, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(boss.x + boss.w*0.12, by + boss.h*0.42, 2, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // 顶部血条
      const barW = W - 40, barX = 20, barY = 6, frac = Math.max(0, boss.hp/boss.maxHp);
      ctx.fillStyle = '#2a2f3a'; ctx.fillRect(barX, barY, barW, 5);
      ctx.fillStyle = boss.phase===2 ? '#f6465d' : '#f0b90b'; ctx.fillRect(barX, barY, barW*frac, 5);
      ctx.fillStyle = '#fff'; ctx.font = '10px JetBrains Mono, monospace'; ctx.textAlign = 'center';
      ctx.fillText('BOSS' + (boss.phase===2 ? ' · 狂暴' : ''), W/2, barY + 16);
      ctx.textAlign = 'left';
    }

    // 玩家
    const py = sy(player.y);
    ctx.fillStyle = player.rocketTimer > 0 ? '#f0b90b' : '#02c076';
    ctx.beginPath(); ctx.arc(player.x, py, player.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2; ctx.stroke();
    // 护盾环
    if(player.shield > 0){
      ctx.strokeStyle = 'rgba(2,192,118,.85)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(player.x, py, player.r + 6, 0, Math.PI*2); ctx.stroke();
    }

    const sc = $('score'); if(sc) sc.textContent = String(score);
    const st = $('st'); if(st) st.textContent = gameOver ? '结束' : '进行中';
    const msg = $('msg'); if(msg){ if(gameOver){ msg.className='msg over'; msg.textContent='💀 掉出屏幕，游戏结束 · 得分 '+score+' · 刷新重开'; } else msg.className='msg'; }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const l=$('left'), r=$('right'), n=$('new');
    if(l) l.onclick = () => { move(-1); render(); };
    if(r) r.onclick = () => { move(1); render(); };
    if(n) n.onclick = () => { reset(); render(); };
    if(typeof document!=='undefined'){
      document.addEventListener('keydown', e => {
        if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A'){ move(-1); render(); }
        if(e.key==='ArrowRight'|| e.key==='d' || e.key==='D'){ move(1); render(); }
      });
    }
  }
  function buildDiffBar(){
    if(typeof document==='undefined') return;
    const bar = $('diffbar'); if(!bar) return;
    bar.innerHTML = '';
    DIFF_ORDER.forEach(function(k){
      const b = document.createElement('button');
      b.textContent = DIFFICULTY[k].label;
      if(k === difficulty) b.className = 'active';
      b.addEventListener('click', function(){ setDifficulty(k); reset(); buildDiffBar(); });
      bar.appendChild(b);
    });
  }
  function loop(){
    step(0.016); render(); uiTick();
    if(typeof document!=='undefined') requestAnimationFrame(loop);
  }
  function uiTick(){ /* HUD 已在 render 内更新，占位保持结构一致 */ }

  reset();
  if(typeof document!=='undefined'){ bindUI(); buildDiffBar(); if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', render); else render(); loop(); }
  if(typeof window!=='undefined'){
    window.__t = {
      W, H, R, START_Y, PLAT_W, JUMP_V, SPRING_V, ROCKET_V, ROCKET_DUR, STAR_VALUE, GRAVITY,
      PICKUP_TYPES, PICKUP_PROB,
      setRand, reseed, newGame, reset, step, move, isGameOver, getScore, getState,
      setPlayerX, setPlayerY, setVY, triggerFall,
      getPlatforms:()=>platforms.map(p=>({x:p.x,y:p.y,w:p.w,type:p.type,broken:!!p.broken})),
      setPlatforms:(arr)=>{ platforms = (arr||[]).map(p=>({x:p.x,y:p.y,w:p.w,type:p.type||'normal',broken:false})); },
      // ---- 难度系统钩子（倍率法）----
      DIFFICULTY, DIFF_ORDER, setDifficulty, getDifficulty, diffCfg,
      getGravity: curGravity, getBreakProb: breakProb, getSpikeProb: spikeProb,
      // ---- 拾取增益道具系统钩子 ----
      spawnPickup:(type,x,y)=>{ pickups.push(makePickup(type, x, y)); },
      getPickups:()=>pickups.length,
      getShield:()=>player.shield, setShield:(v)=>{ player.shield=v; },
      getRocket:()=>player.rocketTimer, setRocket:(v)=>{ player.rocketTimer=v; },
      applyPickup, stepPickups,
      // ---- 生存型 Boss 系统钩子 ----
      BOSS_EVERY, SCORE_PER_MILESTONE, isBossWave, spawnBoss, updateBoss,
      getBoss:()=> boss ? { x:boss.x, y:boss.y, w:boss.w, h:boss.h, hp:boss.hp, maxHp:boss.maxHp, phase:boss.phase, dir:boss.dir, climbRef:boss.climbRef } : null,
      setBossHp:(v)=>{ if(boss) boss.hp = v; },
      setBossPhase:(v)=>{ if(boss) boss.phase = v; },
      setWave:(v)=>{ wave = v; },
      getWave:()=>wave,
      getBossWaveMark:()=>bossWaveMark,
      getRocks:()=>bossRocks.length,
      takeBossHit,
      confettiFired:()=>confettiFx,
    };
  }
})();
</script>
</body>
</html>
