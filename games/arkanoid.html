<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TERMINAL // ARKANOID</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --sub:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  .window{
    position:relative;
    width:820px; max-width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    overflow:hidden;
  }
  .window::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:5;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 3px),
      linear-gradient(0deg, rgba(31,42,56,.05), rgba(31,42,56,.05));
    mix-blend-mode:screen;
  }
  .titlebar{
    display:flex; align-items:center; gap:10px;
    height:40px; padding:0 14px;
    background:linear-gradient(180deg,#161d28,#10151d);
    border-bottom:1px solid var(--border);
    position:relative; z-index:6;
  }
  .dots{ display:flex; gap:8px; }
  .dot{ width:12px; height:12px; border-radius:50%; }
  .dot.r{ background:#ff5f56; } .dot.y{ background:#ffbd2e; } .dot.g{ background:#27c93f; }
  .title{
    flex:1; text-align:center; font-size:13px; letter-spacing:2px;
    color:var(--text);
  }
  .title .accent{ color:var(--red); }
  .bar-btns{ display:flex; gap:8px; }
  button{
    font-family:inherit; font-size:12px; cursor:pointer;
    border-radius:6px; padding:6px 12px; border:1px solid var(--border);
    background:transparent; color:var(--text); transition:all .15s;
  }
  button:hover:not(:disabled){ border-color:var(--red); }
  button:disabled{ opacity:.35; cursor:default; }
  .btn-main{
    background:var(--red); color:#0a0e14; border-color:var(--red); font-weight:700;
    box-shadow:0 0 12px rgba(246,70,93,.35);
  }
  .btn-main:hover:not(:disabled){ filter:brightness(1.1); }
  .stage{ position:relative; z-index:6; padding:14px; background:var(--bg); }
  canvas{
    display:block; margin:0 auto;
    border:1px solid var(--border); border-radius:6px;
    background:var(--bg); cursor:crosshair;
    max-width:100%; height:auto;
    touch-action:none; -ms-touch-action:none;
  }
  .hint{
    margin-top:10px; text-align:center; font-size:11px; color:var(--sub);
    letter-spacing:1px;
  }
  .diffbar{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
  .diffbar button{ background:var(--panel,#121821); color:var(--sub,#6b7785); border:1px solid var(--border); border-radius:8px; padding:6px 13px; font-weight:700; cursor:pointer; font-family:inherit; font-size:12px; }
  .diffbar button.active{ background:var(--gold,#f0b90b); color:#0a0e14; border-color:var(--gold,#f0b90b); }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="dots">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      </div>
      <div class="title">TERMINAL <span class="accent">//</span> ARKANOID</div>
      <div class="bar-btns">
        <button id="pauseBtn" disabled>暂停</button>
        <button id="startBtn" class="btn-main">开始游戏</button>
      </div>
    </div>
    <div class="stage">
      <canvas id="game" width="780" height="540"></canvas>
      <div class="hint">鼠标 / ←→ / 触屏拖动 移动挡板 · 接住掉落道具（🔴多球 / 🟦加长挡板 / 🐢慢速球）· 打碎所有砖块过关</div>
      <div class="diffbar" id="diffbar"></div>
    </div>
  </div>

<script src="input.js"></script>
<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const FONT = "'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace";
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const HUD_H = 46;
  const STEP = 1000/60;

  const C = {
    bg:'#0a0e14', panel:'#121821', border:'#1f2a38',
    text:'#e6edf3', sub:'#6b7785',
    red:'#f6465d', green:'#02c076', gold:'#f0b90b'
  };

  // ---- 状态 ----
  let score=0, level=1, lives=3;
  let high = loadHigh();
  let state='menu'; // menu | ready | playing | paused | levelcomplete | gameover
  let now = (typeof performance!=='undefined') ? performance.now() : Date.now();
  let levelClearTime=0;
  let shakeTime=0;
  let _confettiFired=false; // 通关 confetti 已触发（独立于 Juice 的只读测试锁）
  const baseSpeed = 4.2;

  // ---------- 难度系统（简单/普通/困难/地狱）----------
  const DIFFICULTY = {
    easy:   { label:'简单', spdMult:0.82, rowBonus:0, capBonus:0 },
    normal: { label:'普通', spdMult:1.0,  rowBonus:0, capBonus:0 },
    hard:   { label:'困难', spdMult:1.2,  rowBonus:1, capBonus:1.5 },
    hell:   { label:'地狱', spdMult:1.45, rowBonus:2, capBonus:3 }
  };
  const DIFF_ORDER = ['easy','normal','hard','hell'];
  let difficulty = 'normal';
  function setDifficulty(d){ if(DIFFICULTY[d]){ difficulty=d; return true; } return false; }
  function getDifficulty(){ return difficulty; }
  function diffCfg(){ return DIFFICULTY[difficulty] || DIFFICULTY.normal; }

  const paddle = { baseW:110, w:110, h:12, x:0, y:H-34 };
  paddle.x = W/2 - paddle.w/2;

  let balls=[];
  let bricks=[];
  let particles=[];

  let keyLeft=false, keyRight=false;

  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  // ---- 工具 ----
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function loadHigh(){
    try{ return parseInt(localStorage.getItem('arkanoid_high')||'0',10)||0; }
    catch(e){ return 0; }
  }
  function saveHigh(){
    try{ localStorage.setItem('arkanoid_high', String(high)); }catch(e){}
  }
  function setState(s){ state=s; updateUI(); }
  function updateUI(){
    if(state==='menu'){ startBtn.textContent='开始游戏'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
    else if(state==='ready'){ startBtn.textContent='发射'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
    else if(state==='playing'){ startBtn.textContent='重新开始'; pauseBtn.disabled=false; pauseBtn.textContent='暂停'; }
    else if(state==='paused'){ startBtn.textContent='重新开始'; pauseBtn.disabled=false; pauseBtn.textContent='继续'; }
    else if(state==='levelcomplete'){ startBtn.textContent='下一关'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
    else if(state==='gameover'){ startBtn.textContent='重新开始'; pauseBtn.disabled=true; pauseBtn.textContent='暂停'; }
  }

  function targetSpeed(){
    const cfg = diffCfg();
    let s = (baseSpeed + (level-1)*0.5) * cfg.spdMult;
    if(now < slowUntil) s *= 0.6;
    return Math.min(s, 11 + cfg.capBonus);
  }

  // ---- 关卡 / 球 / 砖块 ----
  function buildLevel(){
    bricks=[];
    const rows = Math.min(3 + level + diffCfg().rowBonus, 9);
    const cols = 10;
    const marginX=16, gap=8, top=HUD_H+20, bh=22;
    const bw = (W - marginX*2 - gap*(cols-1))/cols;
    const rowColors=[C.red, C.gold, C.green];
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        bricks.push({
          x: marginX + c*(bw+gap),
          y: top + r*(bh+gap),
          w: bw, h: bh,
          color: rowColors[r%3],
          points: (rows - r)*10 + 10,
          alive:true
        });
      }
    }
  }

  function makeBall(stuck){
    return { x:paddle.x+paddle.w/2, y:paddle.y-8, vx:0, vy:0, r:7, stuck:!!stuck };
  }
  function resetBall(){ balls=[ makeBall(true) ]; }

  function startGame(){
    score=0; lives=3; level=1;
    particles=[];
    // ===== 道具系统初始化 =====
    pickups=[]; wideUntil=0; slowUntil=0;
    paddle.w=paddle.baseW;
    _confettiFired=false; // 新游戏重置通关反馈锁（仅视觉状态）
    buildLevel(); resetBall();
    setState('ready');
  }

  function launch(){
    if(state!=='ready' || !balls.length) return;
    const b = balls[0];
    const angle = (-Math.PI/2) + (_rng()*0.5 - 0.25);
    const sp = targetSpeed();
    b.vx = Math.cos(angle)*sp;
    b.vy = Math.sin(angle)*sp;
    b.stuck = false;
    setState('playing');
  }

  // ============================================================
  // 道具系统（打砖块贴合玩法）：🔴多球 / 🟦加长挡板 / 🐢慢速球
  // 纯注入分支，不改动挡板移动 / 球反弹 / 消砖计分等核心玩法逻辑。
  // 砖块击碎时按概率掉落，挡板接住后生效。
  // ============================================================
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  var _rng = mk(0x9ABC);
  function setRand(fn){ if(typeof fn==='function') _rng = fn; }

  var pickups=[];          // 掉落道具列表
  var wideUntil=0;         // 加长挡板到期时刻（与 now 比较）
  var slowUntil=0;         // 慢速球到期时刻（与 now 比较）
  var FIELD_W=W, FIELD_H=H;
  var PICKUP_TYPES=['multiball','expand','slow'];
  var PICKUP_EMOJI={multiball:'🔴',expand:'🟦',slow:'🐢'};
  var PICKUP_COLOR={multiball:'#f6465d',expand:'#3aa0ff',slow:'#02c076'};
  var DROP_PROB=0.18;      // 砖块击碎掉落概率

  function makePickup(type, x, y){
    return { type:type, x:x, y:y, r:14, vy:70, dead:false };
  }
  // 砖块击碎回调：按概率掉落一个随机道具（用局部 _rng，禁止裸 Math.random）
  function maybeDrop(x, y){
    if(_rng() < DROP_PROB){
      const t = PICKUP_TYPES[Math.floor(_rng()*PICKUP_TYPES.length)];
      pickups.push(makePickup(t, x, y));
    }
  }
  function applyPickup(p){
    if(!p) return;
    if(typeof Juice!=='undefined') Juice.sfx('pickup');
    if(p.type==='multiball'){
      // 多球：为每个在场的非吸附球镜像出最多 2 颗，总数上限 6
      const add=[];
      for(const b of balls){
        if(b.stuck) continue;
        add.push({ x:b.x, y:b.y, r:b.r, vx:-b.vx, vy:b.vy, stuck:false });
        add.push({ x:b.x, y:b.y, r:b.r, vx:b.vx, vy:-b.vy, stuck:false });
      }
      for(const e of add){ if(balls.length<6) balls.push(e); }
      if(typeof Juice!=='undefined') Juice.popup(p.x, p.y, '🔴', '#f6465d', {size:16});
    } else if(p.type==='expand'){
      // 加长挡板：宽度 1.5 倍，记录到期时刻
      const cx = paddle.x + paddle.w/2;
      paddle.w = paddle.baseW*1.5;
      paddle.x = clamp(cx - paddle.w/2, 0, W-paddle.w);
      wideUntil = now + 12000;
      if(typeof Juice!=='undefined') Juice.popup(p.x, p.y, '🟦', '#3aa0ff', {size:16});
    } else if(p.type==='slow'){
      // 慢速球：球速倍率 0.6，记录到期时刻
      slowUntil = now + 8000;
      if(typeof Juice!=='undefined') Juice.popup(p.x, p.y, '🐢', '#02c076', {size:16});
    }
  }
  // 挡板接住判定：普通 AABB-类重叠（带 p.r 容差）
  function updatePickups(dt){
    for(let i=0;i<pickups.length;i++){
      const p = pickups[i];
      if(p.dead) continue;
      p.y += p.vy*dt;
      const hit = (p.y + p.r >= paddle.y && p.y - p.r <= paddle.y + paddle.h &&
                   p.x >= paddle.x - p.r && p.x <= paddle.x + paddle.w + p.r);
      if(hit){ applyPickup(p); p.dead=true; }
      else if(p.y > FIELD_H + 30){ p.dead=true; }
    }
    pickups = pickups.filter(function(p){ return !p.dead; });
  }
  function drawPickup(g){
    for(let i=0;i<pickups.length;i++){
      const p = pickups[i];
      g.save();
      g.beginPath(); g.arc(p.x, p.y, p.r, 0, Math.PI*2);
      g.fillStyle = PICKUP_COLOR[p.type] || '#02c076';
      g.shadowColor = PICKUP_COLOR[p.type] || '#02c076'; g.shadowBlur = 14;
      g.fill(); g.shadowBlur = 0;
      g.fillStyle = '#0a0e14'; g.font = 'bold 14px ' + FONT;
      g.textAlign = 'center'; g.textBaseline = 'middle';
      g.fillText(PICKUP_EMOJI[p.type] || '★', p.x, p.y+1);
      g.restore();
    }
    // HUD 增益指示
    g.save(); g.font = '14px ' + FONT; g.textAlign = 'left'; g.textBaseline = 'middle';
    let bx = 14, by = HUD_H + 18;
    if(now < wideUntil){ g.fillStyle = '#3aa0ff'; g.fillText('🟦 加长 ' + ((wideUntil-now)/1000).toFixed(1) + 's', bx, by); bx += 110; }
    if(now < slowUntil){ g.fillStyle = '#02c076'; g.fillText('🐢 慢速 ' + ((slowUntil-now)/1000).toFixed(1) + 's', bx, by); }
    g.restore();
  }

  // ---- 粒子（视觉，仅 render 用）----
  function spawnParticles(x,y){
    for(let i=0;i<14;i++){
      const a = _rng()*Math.PI*2;
      const sp = 1 + _rng()*3.5;
      particles.push({
        x, y,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1,
        life:1,
        color: _rng()<0.5 ? C.red : C.gold
      });
    }
  }

  // ---- 更新：核心玩法（挡板/球反弹/消砖）不变 ----
  function updateBalls(){
    const tgt = targetSpeed();
    for(let i=balls.length-1;i>=0;i--){
      const b = balls[i];
      if(b.stuck) continue;
      b.x += b.vx; b.y += b.vy;
      // 墙
      if(b.x-b.r<0){ b.x=b.r; b.vx=Math.abs(b.vx); }
      if(b.x+b.r>W){ b.x=W-b.r; b.vx=-Math.abs(b.vx); }
      if(b.y-b.r<HUD_H){ b.y=HUD_H+b.r; b.vy=Math.abs(b.vy); }
      // 挡板
      if(b.vy>0 &&
         b.y+b.r>=paddle.y && b.y-b.r<=paddle.y+paddle.h &&
         b.x>=paddle.x-b.r && b.x<=paddle.x+paddle.w+b.r){
        b.y = paddle.y - b.r;
        const hit = (b.x-(paddle.x+paddle.w/2))/(paddle.w/2);
        const h = clamp(hit,-1,1);
        const ang = h*(Math.PI/3);
        b.vx = Math.sin(ang)*tgt;
        b.vy = -Math.cos(ang)*tgt;
      }
      // 砖块
      for(const br of bricks){
        if(!br.alive) continue;
        const cx = clamp(b.x, br.x, br.x+br.w);
        const cy = clamp(b.y, br.y, br.y+br.h);
        const dx = b.x-cx, dy = b.y-cy;
        if(dx*dx+dy*dy <= b.r*b.r){
          br.alive=false;
          score += br.points;
          if(score>high){ high=score; saveHigh(); }
          spawnParticles(cx, cy);
          if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.burst(cx,cy,{color:br.color,n:6,speed:140}); Juice.ring(cx,cy,{color:br.color,r1:40}); Juice.popup(cx, cy-8, '+'+br.points, br.color, {size:13}); }
          // 仅在此处（砖块击碎）按概率掉落道具——完全独立于核心反弹逻辑
          if(cx===br.x || cx===br.x+br.w) b.vx=-b.vx; else b.vy=-b.vy;
          maybeDrop(br.x+br.w/2, br.y+br.h/2);
          break;
        }
      }
      // 底部出界
      if(b.y-b.r>H){ balls.splice(i,1); }
    }
    if(balls.length===0){
      lives--; shakeTime=350;
      if(typeof Juice!=='undefined'){ Juice.sfx('lose'); Juice.addTrauma(0.4); Juice.flash('#f6465d',0.3); }
      if(lives<=0){
        setState('gameover');
        if(typeof Juice!=='undefined'){
          const bk=Juice.best('arkanoid',score); const rk=Juice.rank(score);
          if(bk.isNew) Juice.achievement('🏆 新纪录 '+score+'！段位 '+rk);
        }
      }
      else { resetBall(); setState('ready'); }
    }
  }

  function updateParticles(){
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.025;
      if(p.life<=0) particles.splice(i,1);
    }
  }

  function update(dt){
    dt = dt || (STEP/1000);
    // 挡板加宽到期还原
    if(now>wideUntil && paddle.w!==paddle.baseW){
      const cx = paddle.x + paddle.w/2;
      paddle.w = paddle.baseW;
      paddle.x = clamp(cx - paddle.w/2, 0, W-paddle.w);
    }
    // 挡板移动（共享输入层 input.js，失焦自动清键）
    if(state==='playing' || state==='ready'){
      const L = (typeof Input!=='undefined') ? Input.down('left') : keyLeft;
      const R = (typeof Input!=='undefined') ? Input.down('right') : keyRight;
      if(L) paddle.x -= 7;
      if(R) paddle.x += 7;
      paddle.x = clamp(paddle.x, 0, W-paddle.w);
    }
    // 待发射球跟随挡板
    if(state==='ready'){
      for(const b of balls){ if(b.stuck){ b.x=paddle.x+paddle.w/2; b.y=paddle.y-b.r-1; } }
    }
    if(shakeTime>0) shakeTime -= STEP;

    if(state==='playing'){
      updateBalls();
      updateParticles();
      if(state==='playing' && bricks.every(b=>!b.alive)){
        setState('levelcomplete');
        levelClearTime = now + 1600;
        if(typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.flash('#02c076',0.2); Juice.achievement('第 '+level+' 关 通过 ✓'); }
        if(!_confettiFired){
          _confettiFired=true;
          if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4});
          if(typeof Juice!=='undefined' && Juice.shake) Juice.shake(0.4);
        }
      }
    } else if(state==='levelcomplete'){
      updateParticles();
      if(now > levelClearTime){
        level++; buildLevel(); resetBall(); setState('ready');
      }
    } else {
      updateParticles();
    }
    // ===== 道具系统：仅推进掉落物与接住判定，不触碰核心玩法 =====
    updatePickups(dt);
  }

  // ---- 绘制 ----
  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawGrid(){
    ctx.strokeStyle='rgba(31,42,56,0.55)'; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=40){ ctx.beginPath(); ctx.moveTo(x,HUD_H); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=HUD_H;y<=H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  function drawHUD(){
    ctx.fillStyle=C.panel; ctx.fillRect(0,0,W,HUD_H);
    ctx.strokeStyle=C.border; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,HUD_H); ctx.lineTo(W,HUD_H); ctx.stroke();
    ctx.textBaseline='middle'; ctx.font='14px '+FONT;
    ctx.textAlign='left';
    ctx.fillStyle=C.sub; ctx.fillText('分数', 14, HUD_H/2);
    const sw = ctx.measureText('分数').width;
    ctx.fillStyle=C.gold; ctx.fillText(String(score), 14+sw+8, HUD_H/2);
    ctx.textAlign='center';
    ctx.fillStyle=C.sub; ctx.fillText('关卡 LV '+level, W/2, HUD_H/2);
    ctx.textAlign='right';
    ctx.fillStyle=C.sub; ctx.fillText('最高 '+high, W-92, HUD_H/2);
    ctx.font='16px '+FONT;
    let hx = W-14;
    for(let i=0;i<3;i++){
      ctx.fillStyle = i<lives ? C.red : C.border;
      ctx.fillText('♥', hx, HUD_H/2);
      hx -= 20;
    }
  }

  function drawBricks(){
    for(const br of bricks){
      if(!br.alive) continue;
      ctx.fillStyle = br.color;
      roundRect(br.x, br.y, br.w, br.h, 4); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.18)';
      roundRect(br.x+2, br.y+2, br.w-4, 4, 2); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
      roundRect(br.x, br.y, br.w, br.h, 4); ctx.stroke();
    }
  }

  function drawPaddle(){
    ctx.save();
    ctx.shadowColor='rgba(246,70,93,0.6)'; ctx.shadowBlur=14;
    ctx.fillStyle=C.red;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5); ctx.fill();
    ctx.restore();
  }

  function drawBalls(){
    ctx.save();
    ctx.shadowColor='rgba(246,70,93,0.7)'; ctx.shadowBlur=10;
    ctx.fillStyle=C.text;
    for(const b of balls){
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawParticles(){
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-2, p.y-2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawOverlay(){
    if(state==='playing') return;
    ctx.fillStyle='rgba(10,14,20,0.80)';
    ctx.fillRect(0, HUD_H, W, H-HUD_H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const cx=W/2, cy=H/2;
    function big(txt,color){ ctx.font='30px '+FONT; ctx.fillStyle=color||C.gold; ctx.fillText(txt,cx,cy-26); }
    function sub(txt,color){ ctx.font='15px '+FONT; ctx.fillStyle=color||C.text; ctx.fillText(txt,cx,cy+14); }
    function sub2(txt,color){ ctx.font='13px '+FONT; ctx.fillStyle=color||C.sub; ctx.fillText(txt,cx,cy+40); }
    if(state==='menu'){
      big('TERMINAL // ARKANOID', C.red);
      sub('金融终端 · 打砖块');
      sub2('按 [开始游戏] 或 空格 开始');
    } else if(state==='ready'){
      big('第 '+level+' 关 · 准备', C.gold);
      sub('按 [发射] 或 空格 / 点击 发射小球');
    } else if(state==='paused'){
      big('已暂停', C.gold);
      sub('按 P 或 [继续] 恢复');
    } else if(state==='levelcomplete'){
      big('第 '+level+' 关 通过 ✓', C.green);
      sub('即将进入下一关...');
    } else if(state==='gameover'){
      big('GAME OVER', C.red);
      sub('最终分数 '+score+'    最高 '+high);
      sub2('按 [重新开始] 再来一局');
    }
  }

  function render(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
    if(typeof Juice!=='undefined') Juice.begin(ctx);
    let sx=0, sy=0;
    if(shakeTime>0){
      const m = (shakeTime/350)*8;
      sx=(_rng()*2-1)*m; sy=(_rng()*2-1)*m;
    }
    ctx.save(); ctx.translate(sx,sy);
    drawGrid();
    drawHUD();
    drawBricks();
    drawPickup(ctx);   // 玩家（挡板）前绘制掉落物
    drawPaddle();
    drawBalls();
    drawParticles();
    ctx.restore();
    drawOverlay();
    if(typeof Juice!=='undefined'){ Juice.mid(ctx); Juice.end(ctx); }
  }

  // ---- 主循环（固定步长）----
  let last = (typeof performance!=='undefined') ? performance.now() : Date.now(), acc=0;
  function frame(t){
    now = t;
    let f = t - last; last = t;
    if(f>200) f=200;
    if (typeof Juice !== 'undefined') Juice.update(f/1000);
    if (typeof Input !== 'undefined') {
      if (Input.pressed('a')) primaryAction();   // 空格
      if (Input.pressed('pause')) togglePause();  // P
      Input.update();
    }
    acc += f;
    let steps=0;
    while(acc>=STEP && steps<5){ update(); acc-=STEP; steps++; }
    render();
    requestAnimationFrame(frame);
  }

  // ---- 输入 ----
  canvas.addEventListener('mousemove', function(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX-rect.left) * (W/rect.width);
    paddle.x = clamp(x - paddle.w/2, 0, W-paddle.w);
  });
  function touchToCanvas(clientX){
    const rect = canvas.getBoundingClientRect();
    const x = (clientX-rect.left) * (W/rect.width);
    paddle.x = clamp(x - paddle.w/2, 0, W-paddle.w);
  }
  canvas.addEventListener('touchstart', function(e){
    if(e.touches && e.touches.length){ touchToCanvas(e.touches[0].clientX); }
  }, { passive:true });
  canvas.addEventListener('touchmove', function(e){
    if(e.touches && e.touches.length){ touchToCanvas(e.touches[0].clientX); }
    e.preventDefault();
  }, { passive:false });
  canvas.addEventListener('click', primaryAction);
  if (typeof Input !== 'undefined') {
    Input.init({ keymap: { 'KeyP':'pause' } });
  }
  function primaryAction(){
    if(state==='menu'||state==='gameover') startGame();
    else if(state==='ready') launch();
    else if(state==='levelcomplete'){ level++; buildLevel(); resetBall(); setState('ready'); }
  }
  function togglePause(){
    if(state==='playing') setState('paused');
    else if(state==='paused') setState('playing');
  }

  startBtn.addEventListener('click', function(){
    if(state==='playing'||state==='paused') startGame();
    else primaryAction();
  });
  pauseBtn.addEventListener('click', togglePause);

  function buildDiffBar(){
    if(typeof document==='undefined') return;
    var bar=document.getElementById('diffbar'); if(!bar) return;
    bar.innerHTML='';
    DIFF_ORDER.forEach(function(k){
      var b=document.createElement('button');
      b.textContent=DIFFICULTY[k].label;
      if(k===difficulty) b.className='active';
      b.addEventListener('click',function(){ setDifficulty(k); buildDiffBar(); });
      bar.appendChild(b);
    });
  }
  buildDiffBar();

  // ---- 启动 ----
  buildLevel(); // 仅为初始化（菜单态不显示）
  setState('menu');
  requestAnimationFrame(frame);

  // ---- 测试钩子 ----
  window.__t = {
    buildLevel: buildLevel, makeBall: makeBall,
    resetBall: resetBall, startGame: startGame, launch: launch,
    maybeDrop: maybeDrop, clamp: clamp, setRand: setRand,
    DIFFICULTY: DIFFICULTY, DIFF_ORDER: DIFF_ORDER,
    setDifficulty: setDifficulty, getDifficulty: getDifficulty, diffCfg: diffCfg,
    targetSpeed: targetSpeed,
    getBricks: function(){ return bricks.map(function(b){ return {x:b.x,y:b.y,w:b.w,h:b.h,color:b.color,points:b.points,alive:b.alive}; }); },
    getBalls: function(){ return balls.map(function(b){ return {x:b.x,y:b.y,vx:b.vx,vy:b.vy,r:b.r,stuck:b.stuck}; }); },
    getPaddle: function(){ return {baseW:paddle.baseW,w:paddle.w,h:paddle.h,x:paddle.x,y:paddle.y}; },
    getScore: function(){ return score; }, getLives: function(){ return lives; },
    getLevel: function(){ return level; }, getState: function(){ return state; },
    setLevel: function(v){ level=v; }, setNow: function(v){ now=v; },
    setLives: function(v){ lives=v; }, setScore: function(v){ score=v; },
    setBalls: function(arr){ balls = arr.map(function(b){ return {x:b.x,y:b.y,vx:b.vx,vy:b.vy,r:b.r||7,stuck:!!b.stuck}; }); },
    update: update,
    setBricks: function(arr){ bricks = arr.map(function(b){ return {x:b.x,y:b.y,w:b.w,h:b.h,color:b.color,points:b.points,alive:(b.alive!==false)}; }); },
    confettiFired: function(){ return _confettiFired; },
    getWideUntil: function(){ return wideUntil; }, getSlowUntil: function(){ return slowUntil; },
    // ===== 道具系统钩子 =====
    reset: startGame,
    spawnPickup: function(type, x, y){ var p = makePickup(type, x, y); pickups.push(p); return p; },
    stepPickups: updatePickups,
    applyPickup: function(p){ if(typeof p==='string') p = makePickup(p, paddle.x+paddle.w/2, paddle.y); applyPickup(p); return p; },
    getPickups: function(){ return pickups.map(function(p){ return {type:p.type, x:p.x, y:p.y, r:p.r, dead:p.dead}; }); },
    getPickupTypes: function(){ return PICKUP_TYPES.slice(); }
  };
})();
</script>
</body>
