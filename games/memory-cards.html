<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 翻牌记忆配对 MEMORY CARDS</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(240,185,11,.05), transparent 60%),var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(520px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--gold)}
  .wrap{width:min(520px,98vw)}
  .hud{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:var(--dim);margin-bottom:10px;flex-wrap:wrap}
  .hud .st{color:var(--gold);font-weight:700}
  .boardwrap{display:flex;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:10px}
  canvas{background:#0e141d;border-radius:8px;cursor:pointer;max-width:96vw;height:auto}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .controls button{flex:1;min-width:60px;background:var(--gold);color:#0a0e14;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.over{color:var(--red);font-weight:700}
  .msg.win{color:var(--green);font-weight:700}
  .diffbar{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .diffbar button{flex:0 0 auto;font:600 12px/1 inherit;color:var(--dim);background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;transition:.12s}
  .diffbar button:hover{color:#fff;border-color:#666}
  .diffbar button.active{color:#0a0e14;background:var(--gold);border-color:var(--gold)}
  .foot{width:min(520px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>翻牌记忆配对</b> MEMORY CARDS</span></div>
  <div class="wrap">
    <div class="hud">
      <span>分数 · <span class="st" id="score">0</span></span>
      <span>配对 · <span class="st" id="pairs">0</span>/<span class="st" id="pairsmax">0</span></span>
      <span>步数 · <span class="st" id="moves">0</span>/<span class="st" id="maxmoves">0</span></span>
      <span>状态 · <span class="st" id="st">进行中</span></span>
    </div>
    <div class="boardwrap"><canvas id="board" width="360" height="336"></canvas></div>
    <div class="controls">
      <button id="new" class="ghost">新局 NEW</button>
    </div>
    <div class="diffbar" id="diffbar"></div>
    <div class="msg" id="msg">点击两张牌，符号相同即消除并加分，不同则翻回。在步数耗尽前消除全部即可获胜。</div>
  </div>
  <div class="foot">Memory Cards（翻牌记忆配对）：记住翻开的牌面，用最少步数找出所有配对。难度越高网格越大、步数越紧。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const J = (typeof Juice!=='undefined') ? Juice : null;
  // 局部 PRNG（mulberry32）—— 洗牌只用它，绝不用 Math.random
  function mk(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; var t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let _rng = mk(0x0c0ffee);
  function setRand(fn){ if(typeof fn==='function') _rng=fn; }

  // ---- 难度选择系统（简单/普通/困难/地狱，倍率法）----
  // 本作为记忆配对，难度直接决定网格规模(rows×cols)与步数宽限(maxMovesMult)，
  // normal=1.0 保持基线行为，绝对不破坏既有单测约定。
  var DIFFICULTY = {
    easy:   { label:'简单', rows:4, cols:3, maxMovesMult:3.0, scoreMult:1.0 },
    normal: { label:'普通', rows:4, cols:4, maxMovesMult:2.5, scoreMult:1.0 },
    hard:   { label:'困难', rows:5, cols:4, maxMovesMult:2.2, scoreMult:1.2 },
    hell:   { label:'地狱', rows:6, cols:5, maxMovesMult:1.8, scoreMult:1.5 }
  };
  var DIFF_ORDER = ['easy','normal','hard','hell'];
  var difficulty = 'normal';
  function diffCfg(){ return DIFFICULTY[difficulty]; }
  function setDifficulty(d){ if(!DIFFICULTY[d]) return false; difficulty=d; if(typeof reset==='function') reset(); return true; }
  function getDifficulty(){ return difficulty; }

  // 符号池（≥15 种，地狱档 15 对足够）
  var SYMBOLS = ['🍎','🍌','🍇','🍓','🍑','🍒','🥝','🍉','🍊','🥥','🍋','🍐','🫐','🥭','🍍','🥑','🌽','🥕','🌶','🍄'];

  let rows, cols, cards, flipped, matched, moves, flips, score, combo, over;
  let _overrideMaxMoves = null;       // 测试用 maxMoves 覆盖（setGrid 设定，reset 清除）
  const CW = 70, CH = 84; // 卡牌像素尺寸（仅绘制层）

  function pairs(){ return cards ? cards.length / 2 : 0; }
  function maxMoves(){
    if(typeof _overrideMaxMoves==='number') return _overrideMaxMoves;
    const p = pairs();
    return p ? Math.max(p, Math.round(p * diffCfg().maxMovesMult)) : 0;
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(_rng() * (i+1));
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function buildDeck(){
    const total = rows * cols;          // 必为偶数
    const p = total / 2;
    // 从符号池取前 p 个，复制成双，再洗牌
    const pick = SYMBOLS.slice(0, p);
    const deck = [];
    for(let k=0;k<pick.length;k++){ deck.push(pick[k], pick[k]); }
    shuffle(deck);
    cards = deck.map(function(sym){ return { sym: sym, faceUp: false, matched: false }; });
    return cards;
  }

  function genField(){
    const cfg = diffCfg();
    rows = cfg.rows; cols = cfg.cols;
    buildDeck();
    flipped = [];
    matched = 0; moves = 0; flips = 0; score = 0; combo = 0; over = false;
    _overrideMaxMoves = null;          // 新局清除测试覆盖
  }

  function reset(seed){
    if(typeof seed==='number') _rng = mk(seed>>>0);
    genField();
    return getState();
  }
  function newGame(seed){ return reset(seed); }

  // 翻牌：点击翻一张；翻第二张时即时比对（同步结算，不依赖定时器）。
  function flip(i){
    if(over) return false;
    if(i<0 || i>=cards.length) return false;
    const c = cards[i];
    if(c.faceUp || c.matched) return false;                       // 已翻开/已消除，忽略
    if(flipped.length === 1 && flipped[0] === i) return false;   // 重复点同一张，忽略
    c.faceUp = true;
    flips++;
    if(J && typeof J.sfx==='function') J.sfx('click');
    if(flipped.length === 0){
      flipped.push(i);
      return true;
    }
    // 第二张：比对
    const a = flipped[0], b = i;
    const ca = cards[a];
    if(ca.sym === c.sym){
      // 匹配：消除并加分，连击递增
      ca.matched = true; c.matched = true;
      matched++; combo++;
      score += Math.round(100 * combo * (diffCfg().scoreMult || 1));
      flipped = [];
      if(J && typeof J.sfx==='function') J.sfx('match');
      if(J && typeof J.burst==='function') J.burst();
      if(matched === pairs()){ over = true; if(J && typeof J.confetti==='function') J.confetti(); } // 全消除即胜利
    } else {
      // 不匹配：翻回，连击清零，消耗一步
      ca.faceUp = false; c.faceUp = false;
      combo = 0;
      flipped = [];
      moves++;
      if(J && typeof J.sfx==='function') J.sfx('wrong');
      if(moves >= maxMoves() && matched < pairs()) over = true;   // 步数超限 → 失败
    }
    return true;
  }

  function isWin(){ return pairs() > 0 && matched === pairs(); }
  function isGameOver(){ return over; }
  function getScore(){ return score; }
  function getGrid(){
    return cards.map(function(c){ return { sym: c.sym, faceUp: c.faceUp, matched: c.matched }; });
  }
  function getState(){
    return {
      grid: getGrid(),
      rows: rows, cols: cols,
      pairs: pairs(), matched: matched,
      moves: moves, maxMoves: maxMoves(), flips: flips,
      score: score, combo: combo,
      over: over, won: isWin(), difficulty: difficulty
    };
  }

  // ---- 测试辅助 setter（不影响核心玩法，便于确定性测试） ----
  // 用给定符号数组直接铺设牌面（长度须为偶数，每种符号成对出现）。
  // opts.maxMoves 可覆盖步数上限（测试失败结局用）。
  function setGrid(symbols, opts){
    opts = opts || {};
    cards = symbols.map(function(sym){ return { sym: sym, faceUp: false, matched: false }; });
    // 按符号数量推导一个近方阵，仅供绘制层使用（不影响逻辑）
    const n = cards.length;
    cols = Math.ceil(Math.sqrt(n));
    rows = Math.ceil(n / cols);
    flipped = [];
    matched = 0; moves = 0; flips = 0; score = 0; combo = 0; over = false;
    if(typeof opts.maxMoves==='number'){
      // 临时覆盖 maxMoves：用闭包字段保存
      _overrideMaxMoves = opts.maxMoves;
    } else {
      _overrideMaxMoves = null;
    }
    return getState();
  }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined') ? document.getElementById(id) : null; }
  function render(){
    if(typeof document==='undefined') return;
    const cv = $('board'); if(!cv) return;
    const vw = (typeof window!=='undefined') ? window.innerWidth : 800;
    // 动态依据当前网格设置画布尺寸（只改绘制层）
    const cw = CW, chh = CH;
    cv.width = Math.min(cols * cw, Math.max(240, (vw - 24)));
    cv.height = rows * chh;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    const cw2 = cv.width / cols, ch2 = cv.height / rows;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const idx = r*cols + c;
        const card = cards[idx];
        if(!card) continue;
        const x = c*cw2, y = r*ch2;
        const pad = Math.min(cw2, ch2) * 0.08;
        const bx = x+pad, by = y+pad, bw = cw2-2*pad, bh = ch2-2*pad;
        if(card.matched){
          // 已消除：暗色底 + 半透明符号
          ctx.fillStyle = '#10241a';
          roundRect(ctx, bx, by, bw, bh, 8); ctx.fill();
          ctx.globalAlpha = 0.35;
          ctx.font = (Math.min(bw,bh)*0.5|0)+'px serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(card.sym, x+cw2/2, y+ch2/2);
          ctx.globalAlpha = 1;
        } else if(card.faceUp){
          // 正面：亮色卡面 + emoji
          ctx.fillStyle = '#1d2b1f';
          roundRect(ctx, bx, by, bw, bh, 8); ctx.fill();
          ctx.strokeStyle = '#02c076'; ctx.lineWidth = 2;
          roundRect(ctx, bx, by, bw, bh, 8); ctx.stroke();
          ctx.font = (Math.min(bw,bh)*0.55|0)+'px serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(card.sym, x+cw2/2, y+ch2/2);
        } else {
          // 背面：网格花纹
          ctx.fillStyle = '#16202c';
          roundRect(ctx, bx, by, bw, bh, 8); ctx.fill();
          ctx.strokeStyle = '#2f3d4f'; ctx.lineWidth = 1;
          roundRect(ctx, bx, by, bw, bh, 8); ctx.stroke();
          ctx.strokeStyle = 'rgba(240,185,11,0.25)';
          ctx.beginPath();
          ctx.moveTo(bx+bw*0.5, by+bh*0.25); ctx.lineTo(bx+bw*0.5, by+bh*0.75);
          ctx.moveTo(bx+bw*0.25, by+bh*0.5); ctx.lineTo(bx+bw*0.75, by+bh*0.5);
          ctx.stroke();
        }
      }
    }
    const sc = $('score'); if(sc) sc.textContent = String(score);
    const pr = $('pairs'); if(pr) pr.textContent = String(matched);
    const prm = $('pairsmax'); if(prm) prm.textContent = String(pairs());
    const mv = $('moves'); if(mv) mv.textContent = String(moves);
    const mm = $('maxmoves'); if(mm) mm.textContent = String(maxMoves());
    const st = $('st'); if(st) st.textContent = over ? (isWin()?'胜利':'失败') : '进行中';
    const msg = $('msg');
    if(msg){
      if(isWin()){ msg.className='msg win'; msg.textContent='🎉 全部配对成功，胜利！'; }
      else if(over){ msg.className='msg over'; msg.textContent='💀 步数耗尽，游戏失败。'; }
      else msg.className='msg';
    }
  }
  function roundRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const cv = $('board');
    if(cv && typeof cv.addEventListener==='function'){
      cv.addEventListener('click', function(e){
        const rect = cv.getBoundingClientRect();
        const sx = cv.width / rect.width, sy = cv.height / rect.height;
        const x = (e.clientX - rect.left) * sx;
        const y = (e.clientY - rect.top) * sy;
        const cw2 = cv.width / cols, ch2 = cv.height / rows;
        const ci = Math.floor(x / cw2), ri = Math.floor(y / ch2);
        const idx = ri*cols + ci;
        flip(idx); render();
      });
    }
    const nb = $('new'); if(nb) nb.onclick = () => { reset(); render(); };
  }
  function buildDiffBar(){
    var bar = (typeof document!=='undefined') ? document.getElementById('diffbar') : null;
    if(!bar) return;
    bar.innerHTML = '';
    DIFF_ORDER.forEach(function(k){
      var b = document.createElement('button');
      b.textContent = DIFFICULTY[k].label;
      if(k === difficulty) b.className = 'active';
      b.addEventListener('click', function(){ setDifficulty(k); buildDiffBar(); render(); });
      bar.appendChild(b);
    });
  }

  reset();
  if(typeof document!=='undefined'){
    bindUI(); buildDiffBar();
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', render); else render();
  }
  if(typeof window!=='undefined'){
    window.__t = {
      setRand, reset, newGame, flip,
      isWin, isGameOver, getScore, getGrid, getState,
      // ---- 难度系统钩子 ----
      DIFFICULTY, DIFF_ORDER, setDifficulty, getDifficulty, diffCfg,
      // ---- 扩展测试钩子（不影响核心玩法） ----
      setGrid, pairs, maxMoves,
      getRows:()=>rows, getCols:()=>cols,
      getMoves:()=>moves, getMaxMoves:maxMoves, getMatched:()=>matched
    };
  }
})();
</script>
</body>
</html>
