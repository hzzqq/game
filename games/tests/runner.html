<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TERMINAL // AUTO-TEST · 游戏自动化检测面板</title>
<style>
:root{
  --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
  --text:#e6edf3; --dim:#6b7785;
  --red:#f6465d; --green:#02c076; --gold:#f0b90b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:
    radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.06), transparent 60%),
    linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,
    var(--bg);
  color:var(--text); font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
  padding:20px;
}
.titlebar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:18px}
.dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
.titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
.titlebar b{color:var(--red)}
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;box-shadow:0 0 12px rgba(246,70,93,.35)}
.btn:hover{filter:brightness(1.15)}.btn:active{transform:translateY(1px)}
.btn.run-all{background:linear-gradient(135deg,var(--red),#ff8a96);color:#fff;font-size:15px;padding:12px 24px}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--border);box-shadow:none;font-weight:400}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(22,32,44,.6)}
.card-head h3{font-size:15px;letter-spacing:.5px}
.badge{font-size:11px;padding:3px 8px;border-radius:4px}
.badge.ok{color:var(--green);border:1px solid rgba(2,192,118,.4);background:rgba(2,192,118,.08)}
.badge.err{color:var(--red);border:1px solid rgba(246,70,93,.4);background:rgba(246,70,93,.08)}
.badge.wait{color:var(--dim);border:1px solid var(--border)}
.card-body{padding:14px 16px}
.log{max-height:220px;overflow:auto;font-size:12px;line-height:1.7;color:var(--dim);white-space:pre-wrap;word-break:break-all}
.log .pass{color:var(--green)} .log .fail{color:var(--red)} .log .warn{color:var(--gold)} .log .info{color:#7aa2ff}
.stat-row{display:flex;gap:16px;margin-bottom:10px;font-size:12px}
.stat-row span{color:var(--dim)} .stat-row b{color:var(--text)}
iframe{display:none} /* 隐藏加载的游戏 iframe */

#summary{position:fixed;top:0;left:0;right:0;z-index:9;display:none;align-items:center;justify-content:center;background:rgba(10,14,20,.85);padding:40px;text-align:center}
#summary .box{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 44px;max-width:520px}
#summary h2{font-size:26px;margin-bottom:14px;letter-spacing:1px}
#summary .res{font-size:42px;font-weight:900;margin:16px 0}
</style>
</head>
<body>

<div class="titlebar">
  <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
  <span class="t">TERMINAL // <b>AUTO-TEST</b> · 游戏自动化检测面板</span>
</div>

<div class="controls">
  <button class="btn run-all" id="runAll">▶ 运行全部测试</button>
  <button class="btn ghost" id="clearLog">清空日志</button>
  <span style="color:var(--dim);font-size:12px;align-self:center">模拟输入 × 自动断言 × 出错即报 — 无需人工体验游戏</span>
</div>

<div id="grid" class="grid"></div>

<div id="summary"><div class="box"><h2>全部测试完成</h2><div class="res" id="sumRes"></div><p id="sumDetail" style="color:var(--dim);font-size:13px;line-height:1.8"></p><br/><button class="btn" onclick="document.getElementById('summary').style.display='none'">关闭</button></div></div>

<script>
// ========== 测试框架核心 ==========
const TESTS = [];
const RESULTS = {};

function defineTest(name, file, fn){
  TESTS.push({name, file, fn});
}

// 断言工具
function assert(cond, msg){ if(!cond) throw new Error('ASSERT_FAIL: '+msg); }
function assertEq(a,b,msg){ if(a!==b) throw new Error(`ASSERT_FAIL: ${msg||''} expected ${JSON.stringify(b)} got ${JSON.stringify(a)}`); }
function assertGt(a,b,msg){ if(!(a>b)) throw new Error(`ASSERT_FAIL: ${msg||''} expected >${b} got ${a}`); }

// 加载游戏：用 iframe.src 原生导航加载，浏览器正确执行内联+外部脚本
// （juice.js/input.js 等相对路径脚本可正常加载），布局尺寸/innerWidth 正确，
// requestAnimationFrame 正常绘制。file:// 与 http:// 均可用（fetch+write 在 file:// 会被 CORS 拦截）。
function loadGameScript(src){
  return new Promise((resolve,reject)=>{
    const iframe=document.createElement('iframe');
    // display:block 必须内联覆盖样式表里的 iframe{display:none}——否则 iframe 视口为 0（innerWidth=0），
    // 依赖 innerWidth 的 canvas 会变 0×0，且 display:none 的 iframe 不执行 requestAnimationFrame（画面不绘制）。
    iframe.style.cssText='position:absolute;left:-9999px;top:-9999px;width:800px;height:600px;border:0;display:block';
    let resolved=false;

    iframe.onload=()=>{
      // 原生加载完成，给游戏留出初始化 + 首帧绘制时间（onload 处理器 / rAF）
      setTimeout(()=>{
        try{
          // 触发一次 resize，让依赖 innerWidth/clientWidth 的 canvas 自适应逻辑重新计算尺寸
          iframe.contentWindow.dispatchEvent(new Event('resize'));
        }catch(e){}
        setTimeout(()=>{
          if(!resolved){ resolved=true; resolve({win:iframe.contentWindow, doc:iframe.contentDocument, iframe}); }
        }, 400);
      }, 350);
    };
    iframe.onerror=()=>{ if(!resolved){ resolved=true; reject(new Error('LOAD_FAIL: '+src)); } };

    iframe.src=src;
    document.body.appendChild(iframe);

    // 超时保护
    setTimeout(()=>{ if(!resolved){ resolved=true; reject(new Error('TIMEOUT: '+src)); }}, 15000);
  });
}

// 模拟键盘事件（同时派发到 window 和 document，兼容两种监听方式）
function simKey(win, key, type='keydown'){
  const evt=new KeyboardEvent(type,{key:key,bubbles:true,cancelable:true,
    keyCode: key===' '?32 : key==='Enter'?13 : key==='ArrowUp'?38:key==='ArrowDown'?40:key==='ArrowLeft'?37:key==='ArrowRight'?39 : key.toUpperCase().charCodeAt(0)
  });
  win.dispatchEvent(evt);
  win.document.dispatchEvent(evt);
}
function simKeys(win, keys){ keys.forEach(k=>simKey(win,k,'keydown')); keys.forEach(k=>simKey(win,k,'keyup')); }

// 延时
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

// 运行单个测试套件
async function runOne(test){
  const card = document.getElementById('card-'+test.name.replace(/\s+/g,'-'));
  const badge = card.querySelector('.badge');
  const log = card.querySelector('.log');
  const statRow = card.querySelector('.stat-row');
  
  function logMsg(cls, txt){
    log.innerHTML += `<span class="${cls}">${txt}</span>\n`;
    log.scrollTop=log.scrollHeight;
  }
  function updateStats(passed, failed, total){
    statRow.innerHTML=`<span>通过 <b style="color:var(--green)">${passed}</b></span><span>失败 <b style="color:var(--red)">${failed}</b></span><span>总计 <b>${total}</b></span>`;
  }
  
  badge.className='badge wait'; badge.textContent='运行中…';
  log.innerHTML='';
  let passed=0, failed=0, total=0, errors=[];
  
  const start=Date.now();
  try {
    await test.fn({assert,assertEq,assertGt,simKey,simKeys,wait,loadGameScript,logMsg});
  } catch(e){
    errors.push(e.message);
    logMsg('fail','✗ FATAL: '+e.message);
    failed++;
  }
  total=passed+failed+errors.length;
  const ms=Date.now()-start;
  
  if(failed===0 && errors.length===0){
    badge.className='badge ok'; badge.textContent='✅ 全部通过';
    logMsg('info','\n── 完成 '+ms+'ms ──');
  } else {
    badge.className='badge err'; badge.textContent='❌ '+failed+' 失败';
    logMsg('warn','\n── '+failed+' 个失败 ('+ms+'ms) ──');
  }
  updateStats(passed,failed,total);
  
  RESULTS[test.name]={passed,failed,total,time:ms,errors};

  // 清理本次测试创建的游戏 iframe：结果已落入 RESULTS 与日志，可安全移除。
  // 否则 155 个 iframe（各带 rAF 循环 / 定时器 / AudioContext）会累积，拖慢后续测试
  // 并导致后期游戏加载超时、定时器被 CPU 争抢而“未走动”。
  document.querySelectorAll('body > iframe').forEach(f=>{ try{ f.src='about:blank'; }catch(e){} f.remove(); });
}

// ========== 各游戏测试用例 ==========

// ---- 2048 ----
defineTest('2048 数字合成', '2048.html', async T=>{
  T.logMsg('info','加载 2048.html …');
  const {win}=await T.loadGameScript('../2048.html');
  await T.wait(500);
  T.logMsg('info','DOM 结构检查：');
  const grid=win.document.querySelector('[class*="grid"],[id*="grid"],[class*="board"]') || win.document.querySelectorAll('.cell').length>0 ? 'found' : null;
  T.assert(grid, '未找到游戏网格容器');
  T.passed=(T.passed||0)+1; T.logMsg('pass','✓ 网格容器存在');
  
  T.logMsg('info','键盘模拟：向右滑动 5 次');
  for(let i=0;i<5;i++){ T.simKey(win,'ArrowRight'); await T.wait(80); }
  await T.wait(300);
  T.passed++; T.logMsg('pass','✓ 方向键输入无崩溃');
  
  // 检查分数变化
  const scoreEl=win.document.querySelector('[class*="score"],[id*="score"]');
  T.assert(scoreEl, '找不到分数元素');
  T.passed++; T.logMsg('pass','✓ 分数元素存在');
  
  // 检查 localStorage 可用
  try {
    win.localStorage.setItem('__test__','ok');
    T.assert(win.localStorage.getItem('__test__')==='ok', 'localStorage 不可写');
    win.localStorage.removeItem('__test__');
    T.passed++; T.logMsg('pass','✓ localStorage 可读写');
  } catch(e){
    T.logMsg('warn','⚠ localStorage 可能受限（iframe 安全策略）');
  }
  
  T.logMsg('info','快速连续操作压力测试：50 次');
  for(let i=0;i<25;i++){ T.simKey(win,'ArrowDown'); T.simKey(win,'ArrowLeft'); }
  await T.wait(200);
  T.passed++; T.logMsg('pass','✓ 50 次快速操作无异常');
});

// ---- Tetris ----
defineTest('俄罗斯方块', 'tetris.html', async T=>{
  T.logMsg('info','加载 tetris.html …');
  const {win}=await T.loadGameScript('../tetris.html');
  await T.wait(600);
  T.logMsg('info','Canvas 检查：');
  const cvs=win.document.querySelector('canvas');
  T.assert(cvs, '找不到 Canvas 元素');
  T.passed=(T.passed||0)+1; T.logMsg('pass','✓ Canvas 存在 ('+cvs.width+'×'+cvs.height+')');
  
  T.logMsg('info','模拟移动/旋转：← ×3 → ↑ ← ↓');
  T.simKeys(win,['ArrowLeft','ArrowLeft','ArrowLeft','ArrowUp','ArrowLeft','ArrowDown']);
  await T.wait(300);
  T.passed++; T.logMsg('pass','✓ 键盘操作无崩溃');
  
  T.logMsg('info','Hold 测试：按 C/Hold');
  T.simKey(win,'c'); await T.wait(100);
  T.simKey(win,'Shift'); await T.wait(100);
  T.passed++; T.logMsg('pass','✓ Hold 操作无崩溃');
  
  T.logMsg('info','暂停恢复测试：P → P');
  T.simKey(win,'p'); await T.wait(200);
  T.simKey(win,'p'); await T.wait(200);
  T.passed++; T.logMsg('pass','✓ 暂停/恢复切换正常');
  
  T.logMsg('info','HUD 元素检查：');
  const hudItems=['score','level','lines','next','hold'];
  let found=0;
  for(const h of hudItems){
    if(win.document.body.textContent.toLowerCase().includes(h)) found++;
  }
  T.assert(found>=3, 'HUD 元素过少，只找到 '+found+'/'+hudItems.length);
  T.passed++; T.logMsg('pass','✓ HUD 包含 '+found+'/'+hudItems.length+' 项');
});

// ---- Rhythm ----
defineTest('节奏大师', 'rhythm.html', async T=>{
  T.logMsg('info','加载 rhythm.html …');
  const {win}=await T.loadGameScript('../rhythm.html');
  await T.wait(600);
  T.logMsg('info','Canvas + 音频检查：');
  const cvs=win.document.querySelector('canvas');
  T.assert(cvs, '找不到 Canvas');
  T.passed=(T.passed||0)+1; T.logMsg('pass','✓ Canvas 存在');
  
  T.logMsg('info','AudioContext 状态：');
  const hasAC=typeof win.AudioContext!=='undefined' || typeof win.webkitAudioContext!=='undefined';
  T.assert(hasAC, 'AudioContext 不存在');
  T.passed++; T.logMsg('pass','✓ AudioContext API 可用');
  
  T.logMsg('info','按键模拟：D F J K 连击测试');
  for(const k of ['d','f','j','k']){ T.simKey(win,k); await T.wait(60); }
  T.passed++; T.logMsg('pass','✓ 四键输入无崩溃');
  
  T.logMsg('info','HUD 检查：分数/连击/准确率');
  const bodyText=win.document.body.textContent.toLowerCase();
  const hasScore=bodyText.includes('score')||bodyText.includes('分数')||bodyText.includes('连击')||bodyText.includes('准确');
  T.assert(hasScore, '未找到计分相关文字');
  T.passed++; T.logMsg('pass','✓ 计分 UI 存在');
});

// ---- Breakout ----
defineTest('打砖块', 'breakout.html', async T=>{
  T.logMsg('info','加载 breakout.html …');
  const {win}=await T.loadGameScript('../breakout.html');
  await T.wait(600);
  T.logMsg('info','Canvas 检查：');
  const cvs=win.document.querySelector('canvas');
  T.assert(cvs, '找不到 Canvas');
  T.passed=(T.passed||0)+1; T.logMsg('pass','✓ Canvas 存在 ('+cvs.width+'×'+cvs.height+')');
  
  T.logMsg('info','挡板移动模拟：← → ×10');
  for(let i=0;i<10;i++){ T.simKey(win,'ArrowLeft'); T.simKey(win,'ArrowRight'); await T.wait(40); }
  T.passed++; T.logMsg('pass','✓ 挡板控制无崩溃');
  
  T.logMsg('info','暂停测试：P → P');
  T.simKey(win,'p'); await T.wait(200); T.simKey(win,'p'); await T.wait(200);
  T.passed++; T.logMsg('pass','✓ 暂停/恢复正常');
  
  T.logMsg('info','生命值/UI 检查：');
  const bodyText=win.document.body.textContent.toLowerCase();
  const hasLife=bodyText.includes('life')||bodyText.includes('命')||bodyText.includes('♥')||bodyText.includes('关卡')||bodyText.includes('level');
  T.assert(hasLife, '未找到生命/关卡信息');
  T.passed++; T.logMsg('pass','✓ 生命或关卡 UI 存在');
  
  T.logMsg('info','本地存储检查：');
  try { win.localStorage.getItem; T.passed++; T.logMsg('pass','✓ localStorage API 可用'); }
  catch(e){ T.logMsg('warn','⚠ localStorage 受限'); }
});

// ---- Battle (本地模式跳过 PeerJS) ----
defineTest('坦克对战 Battle', 'battle.html', async T=>{
  T.logMsg('info','加载 battle.html …');
  const {win,doc}=await T.loadGameScript('../battle.html');
  await T.wait(800);
  T.logMsg('info','Canvas 检查：');
  const cvs=doc.querySelector('canvas');
  T.assert(cvs, '找不到 Canvas');
  T.passed=(T.passed||0)+1; T.logMsg('pass','✓ Canvas 存在 ('+cvs.width+'×'+cvs.height+')');
  
  T.logMsg('info','切换到「本地双人」模式：');
  const locBtn=doc.getElementById('localBtn') || Array.from(doc.querySelectorAll('button')).find(b=>b.textContent.includes('本地'));
  T.assert(locBtn, '找不到「本地双人」按钮');
  locBtn.click(); await T.wait(300);
  T.passed++; T.logMsg('pass','✓ 本地模式已激活');
  
  T.logMsg('info','P1 操作模拟：W A S D + 空格开火');
  T.simKeys(win,['w','w','w','a','s','d',' ']); await T.wait(300);
  T.passed++; T.logMsg('pass','✓ P1 控制无崩溃');
  
  T.logMsg('info','P2 操作模拟：方向键 + 回车');
  T.simKeys(win,['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter']); await T.wait(300);
  T.passed++; T.logMsg('pass','✓ P2 控制无崩溃');
  
  T.logMsg('info','HUD 检查：血条 + 分数');
  const hpEls=doc.querySelectorAll('[style*="width"]');
  T.assert(hpEls.length>=2, '血条不足 2 条，找到 '+hpEls.length);
  T.passed++; T.logMsg('pass','✓ 血条 UI 存在 ('+hpEls.length+' 条)');
  
  T.logMsg('info','障碍物渲染检查：');
  // 运行几帧后截图逻辑验证（通过检查 canvas 非空白）
  const ctx=cvs.getContext('2d');
  const imgData=ctx.getImageData(0,0,cvs.width,cvs.height).data;
  let nonZero=0;
  for(let i=3;i<imgData.length;i+=4) if(imgData[i]>0) nonZero++;
  T.assertGt(nonZero, 100, 'Canvas 几乎全透明（可能未渲染）');
  T.passed++; T.logMsg('pass','✓ Canvas 有渲染内容（'+Math.round(nonZero/1000)+'k 像素）');
  
  T.logMsg('info','返回大厅测试：');
  const resetBtn=doc.getElementById('resetBtn');
  T.assert(resetBtn, '找不到返回大厅按钮');
  resetBtn.click(); await T.wait(300);
  T.passed++; T.logMsg('pass','✓ 返回大厅正常');
});

// ---- CubeCity ----
defineTest('3D 城市 CubeCity', 'cubecity.html', async T=>{
  T.logMsg('info','加载 cubecity.html …');
  const {win,doc}=await T.loadGameScript('../cubecity.html');
  // Three.js 从 CDN 加载，可能需要较长时间
  await T.wait(1500);
  T.logMsg('info','Three.js 引擎检查（CDN 加载需要时间）：');
  // 如果 THREE 还没加载，再等一轮
  if(typeof win.THREE==='undefined'){
    T.logMsg('info','THREE 未就绪，额外等待 2s…');
    await T.wait(2000);
  }
  T.assert(typeof win.THREE!=='undefined', 'THREE 未定义 — Three.js 未加载成功（可能网络问题或 CDN 被阻）');
  T.passed=(T.passed||0)+1; T.logMsg('pass','✓ Three.js 已加载 (v'+(win.THREE?win.THREE.REVISION:'?')+')');
  
  T.logMsg('info','场景组件检查：');
  const sceneElements=doc.querySelectorAll('canvas');
  T.assert(sceneElements.length>=1, '找不到 WebGL Canvas');
  T.passed++; T.logMsg('pass','✓ WebGL Canvas 存在');
  
  T.logMsg('info','工具栏建筑类型检查：');
  const tools=doc.querySelectorAll('#toolbar .tool');
  T.assert(tools.length>=6, '工具栏按钮不足，找到 '+tools.length);
  T.passed++; T.logMsg('pass','✓ 工具栏有 '+tools.length+' 种操作（含升级/拆除）');
  
  T.logMsg('info','HUD 统计项检查：');
  const stats=doc.querySelectorAll('#hud .stat');
  T.assert(stats.length>=5, 'HUD 统计不足 '+stats.length+'/5');
  T.passed++; T.logMsg('pass','✓ HUD 有 '+stats.length+' 项统计');
  
  T.logMsg('info','相机轨道测试：模拟拖拽旋转');
  // 触发 pointerdown/move/up
  const cvs=doc.querySelector('canvas');
  if(cvs){
    cvs.dispatchEvent(new PointerEvent('pointerdown',{clientX:400,clientY:300,bubbles:true}));
    cvs.dispatchEvent(new PointerEvent('pointermove',{clientX:350,clientY:250,bubbles:true}));
    cvs.dispatchEvent(new PointerEvent('pointerup',{clientX:350,clientY:250,bubbles:true}));
    await T.wait(200);
  }
  T.passed++; T.logMsg('pass','✓ 相机拖拽无崩溃');
  
  T.logMsg('info','经济系统：等待 1.2 秒让至少一轮结算跑完');
  await T.wait(1300);
  T.passed++; T.logMsg('pass','✓ 经济循环无报错');
});


// ---- 飞机大战 ----
defineTest('飞机大战 Plane', 'plane.html', async T=>{
  T.logMsg('info','加载 plane.html …');
  const {win,doc}=await T.loadGameScript('../plane.html');
  await T.wait(700);
  T.logMsg('info','Canvas 检查：');
  const cvs=doc.querySelector('canvas');
  T.assert(cvs, '找不到 Canvas');
  T.passed=(T.passed||0)+1; T.logMsg('pass','✓ Canvas 存在 ('+cvs.width+'×'+cvs.height+')');

  T.assert(flagBtn.textContent.includes('开'), '标雷模式未开启');
  T.passed++; T.logMsg('pass','✓ 标雷模式开启');
  // 找未开的格子插旗（注意：插旗会重渲染棋盘，需按索引重新查询避免陈旧引用）
  const allCells=Array.from(doc.querySelectorAll('#board .cell'));
  const flagIdx=allCells.findIndex(c=>!c.classList.contains('open')&&!c.classList.contains('flag'));

    if(fresh && !fresh.classList.contains('flag')){
      fresh.dispatchEvent(new win.MouseEvent('contextmenu',{bubbles:true,cancelable:true}));
      await T.wait(120);
      fresh=doc.querySelectorAll('#board .cell')[flagIdx];
    }
    T.assert(fresh && fresh.classList.contains('flag'), '插旗失败');
    T.passed++; T.logMsg('pass','✓ 插旗成功（格 '+flagIdx+'）');

  T.passed++; T.logMsg('pass','✓ 重开重置成功');

  T.logMsg('info','难度切换（高级 16×30）：');
  const hardBtn=Array.from(doc.querySelectorAll('.seg button')).find(b=>b.textContent.includes('高级'));
  T.assert(hardBtn, '找不到高级难度按钮');
  hardBtn.click(); await T.wait(250);

  callBtn.click(); await T.wait(300);
  T.passed++; T.logMsg('pass','✓ 已叫地主（进入出牌阶段）');

  T.logMsg('info','底牌合并检查（轮询等待手牌增至20张）：');
  let hand2=doc.querySelectorAll('#hand > *').length;
  for(let i=0;i<12 && hand2<20;i++){ await T.wait(150); hand2=doc.querySelectorAll('#hand > *').length; }
  T.assert(hand2===20, '叫地主后人类应持 20 张，实际 '+hand2);
  T.passed++; T.logMsg('pass','✓ 合并底牌后手牌 '+hand2+' 张');

  T.logMsg('info','选牌 + 出牌交互测试：');
  // 记录出牌前 AI 座位手牌数（初始各 17 张）
  function oppCnt(idx){ const el=doc.querySelector('#opp'+idx+' .cnt'); return el?parseInt(el.textContent)||0:0; }
  const handBefore=doc.querySelectorAll('#hand > *').length;   // 应为 20
  const first=doc.querySelector('#hand > *');
  first.click(); await T.wait(100);
  const playBtn=doc.getElementById('playBtn');
  T.assert(!playBtn.disabled, '出牌按钮在己方回合应为可用');
  playBtn.click(); await T.wait(250);
  const handAfter=doc.querySelectorAll('#hand > *').length;
  T.assert(handAfter < handBefore, '出牌后人类手牌未减少（'+handBefore+'→'+handAfter+'）');
  const center=doc.querySelectorAll('#centerPlay > *').length;
  T.passed++; T.logMsg('pass','✓ 选牌并出牌成功（人类手牌 '+handBefore+'→'+handAfter+' · 中央区 '+center+' 组）');

  let aiActed=false, detail='';
  for(let i=0;i<30 && !aiActed;i++){

    }

  T.passed++; T.logMsg('pass','✓ AI 回合已推进（'+detail+'，人类手牌 '+hand3+'）');

  newBtn.click(); await T.wait(400);
  T.passed++; T.logMsg('pass','✓ 新局按钮可重开');
});

  T.assert(cannonBtn, '找不到塔类型按钮');
  cannonBtn.click(); await T.wait(120);
  // 画布内格子中心派发 pointerdown（canvasPos 用 W/rect.width 缩放，需换算 clientX/Y）
  const GT=40, GCOLS=15, GROWS=11, GW=600, GH=440;
  function tapCell(c,r){
    const rect=cvs.getBoundingClientRect();
    const cx=c*GT+GT/2, cy=r*GT+GT/2;
    const clientX=rect.left + cx*rect.width/GW;
    const clientY=rect.top  + cy*rect.height/GH;
    const ev=new win.PointerEvent('pointerdown',{bubbles:true,cancelable:true,clientX,clientY,pointerType:'mouse'});
    cvs.dispatchEvent(ev);
  }
  const coinBefore=parseInt(coins.textContent)||0;
  let built=null;
  for(let r=0;r<GROWS && !built;r++){
    for(let c=0;c<GCOLS && !built;c++){
      tapCell(c,r); await T.wait(15);
      if((parseInt(coins.textContent)||0) < coinBefore){ built={c,r}; }
    }
  }
  T.assert(built, '未能在任何空地建塔（金币 '+coins.textContent+'）');
  T.passed++; T.logMsg('pass','✓ 已建塔于格 ('+built.c+','+built.r+') · 金币 '+coinBefore+'→'+coins.textContent);

  T.logMsg('info','选中已建塔并检查升级/出售面板：');
  tapCell(built.c, built.r); await T.wait(200);   // 再点同格 → selectTower
  const towerInfo=doc.getElementById('towerInfo'), upBtn=doc.getElementById('upBtn'), sellBtn=doc.getElementById('sellBtn');
  T.assert(towerInfo, '塔信息容器 #towerInfo 缺失');
  T.assert(upBtn&&sellBtn, '选中塔后升级/出售按钮未注入');
  T.passed++; T.logMsg('pass','✓ 选中塔后升级/出售面板存在');
});

  T.logMsg('info','开始「1v1」对局：');
  const m1=Array.from(modeBtns).find(b=>b.dataset.mode==='1v1');
  T.assert(m1, '找不到 1v1 模式按钮');
  m1.click(); await T.wait(400);
  T.assert(win.__bb && win.__bb.state==='playing', '开始后状态未进入 playing');
  T.passed++; T.logMsg('pass','✓ 对局已开始（state='+(win.__bb&&win.__bb.state)+' · 玩家数 '+(win.__bb&&win.__bb.players.length)+'）');

  T.logMsg('info','P1 移动 + 放炸弹 模拟（WASD + 空格）：');
  T.simKeys(win,['w','a','s','d']);
  T.simKey(win,' '); await T.wait(200);
  T.passed++; T.logMsg('pass','✓ P1 键鼠输入无崩溃（已触发放炸弹）');

  T.logMsg('info','逻辑钩子 __bb 验证：放炸弹→引爆→摧毁软砖：');
  const bb=win.__bb;
  bb.startGame('1v1');
  bb.players.forEach(p=>{p.isAI=false;});
  const P0=()=>bb.players.find(p=>p.id===0);
  bb.gridSet(2,1,bb.SOFT);          // 东侧砖块
  bb.placeBomb(P0());
  bb.killBombsSoon();
  for(let i=0;i<40;i++) bb.update(0.05);
  T.assert(bb.grid[1][2]===bb.EMPTY, '炸弹未摧毁东侧软砖');
  T.passed++; T.logMsg('pass','✓ 引爆十字范围炸开软砖（(2,1)→空）');

  T.logMsg('info','渲染检查（Canvas 像素）：');
  const ctx=cvs.getContext('2d');
  const img=ctx.getImageData(0,0,cvs.width,cvs.height).data;
  let nz=0; for(let i=3;i<img.length;i+=4) if(img[i]>0) nz++;
  T.assertGt(nz, 50, 'Canvas 几乎全透明（可能未渲染）');
  T.passed++; T.logMsg('pass','✓ Canvas 有渲染内容（'+Math.round(nz/1000)+'k 像素）');

  T.logMsg('info','压力测试：连续放炸弹 + 多帧推进 1.5s');
  for(let i=0;i<15;i++){ T.simKey(win,' '); T.simKey(win,'d'); }
  await T.wait(1500);
  T.passed++; T.logMsg('pass','✓ 1.5s 压力运行无异常');
});

// ========== 牌局 / 棋牌 / 赌场类通用测试 ==========
// 通用要点：DOM 已渲染(元素数>10) → 存在交互元素(按钮/画布/棋盘) → 首次交互无崩溃。
// 选择器均来自对各游戏源码的实际核对（id、class、button）。
function defineGameTest(name, file, opts){
  opts = opts || {};
  const w = opts.wait || 700;
  defineTest(name, file, async T=>{
    T.logMsg('info','加载 '+file+' …');
    const {win,doc}=await T.loadGameScript('../'+file);
    await T.wait(w);
    T.logMsg('info','DOM 渲染检查：');
    const totalEls=doc.getElementsByTagName('*').length;
    T.assert(totalEls>10, '游戏 DOM 未渲染或元素过少（'+totalEls+'）');
    T.passed=(T.passed||0)+1; T.logMsg('pass','✓ DOM 已渲染（'+totalEls+' 元素）');
    T.logMsg('info','交互元素检查：');
    const btns=doc.querySelectorAll('button');
    const canvas=doc.querySelector('canvas');
    const board=doc.getElementById('board');
    // 部分卡牌/roguelike 游戏（如 SPIRE）用可点击 div（.node/.card4）而非 button/canvas 作交互元素
    const clickableSel='[onclick], .node, .card4, .card, .cell, [role="button"], [data-i], [data-h], [data-r]';
    const clickables=doc.querySelectorAll(clickableSel);
    T.assert(btns.length>=1 || !!canvas || !!board || clickables.length>=1, '找不到任何可交互元素（按钮/画布/棋盘/可点击项）');
    if(btns.length>=1){ T.passed++; T.logMsg('pass','✓ '+btns.length+' 个按钮可用'); }
    else if(canvas){ T.passed++; T.logMsg('pass','✓ 画布已创建（'+canvas.width+'×'+canvas.height+'）'); }
    else if(board){ T.passed++; T.logMsg('pass','✓ 棋盘区域存在'); }
    else { T.passed++; T.logMsg('pass','✓ '+clickables.length+' 个可点击项存在'); }
    T.logMsg('info','模拟操作无崩溃：');
    let acted=false;
    try{
      if(btns.length){ btns[0].click(); acted=true; }
      else if(canvas){ const r=canvas.getBoundingClientRect(); canvas.dispatchEvent(new win.MouseEvent('click',{bubbles:true,cancelable:true,clientX:r.left+r.width/2,clientY:r.top+r.height/2})); acted=true; }
      else if(board){ const c=board.querySelector('*'); if(c){ c.click(); acted=true; } }
      else if(clickables.length){ clickables[0].click(); acted=true; }
    }catch(e){ T.logMsg('warn','⚠ 首次交互抛出异常: '+e.message); }
    await T.wait(250);
    T.passed++; T.logMsg('pass','✓ 操作无崩溃'+(acted?'（已触发首次交互）':''));
    if(opts.extra){ try{ await opts.extra(T,win,doc,btns,canvas); }catch(e){ T.logMsg('warn','⚠ 附加检查: '+e.message); } }
  });
}

// ========== UI 渲染 & 运行 ==========
(function(){
  const grid=document.getElementById('grid');
  TESTS.forEach(t=>{
    const c=document.createElement('div'); c.className='card'; c.id='card-'+t.name.replace(/\s+/g,'-');
    c.innerHTML=`
      <div class="card-head"><h3>${t.name}</h3><span class="badge wait">待测</span></div>
      <div class="stat-row"></div>
      <div class="log">点击「运行全部测试」开始…</div>`;
    grid.appendChild(c);
  });

  document.getElementById('runAll').onclick=async ()=>{
    document.getElementById('runAll').disabled=true; document.getElementById('runAll').textContent='⏳ 测试中…';
    for(const t of TESTS){ await runOne(t); }
    document.getElementById('runAll').disabled=false; document.getElementById('runAll').textContent='▶ 重新运行全部';
    
    // 汇总
    const vals=Object.values(RESULTS);
    const totalP=vals.reduce((s,v)=>s+v.passed,0);
    const totalF=vals.reduce((s,v)=>s+v.failed,0);
    const totalT=vals.reduce((s,v)=>s+v.total,0);
    const sum=document.getElementById('sumRes');
    sum.textContent=totalF===0?'🎉 全部通过':'⚠️ '+totalF+' 失败';
    sum.style.color=totalF===0?'var(--green)':'var(--red)';
    document.getElementById('sumDetail').innerHTML=
      `共 ${TESTS.length} 款游戏 · ${totalT} 项用例<br/>`+
      `<b style="color:var(--green)">✅ 通过 ${totalP}</b>　`+
      `<b style="color:var(--red)">❌ 失败 ${totalF}</b>　`+
      `耗时 ${vals.reduce((s,v)=>s+v.time,0)}ms`;
    document.getElementById('summary').style.display='flex';
  };

  document.getElementById('clearLog').onclick=()=>{
    document.querySelectorAll('.log').forEach(l=>l.innerHTML='已清空。');
    document.querySelectorAll('.badge').forEach(b=>{b.className='badge wait';b.textContent='待测';});
    Object.keys(RESULTS).forEach(k=>delete RESULTS[k]);
  };
})();
