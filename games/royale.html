<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // ROYALE</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(246,70,93,.08), transparent 60%),
      linear-gradient(0deg, rgba(255,255,255,.02) 1px, transparent 1px) 0 0/100% 3px,
      var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:14px;
  }
  .window{
    width:min(460px,100%);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:0 0 40px rgba(0,0,0,.6), 0 0 0 1px rgba(246,70,93,.08);
    overflow:hidden;
  }
  .titlebar{
    display:flex; align-items:center; gap:10px;
    padding:10px 14px;
    background:linear-gradient(180deg,#16202c,#10161f);
    border-bottom:1px solid var(--border);
  }
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:8px 14px; border-bottom:1px solid var(--border); background:#0e141d;
    font-size:12px;
  }
  .topbar .clock{color:var(--gold); letter-spacing:1px; font-size:14px}
  .topbar .crow{display:flex; gap:10px}
  .topbar .c{display:flex; align-items:center; gap:4px; color:var(--dim)}
  .topbar .c b{color:var(--text)}
  .topbar .c.me b{color:var(--red)} .topbar .c.ai b{color:var(--green)}
  .stage{position:relative; background:var(--bg); line-height:0}
  canvas{width:100%; height:auto; display:block; touch-action:none; cursor:crosshair}
  .overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(10,14,20,.84); backdrop-filter:blur(2px);
  }
  .overlay.hidden{display:none}
  .ov-box{
    text-align:center; padding:28px 34px; border:1px solid var(--border);
    border-radius:12px; background:var(--panel); box-shadow:0 0 30px rgba(0,0,0,.6);
  }
  .ov-title{font-size:28px; letter-spacing:3px; margin-bottom:10px}
  .ov-title.win{color:var(--green); text-shadow:0 0 18px rgba(2,192,118,.5)}
  .ov-title.lose{color:var(--red); text-shadow:0 0 18px rgba(246,70,93,.5)}
  .ov-msg{color:var(--dim); font-size:13px; margin-bottom:18px; line-height:1.7}
  .btn{
    background:#111824; color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:11px 20px; font-family:inherit; font-size:13px; cursor:pointer;
    transition:.15s ease; letter-spacing:1px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(180deg,#16202c,#10161f); border-color:var(--gold); color:var(--gold)}
  .controls{padding:12px 14px; border-top:1px solid var(--border); background:#0e141d}
  .elixir{
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
  }
  .elixir .lab{font-size:11px; color:var(--dim); white-space:nowrap}
  .pips{flex:1; display:flex; gap:3px; height:14px}
  .pip{flex:1; border-radius:3px; background:#15202c; border:1px solid #1f2a38; transition:.1s}
  .pip.on{background:linear-gradient(180deg,#c04bff,#7a2bd6); border-color:#c04bff; box-shadow:0 0 8px rgba(192,75,255,.6)}
  .hand{display:flex; gap:8px}
  .card{
    flex:1; background:#111824; border:1px solid var(--border); border-radius:9px;
    padding:8px 4px; text-align:center; cursor:pointer; transition:.15s ease; position:relative;
    user-select:none;
  }
  .card:active{transform:translateY(1px)}
  .card.sel{border-color:var(--gold); box-shadow:0 0 14px rgba(240,185,11,.35); background:#16202c}
  .card.poor{opacity:.4; cursor:not-allowed}
  .card .nm{font-size:12px; letter-spacing:.5px}
  .card .cost{
    position:absolute; top:-7px; right:-5px; width:18px; height:18px; border-radius:50%;
    background:#7a2bd6; color:#fff; font-size:11px; line-height:18px; border:1px solid #c04bff;
  }
  .card .ic{font-size:18px; margin:2px 0}
  .foot{margin-top:9px; color:var(--dim); font-size:11px; text-align:center; line-height:1.6}
  .blink{color:var(--red); animation:bl 1.1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="t">TERMINAL // <b>皇室战争</b> · ROYALE</span>
    </div>
    <div class="topbar">
      <div class="clock" id="clock">2:30</div>
      <div class="crow">
        <div class="c me">⛨ <b id="myTowers">3</b></div>
        <div class="c ai">⛨ <b id="aiTowers">3</b></div>
      </div>
    </div>
    <div class="stage">
      <canvas id="game"></canvas>
      <div id="overlay" class="overlay hidden">
        <div class="ov-box">
          <div id="ovTitle" class="ov-title"></div>
          <div id="ovMsg" class="ov-msg"></div>
          <button id="ovBtn" class="btn primary">再来一局</button>
        </div>
      </div>
    </div>
    <div class="controls">
      <div class="elixir">
        <span class="lab">圣水</span>
        <div class="pips" id="pips"></div>
      </div>
      <div class="hand" id="hand"></div>
      <div class="foot">选卡 → 点己方半场部署（法术可点任意位置）· 摧毁敌方国王塔即胜 <span class="blink">_</span></div>
    </div>
  </div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";

  // ---------- 画布 ----------
  const W = 420, H = 640, RIVER = H/2;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  // ---------- 卡牌定义 ----------
  const CARDS = {
    knight:    {name:'骑士',   ic:'🛡️', cost:3, kind:'unit', count:1, hp:440, dmg:60, range:20,  speed:54, atk:1.0, r:13, color:'#f6465d', towerOnly:false},
    archers:   {name:'弓手',   ic:'🏹', cost:3, kind:'unit', count:2, hp:130, dmg:32, range:96,  speed:56, atk:0.9, r:10, color:'#ff8a96', towerOnly:false},
    giant:     {name:'巨人',   ic:'🗿', cost:5, kind:'unit', count:1, hp:1000,dmg:96, range:22,  speed:34, atk:1.3, r:17, color:'#f0b90b', towerOnly:true},
    goblins:   {name:'哥布林', ic:'👺', cost:2, kind:'unit', count:3, hp:95,  dmg:42, range:18,  speed:86, atk:0.7, r:9,  color:'#02c076', towerOnly:false},
    minions:   {name:'小恶魔', ic:'🦇', cost:3, kind:'unit', count:3, hp:110, dmg:38, range:80,  speed:94, atk:0.8, r:9,  color:'#3aa0ff', towerOnly:false},
    musketeer: {name:'火枪手', ic:'🔫', cost:4, kind:'unit', count:1, hp:220, dmg:84, range:118, speed:52, atk:1.0, r:11, color:'#b388ff', towerOnly:false},
    skeletons: {name:'骷髅兵', ic:'💀', cost:1, kind:'unit', count:4, hp:55,  dmg:28, range:16,  speed:80, atk:0.6, r:7,  color:'#e6edf3', towerOnly:false},
    fireball:  {name:'火球',   ic:'🔥', cost:4, kind:'spell', radius:56, dmg:240, color:'#ff8a2b'}
  };
  const DECK = ['knight','archers','giant','goblins','minions','musketeer','skeletons','fireball'];

  // ---------- 塔定义 ----------
  const TOWER_DEF = {
    king:    {hp:1500, dmg:55, range:100, atk:0.8, w:46, h:54},
    princess:{hp:820,  dmg:50, range:98,  atk:0.8, w:34, h:42}
  };

  // ---------- 状态 ----------
  const state = {};
  function makeTowers(side){
    const yk = side==='me' ? H-46 : 46;
    const yp = side==='me' ? H-120 : 120;
    const xL = 64, xR = W-64, xC = W/2;
    const mk=(kind,x,y)=>({side,kind,x,y,w:TOWER_DEF[kind].w,h:TOWER_DEF[kind].h,
      hp:TOWER_DEF[kind].hp,maxHp:TOWER_DEF[kind].hp,dmg:TOWER_DEF[kind].dmg,
      range:TOWER_DEF[kind].range,atk:TOWER_DEF[kind].atk,cd:0,dead:false});
    return [mk('king',xC,yk), mk('princess',xL,yp), mk('princess',xR,yp)];
  }
  function resetState(){
    state.units = [];
    state.towers = [].concat(makeTowers('me'), makeTowers('ai'));
    state.effects = [];
    state.loot = [];
    state.rage = { me:0, ai:0 };
    state.elixirMe = 5; state.elixirAi = 5;
    state.deckMe = DECK.slice(); state.deckAi = DECK.slice();
    state.selCard = null;
    state.time = 150;            // 比赛时长（秒）
    state.over = false; state.win = false;
    state.aiTimer = 2.2;
    hideOverlay();
    renderHand(); renderPips();
  }

  // ---------- 工具 ----------
  function aliveTowers(side){ return state.towers.filter(t=>t.side===side && !t.dead); }
  function enemiesOf(side){
    const list = [];
    for(const u of state.units) if(u.side!==side && !u.dead) list.push(u);
    for(const t of state.towers) if(t.side!==side && !t.dead) list.push(t);
    return list;
  }
  function nearest(from, list){
    let best=null, bd=1e9;
    for(const e of list){ const d=Math.hypot(e.x-from.x, e.y-from.y); if(d<bd){bd=d; best=e;} }
    return best;
  }
  function distToRect(px,py,r){
    const cx=Math.max(r.x-r.w/2, Math.min(px, r.x+r.w/2));
    const cy=Math.max(r.y-r.h/2, Math.min(py, r.y+r.h/2));
    return Math.hypot(px-cx, py-cy);
  }

  // ---------- 部署 ----------
  function spawnUnit(key, x, y, side){
    const c = CARDS[key];
    const n = c.count;
    for(let i=0;i<n;i++){
      const ox = (i%2? 14:-14)*(Math.floor(i/2)+1) * (side==='me'?1:1);
      const oy = (i%2? -14:14)*(Math.floor(i/2)+1);
      state.units.push({
        side, key, name:c.name, color:c.color,
        x:x+ox*(i>0?0.6:0), y:y+oy*(i>0?0.6:0),
        hp:c.hp, maxHp:c.hp, dmg:c.dmg, range:c.range, speed:c.speed, atk:c.atk,
        r:c.r, towerOnly:!!c.towerOnly, cd:0, dead:false
      });
    }
  }
  function castSpell(key, x, y, side){
    const c = CARDS[key];
    const foes = [];
    for(const u of state.units) if(u.side!==side && !u.dead) foes.push(u);
    for(const t of state.towers) if(t.side!==side && !t.dead) foes.push(t);
    for(const f of foes){
      const d = (f.w ? distToRect(x,y,f) : Math.hypot(f.x-x,f.y-y));
      if(d <= c.radius) damage(f, c.dmg);
    }
    state.effects.push({type:'fire', x, y, age:0, life:0.45, r:c.radius});
    beep(180, 0.18, 'sawtooth', 0.05);
  }
  function deploy(side, key, x, y){
    const c = CARDS[key];
    if(c.kind==='spell'){ castSpell(key, x, y, side); if(typeof Juice!=='undefined') Juice.sfx('boom'); }
    else { spawnUnit(key, x, y, side); beep(520, 0.05, 'triangle', 0.04); if(typeof Juice!=='undefined'){ Juice.sfx('shoot'); Juice.popup(x, y, '部署', '#f6465d', {size:13}); } }
  }

  function damage(ent, dmg){
    ent.hp -= dmg;
    if(ent.hp <= 0){
      ent.hp = 0; ent.dead = true;
      if(ent.w){ // 塔被摧毁
        state.effects.push({type:'boom', x:ent.x, y:ent.y, age:0, life:0.5, r:Math.max(ent.w,ent.h)});
        beep(140, 0.25, 'square', 0.05);
        if(typeof Juice!=='undefined'){ Juice.sfx('boom'); Juice.addTrauma(0.4); Juice.burst(ent.x, ent.y, {color:'#f0b90b', n:18, speed:200}); }
      } else {
        state.effects.push({type:'boom', x:ent.x, y:ent.y, age:0, life:0.3, r:ent.r*2});
        if(typeof Juice!=='undefined'){ Juice.sfx('hit'); Juice.burst(ent.x, ent.y, {color:ent.color||'#e6edf3', n:12, speed:180}); }
        // 击杀掉落战利品（能量或狂暴），归击杀方所有
        if(Math.random() < 0.4){
          const side = ent.side==='me' ? 'ai' : 'me';
          const type = Math.random() < 0.28 ? 'rage' : 'energy';
          state.loot.push({ side, type, x:ent.x, y:ent.y, age:0, done:false });
        }
      }
    }
  }

  // ---------- 手牌 ----------
  function handOf(side){ return (side==='me'? state.deckMe : state.deckAi).slice(0,4); }
  function playFromDeck(side, idx){
    const deck = side==='me'? state.deckMe : state.deckAi;
    const key = deck[idx];
    if(!key) return null;
    const c = CARDS[key];
    const elix = side==='me'? state.elixirMe : state.elixirAi;
    if(elix < c.cost) return null;
    if(side==='me') state.elixirMe -= c.cost; else state.elixirAi -= c.cost;
    deck.splice(idx,1); deck.push(key);
    return key;
  }
  function renderHand(){
    const hand = document.getElementById('hand');
    hand.innerHTML = '';
    const h = handOf('me');
    h.forEach((key, i)=>{
      const c = CARDS[key];
      const el = document.createElement('div');
      el.className = 'card' + (state.selCard===i?' sel':'') + (state.elixirMe < c.cost?' poor':'');
      el.innerHTML = '<div class="ic">'+c.ic+'</div><div class="nm">'+c.name+'</div><div class="cost">'+c.cost+'</div>';
      el.onclick = ()=>{
        ensureAudio();
        state.selCard = (state.selCard===i? null : i);
        renderHand();
      };
      hand.appendChild(el);
    });
  }
  function renderPips(){
    const pips = document.getElementById('pips');
    pips.innerHTML = '';
    const filled = Math.floor(state.elixirMe);
    const frac = state.elixirMe - filled;
    for(let i=0;i<10;i++){
      const p = document.createElement('div');
      p.className = 'pip' + (i<filled || (i===filled && frac>0.5) ? ' on' : '');
      pips.appendChild(p);
    }
  }

  // ---------- AI ----------
  function aiThink(dt){
    if(state.over) return;
    state.aiTimer -= dt;
    const h = handOf('ai');
    // 圣水接近满则尽快出牌，避免浪费
    let idx = -1;
    if(state.elixirAi >= 9.5){
      for(let i=0;i<h.length;i++) if(CARDS[h[i]].cost <= state.elixirAi){ idx=i; break; }
    } else if(state.aiTimer <= 0){
      const aff = h.map((k,i)=>CARDS[k].cost<=state.elixirAi? i : -1).filter(i=>i>=0);
      if(aff.length){ idx = aff[Math.floor(Math.random()*aff.length)]; state.aiTimer = 1.8 + Math.random()*1.8; }
    }
    if(idx<0) return;
    const key = playFromDeck('ai', idx);
    if(!key) return;
    const c = CARDS[key];
    let x, y;
    if(c.kind==='spell'){
      // 火球砸向玩家推进最前的单位 / 塔
      const targets = enemiesOf('ai').filter(e=>e.side==='me');
      const t = targets.sort((a,b)=> (a.y)-(b.y))[0]; // 最靠上的（最深入 AI 半场）
      x = t? t.x : W/2; y = t? t.y : H/2;
    } else {
      const lanes = [64, W/2, W-64];
      x = lanes[Math.floor(Math.random()*lanes.length)] + (Math.random()*30-15);
      y = RIVER - 40 - Math.random()*70; // AI 半场
    }
    deploy('ai', key, x, y);
  }

  // ---------- 更新 ----------
  function update(dt){
    if(state.over) return;
    // 圣水
    const regen = state.time <= 60 ? 1.6 : 2.8; // 最后 1 分钟双倍圣水
    state.elixirMe = Math.min(10, state.elixirMe + dt/regen);
    state.elixirAi = Math.min(10, state.elixirAi + dt/regen);

    aiThink(dt);

    // 单位
    for(const u of state.units){
      if(u.dead) continue;
      u.cd -= dt;
      const pool = u.towerOnly ? state.towers.filter(t=>t.side!==u.side && !t.dead) : enemiesOf(u.side);
      const tgt = nearest(u, pool);
      if(!tgt) continue;
      const d = (tgt.w? distToRect(u.x,u.y,tgt) : Math.hypot(tgt.x-u.x, tgt.y-u.y));
      const rage = state.rage[u.side] > 0;
      if(d > u.range){
        const dx=tgt.x-u.x, dy=tgt.y-u.y, m=Math.hypot(dx,dy)||1;
        const spd = u.speed * (rage?1.5:1);
        u.x += dx/m*spd*dt; u.y += dy/m*spd*dt;
      } else if(u.cd <= 0){
        damage(tgt, u.dmg * (rage?1.5:1));
        state.effects.push({type:'hit', x:tgt.x, y:tgt.y, age:0, life:0.15, r:6, color:u.color});
        u.cd = u.atk;
      }
    }

    // 塔
    for(const t of state.towers){
      if(t.dead) continue;
      t.cd -= dt;
      if(t.cd > 0) continue;
      const foes = enemiesOf(t.side).filter(e=> (e.w? distToRect(e.x,e.y,t) : Math.hypot(e.x-t.x,e.y-t.y)) <= t.range);
      if(foes.length){
        const tgt = nearest(t, foes);
        damage(tgt, t.dmg);
        state.effects.push({type:'hit', x:tgt.x, y:tgt.y, age:0, life:0.15, r:5, color:'#f0b90b'});
        t.cd = t.atk;
      }
    }

    // 特效
    for(const ef of state.effects) ef.age += dt;

    // 战利品（击杀掉落，短时后归属方拾取）
    for(const lo of state.loot){
      lo.age += dt;
      if(lo.age >= 0.9 && !lo.done){
        lo.done = true;
        if(lo.type === 'energy'){
          if(lo.side==='me') state.elixirMe = Math.min(10, state.elixirMe + 2);
          else state.elixirAi = Math.min(10, state.elixirAi + 2);
          if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); Juice.popup(lo.x, lo.y, '+2 圣水', '#c04bff', {size:13}); }
        } else {
          state.rage[lo.side] = 4;
          if(typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.burst(lo.x, lo.y, {color:'#f0b90b', n:12, speed:200}); Juice.popup(lo.x, lo.y, '狂暴!', '#f0b90b', {size:15, big:true}); }
        }
      }
    }
    state.loot = state.loot.filter(lo => !lo.done);
    // 狂暴计时
    for(const s of ['me','ai']) if(state.rage[s] > 0) state.rage[s] = Math.max(0, state.rage[s] - dt);

    // 清理
    state.units = state.units.filter(u=>!u.dead);
    state.towers = state.towers.filter(t=>!t.dead);
    state.effects = state.effects.filter(ef=>ef.age < ef.life);

    // 计时 / 胜负
    state.time -= dt;
    if(state.time <= 0){ endByTowers(); return; }
    const myKing = state.towers.find(t=>t.side==='me' && t.kind==='king');
    const aiKing = state.towers.find(t=>t.side==='ai' && t.kind==='king');
    if(aiKing && aiKing.dead){ finish('win'); return; }
    if(myKing && myKing.dead){ finish('lose'); return; }
  }
  function endByTowers(){
    const myT = aliveTowers('me').length, aiT = aliveTowers('ai').length;
    if(myT > aiT) finish('win');
    else if(aiT > myT) finish('lose');
    else finish('draw');
  }
  function finish(result){
    if(state.over) return;
    state.over = true; state.result = result;
    showOverlay(result);
  }

  // ---------- 渲染 ----------
  function render(){
    ctx.clearRect(0,0,W,H);
    if(typeof Juice!=='undefined') Juice.begin(ctx);
    // 背景网格
    ctx.strokeStyle = '#101824'; ctx.lineWidth = 1;
    for(let x=0;x<=W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0;y<=H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    // 河流
    ctx.strokeStyle = '#16314a'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(0,RIVER); ctx.lineTo(W,RIVER); ctx.stroke();
    ctx.strokeStyle = 'rgba(58,160,255,.35)'; ctx.lineWidth = 1; ctx.setLineDash([6,8]);
    ctx.beginPath(); ctx.moveTo(0,RIVER); ctx.lineTo(W,RIVER); ctx.stroke(); ctx.setLineDash([]);
    // 己方部署区提示
    if(state.selCard!==null){
      ctx.fillStyle = 'rgba(246,70,93,.05)';
      ctx.fillRect(0, RIVER+6, W, H-RIVER-6);
    }

    // 塔
    for(const t of state.towers) drawTower(t);
    // 单位
    for(const u of state.units) drawUnit(u);
    // 战利品
    for(const lo of state.loot) drawLoot(lo);
    // 特效
    for(const ef of state.effects) drawEffect(ef);

    // HUD 数字（canvas 上不需要 DOM 同步，DOM 单独更新）
    syncHud();
    if(typeof Juice!=='undefined'){ Juice.mid(ctx); Juice.end(ctx); }
  }
  function drawTower(t){
    const col = t.side==='me'? '#f6465d' : '#02c076';
    ctx.save();
    ctx.fillStyle = '#0e141d';
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    roundRect(t.x-t.w/2, t.y-t.h/2, t.w, t.h, 6); ctx.fill(); ctx.stroke();
    ctx.fillStyle = col; ctx.font='bold 16px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t.kind==='king'?'♛':'♜', t.x, t.y);
    ctx.restore();
    drawHpBar(t.x, t.y - t.h/2 - 8, t.w+6, t.hp/t.maxHp);
  }
  function drawUnit(u){
    const ring = u.side==='me'? '#f6465d' : '#02c076';
    ctx.save();
    ctx.beginPath(); ctx.arc(u.x, u.y, u.r+2, 0, Math.PI*2);
    ctx.fillStyle = '#0a0e14'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = ring; ctx.stroke();
    ctx.beginPath(); ctx.arc(u.x, u.y, u.r-1, 0, Math.PI*2);
    ctx.fillStyle = u.color; ctx.fill();
    ctx.restore();
    drawHpBar(u.x, u.y - u.r - 7, Math.max(20, u.r*2), u.hp/u.maxHp);
  }
  function drawHpBar(cx, y, w, ratio){
    const r = Math.max(0, Math.min(1, ratio));
    ctx.fillStyle = '#1f2a38'; ctx.fillRect(cx-w/2, y, w, 4);
    ctx.fillStyle = r>0.5? '#02c076' : (r>0.25? '#f0b90b' : '#f6465d');
    ctx.fillRect(cx-w/2, y, w*r, 4);
  }
  function drawLoot(lo){
    const bob = Math.sin((lo.age||0)*6 + lo.x*0.1) * 3;
    const col = lo.type==='energy' ? '#c04bff' : '#f0b90b';
    ctx.save();
    ctx.translate(lo.x, lo.y + bob);
    ctx.shadowBlur = 12; ctx.shadowColor = col;
    ctx.fillStyle = col; ctx.fillRect(-7,-7,14,14);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0a0e14'; ctx.font='bold 11px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lo.type==='energy' ? '⚡' : '🔥', 0, 0);
    ctx.restore();
  }
  function drawEffect(ef){
    const k = ef.age/ef.life;
    ctx.globalAlpha = 1-k;
    if(ef.type==='boom'){
      ctx.strokeStyle = ef.r>40? '#f6465d':'#f0b90b'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r*(0.4+0.9*k), 0, Math.PI*2); ctx.stroke();
    } else if(ef.type==='fire'){
      ctx.fillStyle = 'rgba(255,138,43,.5)';
      ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r*(0.6+0.6*k), 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ff8a2b'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r*(0.6+0.6*k), 0, Math.PI*2); ctx.stroke();
    } else {
      ctx.strokeStyle = ef.color||'#e6edf3'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r*(0.5+k), 0, Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }
  function syncHud(){
    document.getElementById('myTowers').textContent = aliveTowers('me').length;
    document.getElementById('aiTowers').textContent = aliveTowers('ai').length;
    const m = Math.max(0, Math.floor(state.time/60)), s = Math.max(0, Math.floor(state.time%60));
    document.getElementById('clock').textContent = m + ':' + (s<10?'0':'') + s;
    renderPips();
    renderHandAfford();
  }
  function renderHandAfford(){
    const cards = document.querySelectorAll('#hand .card');
    const h = handOf('me');
    cards.forEach((el,i)=>{
      if(i>=h.length) return;
      const poor = state.elixirMe < CARDS[h[i]].cost;
      el.classList.toggle('poor', poor);
      el.classList.toggle('sel', state.selCard===i);
    });
  }

  // ---------- 输入 ----------
  function canvasPos(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    return { x, y };
  }
  canvas.addEventListener('pointerdown', e=>{
    ensureAudio();
    if(state.over || state.selCard===null) return;
    const p = canvasPos(e);
    const key = handOf('me')[state.selCard];
    if(!key) return;
    const c = CARDS[key];
    if(c.kind==='spell'){
      // 任意位置
      if(playFromDeck('me', state.selCard)) deploy('me', key, p.x, p.y);
    } else {
      // 必须在己方半场
      if(p.y < RIVER + 6){ flashHint('只能在己方半场部署'); return; }
      if(playFromDeck('me', state.selCard)) deploy('me', key, p.x, p.y);
    }
    state.selCard = null;
    renderHand();
  });
  function flashHint(msg){
    const f = document.querySelector('.foot');
    if(!f) return; const old=f.innerHTML; f.innerHTML = '<span style="color:#f6465d">'+msg+'</span>';
    setTimeout(()=>{ f.innerHTML = old; }, 1100);
  }

  // ---------- 结算 ----------
  function showOverlay(kind){
    const ov = document.getElementById('overlay');
    const title = document.getElementById('ovTitle');
    const msg = document.getElementById('ovMsg');
    if(kind==='win'){
      title.textContent = '胜利 WIN'; title.className='ov-title win';
      msg.innerHTML = '敌方国王塔已摧毁！<br/>剩余己方塔 ' + aliveTowers('me').length + ' / 3';
      if(typeof Juice!=='undefined'){ Juice.sfx('win'); Juice.flash('#02c076',0.28); Juice.addTrauma(0.6); const b=Juice.best('royale',1); Juice.rank(1); if(b.isNew) Juice.achievement('新纪录！'); }
    } else if(kind==='draw'){
      title.textContent = '平局 DRAW'; title.className='ov-title win';
      msg.innerHTML = '时间到 · 双方塔数相同！<br/>剩余己方塔 ' + aliveTowers('me').length + ' / 3';
      if(typeof Juice!=='undefined') Juice.sfx('click');
    } else {
      title.textContent = '失败 LOSE'; title.className='ov-title lose';
      msg.innerHTML = '己方国王塔失守…<br/>剩余敌方塔 ' + aliveTowers('ai').length + ' / 3';
      if(typeof Juice!=='undefined'){ Juice.sfx('lose'); Juice.flash('#f6465d',0.3); Juice.addTrauma(0.6); }
    }
    ov.classList.remove('hidden');
  }
  function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }
  document.getElementById('ovBtn').addEventListener('click', ()=>{ resetState(); });

  // ---------- 音效 ----------
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){ try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ audioCtx=null; } }
    if(audioCtx && audioCtx.state==='suspended'){ audioCtx.resume().catch(()=>{}); }
  }
  function beep(freq, dur, type, vol){
    if(!audioCtx) return;
    try {
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type||'square'; o.frequency.value=freq; g.gain.value=vol||0.04;
      o.connect(g); g.connect(audioCtx.destination); o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
      o.stop(audioCtx.currentTime+dur);
    } catch(e){}
  }

  // ---------- 主循环 ----------
  let lastTime = performance.now();
  function loop(now){
    let dt = (now-lastTime)/1000; lastTime=now;
    if(dt>0.05) dt=0.05;
    if(typeof Juice!=='undefined') Juice.update(dt);
    if(!state.over) update(dt);
    render();
    requestAnimationFrame(loop);
  }

  resetState();
  requestAnimationFrame(loop);

  // 测试钩子（不影响正常玩法）
  window.__t = {
    state, deploy,
    spawnLoot(side, type, x, y){ state.loot.push({ side, type, x: x||W/2, y: y||H/2, age:0, done:false }); },
    stepLoot(dt){
      for(const lo of state.loot){
        lo.age += dt;
        if(lo.age >= 0.9 && !lo.done){
          lo.done = true;
          if(lo.type==='energy'){ if(lo.side==='me') state.elixirMe=Math.min(10,state.elixirMe+2); else state.elixirAi=Math.min(10,state.elixirAi+2); }
          else { state.rage[lo.side] = 4; }
        }
      }
      state.loot = state.loot.filter(l => !l.done);
    },
    getLoot(){ return state.loot.length; },
    getRage(side){ return state.rage[side]; },
    getElixir(side){ return side==='me' ? state.elixirMe : state.elixirAi; },
    setElixir(side, v){ if(side==='me') state.elixirMe=v; else state.elixirAi=v; }
  };
})();
</script>
