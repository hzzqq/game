<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 3×3 2048 变体</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(240,185,11,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px;touch-action:none}
  .titlebar{width:min(420px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--gold)}
  .wrap{width:min(420px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:8px;margin-bottom:10px;touch-action:none}
  .cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;border-radius:8px;background:#0e141d;font-size:28px;font-weight:700;color:var(--text)}
  .cell[data-v="2"]{background:#1b2733;color:#9fd3ff}
  .cell[data-v="4"]{background:#1f3326;color:#7fe0a6}
  .cell[data-v="8"]{background:#243a1f;color:#aef08a}
  .cell[data-v="16"]{background:#33411a;color:#e0e36a}
  .cell[data-v="32"]{background:#3d3413;color:#f0c44a}
  .cell[data-v="64"]{background:#46280f;color:#f59a3c}
  .cell[data-v="128"]{background:#4a1f12;color:#f6465d}
  .cell[data-v="256"]{background:#4a1230;color:#ff7ab0}
  .msg{text-align:center;min-height:20px;margin-top:8px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .msg.lose{color:var(--red);font-weight:700}
  .hint{text-align:center;color:var(--dim);font-size:11px;margin-top:6px}
  .foot{width:min(420px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>迷你 2048</b> 3×3</span></div>
  <div class="wrap">
    <div class="hud"><span>分数 SCORE · <span class="st" id="score">0</span></span><span id="status">滑动合成 128</span></div>
    <div class="board" id="board"></div>
    <div class="msg" id="msg">用方向键 / WASD / 滑动 移动。相同数字合并翻倍，先合成 128 即胜。</div>
    <div class="hint">↑↓←→ 或 WASD · 触屏滑动</div>
  </div>
  <div class="foot">3×3 2048 变体：规则同经典 2048（相邻相同翻倍），但棋盘缩小为 3×3，胜利目标降为 128，节奏更紧凑。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  /* ===================== 纯逻辑核心 ===================== */
  const SIZE = 3, WIN = 128;

  let _rand = Math.random;
  function setRand(fn){ _rand = fn; }

  let board, score, status, _celebrated = false; // status: 'playing' | 'win' | 'over'

  function emptyBoard(){ return Array.from({length:SIZE},()=>new Array(SIZE).fill(0)); }
  function reset(){
    board = emptyBoard(); score = 0; status = 'playing'; _celebrated = false;
    spawn(); spawn();
  }
  function spawn(){
    const empties = [];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]===0) empties.push([r,c]);
    if(empties.length===0) return false;
    const idx = Math.floor(_rand()*empties.length);
    const p = empties[idx];
    board[p[0]][p[1]] = (_rand()<0.9)?2:4;
    return true;
  }
  function setBoard(b){
    board = b.map(row=>row.slice());
    score = 0; status = 'playing'; _celebrated = false;
  }
  // 单行向左压缩+合并（相邻相同翻倍，一次合并只生效一次），返回 {row, gained}
  function slideLine(line){
    const arr = line.filter(v=>v!==0);
    let gained = 0;
    for(let i=0;i<arr.length-1;i++){
      if(arr[i]===arr[i+1]){ arr[i]*=2; gained+=arr[i]; arr.splice(i+1,1); }
    }
    while(arr.length<SIZE) arr.push(0);
    return {row:arr, gained};
  }
  function hasValue(v){ for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]===v) return true; return false; }
  function canMove(){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      if(board[r][c]===0) return true;
      if(c+1<SIZE && board[r][c]===board[r][c+1]) return true;
      if(r+1<SIZE && board[r][c]===board[r+1][c]) return true;
    }
    return false;
  }
  // dir: 'left' | 'right' | 'up' | 'down'
  function move(dir){
    if(status!=='playing') return {moved:false, gained:0, status};
    const before = JSON.stringify(board);
    const nb = emptyBoard();
    let gained = 0;
    for(let i=0;i<SIZE;i++){
      let line;
      if(dir==='left') line = board[i].slice();
      else if(dir==='right') line = board[i].slice().reverse();
      else if(dir==='up') line = board.map(r=>r[i]);
      else line = board.map(r=>r[i]).reverse(); // down
      const res = slideLine(line);
      gained += res.gained;
      let out = res.row;
      if(dir==='right') out = out.reverse();
      else if(dir==='down') out = out.reverse();
      if(dir==='left'||dir==='right') nb[i] = out;
      else for(let r=0;r<SIZE;r++) nb[r][i] = out[r];
    }
    const moved = JSON.stringify(nb)!==before;
    board = nb;
    score += gained;
    if(hasValue(WIN)) status = 'win';
    if(moved) spawn();
    if(!canMove()) status = 'over';
    if(typeof Juice!=='undefined'){
      if(status==='win') Juice.sfx('levelup');
      else if(status==='over') Juice.sfx('boom');
      else if(gained>0) Juice.sfx('click');
    }
    if(status==='win'){ celebrate(); }
    else if(gained>0){ spawnParticle(window.innerWidth/2, window.innerHeight/2, '#f0b90b'); }
    return {moved, gained, status};
  }
  function celebrate(){
    _celebrated = true;
    if(typeof Juice!=='undefined' && Juice.confetti) Juice.confetti(window.innerWidth/2, window.innerHeight*0.3, {n:120, life:2.4});
  }
  function spawnParticle(x,y,color){
    if(typeof Juice==='undefined') return;
    if(Juice.spawnParticle) Juice.spawnParticle(x,y,{color:color||'#f0b90b'});
    else if(Juice.addParticle) Juice.addParticle(x,y,{color:color||'#f0b90b'});
  }
  function getState(){ return {board:board.map(r=>r.slice()), score, status}; }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  function render(){
    if(typeof document==='undefined') return;
    const sc=$('score'),boardEl=$('board'),msg=$('msg'),status=$('status');
    if(!boardEl) return;
    if(sc) sc.textContent=score;
    boardEl.innerHTML='';
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const v=board[r][c];
      const cell=document.createElement('div'); cell.className='cell'; cell.dataset.v=v; cell.textContent=v?v:'';
      boardEl.appendChild(cell);
    }
    if(msg){
      if(status==='win'){ msg.className='msg win'; msg.textContent='🎉 达成 128，胜利！'; }
      else if(status==='over'){ msg.className='msg lose'; msg.textContent='无路可走 · 游戏结束'; }
      else { msg.className='msg'; msg.textContent='用方向键 / WASD / 滑动 移动。'; }
    }
    if(status) status.textContent = status==='playing'?'滑动合成 128':(status==='win'?'已胜利':'已结束');
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const dirs={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
      a:'left',d:'right',w:'up',s:'down',A:'left',D:'right',W:'up',S:'down'};
    window.addEventListener('keydown',e=>{ const d=dirs[e.key]; if(d){ e.preventDefault(); move(d); render(); } });
    // 触屏滑动
    let sx=0, sy=0;
    const b=$('board');
    if(b){
      b.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY; },{passive:true});
      b.addEventListener('touchend',e=>{
        const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
        if(Math.max(Math.abs(dx),Math.abs(dy))<24) return;
        if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left'); else move(dy>0?'down':'up');
        render();
      },{passive:true});
    }
  }
  reset();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ bindUI(); render(); });
    else { bindUI(); render(); }
  }

  if(typeof window!=='undefined'){
    window.__t = {
      SIZE, WIN,
      setRand, reset, setBoard, move, getState,
      hasValue, canMove,
      celebrate, spawnParticle,
      triggerWinEffect:function(){ celebrate(); },
      wasCelebrated:function(){ return _celebrated; },
    };
  }
})();
</script>
</body>
</html>
