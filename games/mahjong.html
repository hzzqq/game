<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // MAHJONG</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#121821; --border:#1f2a38;
    --text:#e6edf3; --dim:#6b7785;
    --red:#f6465d; --green:#02c076; --gold:#f0b90b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:
    radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.06), transparent 60%),
    linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,
    var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
    display:flex;flex-direction:column;align-items:center;padding:14px 10px;min-height:100%}
  .titlebar{width:min(640px,97vw);display:flex;align-items:center;gap:10px;padding:9px 14px;
    background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
  .dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}
  .titlebar .t b{color:var(--red)}

  .meta{width:min(640px,97vw);display:flex;justify-content:space-between;color:var(--dim);
    font-size:12px;margin-bottom:8px;padding:0 4px;flex-wrap:wrap;gap:4px}
  .meta b{color:var(--text)}
  .meta .gold{color:var(--gold)}

  .table{width:min(640px,97vw);position:relative;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:12px;display:grid;grid-template-columns:64px 1fr 64px;grid-template-rows:74px 1fr 64px;gap:8px}
  .seat{background:#0e141d;border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;font-size:11px;color:var(--dim);position:relative}
  .seat .nm{color:var(--text);font-size:11px;letter-spacing:1px}
  .seat .cnt{color:var(--gold);font-size:15px;font-weight:700}
  .seat .ml{font-size:10px;color:var(--red)}
  .seat.top{grid-column:2;grid-row:1}
  .seat.left{grid-column:1;grid-row:2}
  .seat.right{grid-column:3;grid-row:2}
  .center{grid-column:2;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  #discard{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-content:center;max-height:150px;overflow:auto;width:100%}
  .dtile{font-size:12px;padding:3px 5px;border:1px solid var(--border);border-radius:5px;background:#0e141d;min-width:22px;text-align:center}
  .dtile.latest{border-color:var(--gold);box-shadow:0 0 8px rgba(240,185,11,.5)}
  .pilelabel{font-size:10px;color:var(--dim)}

  .handwrap{width:min(640px,97vw);margin-top:10px}
  #hand{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;min-height:54px}
  .htile{font-size:18px;padding:9px 7px;border:1px solid var(--border);border-radius:7px;background:#0e141d;
    min-width:34px;text-align:center;cursor:pointer;user-select:none;touch-action:manipulation;transition:transform .05s}
  .htile:active{transform:translateY(2px)}
  .htile.selected{border-color:var(--red);box-shadow:0 0 12px rgba(246,70,93,.45);transform:translateY(-6px)}
  .htile.drawn{border-color:var(--gold);box-shadow:0 0 10px rgba(240,185,11,.35)}
  .t-wan{color:var(--red)} .t-tiao{color:var(--green)} .t-tong{color:var(--gold)}

  .controls{width:min(640px,97vw);display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}
  .controls button{flex:1;min-width:64px;background:#0e141d;border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:12px 0;cursor:pointer;font-family:inherit;font-size:14px;letter-spacing:1px}
  .controls button:hover:not(:disabled){border-color:var(--dim)}
  .controls button:disabled{opacity:.32;cursor:not-allowed}
  .controls .b-win{color:var(--green);border-color:rgba(2,192,118,.5)}
  .controls .b-pong{color:var(--gold);border-color:rgba(240,185,11,.5)}
  .controls .b-disc{color:var(--red);border-color:rgba(246,70,93,.5)}
  .controls .b-pass{color:var(--dim)}

  #msg{width:min(640px,97vw);margin-top:10px;color:var(--dim);font-size:12px;text-align:center;min-height:16px}
  .hint{width:min(640px,97vw);margin-top:6px;color:var(--dim);font-size:11px;text-align:center;line-height:1.5}

  #overlay{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;background:rgba(10,14,20,.92)}
  #overlay .box{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:30px 40px;text-align:center;max-width:90vw}
  #overlay h2{font-size:24px;margin-bottom:12px;color:var(--green);letter-spacing:1px}
  #overlay p{color:var(--dim);font-size:13px;margin-bottom:16px}
  #overlay .act{background:var(--red);color:#0a0e14;border:none;font-weight:700;padding:11px 26px;font-family:inherit;cursor:pointer;border-radius:8px;font-size:14px}
</style>
</head>
<body>
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t"><b>麻将</b> // MAHJONG TERMINAL</span>
  </div>

  <div class="meta">
    <span>牌墙 WALL: <b id="wallCount">0</b></span>
    <span id="turnInfo">当前: —</span>
    <span class="gold">规则: 108张 / 碰 / 自摸+点炮</span>
  </div>

  <div class="table">
    <div class="seat top" id="opp2"><span class="nm">玩家3</span><span class="cnt">0</span><span class="ml"></span></div>
    <div class="seat left" id="opp3"><span class="nm">玩家4</span><span class="cnt">0</span><span class="ml"></span></div>
    <div class="center">
      <span class="pilelabel">弃牌池 DISCARD</span>
      <div id="discard"></div>
    </div>
    <div class="seat right" id="opp1"><span class="nm">玩家2</span><span class="cnt">0</span><span class="ml"></span></div>
  </div>

  <div class="handwrap">
    <div id="hand"></div>
  </div>

  <div class="controls">
    <button id="btnDiscard" class="b-disc" disabled>出</button>
    <button id="btnPong" class="b-pong" disabled>碰</button>
    <button id="btnWin" class="b-win" disabled>胡</button>
    <button id="btnPass" class="b-pass" disabled>过</button>
  </div>

  <div id="msg"></div>
  <div class="hint">点击手牌选中 → 按「出」打牌。可「碰」/「胡」时按钮亮起。胡 = 4 面子 + 1 将（对子）。</div>

  <div id="overlay">
    <div class="box">
      <h2 id="overlayText">—</h2>
      <p id="overlaySub"></p>
      <button class="act" id="btnNew">新局 / NEW GAME</button>
    </div>
  </div>

<script>
'use strict';

/* ============ tile helpers ============ */
function buildWall(){
  const w=[];
  for(let s=0;s<3;s++) for(let r=0;r<9;r++) for(let c=0;c<4;c++) w.push(s*9+r);
  return shuffle(w);
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=a[i]; a[i]=a[j]; a[j]=tmp; }
  return a;
}
function countTile(arr,t){ let n=0; for(let i=0;i<arr.length;i++) if(arr[i]===t) n++; return n; }
function removeTile(arr,t){ const i=arr.indexOf(t); if(i>=0) arr.splice(i,1); return i>=0; }

/* ============ win check (recursive decomposition) ============
   A winning hand (14 tiles) decomposes into 4 melds (triplet 刻子 or
   sequence 顺子) + 1 pair (将). exposedMelds = already-exposed pongs,
   reducing the number of melds still needed from the hidden hand.        */
function canFormMelds(counts, need){
  let i=0;
  while(i<27 && counts[i]===0) i++;
  if(i===27) return need===0;     // all tiles consumed
  if(need===0) return false;      // tiles left but no melds allowed
  // try triplet
  if(counts[i]>=3){
    counts[i]-=3;
    if(canFormMelds(counts, need-1)){ counts[i]+=3; return true; }
    counts[i]+=3;
  }
  // try sequence (must stay within the same suit: i%9 <= 6)
  if((i%9)<=6 && counts[i+1]>0 && counts[i+2]>0){
    counts[i]--; counts[i+1]--; counts[i+2]--;
    if(canFormMelds(counts, need-1)){ counts[i]++; counts[i+1]++; counts[i+2]++; return true; }
    counts[i]++; counts[i+1]++; counts[i+2]++;
  }
  return false;
}
function canWin(tiles, exposedMelds){
  if(exposedMelds===undefined) exposedMelds=0;
  const need = 4 - exposedMelds;
  if(need<0) return false;
  const counts=new Array(27).fill(0);
  for(let i=0;i<tiles.length;i++) counts[tiles[i]]++;
  for(let i=0;i<27;i++){
    if(counts[i]>=2){
      counts[i]-=2;
      const ok=canFormMelds(counts, need);
      counts[i]+=2;
      if(ok) return true;
    }
  }
  return false;
}

/* ============ AI discard heuristic: most isolated tile ============ */
function mostIsolated(hand){
  if(hand.length===0) return null;
  const counts={};
  for(let i=0;i<hand.length;i++) counts[hand[i]]=(counts[hand[i]]||0)+1;
  let best=hand[0], bestScore=Infinity;
  for(let i=0;i<hand.length;i++){
    const t=hand[i], r=t%9;
    let score=(counts[t]-1)*3;            // duplicates are valuable
    if(r>0 && counts[t-1]) score+=2;       // adjacent lower (same suit)
    if(r<8 && counts[t+1]) score+=2;       // adjacent higher
    if(r>1 && counts[t-2]) score+=1;
    if(r<7 && counts[t+2]) score+=1;
    if(score<bestScore){ bestScore=score; best=t; }
  }
  return best;
}

/* ============ game state ============ */
let wall=[], hands=[[],[],[],[]], melds=[0,0,0,0], discards=[];
let currentPlayer=0, selected=null, drawnTile=null, over=false;
let claimPhase=false, pendingDiscard=null, pendingDiscarder=null, humanSelfWin=false;
let messageText='';

function tileLabel(t){ const r=t%9+1; const s=Math.floor(t/9); return r+['万','条','筒'][s]; }
function tileClass(t){ return ['t-wan','t-tiao','t-tong'][Math.floor(t/9)]; }
function msg(t){ messageText=t; render(); }
function setText(id,t){ const e=document.getElementById(id); if(e) e.textContent=t; }
function btn(id){ return document.getElementById(id); }

/* ============ flow ============ */
function newGame(){
  wall=buildWall();
  hands=[[],[],[],[]];
  melds=[0,0,0,0];
  discards=[];
  currentPlayer=0; selected=null; drawnTile=null; over=false;
  claimPhase=false; pendingDiscard=null; pendingDiscarder=null; humanSelfWin=false;
  for(let i=0;i<13;i++) for(let p=0;p<4;p++) hands[p].push(wall.pop());
  for(let p=0;p<4;p++) hands[p].sort((a,b)=>a-b);
  hideOverlay();
  msg('新局开始 — 你是庄家，请出牌');
  render();
  startTurn(0);
}

function startTurn(p){
  if(over) return;
  if(wall.length===0){ drawGame(); return; }
  const t=wall.pop();
  hands[p].push(t);
  hands[p].sort((a,b)=>a-b);
  if(p===0){ drawnTile=t; selected=null; }
  else { drawnTile=null; }
  render();
  if(p===0){
    humanSelfWin = canWin(hands[0], melds[0]);
    msg(humanSelfWin ? '你的回合 — 可自摸胡牌！' : '你的回合 — 请出牌');
  }else{
    if(canWin(hands[p], melds[p])){ winGame(p,'自摸'); return; }
    msg('玩家'+(p+1)+' 思考中…');
    setTimeout(function(){ aiDiscard(p); }, 480);
  }
}

function aiDiscard(p){
  if(over) return;
  const t=mostIsolated(hands[p]);
  removeTile(hands[p], t);
  discards.push(t);
  render();
  resolveDiscard(t, p);
}

function resolveDiscard(tile, discarder){
  if(over) return;
  // 1) AI ron (point-win) has top priority
  for(let p=1;p<4;p++){
    if(p===discarder) continue;
    if(canWin(hands[p].concat(tile), melds[p])){ winGame(p,'胡'); return; }
  }
  // 2) human ron or pong -> pause for decision (cannot claim own discard)
  if(discarder!==0){
    const hRon = canWin(hands[0].concat(tile), melds[0]);
    const hPong = countTile(hands[0], tile)>=2;
    if(hRon || hPong){
      claimPhase=true; pendingDiscard=tile; pendingDiscarder=discarder;
      msg(hRon ? '可胡！选择 胡 或 过' : '可碰 — 选择 碰 / 过');
      render();
      return;
    }
  }
  // 3) AI pong (sometimes)
  for(let p=1;p<4;p++){
    if(p===discarder) continue;
    if(countTile(hands[p], tile)>=2 && melds[p]<4 && Math.random()<0.35){ doPong(p, tile, discarder); return; }
  }
  // 4) no claim -> next player draws
  nextTurn(discarder);
}

function doPong(p, tile, discarder){
  removeTile(hands[p], tile); removeTile(hands[p], tile);
  melds[p]++;
  discards.pop();                       // claimed tile leaves the pile
  currentPlayer=p; drawnTile=null; selected=null; claimPhase=false; pendingDiscard=null;
  render();
  if(p===0){
    if(typeof Juice!=='undefined') Juice.sfx('hit');
    msg('你碰了 — 请出牌');
  }else{
    setTimeout(function(){
      if(over) return;
      const dt=mostIsolated(hands[p]);
      removeTile(hands[p], dt);
      discards.push(dt);
      render();
      resolveDiscard(dt, p);
    }, 480);
  }
}

function nextTurn(d){ if(over) return; currentPlayer=(d+1)%4; startTurn(currentPlayer); }

function winGame(p, type){
  over=true;
  const human = (p===0);
  showOverlay((human?'你赢了':'玩家'+(p+1)+' 胜'), type==='自摸' ? '自摸 (self-draw)' : '点炮胡 (ron)');
  msg((human?'你胡了 ('+type+')':'玩家'+(p+1)+' 胡 ('+type+')'));
  if(typeof Juice!=='undefined'){
    if(human){ Juice.sfx('win'); Juice.best('mahjong',1); Juice.rank(1); Juice.achievement('胡牌！'); }
    else { Juice.sfx('lose'); Juice.best('mahjong',1); Juice.rank(1); }
  }
  render();
}
function drawGame(){
  over=true;
  showOverlay('流局 DRAW', '牌墙已空');
  msg('牌墙耗尽 — 流局');
  if(typeof Juice!=='undefined') Juice.sfx('click');
  render();
}

/* ============ human actions ============ */
function humanDiscard(){
  if(over || claimPhase || currentPlayer!==0) return;
  if(selected===null){ msg('请先点选一张手牌'); return; }
  if(!hands[0].includes(selected)){ msg('无效选择'); return; }
  const t=selected;
  removeTile(hands[0], t);
  drawnTile=null; selected=null; humanSelfWin=false;
  discards.push(t);
  if(typeof Juice!=='undefined') Juice.sfx('click');
  render();
  resolveDiscard(t, 0);
}
function humanPongClick(){
  if(!claimPhase || pendingDiscard===null) return;
  doPong(0, pendingDiscard, pendingDiscarder);
}
function humanWinClick(){
  if(over) return;
  if(claimPhase){
    if(canWin(hands[0].concat(pendingDiscard), melds[0])) winGame(0,'胡');
    return;
  }
  if(currentPlayer===0 && canWin(hands[0], melds[0])) winGame(0,'自摸');
}
function humanPassClick(){
  if(!claimPhase) return;
  const t=pendingDiscard, d=pendingDiscarder;
  claimPhase=false; pendingDiscard=null;
  for(let p=1;p<4;p++){
    if(p===d) continue;
    if(countTile(hands[p], t)>=2 && melds[p]<4 && Math.random()<0.35){ doPong(p, t, d); return; }
  }
  nextTurn(d);
}

/* ============ render ============ */
function render(){
  setText('wallCount', wall.length);
  for(let p=1;p<4;p++){
    const box=document.getElementById('opp'+p);
    if(box){
      box.querySelector('.cnt').textContent=hands[p].length;
      box.querySelector('.ml').textContent=melds[p]>0?('碰×'+melds[p]):'';
    }
  }
  const dp=document.getElementById('discard');
  if(dp){
    let html='';
    const start=Math.max(0, discards.length-30);
    for(let i=start;i<discards.length;i++){
      const last=(i===discards.length-1);
      html+='<span class="dtile '+(last?'latest ':'')+tileClass(discards[i])+'">'+tileLabel(discards[i])+'</span>';
    }
    dp.innerHTML=html;
  }
  const hh=document.getElementById('hand');
  if(hh){
    let dh=hands[0].slice().sort((a,b)=>a-b);
    if(drawnTile!==null){ const idx=dh.indexOf(drawnTile); if(idx>=0){ dh.splice(idx,1); dh.push(drawnTile); } }
    let html='';
    for(let i=0;i<dh.length;i++){
      const v=dh[i];
      const sel=(selected===v)?'selected ':'';
      const dr=(v===drawnTile && drawnTile!==null)?'drawn ':'';
      html+='<span class="htile '+sel+dr+tileClass(v)+'" data-val="'+v+'">'+tileLabel(v)+'</span>';
    }
    hh.innerHTML=html;
  }
  setText('turnInfo', over?'游戏结束':('当前: '+(currentPlayer===0?'你':'玩家'+(currentPlayer+1))));
  setText('msg', messageText);

  const isHumanTurn=(!over && !claimPhase && currentPlayer===0);
  const hPong=claimPhase && pendingDiscard!==null && countTile(hands[0], pendingDiscard)>=2;
  const hRon=claimPhase && pendingDiscard!==null && canWin(hands[0].concat(pendingDiscard), melds[0]);
  btn('btnDiscard').disabled=!isHumanTurn;
  btn('btnPong').disabled=!hPong;
  btn('btnWin').disabled=!( (claimPhase && hRon) || (isHumanTurn && humanSelfWin) );
  btn('btnPass').disabled=!claimPhase;
}

function showOverlay(title, sub){
  const o=document.getElementById('overlay');
  if(o){ setText('overlayText', title); setText('overlaySub', sub||''); o.style.display='flex'; }
}
function hideOverlay(){ const o=document.getElementById('overlay'); if(o) o.style.display='none'; }

/* ============ wire up ============ */
(function init(){
  const handEl=document.getElementById('hand');
  handEl.addEventListener('click', function(e){
    const t=e.target.closest('.htile');
    if(!t) return;
    const v=parseInt(t.getAttribute('data-val'),10);
    selected=(selected===v)?null:v;
    render();
  });
  btn('btnDiscard').addEventListener('click', humanDiscard);
  btn('btnPong').addEventListener('click', humanPongClick);
  btn('btnWin').addEventListener('click', humanWinClick);
  btn('btnPass').addEventListener('click', humanPassClick);
  btn('btnNew').addEventListener('click', newGame);

  /* ---------- 测试钩子（非侵入，仅暴露纯函数） ---------- */
  window.__t = {
    buildWall, shuffle, countTile, removeTile,
    canFormMelds, canWin, mostIsolated,
    tileLabel, tileClass
  };

  newGame();
})();
</script>
</body>
</html>
