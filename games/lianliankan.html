<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 连连看</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(2,192,118,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(760px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--green)}
  .wrap{width:min(760px,98vw)}
  .hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--dim)}
  .hud .sc{color:var(--gold);font-weight:700;font-size:16px}
  .hud .btns{display:flex;gap:8px}
  .hud button{background:#0e141d;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;cursor:pointer;font-family:inherit}
  .hud button:hover{border-color:var(--green);color:var(--green)}
  .board{display:grid;gap:4px;background:var(--border);border:2px solid var(--border);border-radius:10px;padding:6px;justify-content:center}
  .cell{width:42px;height:42px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:#0c121a;border:1px solid #0c121a;transition:.1s;user-select:none}
  .cell.filled{background:#16202c;border-color:#26344a}
  .cell.filled:hover{border-color:var(--green)}
  .cell.sel{border-color:var(--gold);box-shadow:0 0 12px rgba(240,185,11,.6);transform:scale(1.06)}
  .cell.gone{visibility:hidden}
  .cell.hint{border-color:var(--red);box-shadow:0 0 12px rgba(246,70,93,.6);animation:hintp 0.6s ease infinite alternate}
  @keyframes hintp{from{opacity:.6}to{opacity:1}}
  .msg{text-align:center;min-height:22px;margin-top:10px;font-size:14px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(760px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>连连看</b> LIANLIANKAN</span></div>
  <div class="wrap">
    <div class="hud">
      <span>得分 SCORE · <span class="sc" id="score">0</span> ｜ 剩余 <span id="left">0</span></span>
      <div class="btns"><button id="hint">提示 HINT</button><button id="shuffle">重排 SHUFFLE</button><button id="restart">重开</button></div>
    </div>
    <div class="board" id="board"></div>
    <div class="msg" id="msg">点击两个相同图案，路径不超两拐角即可消除。</div>
  </div>
  <div class="foot">经典连连看：相同图案且可用不超过两个拐角的路径连通即消除。无路可走自动重排。红涨绿跌，暗色终端风。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  /* ===================== 纯逻辑核心 ===================== */
  const ROWS = 8, COLS = 9, SYMS = 9; // 72 格，每符号 8 个（4 对）
  const SYM_CHARS = ['🍎','🍋','🍇','🍉','⭐','💎','🔔','🍀','🌹'];

  let _rand = Math.random;
  function setRand(fn){ _rand = fn; }
  function shuffleArr(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(_rand()*(i+1)); const t=a[i];a[i]=a[j];a[j]=t; } return a; }

  let grid; // grid[r][c] = symbol id (1..SYMS) or 0
  let score, sel, combo, gameOver;

  function initGrid(){
    const total = ROWS*COLS; // 72
    const cells = [];
    for(let s=1;s<=SYMS;s++){ const pairCount = Math.floor(total/SYMS/2); for(let k=0;k<pairCount*2;k++) cells.push(s); }
    while(cells.length < total) cells.push(1);
    while(cells.length > total) cells.pop();
    shuffleArr(cells);
    grid = [];
    for(let r=0;r<ROWS;r++){ grid.push(cells.slice(r*COLS, r*COLS+COLS)); }
  }
  function reset(){ initGrid(); score=0; sel=null; combo=0; gameOver=false; }
  function countLeft(){ let n=0; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]!==0) n++; return n; }
  function isWin(){ return countLeft()===0; }

  function inField(r,c){ return r>=-1 && r<=ROWS && c>=-1 && c<=COLS; }
  function passable(r,c,tr,tc){
    if(r===tr && c===tc) return true;          // 终点
    if(r<0||r>=ROWS||c<0||c>=COLS) return true; // 外圈通道
    return grid[r][c]===0;                       // 棋盘内空格
  }
  // 能否用 ≤2 拐角路径连通（a,b 为 {r,c}）
  function reachable(a,b){
    if(a.r===b.r && a.c===b.c) return false;
    if(grid[a.r][a.c]===0 || grid[b.r][b.c]===0) return false;
    if(grid[a.r][a.c] !== grid[b.r][b.c]) return false;
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    const seen={};
    const q=[];
    for(let di=0;di<4;di++){ const nr=a.r+dirs[di][0], nc=a.c+dirs[di][1]; if(inField(nr,nc)&&passable(nr,nc,b.r,b.c)) q.push([nr,nc,di,0]); }
    while(q.length){
      const [r,c,d,t]=q.shift();
      if(r===b.r && c===b.c) return true;
      for(let di=0;di<4;di++){
        const nt=t+(di!==d?1:0); if(nt>2) continue;
        const nr=r+dirs[di][0], nc=c+dirs[di][1];
        if(!inField(nr,nc) || !passable(nr,nc,b.r,b.c)) continue;
        const key=r+','+c+','+di;
        if(seen[key]!==undefined && seen[key]<=nt) continue;
        seen[key]=nt; q.push([nr,nc,di,nt]);
      }
    }
    return false;
  }

  // 尝试消除一对（按坐标 {r,c}）
  function tryRemove(a,b){
    if(!a||!b) return false;
    if(grid[a.r][a.c]===0 || grid[b.r][b.c]===0) return false;
    if(grid[a.r][a.c]!==grid[b.r][b.c]) return false;
    if(!reachable(a,b)) return false;
    grid[a.r][a.c]=0; grid[b.r][b.c]=0;
    combo++; const gain = 10 + Math.min(combo-1,5)*2; score += gain;
    if(typeof Juice!=='undefined'){ Juice.sfx('pickup'); }
    return true;
  }

  // 找一对可消除的（提示）
  function findHint(){
    const pts=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]!==0) pts.push({r,c});
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      if(grid[pts[i].r][pts[i].c]===grid[pts[j].r][pts[j].c] && reachable(pts[i],pts[j])) return [pts[i],pts[j]];
    }
    return null;
  }
  function hasMove(){ return findHint()!==null; }
  function reshuffle(){
    const vals=[]; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]!==0) vals.push(grid[r][c]);
    shuffleArr(vals); let k=0;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]!==0) grid[r][c]=vals[k++];
    sel=null; combo=0;
  }

  /* ===================== UI ===================== */
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  let boardEl=null, cellEls=[];
  function buildBoard(){
    if(typeof document==='undefined') return;
    boardEl=$('board'); if(!boardEl) return;
    boardEl.style.gridTemplateColumns='repeat('+COLS+',42px)';
    boardEl.innerHTML=''; cellEls=[];
    for(let r=0;r<ROWS;r++){ cellEls.push([]); for(let c=0;c<COLS;c++){
      const e=document.createElement('div'); e.className='cell'; e.dataset.r=r; e.dataset.c=c;
      e.onclick=()=>onCell(r,c);
      boardEl.appendChild(e); cellEls[r].push(e);
    }}
  }
  function render(){
    if(typeof document==='undefined') return;
    const sc=$('score'),lf=$('left'),msg=$('msg');
    if(sc) sc.textContent=score; if(lf) lf.textContent=countLeft();
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const e=cellEls[r]&&cellEls[r][c]; if(!e) continue;
      const v=grid[r][c];
      e.className='cell'+(v===0?' gone':(v!==0?' filled':''));
      e.textContent = v===0 ? '' : SYM_CHARS[(v-1)%SYM_CHARS.length];
      if(sel && sel.r===r && sel.c===c) e.classList.add('sel');
    }
    if(msg){ if(gameOver||isWin()){ msg.className='msg win'; msg.textContent='🎉 全部消除！得分 '+score; } else { msg.className='msg'; msg.textContent='点击两个相同图案消除。'; } }
  }
  function onCell(r,c){
    if(gameOver||grid[r][c]===0) return;
    if(!sel){ sel={r,c}; render(); return; }
    if(sel.r===r && sel.c===c){ sel=null; render(); return; }
    if(tryRemove(sel,{r,c})){
      sel=null;
      if(typeof Juice!=='undefined'){ Juice.flash&&Juice.flash('#02c076'); }
      if(isWin()){ gameOver=true; if(typeof Juice!=='undefined'){ Juice.sfx('levelup'); Juice.best('lianliankan',score); } }
    } else { sel={r,c}; }
    render();
    if(!gameOver && !hasMove()){ reshuffle(); render(); }
  }
  function bindUI(){
    if(typeof document==='undefined') return;
    const h=$('hint'),s=$('shuffle'),rs=$('restart');
    if(h) h.onclick=()=>{ const p=findHint(); if(p){ /* 高亮 */ cellEls[p[0].r][p[0].c].classList.add('hint'); cellEls[p[1].r][p[1].c].classList.add('hint'); setTimeout(()=>{cellEls[p[0].r][p[0].c].classList.remove('hint');cellEls[p[1].r][p[1].c].classList.remove('hint');},1200); } };
    if(s) s.onclick=()=>{ reshuffle(); render(); };
    if(rs) rs.onclick=()=>{ reset(); render(); };
  }
  reset();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ buildBoard(); bindUI(); render(); });
    else { buildBoard(); bindUI(); render(); }
  }

  if(typeof window!=='undefined'){
    window.__t = {
      ROWS, COLS, SYMS, SYM_CHARS,
      setRand, initGrid, reset, reachable, tryRemove, findHint, hasMove, reshuffle,
      countLeft, isWin,
      getGrid:()=>grid, setCell:(r,c,v)=>{grid[r][c]=v;}, getCell:(r,c)=>grid[r][c],
      getScore:()=>score, setScore:(v)=>{score=v;}, getSel:()=>sel, setSel:(v)=>{sel=v;},
      getCombo:()=>combo, isGameOver:()=>gameOver,
    };
  }
})();
</script>
</body>
</html>
