<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TERMINAL // 斗兽棋</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--border:#1f2a38;--text:#e6edf3;--dim:#6b7785;--red:#f6465d;--green:#02c076;--gold:#f0b90b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, rgba(246,70,93,.05), transparent 60%),linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px) 0 0/100% 3px,var(--bg);
    color:var(--text);font-family:'JetBrains Mono','Fira Code',Consolas,monospace;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
  .titlebar{width:min(520px,98vw);display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,#16202c,#10161f);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:13px;letter-spacing:1px}.titlebar .t b{color:var(--red)}
  .wrap{width:min(520px,98vw)}
  .hud{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:10px}
  .hud .st{color:var(--gold);font-weight:700}
  .board{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--panel);padding:8px;border:1px solid var(--border);border-radius:10px;width:min(420px,94vw);margin:0 auto}
  .cell{aspect-ratio:1/1;background:#0e141d;border:1px solid #1a2230;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;font-weight:700}
  .cell.water{background:#0b1a2b;border-color:#16324a}
  .cell.trap{background:#241a0e;border-color:#4a3a16}
  .cell.den{background:#1c1030;border-color:#3a2360}
  .cell.sel{box-shadow:0 0 0 3px var(--gold)}
  .cell .b{color:var(--red)} .cell .w{color:var(--green)}
  .controls{display:flex;gap:8px;margin-top:10px;justify-content:center}
  .controls button{background:var(--red);color:#0a0e14;border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .controls button:hover{filter:brightness(1.1)}
  .msg{text-align:center;min-height:20px;margin-top:10px;font-size:13px;color:var(--dim)}
  .msg.win{color:var(--gold);font-weight:700}
  .foot{width:min(520px,98vw);text-align:center;color:var(--dim);font-size:11px;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
  <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="t">TERMINAL // <b>斗兽棋</b> JUNGLE</span></div>
  <div class="wrap">
    <div class="hud"><span>轮到 TURN · <span class="st" id="turn">红(下)</span></span><span>胜方 WIN · <span class="st" id="win">—</span></span></div>
    <div class="board" id="board"></div>
    <div class="controls"><button id="new" class="ghost">新局 NEW</button></div>
    <div class="msg" id="msg">红方在下、蓝方在上。点己方棋子→点相邻格移动/吃子（大吃小、同级可吃；鼠克象、象不吃鼠）。踏入对方兽穴即胜。</div>
  </div>
  <div class="foot">斗兽棋（动物棋）：象8>狮7>虎6>豹5>狼4>狗3>猫2>鼠1；鼠可入水、克象；陷阱令对方棋子变 0 级；进敌穴获胜。</div>

<script src="juice.js"></script>
<script>
(function(){
  "use strict";
  const R=9, C=7;
  const RANK={1:'鼠',2:'猫',3:'狗',4:'狼',5:'豹',6:'虎',7:'狮',8:'象'};
  let board, turn, over, winner, sel;
  function newGame(){
    board=Array.from({length:R},()=>new Array(C).fill(null));
    const set=(r,c,side,rank)=>board[r][c]={side,rank};
    // 蓝方(上,w)
    set(0,0,'w',7); set(0,6,'w',6); set(1,1,'w',3); set(1,5,'w',2);
    set(2,0,'w',1); set(2,2,'w',5); set(2,4,'w',4); set(2,6,'w',8);
    // 红方(下,b)
    set(8,6,'b',7); set(8,0,'b',6); set(7,5,'b',3); set(7,1,'b',2);
    set(6,6,'b',1); set(6,4,'b',5); set(6,2,'b',4); set(6,0,'b',8);
    turn='b'; over=false; winner=null; sel=null;
  }
  function isWater(r,c){ return (r>=3&&r<=5)&&(c===1||c===2||c===4||c===5); }
  function isDen(r,c){ return (r===0&&c===3)?'w':(r===8&&c===3)?'b':null; }
  function isTrap(r,c){ if(r===0&&(c===2||c===4))return 'w'; if(r===1&&c===3)return 'w'; if(r===8&&(c===2||c===4))return 'b'; if(r===7&&c===3)return 'b'; return null; }
  function effRank(r,c){ const p=board[r][c]; if(!p) return 0; if(isTrap(r,c)&&isTrap(r,c)!==p.side) return 0; return p.rank; }
  function canCapture(atk,tr,tc){
    const def=board[tr][tc]; if(!def) return false;
    const ar=atk.rank, dr=def.rank;
    // 陷阱优先：防守方在敌方陷阱上 effRank 降为 0，任何棋子可吃（含象吃鼠）。
    // 必须在「象不吃鼠」特殊规则之前判定，否则鼠蹲敌方陷阱时象仍无法吃。
    if(effRank(tr,tc)===0) return true;
    if(ar===1&&dr===8) return true;        // 鼠吃象
    if(ar===8&&dr===1) return false;       // 象不吃鼠
    return effRank(tr,tc) <= ar;           // 进攻方用真实 rank；陷阱已在 effRank 处理
  }
  function move(fr,fc,tr,tc){
    if(over) return false;
    const p=board[fr][fc]; if(!p||p.side!==turn) return false;
    if(Math.abs(fr-tr)+Math.abs(fc-tc)!==1) return false;     // 仅上下左右一步
    if(isWater(tr,tc) && p.rank!==1) return false;            // 非鼠不入水
    const den=isDen(tr,tc); if(den==='b'&&turn==='b') return false; // 不能进自家穴
    const target=board[tr][tc];
    if(target){ if(target.side===turn) return false; if(!canCapture(p,tr,tc)) return false; }
    else { if(isWater(fr,fc) && p.rank===1 && !isWater(tr,tc)) { /* 鼠出水到陆地，允许 */ } }
    board[tr][tc]=p; board[fr][fc]=null;
    if(target){ Juice.sfx('hit'); Juice.addTrauma(.25); }
    if(den && den!==turn){ over=true; winner=turn; Juice.sfx('win'); Juice.flash('#02c076',.5); return true; }
    turn = turn==='b'?'w':'b';
    return true;
  }
  function getBoard(){ return board.map(r=>r.map(c=>c?{side:c.side,rank:c.rank}:null)); }
  function getTurn(){ return turn; }
  function isOver(){ return over; }
  function getWinner(){ return winner; }
  function getPiece(r,c){ return board[r][c]?{...board[r][c]}:null; }
  function setBoard(b,t){ board=b.map(r=>r.map(c=>c?{side:c.side,rank:c.rank}:null)); turn=t||'b'; over=false; winner=null; sel=null; }
  function $(id){ return (typeof document!=='undefined')?document.getElementById(id):null; }
  let cellEls=[];
  function build(){
    if(typeof document==='undefined') return;
    const bd=$('board'); if(!bd) return; bd.innerHTML=''; cellEls=[];
    for(let r=0;r<R;r++) for(let c=0;c<C;c++){
      const el=document.createElement('div'); el.className='cell'+(isWater(r,c)?' water':'')+(isTrap(r,c)?' trap':'')+(isDen(r,c)?' den':'');
      el.dataset.r=r; el.dataset.c=c;
      el.addEventListener('click',()=>{ if(over) return;
        if(sel){ if(move(sel[0],sel[1],r,c)) sel=null; else if(board[r][c]&&board[r][c].side===turn) sel=[r,c]; else sel=null; }
        else if(board[r][c]&&board[r][c].side===turn) sel=[r,c];
        render();
      });
      bd.appendChild(el); cellEls.push(el);
    }
  }
  function render(){
    if(typeof document==='undefined') return;
    cellEls.forEach((el,i)=>{ const r=Math.floor(i/C),c=i%C; const p=board[r][c];
      el.innerHTML=p?'<span class="'+(p.side==='b'?'b':'w')+'">'+RANK[p.rank]+'</span>':(isDen(r,c)?'🏠':isTrap(r,c)?'⚠':isWater(r,c)?'≈':'');
      el.className='cell'+(isWater(r,c)?' water':'')+(isTrap(r,c)?' trap':'')+(isDen(r,c)?' den':'')+(sel&&sel[0]===r&&sel[1]===c?' sel':'');
    });
    const t=$('turn'),w=$('win'),msg=$('msg');
    if(t) t.textContent=turn==='b'?'红(下)':'蓝(上)';
    if(w) w.textContent=over?(winner==='b'?'红':'蓝'):'—';
    if(msg){ if(over){ msg.className='msg win'; msg.textContent='🏁 '+(winner==='b'?'红方':'蓝方')+' 攻入兽穴，获胜！'; } else msg.className='msg'; }
  }
  function bindUI(){ if(typeof document==='undefined') return; const nb=$('new'); if(nb) nb.onclick=()=>{ newGame(); build(); render(); }; }
  newGame();
  if(typeof document!=='undefined'){
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{ build(); bindUI(); render(); });
    else { build(); bindUI(); render(); }
  }
  if(typeof window!=='undefined'){
    window.__t={ R, C, RANK, newGame, move, getBoard, getTurn, isOver, getWinner, getPiece, isWater, isDen, isTrap, setBoard };
  }
})();
</script>
</body>
</html>
